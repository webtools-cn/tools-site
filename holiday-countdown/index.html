<script>
function hcGetHolidays(year){
  const y = year;
  const lunarNY = hcLunarNewYear(y);
  const lantern = new Date(y, 1, 12);
  const qingming = new Date(y, 3, 4);
  const dragonBoat = hcDragonBoat(y);
  const midAutumn = hcMidAutumn(y);
  const doubleNinth = new Date(y, 9, 29);
  return [
    {name:'元旦', date:new Date(y,0,1), icon:'🎉'},
    {name:'春节', date:lunarNY, icon:'🧧'},
    {name:'元宵节', date:lantern, icon:'🏮'},
    {name:'清明节', date:qingming, icon:'🌿'},
    {name:'劳动节', date:new Date(y,4,1), icon:'💪'},
    {name:'端午节', date:dragonBoat, icon:'🐉'},
    {name:'七夕节', date:new Date(y,7,10), icon:'💕'},
    {name:'中秋节', date:midAutumn, icon:'🌙'},
    {name:'国庆节', date:new Date(y,9,1), icon:'🇨🇳'},
    {name:'重阳节', date:doubleNinth, icon:'🌺'},
    {name:'圣诞节', date:new Date(y,11,25), icon:'🎄'},
    {name:'除夕', date:new Date(lunarNY.getTime()-86400000), icon:'🎊'},
    {name:'情人节', date:new Date(y,1,14), icon:'💝'},
    {name:'万圣节', date:new Date(y,9,31), icon:'🎃'},
    {name:'感恩节', date:hcThanksgiving(y), icon:'🦃'},
    {name:'母亲节', date:hcMotherDay(y), icon:'🌷'},
    {name:'父亲节', date:hcFatherDay(y), icon:'👔'},
    {name:'教师节', date:new Date(y,8,10), icon:'📚'},
  ];
}
function hcLunarNewYear(y){
  const ly = new Date(y, 0, 21 + Math.floor((y-1900)*0.2422));
  const offsets = {2024:{m:0,d:10},2025:{m:0,d:29},2026:{m:1,d:17},2027:{m:1,d:6},2028:{m:0,d:26},2029:{m:1,d:13},2030:{m:1,d:3}};
  if(offsets[y]) return new Date(y, offsets[y].m, offsets[y].d);
  if(y<2024) return new Date(y, 0, 22);
  return new Date(y, 1, 12 - ((y-2026)*11%30));
}
function hcDragonBoat(y){
  const offsets = {2024:{m:5,d:10},2025:{m:4,d:31},2026:{m:5,d:19},2027:{m:5,d:9},2028:{m:4,d:28},2029:{m:5,d:16},2030:{m:5,d:6}};
  if(offsets[y]) return new Date(y, offsets[y].m-1, offsets[y].d);
  return new Date(y, 4, 28 + (y%10));
}
function hcMidAutumn(y){
  const offsets = {2024:{m:8,d:17},2025:{m:9,d:6},2026:{m:8,d:27},2027:{m:8,d:16},2028:{m:9,d:4},2029:{m:8,d:22},2030:{m:8,d:12}};
  if(offsets[y]) return new Date(y, offsets[y].m-1, offsets[y].d);
  return new Date(y, 8, 15 + (y%3));
}
function hcThanksgiving(y){
  const d = new Date(y, 10, 1);
  d.setDate(d.getDate() + (3 - d.getDay() + 7) % 7 + 21);
  return d;
}
function hcMotherDay(y){
  const d = new Date(y, 4, 1);
  d.setDate(d.getDate() + (6 - d.getDay() + 7) % 7 + 7);
  return d;
}
function hcFatherDay(y){
  const d = new Date(y, 5, 1);
  d.setDate(d.getDate() + (6 - d.getDay() + 7) % 7 + 14);
  return d;
}
function hcDaysDiff(a, b){
  return Math.round((b.getTime() - a.getTime()) / 86400000);
}
function hcRender(){
  const now = new Date();
  const year = now.getFullYear();
  const all = hcGetHolidays(year).concat(hcGetHolidays(year+1));
  const future = all.filter(h => h.date >= now || hcDaysDiff(now, h.date) >= -1);
  future.sort((a,b)=>a.date-b.date);
  const next = future[0];
  const days = hcDaysDiff(now, next.date);
  const hero = document.getElementById('hcHero');
  if(days === 0){
    hero.innerHTML = '<div class="next-label">今天就是</div><div class="holiday-name">'+next.icon+' '+next.name+'</div><div class="countdown-num" style="color:#4ade80">🎉</div><div class="countdown-label">节日快乐！</div>';
  } else {
    hero.innerHTML = '<div class="next-label">距离</div><div class="holiday-name">'+next.icon+' '+next.name+'</div><div class="countdown-num">'+days+'</div><div class="countdown-label">天</div><div class="date-info">日期：'+next.date.getFullYear()+'年'+(next.date.getMonth()+1)+'月'+next.date.getDate()+'日</div>';
  }
  const grid = document.getElementById('hcGrid');
  const hols = hcGetHolidays(year);
  hols.sort((a,b)=>a.date-b.date);
  grid.innerHTML = hols.map(h => {
    const d = hcDaysDiff(now, h.date);
    let cls = 'future', label = d+' 天';
    if(d === 0){ cls='today'; label='今天！'; }
    else if(d < 0){ cls='passed'; label='已过'; }
    return '<div class="holiday-card"><div class="hc-name">'+h.icon+' '+h.name+'</div><div class="hc-date">'+(h.date.getMonth()+1)+'月'+h.date.getDate()+'日</div><div class="hc-days '+cls+'">'+label+'</div></div>';
  }).join('');
}
document.addEventListener('DOMContentLoaded', hcRender);
</script>
