function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t;}return a;}
function fraction(num,den){
  if(num===0) return '0';
  if(den===0) return '∞';
  var g=gcd(num,den);
  num/=g;den/=g;
  if(den===1) return num.toString();
  return num+'/'+den;
}

    if(scene==='coin'){
      var n=parseInt(document.getElementById('coinTosses').value);
      var k=parseInt(document.getElementById('coinHeads').value);
      if(k>n){result='<p style="color:#f87171">期望次数不能大于抛掷次数</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var comb=1;
      for(var i=1;i<=k;i++) comb=comb*(n-k+i)/i;
      var prob=comb*Math.pow(0.5,n);
      var total=Math.pow(2,n);
      result='<table class="data"><tr><th>参数</th><th>值</th></tr>';
      result+='<tr><td>抛掷次数</td><td>'+n+'</td></tr>';
      result+='<tr><td>期望正面</td><td>'+k+'</td></tr>';
      result+='<tr><td>所有可能结果</td><td>2<sup>'+n+'</sup> = '+total+'</td></tr>';
      result+='<tr><td>有利结果数</td><td>C('+n+','+k+') = '+comb+'</td></tr>';
      result+='<tr><td>概率 (分数)</td><td>'+fraction(comb,total)+'</td></tr>';
      result+='<tr><td>概率 (小数)</td><td>'+prob.toFixed(6)+'</td></tr>';
      result+='<tr><td>概率 (百分比)</td><td>'+(prob*100).toFixed(2)+'%</td></tr></table>';
    }else if(scene==='dice'){
      var sides=parseInt(document.getElementById('diceSides').value);
      var val=parseInt(document.getElementById('diceValue').value);
      if(val<1||val>sides){result='<p style="color:#f87171">骰子值必须在1到'+sides+'之间</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      result='<table class="data"><tr><th>参数</th><th>值</th></tr>';
      result+='<tr><td>骰子面数</td><td>'+sides+'</td></tr>';
      result+='<tr><td>掷出数字</td><td>'+val+'</td></tr>';
      result+='<tr><td>概率 (分数)</td><td>1/'+sides+'</td></tr>';
      result+='<tr><td>概率 (小数)</td><td>'+(1/sides).toFixed(6)+'</td></tr>';
      result+='<tr><td>概率 (百分比)</td><td>'+(100/sides).toFixed(2)+'%</td></tr></table>';
    }else if(scene==='cards'){
      var draw=parseInt(document.getElementById('cardDraw').value);
      var suit=document.getElementById('cardSuit').value;
      var suitNames={'spade':'黑桃','heart':'红心','diamond':'方块','club':'梅花'};
      if(draw>52){result='<p style="color:#f87171">最多抽取52张</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var prob=1;
      for(var i=0;i<draw;i++){
        prob*=(13-i)/(52-i);
      }
      var pct=prob*100;
      result='<table class="data"><tr><th>参数</th><th>值</th></tr>';
      result+='<tr><td>抽取张数</td><td>'+draw+'</td></tr>';
      result+='<tr><td>目标花色</td><td>'+suitNames[suit]+'</td></tr>';
      result+='<tr><td>概率 (分数)</td><td>'+fraction(Math.round(prob*1000000),1000000)+'</td></tr>';
      result+='<tr><td>概率 (小数)</td><td>'+prob.toFixed(6)+'</td></tr>';
      result+='<tr><td>概率 (百分比)</td><td>'+pct.toFixed(2)+'%</td></tr>';
      result+='<tr><td>赔率 (1 : )</td><td>1 : '+(prob>0?((1-prob)/prob).toFixed(2):'∞')+'</td></tr></table>';
    }else if(scene==='combo'){
      var n=parseInt(document.getElementById('comboN').value);
      var k=parseInt(document.getElementById('comboK').value);
      var eventWays=parseInt(document.getElementById('comboEvent').value);
      if(k>n){result='<p style="color:#f87171">选取数不能大于总数</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var comb=1;
      for(var i=1;i<=k;i++) comb=comb*(n-k+i)/i;
      var prob=eventWays/comb;
      result='<table class="data"><tr><th>参数</th><th>值</th></tr>';
      result+='<tr><td>总数 n</td><td>'+n+'</td></tr>';
      result+='<tr><td>选取数 k</td><td>'+k+'</td></tr>';
      result+='<tr><td>所有组合 C(n,k)</td><td>'+comb+'</td></tr>';
      result+='<tr><td>有利方式数</td><td>'+eventWays+'</td></tr>';
      result+='<tr><td>概率 (分数)</td><td>'+fraction(eventWays,comb)+'</td></tr>';
      result+='<tr><td>概率 (小数)</td><td>'+prob.toFixed(6)+'</td></tr>';
      result+='<tr><td>概率 (百分比)</td><td>'+(prob*100).toFixed(2)+'%</td></tr></table>';
    }else if(scene==='conditional'){
      var pAB=parseFloat(document.getElementById('condAB').value);
      var pB=parseFloat(document.getElementById('condB').value);
      if(pB<=0){result='<p style="color:#f87171">P(B) 必须大于0</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      if(pAB>pB){result='<p style="color:#f87171">P(A∩B) 不能大于 P(B)</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var pAgivenB=pAB/pB;
      result='<table class="data"><tr><th>参数</th><th>值</th></tr>';
      result+='<tr><td>P(A∩B)</td><td>'+pAB+'</td></tr>';
      result+='<tr><td>P(B)</td><td>'+pB+'</td></tr>';
      result+='<tr><td>P(A|B) 条件概率</td><td>'+pAgivenB.toFixed(4)+'</td></tr>';
      result+='<tr><td>P(A|B) 百分比</td><td>'+(pAgivenB*100).toFixed(2)+'%</td></tr></table>';
    }
    document.getElementById('resultDisplay').innerHTML=result;
    document.getElementById('resultSection').classList.add('show');
  }catch(e){
    document.getElementById('resultDisplay').innerHTML='<p style="color:#f87171">计算出错：'+e.message+'</p>';
    document.getElementById('resultSection').classList.add('show');
  }
});
})();

</script>
