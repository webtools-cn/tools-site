  to:   '𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃'
};

function convertText(text, fontDef) {
  const charMap = {};
  for (let i = 0; i < fontDef.from.length; i++) {
    charMap[fontDef.from[i]] = fontDef.to[i];
  }
  let result = '';
  for (const ch of text) {
    result += charMap[ch] || ch;
  }
  return result;
}

function generate() {
  const text = document.getElementById('textInput').value;
  if (!text) {
    showToast('请输入要转换的文字');
    return;
  }

  const grid = document.getElementById('fontGrid');
  grid.innerHTML = '';
  let count = 0;

  for (const [name, fontDef] of Object.entries(fonts)) {
    const converted = convertText(text, fontDef);
    if (converted === text) continue; // skip if no change (only numbers/special)

    count++;
    const card = document.createElement('div');
    card.className = 'font-card';
    card.innerHTML = `
      <div class="font-name">${name}</div>
      <div class="font-preview">${converted}</div>
      <button class="btn-copy" onclick="copyText(this, '${converted.replace(/'/g, "\\'")}')">📋 复制</button>
    `;
    grid.appendChild(card);
  }

  document.getElementById('fontCount').textContent = count + ' 种样式';
}



document.addEventListener('DOMContentLoaded', function() {
  generate();
  document.getElementById('textInput').addEventListener('input', generate);
});

</script>
</body>
</html>
