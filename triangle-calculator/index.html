      var b=c*Math.sin(toRad(B))/Math.sin(toRad(C));
      var area=round(0.5*a*b*Math.sin(toRad(C)));

      result='\x3Ctable class="data">\x3Ctr>\x3Cth>属性\x3C/th>\x3Cth>值\x3C/th>\x3C/tr>';

      result+='\x3Ctr>\x3Ctd>面积\x3C/td>\x3Ctd>'+area+'\x3C/td>\x3C/tr>\x3Ctr>\x3Ctd>周长\x3C/td>\x3Ctd>'+peri+'\x3C/td>\x3C/tr>\x3C/table>';
    }else if(mode==='aas'){

      var b=a*Math.sin(toRad(B))/Math.sin(toRad(A));
      var c=a*Math.sin(toRad(C))/Math.sin(toRad(A));

    }
