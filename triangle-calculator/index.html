      result+='<tr><td>斜边 c</td><td>'+round(sides.c)+'</td></tr>';

      result+='<tr><td>角 C (直角)</td><td>90°</td></tr>';
      result+='<tr><td>面积</td><td>'+area+'</td></tr>';
      result+='<tr><td>周长</td><td>'+peri+'</td></tr></table>';
    }else if(mode==='sss'){
      var a=parseFloat(document.getElementById('a').value);
      var b=parseFloat(document.getElementById('b').value);
      var c=parseFloat(document.getElementById('c').value);
      if(isNaN(a)||isNaN(b)||isNaN(c)||a<=0||b<=0||c<=0){result='<p style="color:#f87171">请输入有效的三边长度</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}

      var cosA=(b*b+c*c-a*a)/(2*b*c);
      var cosB=(a*a+c*c-b*b)/(2*a*c);
      var cosC=(a*a+b*b-c*c)/(2*a*b);
      var A=round(toDeg(Math.acos(cosA)));
      var B=round(toDeg(Math.acos(cosB)));
      var C=round(toDeg(Math.acos(cosC)));
      var s=(a+b+c)/2;
      var area=round(Math.sqrt(s*(s-a)*(s-b)*(s-c)));
      var peri=round(a+b+c);
      result='<table class="data"><tr><th>属性</th><th>值</th></tr>';

      result+='<tr><td>面积</td><td>'+area+'</td></tr><tr><td>周长</td><td>'+peri+'</td></tr></table>';
    }else if(mode==='sas'){

      var c=Math.sqrt(a*a+b*b-2*a*b*Math.cos(toRad(C)));

      var cosB=(a*a+c*c-b*b)/(2*a*c);
      var A=round(toDeg(Math.acos(cosA)));

      result='<table class="data"><tr><th>属性</th><th>值</th></tr>';

      result+='<tr><td>面积</td><td>'+area+'</td></tr><tr><td>周长</td><td>'+peri+'</td></tr></table>';

      var a=c*Math.sin(toRad(A))/Math.sin(toRad(C));
      var b=c*Math.sin(toRad(B))/Math.sin(toRad(C));
      var area=round(0.5*a*b*Math.sin(toRad(C)));
      var peri=round(a+b+c);
      result='<table class="data"><tr><th>属性</th><th>值</th></tr>';

      result+='<tr><td>角 A</td><td>'+round(A)+'°</td></tr><tr><td>角 B</td><td>'+round(B)+'°</td></tr><tr><td>角 C</td><td>'+round(C)+'°</td></tr>';
      result+='<tr><td>面积</td><td>'+area+'</td></tr><tr><td>周长</td><td>'+peri+'</td></tr></table>';
    }else if(mode==='aas'){
      var A=parseFloat(document.getElementById('A').value);
      var B=parseFloat(document.getElementById('B').value);

      if(isNaN(A)||isNaN(B)||isNaN(a)){result='<p style="color:#f87171">请输入完整的已知数据</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}

      var b=a*Math.sin(toRad(B))/Math.sin(toRad(A));

      result+='<tr><td>角 A</td><td>'+round(A)+'°</td></tr><tr><td>角 B</td><td>'+round(B)+'°</td></tr><tr><td>角 C</td><td>'+round(C)+'°</td></tr>';
      result+='<tr><td>面积</td><td>'+area+'</td></tr><tr><td>周长</td><td>'+peri+'</td></tr></table>';
    }
    document.getElementById('resultDisplay').innerHTML=result;
    document.getElementById('resultSection').classList.add('show');
  }catch(e){
    document.getElementById('resultDisplay').innerHTML='<p style="color:#f87171">计算出错：'+e.message+'</p>';
