<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5998441792679372"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="app-header">
      <div class="app-title">
        <span class="logo">🔑</span>
        <span>密码生成器</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btnClearHistory" title="清空历史记录">🗑️</button>
      </div>
    </header>

    <!-- 可滚动内容区 -->
    <div class="scrollable">
      <!-- 密码显示区 -->
      <div class="password-display">
        <div class="password-text" id="passwordText">点击生成密码</div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-info">
          <span class="strength-label">密码强度</span>
          <span class="strength-value" id="strengthValue">--</span>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="toolbar">
        <button class="btn btn-primary" id="btnGenerate">🔄 重新生成</button>
        <button class="btn btn-secondary" id="btnCopy">📋 复制密码</button>
      </div>

      <!-- 设置区 -->
      <div class="settings">
        <div class="settings-title">⚙️ 密码设置</div>
        <div class="setting-row">
          <span class="setting-label">密码长度</span>
          <div class="length-control">
            <input type="range" class="length-slider" id="lengthSlider" min="4" max="64" value="16">
            <input type="number" class="length-number" id="lengthNumber" min="4" max="64" value="16">
          </div>
        </div>

        <div class="charset-group">
          <label class="checkbox-item" id="cbUpperWrap">
            <input type="checkbox" id="cbUpper" checked>
            <span>大写字母 A-Z</span>
          </label>
          <label class="checkbox-item" id="cbLowerWrap">
            <input type="checkbox" id="cbLower" checked>
            <span>小写字母 a-z</span>
          </label>
          <label class="checkbox-item" id="cbDigitsWrap">
            <input type="checkbox" id="cbDigits" checked>
            <span>数字 0-9</span>
          </label>
          <label class="checkbox-item" id="cbSymbolsWrap">
            <input type="checkbox" id="cbSymbols" checked>
            <span>特殊符号 !@#</span>
          </label>
        </div>

        <label class="checkbox-item full" id="cbSimilarWrap">
          <input type="checkbox" id="cbExcludeSimilar">
          <span>排除易混淆字符：l / 1 / I / 0 / O</span>
        </label>
      </div>

      <!-- 历史记录 -->
      <div class="history" id="historySection">
        <div class="history-title">📋 历史记录</div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>

    <!-- 底部链接 -->
    <footer class="app-footer">
      <a class="footer-link" id="siteLink" href="https://free-toolbase.com/password-generator/" target="_blank" rel="noopener" title="访问完整在线版">
        🌐 webtools-cn.github.io
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
