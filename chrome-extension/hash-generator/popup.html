<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash 哈希生成器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="app-header">
      <div class="app-title">
        <span class="logo">#</span>
        <span>Hash 哈希生成器</span>
      </div>
    </header>

    <!-- Tab 切换 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="text">📝 文本</button>
      <button class="tab-btn" data-tab="file">📄 文件</button>
      <button class="tab-btn" data-tab="hmac">🔑 HMAC</button>
    </div>

    <!-- ===== 文本哈希 Tab ===== -->
    <div class="tab-panel active" id="tab-text">
      <div class="section section-input">
        <div class="section-label">
          <span>输入文本</span>
          <span class="char-count" id="textCount">0 字符</span>
        </div>
        <textarea id="textInput" class="textarea" placeholder="在此输入要计算哈希的文本..."></textarea>
        <div class="options-row">
          <label class="option-label"><input type="checkbox" id="uppercaseText"> 大写</label>
          <label class="option-label"><input type="checkbox" id="liveCompute" checked> 实时计算</label>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btnComputeText">🔐 计算</button>
          <button class="btn btn-secondary" id="btnClearText">🗑 清空</button>
        </div>
      </div>
      <div class="section section-results">
        <div class="section-label"><span>哈希结果</span></div>
        <div class="hash-list" id="textResults">
          <div class="hash-item" data-algo="md5"><span class="hash-name">MD5</span><span class="hash-val" id="res_text_md5">—</span><button class="hash-copy" data-target="res_text_md5">📋</button></div>
          <div class="hash-item" data-algo="sha1"><span class="hash-name">SHA-1</span><span class="hash-val" id="res_text_sha1">—</span><button class="hash-copy" data-target="res_text_sha1">📋</button></div>
          <div class="hash-item" data-algo="sha256"><span class="hash-name">SHA-256</span><span class="hash-val" id="res_text_sha256">—</span><button class="hash-copy" data-target="res_text_sha256">📋</button></div>
          <div class="hash-item" data-algo="sha384"><span class="hash-name">SHA-384</span><span class="hash-val" id="res_text_sha384">—</span><button class="hash-copy" data-target="res_text_sha384">📋</button></div>
          <div class="hash-item" data-algo="sha512"><span class="hash-name">SHA-512</span><span class="hash-val" id="res_text_sha512">—</span><button class="hash-copy" data-target="res_text_sha512">📋</button></div>
        </div>
      </div>
    </div>

    <!-- ===== 文件哈希 Tab ===== -->
    <div class="tab-panel" id="tab-file">
      <div class="section">
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">📁</div>
          <div class="drop-text">拖拽文件到此处</div>
          <div class="drop-hint">或点击选择文件 · 纯本地计算</div>
        </div>
        <input type="file" id="fileInput" style="display:none">
        <div class="file-info" id="fileInfo" style="display:none"></div>
        <div class="hash-list" id="fileResults">
          <div class="hash-item" data-algo="md5"><span class="hash-name">MD5</span><span class="hash-val" id="res_file_md5">—</span><button class="hash-copy" data-target="res_file_md5">📋</button></div>
          <div class="hash-item" data-algo="sha1"><span class="hash-name">SHA-1</span><span class="hash-val" id="res_file_sha1">—</span><button class="hash-copy" data-target="res_file_sha1">📋</button></div>
          <div class="hash-item" data-algo="sha256"><span class="hash-name">SHA-256</span><span class="hash-val" id="res_file_sha256">—</span><button class="hash-copy" data-target="res_file_sha256">📋</button></div>
          <div class="hash-item" data-algo="sha384"><span class="hash-name">SHA-384</span><span class="hash-val" id="res_file_sha384">—</span><button class="hash-copy" data-target="res_file_sha384">📋</button></div>
          <div class="hash-item" data-algo="sha512"><span class="hash-name">SHA-512</span><span class="hash-val" id="res_file_sha512">—</span><button class="hash-copy" data-target="res_file_sha512">📋</button></div>
        </div>
      </div>
    </div>

    <!-- ===== HMAC Tab ===== -->
    <div class="tab-panel" id="tab-hmac">
      <div class="section section-input">
        <div class="input-group">
          <label>密钥 (Secret Key)</label>
          <input type="password" id="hmacKey" class="input" placeholder="输入HMAC密钥...">
        </div>
        <div class="input-group">
          <label>消息 (Message)</label>
          <textarea id="hmacMsg" class="textarea" style="height:60px;min-height:60px;" placeholder="输入要认证的消息..."></textarea>
        </div>
        <div class="options-row">
          <label class="option-label"><input type="checkbox" id="uppercaseHmac"> 大写</label>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btnComputeHmac">🔑 生成HMAC</button>
          <button class="btn btn-secondary" id="btnClearHmac">🗑 清空</button>
        </div>
      </div>
      <div class="section section-results">
        <div class="section-label"><span>HMAC 结果</span></div>
        <div class="hash-list" id="hmacResults">
          <div class="hash-item" data-algo="hmac-md5"><span class="hash-name">HMAC-MD5</span><span class="hash-val" id="res_hmac_md5">—</span><button class="hash-copy" data-target="res_hmac_md5">📋</button></div>
          <div class="hash-item" data-algo="hmac-sha1"><span class="hash-name">HMAC-SHA1</span><span class="hash-val" id="res_hmac_sha1">—</span><button class="hash-copy" data-target="res_hmac_sha1">📋</button></div>
          <div class="hash-item" data-algo="hmac-sha256"><span class="hash-name">HMAC-SHA256</span><span class="hash-val" id="res_hmac_sha256">—</span><button class="hash-copy" data-target="res_hmac_sha256">📋</button></div>
          <div class="hash-item" data-algo="hmac-sha384"><span class="hash-name">HMAC-SHA384</span><span class="hash-val" id="res_hmac_sha384">—</span><button class="hash-copy" data-target="res_hmac_sha384">📋</button></div>
          <div class="hash-item" data-algo="hmac-sha512"><span class="hash-name">HMAC-SHA512</span><span class="hash-val" id="res_hmac_sha512">—</span><button class="hash-copy" data-target="res_hmac_sha512">📋</button></div>
        </div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- 底部 -->
    <footer class="app-footer">
      <div class="footer-actions">
        <button class="btn btn-small btn-secondary" id="btnCopyAll" title="复制所有可见结果">📋 复制全部</button>
      </div>
      <a class="footer-link" id="siteLink" href="https://free-toolbase.com/hash-generator/" target="_blank" rel="noopener" title="访问完整在线版">
        🌐 webtools-cn.github.io
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
