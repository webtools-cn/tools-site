<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码生成器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="app-header">
      <div class="app-title">
        <span class="logo">▦</span>
        <span>二维码生成器</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btnPaste" title="粘贴剪贴板内容">📋</button>
        <button class="icon-btn" id="btnClear" title="清空输入">🗑️</button>
      </div>
    </header>

    <!-- 输入区 -->
    <div class="section section-input">
      <div class="section-label">
        <span>📝 输入内容</span>
        <span class="char-count" id="inputCount">0 字符</span>
      </div>
      <textarea id="qrInput" class="textarea" spellcheck="false" placeholder="输入文本、网址、WiFi密码等...&#10;示例: https://example.com&#10;WiFi: WIFI:T:WPA;S:MyWiFi;P:pass123;;">https://free-toolbase.com/qr-generator/</textarea>
      <div class="privacy-note">
        <span>🔒</span><span>数据仅本地处理，不上传服务器</span>
      </div>
    </div>

    <!-- 设置区 -->
    <div class="section section-settings">
      <div class="setting-row">
        <div class="setting-group">
          <span class="setting-label">纠错</span>
          <div class="level-row">
            <button class="level-btn" data-level="1">L</button>
            <button class="level-btn active" data-level="0">M</button>
            <button class="level-btn" data-level="3">Q</button>
            <button class="level-btn" data-level="2">H</button>
          </div>
        </div>
        <div class="setting-group">
          <span class="setting-label">颜色</span>
          <div class="color-row">
            <label class="color-item" title="前景色"><span>■</span><input type="color" id="fgColor" value="#000000"></label>
            <label class="color-item" title="背景色"><span>□</span><input type="color" id="bgColor" value="#ffffff"></label>
          </div>
        </div>
      </div>
      <div class="size-control">
        <span class="setting-label">尺寸</span>
        <input type="range" class="size-slider" id="sizeSlider" min="160" max="320" value="220">
        <span class="size-value" id="sizeValue">220</span>
      </div>
    </div>

    <!-- 预览区 -->
    <div class="section section-preview">
      <div class="preview-wrap">
        <canvas id="qrCanvas" width="220" height="220"></canvas>
      </div>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar">
      <div class="format-row">
        <button class="format-btn active" id="fmtPng">PNG</button>
        <button class="format-btn" id="fmtSvg">SVG</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnDownload" title="下载二维码图片">💾 下载</button>
        <button class="btn btn-secondary" id="btnCopy" title="复制图片到剪贴板">📋 复制</button>
      </div>
    </div>

    <!-- 底部 -->
    <footer class="app-footer">
      <span class="footer-text">纯前端 · 零依赖 · 可离线</span>
      <a class="footer-link" id="siteLink" href="https://free-toolbase.com/qr-generator/" target="_blank" rel="noopener" title="访问完整在线版">
        🌐 webtools-cn.github.io
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
