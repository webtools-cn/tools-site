<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 格式化工具</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="app-header">
      <div class="app-title">
        <span class="logo">{ }</span>
        <span>JSON 格式化工具</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btnPaste" title="粘贴剪贴板内容">📋</button>
      </div>
    </header>

    <!-- 顶部操作按钮 -->
    <div class="toolbar">
      <button class="btn btn-primary" id="btnFormat" title="美化格式化 JSON (2空格缩进)">✨ 格式化</button>
      <button class="btn btn-secondary" id="btnMinify" title="压缩为单行">🗜️ 压缩</button>
      <button class="btn btn-secondary" id="btnValidate" title="验证 JSON 语法并定位错误">✅ 验证</button>
    </div>

    <!-- 输入框 -->
    <div class="section section-input">
      <div class="section-label">
        <span>📝 JSON 输入</span>
        <span class="char-count" id="inputCount">0 字符</span>
      </div>
      <textarea id="jsonInput" class="textarea" spellcheck="false" placeholder='在此粘贴 JSON 数据...&#10;例如: {"name":"json","v":1}'></textarea>
    </div>

    <!-- 输出区 (带 Tabs) -->
    <div class="section section-output">
      <div class="tabs">
        <button class="tab-btn active" data-tab="formatted">格式化文本</button>
        <button class="tab-btn" data-tab="tree">树状视图</button>
      </div>
      <div class="tab-panel active" id="tab-formatted">
        <textarea id="formattedOutput" class="textarea textarea-output" spellcheck="false" readonly placeholder="处理结果将显示在这里..."></textarea>
      </div>
      <div class="tab-panel" id="tab-tree">
        <div id="treeOutput" class="tree-view"></div>
      </div>
    </div>

    <!-- 消息提示 -->
    <div id="messageBox" class="message-box"></div>

    <!-- 统计栏 -->
    <div class="stats-bar" id="statsBar">
      <span>节点 <b id="statNodes">0</b></span>
      <span>深度 <b id="statDepth">0</b></span>
      <span>对象 <b id="statObjects">0</b></span>
      <span>数组 <b id="statArrays">0</b></span>
      <span>长度 <b id="statLength">0</b></span>
    </div>

    <!-- 底部操作栏 -->
    <footer class="app-footer">
      <div class="footer-actions">
        <button class="btn btn-small btn-secondary" id="btnCopy" title="复制输出结果">📋 复制</button>
        <button class="btn btn-small btn-danger" id="btnClear" title="清空输入和输出">🗑️ 清空</button>
      </div>
      <a class="footer-link" id="siteLink" href="https://free-toolbase.com/json-formatter/" target="_blank" rel="noopener" title="访问完整在线版">
        🌐 webtools-cn.github.io
      </a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
