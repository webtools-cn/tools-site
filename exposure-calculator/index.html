const fStops=[1,1.4,2,2.8,4,5.6,8,11,16,22,32];
const shutters=[30,15,8,4,2,1,0.5,0.25,0.125,0.0667,0.0333,0.0167,0.00833,0.004,0.002,0.001,0.0005,0.00025];

function log2(x){return Math.log(x)/Math.LN2}

function calcEV(aperture,shutter,iso){
  // EV = log2(N^2/t) - log2(ISO/100)
  const ev=log2(aperture*aperture/shutter)-log2(iso/100);
  return Math.round(ev*10)/10;
}

function sceneDesc(ev){
  if(ev>=15)return '☀️ 明亮阳光/雪景 — 建议用最小ISO和高速快门';
  if(ev>=13)return '☀️ 晴天户外 — 标准阳光十六法则场景';
  if(ev>=11)return '⛅ 多云/阴影 — 光线柔和，适合人像';
  if(ev>=9)return '🌤️ 阴天/傍晚 — 可能需要开大光圈或提高ISO';
  if(ev>=7)return '🏠 室内亮光 — 建议使用大光圈镜头';
  if(ev>=5)return '🕯️ 室内暗光 — 可能需要三脚架或高ISO';
  if(ev>=3)return '🌆 黄昏/暗室 — 三脚架推荐，可用高ISO';
  return '🌙 夜间/弱光 — 三脚架必须，可用长曝光';
}

document.getElementById('calcBtn').addEventListener('click',function(){
  const aperture=parseFloat(document.getElementById('aperture').value);
  const shutter=parseFloat(document.getElementById('shutter').value);
  const iso=parseFloat(document.getElementById('iso').value);
  const evComp=parseFloat(document.getElementById('evComp').value);
  
  const ev=calcEV(aperture,shutter,iso)+evComp;
  
  document.getElementById('evResult').textContent=ev.toFixed(1);
  document.getElementById('evDesc').textContent=sceneDesc(ev);
  document.getElementById('dispEv').textContent=ev.toFixed(1);

function genEquivalent(baseAp,baseShutter,baseIso,evComp){
  const baseEV=calcEV(baseAp,baseShutter,baseIso)+evComp;
  const tbl=document.getElementById('eqTableBody');
  tbl.innerHTML='';
  
  // Generate 6 combinations with different priorities
  const combos=[
    {ap:2.8,shutter:0,iso:100,label:'大光圈 · 浅景深'},
    {ap:4,shutter:0,iso:100,label:'中等光圈'},
    {ap:5.6,shutter:0,iso:100,label:'标准光圈'},
    {ap:8,shutter:0,iso:200,label:'小光圈 · 大景深'},
    {ap:11,shutter:0,iso:400,label:'风景/建筑'},
    {ap:16,shutter:0,iso:800,label:'最大景深'},
  ];
  
  const baseIsoStop=Math.log2(baseIso/100);
  
  combos.forEach(function(c,idx){
    // Fix the aperture and ISO, calculate required shutter
    const targetEV=baseEV;
    // EV = log2(N^2 / t) - log2(ISO/100)
    // t = N^2 / 2^(EV + log2(ISO/100))
    const isoStop=Math.log2(c.iso/100);
    const requiredT=c.ap*c.ap/Math.pow(2,targetEV+isoStop);
    
    // Clamp to reasonable range
    const shutterVal=Math.max(0.000125,Math.min(30,requiredT));
    
    const shutterLabel=shutterVal>=1?Math.round(shutterVal)+'"':Math.round(1/shutterVal)>0?'1/'+Math.round(1/shutterVal):(1/shutterVal).toFixed(1);
    
    tbl.innerHTML+='<tr><td>'+(idx+1)+'</td><td>f/'+c.ap+'</td><td>'+shutterLabel+'</td><td>'+c.iso+'</td><td>'+c.label+'</td></tr>';
  });
  
  document.getElementById('eqCard').style.display='block';
}
