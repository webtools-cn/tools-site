<script>
let imageData=null,imgEl=null;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

function extractPalette(img,n){
const canvas=document.createElement('canvas');
const size=200;
canvas.width=size;canvas.height=size;
const ctx=canvas.getContext('2d');
ctx.drawImage(img,0,0,size,size);
const data=ctx.getImageData(0,0,size,size).data;
const colorMap={};
for(let i=0;i<data.length;i+=4){
const r=data[i],g=data[i+1],b=data[i+2];
// Quantize to reduce colors
const qr=Math.round(r/32)*32,qg=Math.round(g/32)*32,qb=Math.round(b/32)*32;
const key=`${qr},${qg},${qb}`;
if(!colorMap[key])colorMap[key]={r:qr,g:qg,b:qb,count:0,origR:0,origG:0,origB:0};
colorMap[key].count++;
colorMap[key].origR+=r;colorMap[key].origG+=g;colorMap[key].origB+=b;
}
const sorted=Object.values(colorMap).sort((a,b)=>b.count-a.count).slice(0,n*3);
// Cluster nearby colors and take averages
const result=[];
for(const c of sorted){
const avgR=Math.round(c.origR/c.count),avgG=Math.round(c.origG/c.count),avgB=Math.round(c.origB/c.count);
const hex=rgbToHex(avgR,avgG,avgB);
// Check if similar to existing
let tooClose=false;
for(const r of result){
const dr=avgR-r.r,dg=avgG-r.g,db=avgB-r.b;
if(Math.sqrt(dr*dr+dg*dg+db*db)<50){tooClose=true;break;}
}
if(!tooClose){result.push({hex,r:avgR,g:avgG,b:avgB});}
if(result.length>=n)break;
}
return result;
}

function renderPalette(colors){
const el=document.getElementById('palette');
el.innerHTML=colors.map(c=>`
<div class="color-swatch" style="background:${c.hex}" data-hex="${c.hex}" data-rgb="${c.r},${c.g},${c.b}" title="点击复制 ${c.hex}">
<span class="color-label">${c.hex}</span>
<span class="color-label rgb">rgb(${c.r},${c.g},${c.b})</span>
</div>`).join('');
document.querySelectorAll('.color-swatch').forEach(s=>s.addEventListener('click',function(){
const hex=this.dataset.hex;
navigator.clipboard.writeText(hex).then(()=>showToast(`✅ 已复制 ${hex}`));
}));
}

document.getElementById('extractBtn').addEventListener('click',()=>{
if(!imgEl){showToast('⚠️ 请先上传图片');return;}
const n=parseInt(document.getElementById('colorCount').value);
const colors=extractPalette(imgEl,n);
renderPalette(colors);
showToast(`🎨 已提取 ${colors.length} 种颜色`);
});

document.getElementById('exportBtn').addEventListener('click',()=>{
const swatches=document.querySelectorAll('.color-swatch');
if(!swatches.length){showToast('⚠️ 请先提取配色');return;}
const colors=Array.from(swatches).map(s=>({hex:s.dataset.hex, rgb:`rgb(${s.dataset.rgb})`}));
const text=colors.map(c=>`${c.hex} - ${c.rgb}`).join('\n');
navigator.clipboard.writeText(text).then(()=>showToast('✅ 色值已复制（含HEX和RGB）'));
});

document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('uploadZone').addEventListener('dragover',e=>{e.preventDefault();});
document.getElementById('uploadZone').addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)loadImage(f);});
document.getElementById('fileInput').addEventListener('change',function(){const f=this.files[0];if(f)loadImage(f);});

function loadImage(file){
const reader=new FileReader();
reader.onload=function(e){
const img=new Image();
img.onload=function(){
imgEl=img;
const preview=document.getElementById('previewImg');
preview.src=e.target.result;
preview.style.display='block';
document.getElementById('uploadZone').classList.add('has-image');
document.getElementById('uploadZone').querySelector('p').textContent=file.name;
const n=parseInt(document.getElementById('colorCount').value);
const colors=extractPalette(img,n);
renderPalette(colors);
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
}

document.getElementById('colorCount').addEventListener('change',function(){if(imgEl){const n=parseInt(this.value);renderPalette(extractPalette(imgEl,n));}});
</script>

<script>
(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) { hash = ((hash << 5) - hash) + path.charCodeAt(i); hash = hash & hash; }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
