<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');

dropArea.addEventListener('click', () => fileInput.click());
dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.svg')) readFile(file);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('inputSvg').value = e.target.result;
    updateStats();
  };
  reader.readAsText(file);
}

function compress() {
  const input = document.getElementById('inputSvg').value;
  if (!input.trim()) return;
  
  try {
    const result = optimizeSvg(input);
    document.getElementById('outputSvg').textContent = result;
    updateStats();
    updatePreview(result);
  } catch(e) {
    document.getElementById('outputSvg').textContent = '❌ 压缩出错: ' + e.message;
  }
}

function optimizeSvg(svg) {
  let result = svg;
  
  if (document.getElementById('optRemoveComments').checked) {
    result = result.replace(/<!--[\s\S]*?-->/g, '');
  }
  
  if (document.getElementById('optRemoveMetadata').checked) {
    result = result.replace(/<metadata[\s\S]*?<\/metadata>/gi, '');
    result = result.replace(/<title[\s\S]*?<\/title>/gi, '');
    result = result.replace(/<desc[\s\S]*?<\/desc>/gi, '');
  }
  
  if (document.getElementById('optRemoveEditorNS').checked) {
    result = result.replace(/\s+(inkscape|sodipodi|svg|xmlns:inkscape|xmlns:sodipodi):[^=]+="[^"]*"/gi, '');
    result = result.replace(/\s+data-[^=]+="[^"]*"/gi, '');
    result = result.replace(/\s+id="[^"]*"/gi, '');
    result = result.replace(/\s+xmlns:(cc|dc|rdf|inkscape|sodipodi)="[^"]*"/gi, '');
  }
  
  if (document.getElementById('optCollapseGroups').checked) {
    // Collapse single-child <g> tags
    result = result.replace(/<g[^>]*>(\s*)<([a-z][^>]*\/?>[\s\S]*?)<\/g>/gi, (match, ws, inner) => {
      return ws + inner;
    });
  }
  
  if (document.getElementById('optPrecision').checked) {
    // Round decimal numbers in path data
    result = result.replace(/(\d+\.\d+)/g, (m) => {
      const n = parseFloat(m);
      return n.toFixed(2).replace(/\.?0+$/, '');
    });
  }
  
  // Remove empty attributes
  result = result.replace(/\s+[a-z-]+=""/gi, '');
  
  // Remove xml declaration if it exists
  result = result.replace(/<\?xml[^>]*\?>\s*/gi, '');
  
  // Normalize whitespace
  result = result.replace(/>\s+</g, '><');
  result = result.replace(/\s{2}/g, ' ');
  result = result.trim();
  
  // Ensure it's still a valid SVG
  if (!result.match(/<svg/i)) throw new Error('输入的SVG格式不正确');
  
  return result;
}

function updateStats() {
  const input = document.getElementById('inputSvg').value;
  const output = document.getElementById('outputSvg').textContent;
  
  const origSize = new Blob([input]).size;
  const compSize = output.startsWith('点击') || output.startsWith('❌') ? origSize : new Blob([output]).size;
  
  document.getElementById('originalSize').textContent = origSize;
  document.getElementById('compressedSize').textContent = compSize === origSize ? 0 : compSize;
  document.getElementById('origSizeLabel').textContent = origSize + ' B';
  document.getElementById('compSizeLabel').textContent = (compSize === origSize ? '' : compSize + ' B');
  
  if (origSize > 0 && compSize < origSize) {
    const savings = Math.round((1 - compSize / origSize) * 100);
    document.getElementById('savingsPercent').textContent = savings + '%';
    document.getElementById('savingsPercent').className = 'savings';
  } else if (origSize > 0 && compSize >= origSize) {
    document.getElementById('savingsPercent').textContent = '0%';
  } else {
    document.getElementById('savingsPercent').textContent = '0%';
  }
}

function updatePreview(svgContent) {
  const box = document.getElementById('previewBox');
  box.innerHTML = svgContent;
}

function copyOutput() {
  const text = document.getElementById('outputSvg').textContent;
  if (text && !text.startsWith('点击') && !text.startsWith('❌')) {
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
}

function downloadSvg() {
  const text = document.getElementById('outputSvg').textContent;
  if (text && !text.startsWith('点击') && !text.startsWith('❌')) {
    const blob = new Blob([text], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'optimized.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
}

function clearAll() {
  document.getElementById('inputSvg').value = '';
  document.getElementById('outputSvg').textContent = '点击"压缩"按钮查看结果';
  document.getElementById('previewBox').innerHTML = '<span style="color:#64748b;font-size:.85rem">SVG预览将在此显示</span>';
  document.getElementById('originalSize').textContent = '0';
  document.getElementById('compressedSize').textContent = '0';
  document.getElementById('savingsPercent').textContent = '0%';
  document.getElementById('origSizeLabel').textContent = '';
  document.getElementById('compSizeLabel').textContent = '';
}

<!-- 反馈收集 -->
<div id="feedback-widget" style="position:fixed;bottom:20px;right:20px;z-index:1000">
<button id="feedback-toggle" onclick="toggleFeedback()" style="width:48px;height:48px;border-radius:50%;background:rgba(6,182,212,.2);border:2px solid rgba(6,182,212,.5);color:#22d3ee;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">💬</button>
<div id="feedback-panel" style="display:none;position:absolute;bottom:56px;right:0;width:320px;background:#1e293b;border:1px solid rgba(6,182,212,.3);border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.4)">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<span style="color:#f1f5f9;font-size:.95rem;font-weight:600">📝 反馈建议</span>
<button onclick="toggleFeedback()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
</div>
<select id="feedback-type" style="width:100%;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none">
<option value="feedback">💡 功能建议</option>
<option value="bug">🐛 问题反馈</option>
<option value="other">💬 其他</option>
</select>
<textarea id="feedback-text" placeholder="请描述您的建议或遇到的问题..." style="width:100%;height:100px;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:10px;color:#e2e8f0;font-size:.85rem;resize:vertical;outline:none;font-family:inherit" maxlength="1000"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">提交</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ 感谢反馈！已提交到GitHub Issues</div>
</div>
</div>
<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){var ft=document.getElementById('feedback-text');if(ft){ft.style.borderColor='#ef4444';setTimeout(function(){ft.style.borderColor=''},2000)};return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
