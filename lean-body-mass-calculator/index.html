function calcLBM(height,weight,gender,age,formula){
  var h=height,w=weight,a=age;
  if(formula==='boer'){
    if(gender==='male') return 0.407*w+0.267*h-19.2;
    else return 0.252*w+0.473*h-48.3;
  }else if(formula==='james'){
    if(gender==='male') return 1.1*w-128*(w/h)*(w/h);
    else return 1.07*w-148*(w/h)*(w/h);
  }else if(formula==='hume'){
    if(gender==='male') return 0.32810*w+0.33929*h-29.5336;
    else return 0.29569*w+0.41813*h-43.2933;
  }
  return 0;
}

function calc(){
  var h=parseFloat(document.getElementById('height').value)||0;
  var w=parseFloat(document.getElementById('weight').value)||0;
  var g=document.getElementById('gender').value;
  var a=parseInt(document.getElementById('age').value)||30;
  var f=document.getElementById('formula').value;
  if(h<=0||w<=0){return;}
  var lbm=calcLBM(h,w,g,a,f);
  var fat=w-lbm;
  var bfp=((w-lbm)/w*100);
  document.getElementById('lbmVal').textContent=lbm.toFixed(1)+' kg';
  document.getElementById('bfVal').textContent=bfp.toFixed(1)+'%';
  document.getElementById('fatVal').textContent=fat.toFixed(1)+' kg';
  var bmi=w/((h/100)*(h/100));
  var bmiStatus=bmi<18.5?'偏瘦':(bmi<24?'正常':(bmi<28?'超重':'肥胖'));
  var bfpStatus='';
  if(g==='male'){bfpStatus=bfp<6?'必需脂肪偏低':(bfp<14?'运动员水平':(bfp<18?'良好':(bfp<25?'正常偏高':'肥胖')));}
  else{bfpStatus=bfp<14?'必需脂肪偏低':(bfp<21?'运动员水平':(bfp<26?'良好':(bfp<32?'正常偏高':'肥胖')));}
  document.getElementById('bmiInfo').innerHTML='<p>BMI: <strong>'+bmi.toFixed(1)+'</strong> ('+bmiStatus+') &nbsp;|&nbsp; 体脂评估: <strong>'+bfpStatus+'</strong></p>';
  // Compare all formulas

    {id:'boer',name:'Boer'},
    {id:'james',name:'James'},
    {id:'hume',name:'Hume'}
  ];

  for(var i=0;i<formulas.length;i++){
    var lb=calcLBM(h,w,g,a,formulas[i].id);
    ch+='<tr><td>'+formulas[i].name+'</td><td>'+lb.toFixed(1)+'</td><td>'+((w-lb)/w*100).toFixed(1)+'%</td><td>'+(w-lb).toFixed(1)+'</td></tr>';
  }
  ch+='</table></div>';
  document.getElementById('compareResults').innerHTML=ch;
}
['height','weight','gender','age','formula'].forEach(function(id){
  document.getElementById(id).addEventListener('input',calc);
  document.getElementById(id).addEventListener('change',calc);
});
