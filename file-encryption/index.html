<style>
:root{--primary:#4F46E5;--primary-hover:#4338CA;--bg:#f8fafc;--card-bg:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1);--success:#10b981;--error:#ef4444;--warning:#f59e0b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header .logo{font-size:1.25rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:16px;flex-wrap:wrap}
header nav a{color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:color .2s}
header nav a:hover{color:var(--primary)}
main{max-width:800px;margin:0 auto;padding:32px 24px}
h1{font-size:1.75rem;margin-bottom:8px}
.subtitle{color:var(--text-secondary);margin-bottom:32px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:24px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text-secondary)}
.form-group input[type="file"],.form-group input[type="password"]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg);transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.file-drop{width:100%;padding:40px;border:2px dashed var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;transition:all .2s;color:var(--text-secondary)}
.file-drop:hover,.file-drop.dragover{border-color:var(--primary);background:rgba(79,70,229,.05);color:var(--primary)}
.file-drop .icon{font-size:2.5rem;margin-bottom:8px}
.file-info{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border-radius:8px;margin-bottom:16px}
.file-info .name{font-weight:600;flex:1;word-break:break-all}
.file-info .size{color:var(--text-secondary);font-size:.85rem;white-space:nowrap}
.btn-row{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-encrypt{background:var(--primary);color:#fff}
.btn-encrypt:hover{background:var(--primary-hover)}
.btn-encrypt:disabled{background:#9ca3af;cursor:not-allowed}
.btn-decrypt{background:var(--success);color:#fff}
.btn-decrypt:hover{background:#059669}
.btn-decrypt:disabled{background:#9ca3af;cursor:not-allowed}
.btn-reset{background:var(--text-secondary);color:#fff}
.btn-reset:hover{background:#475569}
.password-input{position:relative}
.password-input input{padding-right:50px}
.toggle-pw{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-secondary)}
.strength-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:all .3s}
.strength-weak{width:33%;background:var(--error)}
.strength-medium{width:66%;background:var(--warning)}
.strength-strong{width:100%;background:var(--success)}
.result-area{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;font-family:monospace;font-size:.85rem;word-break:break-all;min-height:60px;display:none}
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin:16px 0;overflow:hidden;display:none}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s;width:0%}
footer{text-align:center;padding:32px 24px;color:var(--text-secondary);font-size:.85rem;border-top:1px solid var(--border);margin-top:48px}
footer a{color:var(--primary);text-decoration:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999}
#toast.show{opacity:1}
@media(max-width:640px){h1{font-size:1.2rem;word-break:break-word}.header{flex-direction:column;gap:8px}}</style>

<body>
<header>
<a href="/" class="logo">Free ToolBase</a>
<nav>
<a href="/">首页</a>
<a href="/about/">关于</a>
</nav>
</header>
<main>
<h1>🔒 文件加密工具</h1>
<p class="subtitle">使用AES-256-GCM算法加密/解密文件，所有处理在浏览器本地完成</p>
<div class="card">
<div class="form-group">
<label>选择文件</label>
<div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
<div class="icon">📁</div>
<div>点击选择文件或拖拽到此处</div>
<div style="font-size:.8rem;margin-top:4px">支持任意格式文件</div>
</div>
<input type="file" id="fileInput" style="display:none" onchange="handleFile(this.files[0])">
</div>
<div id="fileInfo" class="file-info" style="display:none">
<span>📄</span>
<span class="name" id="fileName"></span>
<span class="size" id="fileSize"></span>
</div>
<div class="form-group">
<label>密码</label>
<div class="password-input">
<input type="password" id="password" placeholder="输入加密/解密密码（至少6位）" oninput="checkStrength()">
<button class="toggle-pw" onclick="togglePassword()">👁</button>
</div>
<div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
<div style="font-size:.8rem;color:var(--text-secondary);margin-top:4px" id="strengthLabel"></div>
</div>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<div class="btn-row">
<button class="btn btn-encrypt" id="encryptBtn" disabled onclick="processFile('encrypt')">🔒 加密文件</button>
<button class="btn btn-decrypt" id="decryptBtn" disabled onclick="processFile('decrypt')">🔓 解密文件</button>
<button class="btn btn-reset" onclick="resetAll()">🔄 重置</button>
</div>
</div>
<div class="result-area" id="resultArea"></div>
</main>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 纯前端工具，数据不会上传服务器</p>
</footer>
<div id="toast"></div>
<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}

var selectedFile=null,fileBuffer=null;

document.getElementById("fileInput").addEventListener("change",function(){handleFile(this.files[0])});

var dropZone=document.getElementById("fileDrop");
dropZone.addEventListener("dragover",function(e){e.preventDefault();dropZone.classList.add("dragover")});
dropZone.addEventListener("dragleave",function(){dropZone.classList.remove("dragover")});
dropZone.addEventListener("drop",function(e){e.preventDefault();dropZone.classList.remove("dragover");if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});

function handleFile(file){
if(!file){return}
selectedFile=file;
document.getElementById("fileName").textContent=file.name;
document.getElementById("fileSize").textContent=formatSize(file.size);
document.getElementById("fileInfo").style.display="flex";
document.getElementById("fileDrop").style.display="none";
var reader=new FileReader();
reader.onload=function(){fileBuffer=new Uint8Array(reader.result);updateButtons()};
reader.readAsArrayBuffer(file);
}

function formatSize(bytes){
if(bytes<1024)return bytes+" B";
if(bytes<1048576)return (bytes/1024).toFixed(1)+" KB";
return (bytes/1048576).toFixed(2)+" MB";
}

function checkStrength(){
var pw=document.getElementById("password").value;
var fill=document.getElementById("strengthFill");
var label=document.getElementById("strengthLabel");
fill.className="strength-fill";
if(!pw){fill.style.width="0";label.textContent="";updateButtons();return}
var score=0;
if(pw.length>=6)score++;
if(pw.length>=10)score++;
if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw))score++;
if(/[0-9]/.test(pw))score++;
if(/[^a-zA-Z0-9]/.test(pw))score++;
if(score<=2){fill.className="strength-fill strength-weak";label.textContent="弱 - 建议使用更复杂的密码";label.style.color="#ef4444"}
else if(score<=3){fill.className="strength-fill strength-medium";label.textContent="中等 - 密码强度可接受";label.style.color="#f59e0b"}
else{fill.className="strength-fill strength-strong";label.textContent="强 - 密码强度良好";label.style.color="#10b981"}
updateButtons();
}

function updateButtons(){
var hasFile=!!fileBuffer;
var hasPw=document.getElementById("password").value.length>=6;
document.getElementById("encryptBtn").disabled=!(hasFile&&hasPw);
document.getElementById("decryptBtn").disabled=!(hasFile&&hasPw);
}

function togglePassword(){
var pw=document.getElementById("password");
pw.type=pw.type==="password"?"text":"password";
}

async function processFile(mode){
var pw=document.getElementById("password").value;
if(!fileBuffer||pw.length<6){showToast("请选择文件并输入密码（至少6位）");return}
try{
document.getElementById("progressBar").style.display="block";
document.getElementById("progressFill").style.width="20%";
var keyMaterial=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
var salt=new Uint8Array(16);crypto.getRandomValues(salt);
var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
document.getElementById("progressFill").style.width="50%";
var result;
if(mode==="encrypt"){
var iv=crypto.getRandomValues(new Uint8Array(12));
var encrypted=await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,fileBuffer);
// Format: [salt(16)][iv(12)][encrypted data]
var combined=new Uint8Array(16+12+encrypted.byteLength);
combined.set(salt,0);
combined.set(iv,16);
combined.set(new Uint8Array(encrypted),28);
result=combined;
}else{
if(fileBuffer.length<28){showToast("无效的加密文件格式");document.getElementById("progressBar").style.display="none";return}
var fileSalt=fileBuffer.slice(0,16);
var fileIv=fileBuffer.slice(16,28);
var fileData=fileBuffer.slice(28);
key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:fileSalt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
try{
var decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv:fileIv},key,fileData);
result=new Uint8Array(decrypted);
}catch(e){showToast("解密失败：密码错误或文件已损坏");document.getElementById("progressBar").style.display="none";return}
}
document.getElementById("progressFill").style.width="80%";
var blob=new Blob([result]);
var ext=mode==="encrypt"?".encrypted":".decrypted";
var downloadName=selectedFile.name.replace(/(\.encrypted|\.decrypted)?$/,"")+ext;
var url=URL.createObjectURL(blob);
document.getElementById("progressFill").style.width="100%";
var resultArea=document.getElementById("resultArea");
resultArea.style.display="block";
resultArea.innerHTML='<div style="color:#86efac;margin-bottom:8px">✅ '+(mode==="encrypt"?"加密":"解密")+'完成！</div><div>原始文件: '+selectedFile.name+' ('+formatSize(selectedFile.size)+')</div><div>处理后: '+downloadName+' ('+formatSize(blob.size)+')</div><div style="margin-top:8px"><a href="'+url+'" download="'+downloadName+'" style="color:#93c5fd;text-decoration:underline">⬇️ 下载文件</a></div>';
setTimeout(function(){document.getElementById("progressBar").style.display="none";document.getElementById("progressFill").style.width="0%"},1000);
}catch(e){
showToast("处理失败: "+e.message);
document.getElementById("progressBar").style.display="none";
}
}

function resetAll(){
selectedFile=null;fileBuffer=null;
document.getElementById("fileInput").value="";
document.getElementById("password").value="";
document.getElementById("fileInfo").style.display="none";
document.getElementById("fileDrop").style.display="block";
document.getElementById("resultArea").style.display="none";
document.getElementById("strengthFill").style.width="0";
document.getElementById("strengthLabel").textContent="";
updateButtons();
}
</script>
</body>
</html>
