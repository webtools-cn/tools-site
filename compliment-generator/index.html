function generateCompliment(){
  var cat=document.getElementById('category').value;
  var pool=[];
  if(cat==='all'){
    for(var k in COMPLIMENTS) pool=pool.concat(COMPLIMENTS[k]);
  }else{
    pool=COMPLIMENTS[cat]||COMPLIMENTS.personality;
  }
  currentCompliment=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('complimentDisplay').textContent='💬 '+currentCompliment;
  document.getElementById('resultSection').classList.add('show');
}

document.getElementById('copyBtn').addEventListener('click',function(){
  if(!currentCompliment) return;

    document.getElementById('copyBtn').textContent='✅ 已复制!';
