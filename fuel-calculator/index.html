<div class="container">
  <div class="header"><h1>⛽ 油耗计算器</h1><div class="lang-switch"><a href="index.html" class="active">EN</a><a href="../en/fuel-calculator/">EN</a></div></div>
  <div class="nav-back"><a href="../index.html">&larr; 返回首页</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">输入行驶距离、百公里油耗和当前油价，自动计算单程油费。支持往返模式。</p>
    <div class="form-row">
      <div class="form-group"><label>行驶距离（公里）</label><input type="number" id="distance" step="any" min="0" placeholder="e.g. 300"></div>
      <div class="form-group"><label>百公里油耗（升/100km）</label><input type="number" id="consumption" step="0.1" min="0" placeholder="e.g. 8"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>油价（元/升）</label><input type="number" id="price" step="0.01" min="0" placeholder="e.g. 8.5"></div>
      <div class="form-group"><label><input type="checkbox" id="isRound" style="accent-color:#06b6d4;margin-right:6px">往返</label></div>
    </div>
    <div class="btn-group"><button class="btn btn-primary" onclick="calculate()">计算油费</button></div>
    <div class="result-grid" style="margin-top:16px">
      <div class="result-item"><div class="label">耗油量</div><div class="value" id="resFuel">&mdash;</div></div>
      <div class="result-item"><div class="label">油费</div><div class="value highlight" id="resCost">&mdash;</div></div>
      <div class="result-item"><div class="label">每公里成本</div><div class="value" id="resPerKm">&mdash;</div></div>
      <div class="result-item"><div class="label">往返油费</div><div class="value" id="resRound">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>常见问题</h2>

  </div>

<div class="toast" id="toast"></div>
<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function calculate(){
  var dist=parseFloat(document.getElementById("distance").value);
  var cons=parseFloat(document.getElementById("consumption").value);
  var price=parseFloat(document.getElementById("price").value);
  var round=document.getElementById("isRound").checked;
  if(isNaN(dist)||dist<=0||isNaN(cons)||cons<=0||isNaN(price)||price<=0){toast("请输入有效数值");return}
  var fuel=dist*cons/100;var cost=fuel*price;
  document.getElementById("resFuel").textContent=fuel.toFixed(2)+" L";
  document.getElementById("resCost").textContent=cost.toFixed(2);
  document.getElementById("resPerKm").textContent=(cost/dist).toFixed(3);
  document.getElementById("resRound").textContent=(round?cost*2:cost).toFixed(2);
}
</script>
