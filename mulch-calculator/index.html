<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
header .logo{font-size:1.3rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:8px;flex-wrap:wrap}

header nav a:hover{background:var(--hover);color:var(--primary)}

.card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px}
.card h3{font-size:1rem;margin-bottom:14px;color:var(--text)}

.field label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.field-row{display:flex;gap:10px;flex-wrap:wrap}
.field-row .field{flex:1;min-width:120px;margin-bottom:14px}
input[type="number"],select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;background:#fafbfc;transition:border-color .2s}
input[type="number"]:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}

.result-item .lbl{font-size:.8rem;color:var(--text2);margin-top:4px;display:block}

  main{padding:22px 14px 50px}

<body>
<header>
<a href="/" class="logo">🧰 Free ToolBase</a>
<nav>
<a href="/">🏠 首页</a>
<a href="/category/">📂 分类</a>
<a href="/en/mulch-calculator/">EN</a>
</nav>
</header>
<main>
<h1>🌿 覆盖物计算器</h1>
<p class="subtitle">输入花坛尺寸与铺设厚度，计算所需覆盖物体积、袋数及重量</p>

<div class="card">
<h3>📐 花坛尺寸</h3>
<div class="field-row">
<div class="field">
<label for="len">长度</label>
<input type="number" id="len" min="0" step="0.1" value="6" placeholder="如 6">
</div>
<div class="field">
<label for="wid">宽度</label>
<input type="number" id="wid" min="0" step="0.1" value="4" placeholder="如 4">
</div>
<div class="field">
<label for="dep">铺设厚度</label>
<input type="number" id="dep" min="0" step="0.1" value="3" placeholder="如 3">
</div>
</div>
<div class="field-row">
<div class="field">
<label for="unit">尺寸单位</label>
<select id="unit">
<option value="m">米 (m)</option>
<option value="ft">英尺 (ft)</option>
<option value="cm">厘米 (cm)</option>
</select>
</div>
<div class="field">
<label for="depthUnit">厚度单位</label>
<select id="depthUnit">
<option value="cm">厘米 (cm)</option>
<option value="in">英寸 (in)</option>
<option value="mm">毫米 (mm)</option>
</select>
</div>
</div>
</div>

<div class="card">
<h3>🪵 覆盖物类型</h3>
<div class="field">
<label for="mulchType">选择覆盖物</label>
<select id="mulchType">
<option value="0.25" data-bag="0.0566">树皮碎屑 (松散)</option>
<option value="0.20" data-bag="0.0566">木片覆盖物</option>
<option value="0.50" data-bag="0.04">堆肥</option>
<option value="0.45" data-bag="0.04">蘑菇土</option>
<option value="0.13" data-bag="0.06">松针</option>
<option value="0.95" data-bag="0.035">碎石 / 砾石</option>
<option value="0.40" data-bag="0.04">橡胶覆盖物</option>
</select>
</div>
<div class="info" id="typeInfo">密度参考：树皮碎屑约 250 kg/m³。不同类型密度差异较大，结果为估算值。</div>
</div>

<div class="btn-row">
<button class="btn btn-primary" onclick="calc()">🧮 计算用量</button>
<button class="btn btn-outline" onclick="resetForm()">🔄 重置</button>
</div>

<div id="resultArea" style="display:none">
<div class="card">
<h3>📊 计算结果</h3>
<div class="result-grid" id="resultGrid"></div>
<div class="info" id="resultNote"></div>
</div>
</div>
</main>

<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 免费在线工具集合 · <a href="/privacy-policy/">隐私政策</a></p>
</footer>

<script>
var DENSITY_INFO={
"0.25":"树皮碎屑约 250 kg/m³，松散铺设，1 袋(约 2 立方英尺=0.0566 m³)。",
"0.20":"木片覆盖物约 200 kg/m³，1 袋约 0.0566 m³。",
"0.50":"堆肥约 500 kg/m³，较重，1 袋约 0.04 m³。",
"0.45":"蘑菇土约 450 kg/m³，1 袋约 0.04 m³。",
"0.13":"松针约 130 kg/m³，非常轻，1 袋约 0.06 m³。",
"0.95":"碎石/砾石约 950 kg/m³，最重，1 袋约 0.035 m³。",
"0.40":"橡胶覆盖物约 400 kg/m³，1 袋约 0.04 m³。"
};
function showToast(msg){
var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
m.textContent=msg;t.classList.add('show');
setTimeout(function(){t.classList.remove('show');},2500);
}
document.getElementById('mulchType').addEventListener('change',function(){
document.getElementById('typeInfo').textContent='密度参考：'+DENSITY_INFO[this.value];
});
function toMeters(v,u){
if(u==='m')return v;
if(u==='ft')return v*0.3048;
if(u==='cm')return v/100;
return v;
}
function depthToMeters(v,u){
if(u==='cm')return v/100;
if(u==='in')return v*0.0254;
if(u==='mm')return v/1000;
return v;
}
function fmt(n,d){
d=d||2;
return Number(n.toFixed(d)).toLocaleString('zh-CN');
}
function calc(){
var len=parseFloat(document.getElementById('len').value);
var wid=parseFloat(document.getElementById('wid').value);
var dep=parseFloat(document.getElementById('dep').value);
var unit=document.getElementById('unit').value;
var depthUnit=document.getElementById('depthUnit').value;
var sel=document.getElementById('mulchType');
var density=parseFloat(sel.value);
var bagVol=parseFloat(sel.options[sel.selectedIndex].getAttribute('data-bag'));
if(isNaN(len)||len<=0){showToast('请输入有效的长度');return;}
if(isNaN(wid)||wid<=0){showToast('请输入有效的宽度');return;}
if(isNaN(dep)||dep<=0){showToast('请输入有效的厚度');return;}
var Lm=toMeters(len,unit);
var Wm=toMeters(wid,unit);
var Dm=depthToMeters(dep,depthUnit);
var area=Lm*Wm;
var vol=area*Dm;
var weight=vol*density;
var bags=bagVol>0?Math.ceil(vol/bagVol):0;
var volCuM=vol;
var volCuFt=vol/0.0283168;
var volCuYd=vol/0.764555;
var volL=vol*1000;
var grid=document.getElementById('resultGrid');
var items=[
{val:fmt(area,2)+' m²',lbl:'覆盖面积'},
{val:fmt(volCuM,3)+' m³',lbl:'体积 (立方米)'},
{val:fmt(volCuFt,1)+' ft³',lbl:'体积 (立方英尺)'},
{val:fmt(volCuYd,2)+' yd³',lbl:'体积 (立方码)'},
{val:fmt(volL,0)+' L',lbl:'体积 (升)'},
{val:fmt(weight,0)+' kg',lbl:'估算重量'},
{val:bags+' 袋',lbl:'建议购买袋数'}
];
grid.innerHTML='';
for(var i=0;i<items.length;i++){
var d=document.createElement('div');
d.className='result-item';
d.innerHTML='<span class="val">'+items[i].val+'</span><span class="lbl">'+items[i].lbl+'</span>';
grid.appendChild(d);
}
document.getElementById('resultNote').textContent=
'说明：袋数已向上取整。厚度建议 5–10 cm 以有效抑制杂草。购买时建议多备 5–10% 余量。';
document.getElementById('resultArea').style.display='block';
}
function resetForm(){
document.getElementById('len').value='';
document.getElementById('wid').value='';
document.getElementById('dep').value='';
document.getElementById('resultArea').style.display='none';
showToast('已重置');
}
</script>
</body>
</html>
