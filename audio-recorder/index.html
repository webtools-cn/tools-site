<script>
'use strict';
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let audioUrl = null;
let audioElement = null;
let stream = null;
let isRecording = false;
let isPaused = false;
let isPlaying = false;
let startTime = 0;
let pausedDuration = 0;
let pauseStartTime = 0;
let timerInterval = null;
let analyser = null;
let animationId = null;
let mediaSource = null;

const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');
const formatSelect = document.getElementById('formatSelect');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width || 600;
  canvas.height = 80;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function updateFormat() {
  // Format change only affects future recordings
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function setStatus(dotClass, text) {
  document.getElementById('statusDot').className = 'status-dot' + (dotClass ? ' ' + dotClass : '');
  document.getElementById('statusText').textContent = text;
}

function formatTime(ms) {
  const totalMs = Math.floor(ms);
  const mins = Math.floor(totalMs / 60000);
  const secs = Math.floor((totalMs % 60000) / 1000);
  const millis = totalMs % 1000;
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(millis).padStart(3,'0')}`;
}

function updateTimer() {
  if (isRecording && !isPaused) {
    const elapsed = Date.now() - startTime + pausedDuration;
    document.getElementById('timeDisplay').textContent = formatTime(elapsed);
  }
}

function drawWaveform() {
  if (!analyser) return;
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  analyser.getByteTimeDomainData(dataArray);

  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#22d3ee';
  ctx.beginPath();

  const sliceWidth = canvas.width / bufferLength;
  let x = 0;
  for (let i = 0; i < bufferLength; i++) {
    const v = dataArray[i] / 128.0;
    const y = v * canvas.height / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();
  animationId = requestAnimationFrame(drawWaveform);
}

function drawStaticWaveform() {
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (audioBlob) {
    ctx.fillStyle = '#22d3ee';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🔊 录音完成，点击播放查看波形', canvas.width/2, canvas.height/2 + 4);
  } else {
    ctx.fillStyle = '#64748b';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击"开始录音"开始', canvas.width/2, canvas.height/2 + 4);
  }
}

function updateButtons() {
  const recordBtn = document.getElementById('recordBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const playBtn = document.getElementById('playBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const clearBtn = document.getElementById('clearBtn');

  recordBtn.disabled = isRecording;
  recordBtn.textContent = isRecording ? '🔴 录音中...' : '🎤 开始录音';
  recordBtn.className = 'btn btn-record' + (isRecording ? ' recording' : '');
  pauseBtn.disabled = !isRecording;
  pauseBtn.textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
  stopBtn.disabled = !isRecording;
  playBtn.disabled = !audioBlob || isRecording;
  downloadBtn.disabled = !audioBlob || isRecording;
  clearBtn.disabled = !audioBlob && !isRecording;
}

async function toggleRecord() {
  if (isRecording) return;

  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      document.getElementById('permMsg').style.display = 'none';
    } catch (err) {
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        document.getElementById('permMsg').style.display = 'block';
      } else {
        showError('无法访问麦克风: ' + err.message);
      }
      return;
    }
  }

  audioChunks = [];
  isRecording = true;
  isPaused = false;
  pausedDuration = 0;
  startTime = Date.now();

  const mimeType = formatSelect.value;
  const options = { mimeType: 'audio/webm;codecs=opus' };
  // Try preferred format
  if (mimeType === 'audio/wav') {
    // WAV not directly supported by MediaRecorder, fallback to webm then convert later
    try { mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' }); }
    catch(e) { mediaRecorder = new MediaRecorder(stream); }
  } else {
    try { mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' }); }
    catch(e) { mediaRecorder = new MediaRecorder(stream); }
  }

  // Setup analyser for waveform
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    drawWaveform();
  } catch(e) {}

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const mime = mediaRecorder.mimeType || 'audio/webm';
    audioBlob = new Blob(audioChunks, { type: mime });
    const sizeKB = (audioBlob.size / 1024).toFixed(1);
    document.getElementById('sizeInfo').textContent = `录音大小: ${sizeKB} KB`;

    if (audioUrl) { URL.revokeObjectURL(audioUrl); }
    audioUrl = URL.createObjectURL(audioBlob);
    audioElement = new Audio(audioUrl);

    isRecording = false;
    isPaused = false;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    drawStaticWaveform();
    updateButtons();
    setStatus('', `录音完成 (${formatTime(Date.now() - startTime + pausedDuration)})`);
  };

  mediaRecorder.start(100);
  timerInterval = setInterval(updateTimer, 50);
  setStatus('recording', '录音中...');
  updateButtons();
}

function togglePause() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

  if (mediaRecorder.state === 'recording') {
    mediaRecorder.pause();
    isPaused = true;
    pauseStartTime = Date.now();
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    drawStaticWaveform();
    setStatus('paused', '已暂停');
  } else if (mediaRecorder.state === 'paused') {
    mediaRecorder.resume();
    isPaused = false;
    pausedDuration += Date.now() - pauseStartTime;
    drawWaveform();
    setStatus('recording', '录音中...');
  }
  updateButtons();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (analyser) { analyser = null; }
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
}

function togglePlay() {
  if (!audioElement || !audioBlob) return;

  if (isPlaying) {
    audioElement.pause();
    isPlaying = false;
    setStatus('', '已暂停播放');
    updateButtons();
    return;
  }

  // Recreate element for fresh playback
  if (audioUrl) URL.revokeObjectURL(audioUrl);
  audioUrl = URL.createObjectURL(audioBlob);
  audioElement = new Audio(audioUrl);
  audioElement.onended = () => {
    isPlaying = false;
    setStatus('', '播放完成');
    updateButtons();
    drawStaticWaveform();
  };
  audioElement.play();
  isPlaying = true;
  setStatus('playing', '播放中...');
  updateButtons();
}

function downloadAudio() {
  if (!audioBlob) return;
  const ext = formatSelect.value === 'audio/wav' ? 'wav' : 'webm';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(audioBlob);
  a.download = `recording-${new Date().toISOString().slice(0,19).replace(/[:-]/g,'')}.${ext}`;
  a.click();
}

function clearAudio() {
  if (isRecording) stopRecording();
  if (audioUrl) { URL.revokeObjectURL(audioUrl); audioUrl = null; }
  audioBlob = null;
  audioElement = null;
  audioChunks = [];
  isPlaying = false;
  pausedDuration = 0;
  document.getElementById('timeDisplay').textContent = '00:00.000';
  document.getElementById('sizeInfo').textContent = '';
  drawStaticWaveform();
  setStatus('', '已清除');
  updateButtons();
}

drawStaticWaveform();
updateButtons();
</script>

<select id="feedback-type" style="width:100%;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none">

</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ 感谢反馈！已提交到GitHub Issues</div>

<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){alert('请输入反馈内容');return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
