<div class="container">
  <div class="header">
    <h1>🕐 Digital Clock</h1>
    <a href="../" class="zh-link">🌐 中文</a>
  </div>

  <div class="controls">
    <button class="ctrl-btn fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <button class="ctrl-btn active" data-format="24h" onclick="setFormat('24h')">24h</button>
    <button class="ctrl-btn" data-format="12h" onclick="setFormat('12h')">12h</button>
    <button class="ctrl-btn" onclick="toggleSeconds()" id="secBtn">Sec Hide</button>
  </div>

  <div class="theme-selector">
    <div class="theme-dot dark active" data-theme="dark" onclick="setTheme('dark')" title="Dark"></div>
    <div class="theme-dot light" data-theme="light" onclick="setTheme('light')" title="Light"></div>
    <div class="theme-dot neon" data-theme="neon" onclick="setTheme('neon')" title="Neon"></div>
    <div class="theme-dot forest" data-theme="forest" onclick="setTheme('forest')" title="Forest"></div>
    <div class="theme-dot sunset" data-theme="sunset" onclick="setTheme('sunset')" title="Sunset"></div>
  </div>

  <div class="clock-container theme-dark" id="clockContainer">
    <div class="time-display" id="timeDisplay">00:00:00</div>
    <div class="date-text" id="dateDisplay">Loading...</div>
  </div>

  <div class="panel">
    <h2>📊 Time Info</h2>
    <div class="info-grid">
      <div class="info-item"><div class="label">Timezone</div><div class="value" id="tzDisplay">UTC+8</div></div>
      <div class="info-item"><div class="label">Timestamp</div><div class="value" id="tsDisplay">0</div></div>
      <div class="info-item"><div class="label">Seconds Today</div><div class="value" id="todaySecs">0</div></div>
      <div class="info-item"><div class="label">Year Progress</div><div class="value" id="yearProgress">0%</div></div>
    </div>
  </div>

  <div class="ad-slot" ><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5998441792679372" data-ad-slot="XXXXXXX" data-ad-format="horizontal" data-full-width-responsive="true"></ins></div>

  <div class="footer">
    <p>100% frontend, uses your system clock | <a href="../../">Back to Tools</a></p>
  </div>
</div>

<script>
var is24h = true;
var showSeconds = true;
var currentTheme = 'dark';
var weekDays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();
  var ampm = '';

  if (!is24h) {
    ampm = h >= 12 ? ' PM' : ' AM';
    h = h % 12 || 12;
  }

  var timeStr = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  if (showSeconds) {
    timeStr += '<span class="seconds-dot">:</span>' + String(s).padStart(2, '0');
  }
  if (!is24h) {
    timeStr += '<span class="ampm">' + ampm + '</span>';
  }

  document.getElementById('timeDisplay').innerHTML = timeStr;
  document.getElementById('dateDisplay').textContent = weekDays[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

  var tz = -now.getTimezoneOffset();
  document.getElementById('tzDisplay').textContent = 'UTC' + (tz >= 0 ? '+' : '') + (tz / 60);
  document.getElementById('tsDisplay').textContent = Math.floor(now.getTime() / 1000);
  
  var startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  document.getElementById('todaySecs').textContent = Math.floor((now - startOfDay) / 1000) + 's';

  var startOfYear = new Date(now.getFullYear(), 0, 1);
  var endOfYear = new Date(now.getFullYear() + 1, 0, 1);
  document.getElementById('yearProgress').textContent = ((now - startOfYear) / (endOfYear - startOfYear) * 100).toFixed(2) + '%';
}

function setFormat(format) {
  is24h = format === '24h';
  document.querySelectorAll('[data-format]').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-format="' + format + '"]').classList.add('active');
}

function toggleSeconds() {
  showSeconds = !showSeconds;
  document.getElementById('secBtn').textContent = 'Sec ' + (showSeconds ? 'Hide' : 'Show');
}

function setTheme(theme) {
  currentTheme = theme;
  var container = document.getElementById('clockContainer');
  container.className = 'clock-container theme-' + theme;
  document.querySelectorAll('.theme-dot').forEach(function(d) { d.classList.remove('active'); });
  document.querySelector('.theme-dot[data-theme="' + theme + '"]').classList.add('active');
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function() {});
  } else {
    document.exitFullscreen();
  }
}

setInterval(updateClock, 200);
updateClock();
</script>

<div id="feedback-widget" style="position:fixed;bottom:20px;right:20px;z-index:1000">

<div id="feedback-panel" style="display:none;position:absolute;bottom:56px;right:0;width:320px;background:#1e293b;border:1px solid rgba(6,182,212,.3);border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.4)">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

<button onclick="toggleFeedback()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
</div>

<option value="feedback">💡 功能建议</option>

<option value="other">💬 其他</option>
</select>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">Submit</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ Thank you! Your feedback has been submitted to GitHub Issues</div>
</div>
</div>
<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){showToast('请输入反馈内容');return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**Page**: '+window.location.href+'\n**Type**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
<div class="toast" id="toast"></div>
