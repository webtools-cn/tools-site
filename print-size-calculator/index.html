<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

(function(){var s=document.createElement('script');s.src='/tools-site/feedback-widget.html';s.onload=function(){if(window.initFeedback)initFeedback('print-size-calculator')};document.body.appendChild(s)})();

function toggleFaq(el){var item=el.parentElement;item.classList.toggle('open')}

document.getElementById('calcBtn').addEventListener('click',function(){
  const w=parseFloat(document.getElementById('imgWidth').value);
  const h=parseFloat(document.getElementById('imgHeight').value);
  const dpi=parseFloat(document.getElementById('targetDpi').value);
  const unit=document.getElementById('unitSelect').value;
  
  if(!w||!h||!dpi||w<=0||h<=0||dpi<=0){showToast('请输入有效的像素尺寸和DPI');return}
  
  const printWIn=w/dpi;
  const printHIn=h/dpi;
  const totalMP=(w*h/1000000).toFixed(1);
  const ratio=(w/h).toFixed(3);
  
  const unitLabel=unit==='inch'?'英寸':'厘米';
  const multiplier=unit==='cm'?2.54:1;
  
  document.getElementById('resultCard').style.display='block';
  document.getElementById('printWidth').textContent=(printWIn*multiplier).toFixed(1);
  document.getElementById('printWidthUnit').textContent=unitLabel;
  document.getElementById('printHeight').textContent=(printHIn*multiplier).toFixed(1);
  document.getElementById('printHeightUnit').textContent=unitLabel;
  document.getElementById('totalPixels').textContent=totalMP;
  document.getElementById('aspectRatio').textContent=ratio;
  
  // DPI table
  const dpiLevels=[
    {dpi:350,label:'极高品质',badge:'badge-excellent',scene:'艺术微喷/专业展览'},
    {dpi:300,label:'最佳品质',badge:'badge-excellent',scene:'照片打印/影集'},
    {dpi:240,label:'高品质',badge:'badge-good',scene:'一般照片打印'},
    {dpi:200,label:'良好',badge:'badge-good',scene:'文档插图/宣传册'},
    {dpi:150,label:'可接受',badge:'badge-fair',scene:'海报/大幅面'},
    {dpi:100,label:'一般',badge:'badge-fair',scene:'背景板/展示架'},
    {dpi:72,label:'屏幕级',badge:'badge-poor',scene:'网页/屏幕显示'},
  ];
  
  const tbl=document.getElementById('dpiTableBody');
  tbl.innerHTML='';
  dpiLevels.forEach(function(lv){
    const pw=w/lv.dpi;
    const ph=h/lv.dpi;
    const sizeStr=unit==='cm'?(pw*2.54).toFixed(1)+'×'+(ph*2.54).toFixed(1)+' cm':pw.toFixed(1)+'×'+ph.toFixed(1)+' in';
    tbl.innerHTML+='<tr><td><span class="badge '+lv.badge+'">'+lv.label+'</span></td><td>'+lv.dpi+'</td><td>'+sizeStr+'</td><td>'+lv.scene+'</td></tr>';
  });
  
  // Quality info
  document.getElementById('qualityDpiLabel').textContent=dpi;
  document.getElementById('qualitySizeLabel').textContent=unit==='cm'?(printWIn*2.54).toFixed(1)+'×'+(printHIn*2.54).toFixed(1)+'厘米':printWIn.toFixed(1)+'×'+printHIn.toFixed(1)+'英寸';
  
  let quality='';
  if(dpi>=300)quality='<strong>🟢 优秀</strong> — 达到照片级打印标准，细节丰富锐利';
  else if(dpi>=240)quality='<strong>🟡 良好</strong> — 适合一般照片打印，近观或可见轻微像素';
  else if(dpi>=150)quality='<strong>🟠 可接受</strong> — 适合海报或远距离观看';
  else quality='<strong>🔴 较低</strong> — 近距离观看会看到像素点，建议降低打印尺寸或提高DPI';
  
  document.getElementById('qualityInfo').innerHTML='<strong>📊 质量评估</strong>: '+quality+'<br><br>💡 如需更大打印尺寸，建议降低DPI或拍摄更高像素的照片。';
});

function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:0.9rem;z-index:1000;opacity:0;transition:opacity .3s';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='1'},10);setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},300)},2000)}

</script>
