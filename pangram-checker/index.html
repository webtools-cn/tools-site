;text-decoration:none}@media(max-width:640px){h1{font-size:1.2rem;word-break:break-word}.header{flex-direction:column;gap:8px}}</style>

<body>
<header>
<a href="/" class="logo">🧰 Free ToolBase</a>
<nav>
<a href="/">🏠 首页</a>
<a href="/category/">📂 分类</a>
<a href="/en/pangram-checker/">EN</a>
</nav>
</header>
<main>
<h1>🔤 全字母句检测器</h1>
<p class="subtitle">输入文本，检测是否包含英文字母表中的所有26个字母</p>
<div class="card">
<h3>📝 输入文本</h3>
<textarea id="textInput" placeholder="输入或粘贴英文文本，例如：The quick brown fox jumps over the lazy dog" onkeydown="if(event.key==='Enter'&&event.ctrlKey)check()"></textarea>
<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-primary" onclick="check()">🔍 检测</button>
<button class="btn btn-outline" onclick="loadSample()">✨ 示例</button>
<button class="btn btn-outline" onclick="clearAll()">🗑 清空</button>
</div>
<div class="result-area" id="resultArea">
<div class="result-banner" id="resultBanner"></div>
<div class="alphabet-grid" id="alphabetGrid"></div>
<div class="stats-row" id="statsRow"></div>
</div>
</div>
<div class="card">
<h3>📖 什么是全字母句？</h3>
<ul class="info-list">
<li>全字母句（Pangram）是包含英文字母表中所有26个字母的句子</li>
<li>最著名的全字母句："The quick brown fox jumps over the lazy dog"</li>
<li>全字母句常用于字体展示和键盘测试</li>
<li>完美的全字母句（每个字母恰好出现一次）在英语中几乎不存在</li>
</ul>
</div>
</main>
<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 免费在线工具集合 · <a href="/privacy-policy/">隐私政策</a></p>
</footer>
<script>
function showToast(msg){
  var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
  m.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function check(){
  var text=document.getElementById('textInput').value;
  if(!text.trim()){showToast('请输入文本');return;}
  var found={};
  var lower=text.toLowerCase();
  for(var i=0;i<lower.length;i++){
    var c=lower.charCodeAt(i);
    if(c>=97&&c<=122){found[lower[i]]=true;}
  }
  var foundCount=Object.keys(found).length;
  var isPangram=foundCount===26;
  var banner=document.getElementById('resultBanner');
  banner.className='result-banner '+(isPangram?'pangram-yes':'pangram-no');
  banner.textContent=isPangram?'✅ 这是一个全字母句！包含了所有26个字母':'❌ 不是全字母句，缺少'+(26-foundCount)+'个字母';
  var grid=document.getElementById('alphabetGrid');
  grid.innerHTML='';
  for(var code=97;code<=122;code++){
    var ch=String.fromCharCode(code);
    var cell=document.createElement('div');
    cell.className='alpha-cell '+(found[ch]?'alpha-found':'alpha-missing');
    cell.textContent=ch.toUpperCase();
    grid.appendChild(cell);
  }
  var stats=document.getElementById('statsRow');
  stats.innerHTML='';
  var statsData=[
    {value:foundCount,label:'已找到字母'},
    {value:26-foundCount,label:'缺失字母'},
    {value:text.length,label:'总字符数'}
  ];
  for(var s=0;s<statsData.length;s++){
    var item=document.createElement('div');
    item.className='stat-item';
    item.innerHTML='<div class="stat-value">'+statsData[s].value+'</div><div class="stat-label">'+statsData[s].label+'</div>';
    stats.appendChild(item);
  }
  document.getElementById('resultArea').classList.add('show');
}
function loadSample(){
  document.getElementById('textInput').value='The quick brown fox jumps over the lazy dog';
  check();
}
function clearAll(){
  document.getElementById('textInput').value='';
  document.getElementById('resultArea').classList.remove('show');
}
</script>
</body>
