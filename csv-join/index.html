<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

(function(){var s=document.createElement('script');s.src='/tools-site/feedback-widget.html';s.onload=function(){if(window.initFeedback)initFeedback('csv-join')};document.body.appendChild(s)})();

function toggleFaq(el){var item=el.parentElement;item.classList.toggle('open')}

let csvDataA=null, csvDataB=null;
let currentJoinType='inner';
let joinResult=null;

// File upload handlers
function loadFile(side,input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    if(side==='A'){
      document.getElementById('csvA').value=text;
      parseCSV('A');
    }else{
      document.getElementById('csvB').value=text;
      parseCSV('B');
    }
  };
  reader.readAsText(file);
  input.value='';
}

// Drop zone handlers
['A','B'].forEach(function(side){
  const el=document.getElementById('dropZone'+side);
  el.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('dragover')});
  el.addEventListener('dragleave',function(e){this.classList.remove('dragover')});
  el.addEventListener('drop',function(e){
    e.preventDefault();
    this.classList.remove('dragover');
    const file=e.dataTransfer.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      if(side==='A'){
        document.getElementById('csvA').value=ev.target.result;
        parseCSV('A');
      }else{
        document.getElementById('csvB').value=ev.target.result;
        parseCSV('B');
      }
    };
    reader.readAsText(file);
  });
});

// Auto-parse on textarea change
document.getElementById('csvA').addEventListener('input',debounce(function(){parseCSV('A')},500));
document.getElementById('csvB').addEventListener('input',debounce(function(){parseCSV('B')},500));

function debounce(fn,delay){let t;return function(){clearTimeout(t);t=setTimeout(fn,delay)}}

function parseCSV(side){
  const textarea=document.getElementById('csv'+side);
  const text=textarea.value.trim();
  const previewDiv=document.getElementById('preview'+side);
  const colSelect=document.getElementById('col'+(side==='A'?'A':'B'));
  
  if(!text){
    previewDiv.style.display='none';
    if(side==='A')csvDataA=null;else csvDataB=null;
    updateColOptions();
    return;
  }
  
  try{
    const data=parseCSVText(text);
    if(data.length<1){
      previewDiv.style.display='none';
      if(side==='A')csvDataA=null;else csvDataB=null;
      updateColOptions();
      return;
    }
    
    if(side==='A')csvDataA=data;else csvDataB=data;
    
    // Render preview
    renderPreview(previewDiv,data);
    previewDiv.style.display='block';
    updateColOptions();
  }catch(e){
    previewDiv.style.display='none';
    if(side==='A')csvDataA=null;else csvDataB=null;
    updateColOptions();
  }
}

function parseCSVText(text){
  // Detect delimiter
  const lines=text.split(/\r?\n/).filter(function(l){return l.trim()!==''});
  if(lines.length===0)return [];
  
  // Try to detect delimiter
  let delimiter=',';
  const firstLine=lines[0];
  const tabCount=(firstLine.match(/\t/g)||[]).length;
  const commaCount=(firstLine.match(/,/g)||[]).length;
  if(tabCount>commaCount)delimiter='\t';
  
  // Parse rows
  const result=[];
  for(let i=0;i<lines.length;i++){
    const row=parseCSVLine(lines[i],delimiter);
    result.push(row);
  }
  return result;
}

function parseCSVLine(line,delimiter){
  const result=[];
  let current='';
  let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'){
        if(i+1<line.length&&line[i+1]==='"'){
          current+='"';
          i++;
        }else{
          inQuotes=false;
        }
      }else{
        current+=ch;
      }
    }else{
      if(ch==='"'){
        inQuotes=true;
      }else if(ch===delimiter){
        result.push(current.trim());
        current='';
      }else{
        current+=ch;
      }
    }
  }
  result.push(current.trim());
  return result;
}

function renderPreview(div,data){
  if(!data||data.length===0){div.style.display='none';return}
  const headers=data[0];
  const rows=data.slice(1,21); // Show max 20 rows
  var html='<table><thead><tr>';
  for(let i=0;i<headers.length;i++){
    html+='<th>'+escapeHtml(headers[i])+'</th>';
  }
  html+='</tr></thead><tbody>';
  for(let r=0;r<rows.length;r++){
    html+='<tr>';
    const row=rows[r];
    for(let c=0;c<headers.length;c++){
      html+='<td>'+(c<row.length?escapeHtml(row[c]):'')+'</td>';
    }
    html+='</tr>';
  }
  if(data.length>21){
    html+='<tr><td colspan="'+headers.length+'" style="color:#888;font-style:italic;text-align:center">... 共 '+data.length+' 行</td></tr>';
  }
  html+='</tbody></table>';
  div.innerHTML=html;
}

function updateColOptions(){
  const selA=document.getElementById('colA');
  const selB=document.getElementById('colB');
  
  const oldA=selA.value;
  const oldB=selB.value;
  
  selA.innerHTML='<option value="">-- 选择列 --</option>';
  selB.innerHTML='<option value="">-- 选择列 --</option>';
  
  if(csvDataA&&csvDataA.length>0){
    const headers=csvDataA[0];
    for(let i=0;i<headers.length;i++){
      const opt=document.createElement('option');
      opt.value=''+i;
      opt.textContent=headers[i];
      selA.appendChild(opt);
    }
    if(oldA&&parseInt(oldA)<headers.length)selA.value=oldA;
  }
  
  if(csvDataB&&csvDataB.length>0){
    const headers=csvDataB[0];
    for(let i=0;i<headers.length;i++){
      const opt=document.createElement('option');
      opt.value=''+i;
      opt.textContent=headers[i];
      selB.appendChild(opt);
    }
    if(oldB&&parseInt(oldB)<headers.length)selB.value=oldB;
  }
}

function setJoinType(el){
  document.querySelectorAll('.join-type-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  currentJoinType=el.dataset.join;
}

function executeJoin(){
  if(!csvDataA||!csvDataB||csvDataA.length<1||csvDataB.length<1){
    showToast('请先输入左右表数据');
    return;
  }
  
  const colAIdx=parseInt(document.getElementById('colA').value);
  const colBIdx=parseInt(document.getElementById('colB').value);
  
  if(isNaN(colAIdx)||isNaN(colBIdx)){
    showToast('请选择匹配列');
    return;
  }
  
  const headersA=csvDataA[0];
  const headersB=csvDataB[0];
  const dataA=csvDataA.slice(1);
  const dataB=csvDataB.slice(1);
  
  // Build lookup index for B
  const bIndex={};
  for(let i=0;i<dataB.length;i++){
    const key=String(dataB[i][colBIdx]||'');
    if(!bIndex[key])bIndex[key]=[];
    bIndex[key].push(dataB[i]);
  }
  
  // Build lookup index for A
  const aIndex={};
  for(let i=0;i<dataA.length;i++){
    const key=String(dataA[i][colAIdx]||'');
    if(!aIndex[key])aIndex[key]=[];
    aIndex[key].push(dataA[i]);
  }
  
  // Result headers: all columns from A + all columns from B (except join column)
  const resultHeaders=[];
  for(let i=0;i<headersA.length;i++)resultHeaders.push(headersA[i]);
  for(let i=0;i<headersB.length;i++){
    if(i!==colBIdx)resultHeaders.push(headersB[i]);
  }
  
  const resultRows=[];
  const seenKeys={};
  
  function mergeRow(rowA,rowB){
    const newRow=[];
    for(let i=0;i<headersA.length;i++)newRow.push(i<rowA.length?rowA[i]:'');
    for(let i=0;i<headersB.length;i++){
      if(i!==colBIdx)newRow.push(i<rowB.length?rowB[i]:'');
    }
    return newRow;
  }
  
  function emptyRowA(){const r=[];for(let i=0;i<headersA.length;i++)r.push('');return r}
  function emptyRowB(){const r=[];for(let i=0;i<headersB.length;i++)r.push('');return r}
  
  if(currentJoinType==='inner'||currentJoinType==='left'||currentJoinType==='outer'){
    for(let i=0;i<dataA.length;i++){
      const key=String(dataA[i][colAIdx]||'');
      const matches=bIndex[key]||[];
      if(matches.length>0){
        for(let m=0;m<matches.length;m++){
          resultRows.push(mergeRow(dataA[i],matches[m]));
        }
      }else if(currentJoinType==='left'||currentJoinType==='outer'){
        resultRows.push(mergeRow(dataA[i],emptyRowB()));
      }
      seenKeys[key]=true;
    }
  }
  
  if(currentJoinType==='right'||currentJoinType==='outer'){
    for(let i=0;i<dataB.length;i++){
      const key=String(dataB[i][colBIdx]||'');
      if(!seenKeys[key]){
        const matchesA=aIndex[key]||[];
        if(matchesA.length>0){
          for(let m=0;m<matchesA.length;m++){
            resultRows.push(mergeRow(matchesA[m],dataB[i]));
          }
        }else{
          resultRows.push(mergeRow(emptyRowA(),dataB[i]));
        }
        seenKeys[key]=true;
      }
    }
  }
  
  joinResult={headers:resultHeaders,rows:resultRows};
  
  // Show stats
  document.getElementById('statsRow').style.display='flex';
  document.getElementById('statRows').textContent=resultRows.length;
  document.getElementById('statCols').textContent=resultHeaders.length;
  document.getElementById('statType').textContent=currentJoinType.toUpperCase();
  
  // Render result
  renderResult(resultHeaders,resultRows);
  showToast('合并完成！共 '+resultRows.length+' 行');
}

function renderResult(headers,rows){
  const area=document.getElementById('resultArea');
  if(!rows||rows.length===0){
    area.innerHTML='<div class="empty-state"><div class="empty-icon">🔗</div><div>无匹配结果</div></div>';
    return;
  }
  
  let html='<div class="preview-table"><table><thead><tr>';
  for(let i=0;i<headers.length;i++){
    html+='<th>'+escapeHtml(headers[i])+'</th>';
  }
  html+='</tr></thead><tbody>';
  const displayRows=rows.slice(0,100);
  for(let r=0;r<displayRows.length;r++){
    html+='<tr>';
    for(let c=0;c<headers.length;c++){
      html+='<td>'+(c<displayRows[r].length?escapeHtml(displayRows[r][c]):'')+'</td>';
    }
    html+='</tr>';
  }
  if(rows.length>100){
    html+='<tr><td colspan="'+headers.length+'" style="color:#888;font-style:italic;text-align:center">... 显示前100行，共 '+rows.length+' 行</td></tr>';
  }
  html+='</tbody></table></div>';
  
  // Add copy and export controls
  html+='<div class="btn-group" style="margin-top:12px">';
  html+='<button class="btn btn-success" onclick="downloadResult()">⬇️ 下载CSV</button>';
  html+='<button class="btn btn-outline" onclick="copyResult()">📋 复制CSV</button>';
  html+='</div>';
  
  area.innerHTML=html;
}

function downloadResult(){
  if(!joinResult||!joinResult.rows||joinResult.rows.length===0){
    showToast('请先执行JOIN合并');
    return;
  }
  let csv=joinResult.headers.map(function(h){return '"'+h.replace(/"/g,'""')+'"'}).join(',')+'\n';
  for(let i=0;i<joinResult.rows.length;i++){
    csv+=joinResult.rows[i].map(function(cell){return '"'+String(cell).replace(/"/g,'""')+'"'}).join(',')+'\n';
  }
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='join_result_'+currentJoinType+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('下载已开始');
}

function copyResult(){
  if(!joinResult||!joinResult.rows||joinResult.rows.length===0){
    showToast('请先执行JOIN合并');
    return;
  }
  let csv=joinResult.headers.join(',')+'\n';
  for(let i=0;i<joinResult.rows.length;i++){
    csv+=joinResult.rows[i].join(',')+'\n';
  }
  navigator.clipboard.writeText(csv).then(function(){
    showToast('已复制 '+joinResult.rows.length+' 行');
  }).catch(function(){
    showToast('复制失败');
  });
}

function clearAll(){
  document.getElementById('csvA').value='';
  document.getElementById('csvB').value='';
  document.getElementById('previewA').style.display='none';
  document.getElementById('previewB').style.display='none';
  document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="empty-icon">🔗</div><div>输入左右表数据，选择匹配列和JOIN类型，点击"执行JOIN合并"</div></div>';
  document.getElementById('statsRow').style.display='none';
  csvDataA=null;csvDataB=null;joinResult=null;
  updateColOptions();
  showToast('已清空');
}

function loadSample(){
  const sampleA='id,name,age\n1,张三,28\n2,李四,32\n3,王五,25\n4,赵六,30\n5,陈七,35';
  const sampleB='id,department,salary\n1,技术部,15000\n2,市场部,12000\n4,财务部,13000\n6,人事部,11000';
  document.getElementById('csvA').value=sampleA;
  document.getElementById('csvB').value=sampleB;
  parseCSV('A');
  parseCSV('B');
  // Auto-select id column
  setTimeout(function(){
    document.getElementById('colA').value='0';
    document.getElementById('colB').value='0';
  },100);
  showToast('已加载示例数据');
}

function escapeHtml(s){
  if(s===null||s===undefined)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast show';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove()},300)},2000);
}

</script>
