  const paNums = '₀₁₂₃₄₅₆₇₈₉₁₀';
  const su = '⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻⁼⁽⁾ⁿ';

  const aZ = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const nums = '0123456789';
  const digitNums = '⓪①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';
  function buildMap(src, target, src2, target2, numsSrc, numsTarget){
    const m = {};
    for(let i=0;i<src.length;i++) m[src[i]] = target[i] || src[i];
    for(let i=0;i<(src2||'').length;i++) m[(src2||'')[i]] = (target2||'')[i] || (src2||'')[i];
    for(let i=0;i<(numsSrc||'').length;i++) m[(numsSrc||'')[i]] = (numsTarget||'')[i] || (numsSrc||'')[i];
    return m;
  }
  BT_STYLES[0].map = buildMap(aZ, w, null, null, nums, wNums);
  BT_STYLES[1].map = buildMap(aZ, bl, null, null, nums, blNums);
  BT_STYLES[2].map = buildMap(aZ, pa, null, null, nums, nums);
  BT_STYLES[3].map = buildMap('', '', null, null, nums, digitNums);

let btActiveStyle = 0;
function btConvert(){
  const input = document.getElementById('btInput').value;
  const map = BT_STYLES[btActiveStyle].map;
  let out = '';
  for(const ch of input) out += map[ch] || ch;
  document.getElementById('btOutput').textContent = out;
}
function btSelectStyle(idx){
  btActiveStyle = idx;
  document.querySelectorAll('.style-card').forEach((el,i)=>{
    el.classList.toggle('active', i===idx);

}
function btCopy(){
  const text = document.getElementById('btOutput').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.btn-success');
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制!';
    setTimeout(()=>btn.textContent = orig, 1500);
  }).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
function btClear(){
  document.getElementById('btInput').value = '';

}
function initBtUI(){

    card.appendChild(preview);
    card.appendChild(name);
    container.appendChild(card);

}
