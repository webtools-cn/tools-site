<script>
function generate() {
  const s = document.getElementById('scenario').value;
  const pn = document.getElementById('projectName').value.trim() || 'myapp';
  const wp = document.getElementById('webPort').value || 8080;
  const dbp = document.getElementById('dbPort').value || 3306;
  const dbpass = document.getElementById('dbPassword').value.trim() || 'changeme';
  const dbname = document.getElementById('dbName').value.trim() || 'myapp';
  const extra = document.getElementById('extraEnv').value.trim();
  const vols = document.getElementById('optVolumes').checked;
  const net = document.getElementById('optNetwork').checked;
  const restart = document.getElementById('optRestart').checked ? 'unless-stopped' : 'no';

  let out = '';
  switch (s) {
    case 'webdb': out = genWebDB(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart); break;
    case 'wordpress': out = genWordPress(pn, wp, dbpass, dbname, extra, vols, net, restart); break;
    case 'lamp': out = genLAMP(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart); break;
    case 'mean': out = genMEAN(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart); break;
    case 'nextjs': out = genNextJS(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart); break;
    case 'redis': out = genRedis(pn, wp, dbpass, extra, vols, net, restart); break;
    case 'nginxproxy': out = genNginxProxy(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart); break;
  }
  document.getElementById('output').textContent = out;
}

function yamlVal(v) { return v.includes(' ') ? '"' + v + '"' : v; }
function addEnv(lines, indent, extra) {
  if (!extra) return;
  extra.split('\n').filter(l => l.trim()).forEach(l => lines.push(indent + yamlVal(l.trim())));
}

function genWebDB(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart) {
  const l = []; const i = '  ';
  l.push('version: "3.8"');
  l.push('');
  l.push('services:');
  l.push(i + 'web:');
  l.push(i + i + 'build: .');
  l.push(i + i + `container_name: ${pn}-web`);
  l.push(i + i + `ports: ["${wp}:3000"]`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'depends_on:');
  l.push(i + i + i + '- db');
  l.push(i + i + 'environment:');
  l.push(i + i + i + `DB_HOST: db`);
  l.push(i + i + i + `DB_PORT: "3306"`);
  l.push(i + i + i + `DB_USER: root`);
  l.push(i + i + i + `DB_PASSWORD: ${yamlVal(dbpass)}`);
  l.push(i + i + i + `DB_NAME: ${yamlVal(dbname)}`);
  addEnv(l, i + i + i, extra);
  l.push('');
  l.push(i + 'db:');
  l.push(i + i + `image: mysql:8.0`);
  l.push(i + i + `container_name: ${pn}-db`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'environment:');
  l.push(i + i + i + `MYSQL_ROOT_PASSWORD: ${yamlVal(dbpass)}`);
  l.push(i + i + i + `MYSQL_DATABASE: ${yamlVal(dbname)}`);
  l.push(i + i + `ports: ["${dbp}:3306"]`);
  if (vols) { l.push(i + i + 'volumes:'); l.push(i + i + i + '- db_data:/var/lib/mysql'); }
  if (net) { l.push(i + i + 'networks:'); l.push(i + i + i + '- appnet'); }
  l.push('');
  if (vols) { l.push('volumes:'); l.push(i + 'db_data:'); }
  if (net) { l.push('networks:'); l.push(i + 'appnet:'); }
  return l.join('\n');
}

function genWordPress(pn, wp, dbpass, dbname, extra, vols, net, restart) {
  const l = []; const i = '  ';
  l.push('version: "3.8"');
  l.push(''); l.push('services:');
  l.push(i + 'wordpress:');
  l.push(i + i + `image: wordpress:latest`);
  l.push(i + i + `container_name: ${pn}-wp`);
  l.push(i + i + `ports: ["${wp}:80"]`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'environment:');
  l.push(i + i + i + `WORDPRESS_DB_HOST: db`);
  l.push(i + i + i + `WORDPRESS_DB_USER: root`);
  l.push(i + i + i + `WORDPRESS_DB_PASSWORD: ${yamlVal(dbpass)}`);
  l.push(i + i + i + `WORDPRESS_DB_NAME: ${yamlVal(dbname)}`);
  l.push(i + i + i + `WORDPRESS_TABLE_PREFIX: wp_`);
  addEnv(l, i + i + i, extra);
  if (vols) { l.push(i + i + 'volumes:'); l.push(i + i + i + '- wp_data:/var/www/html'); }
  l.push('');
  l.push(i + 'db:');
  l.push(i + i + `image: mysql:8.0`);
  l.push(i + i + `container_name: ${pn}-db`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'environment:');
  l.push(i + i + i + `MYSQL_ROOT_PASSWORD: ${yamlVal(dbpass)}`);
  l.push(i + i + i + `MYSQL_DATABASE: ${yamlVal(dbname)}`);
  if (vols) { l.push(i + i + 'volumes:'); l.push(i + i + i + '- db_data:/var/lib/mysql'); }
  l.push('');
  if (vols) { l.push('volumes:'); l.push(i + 'db_data:'); l.push(i + 'wp_data:'); }
  return l.join('\n');
}

function genLAMP(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart) {
  const l = []; const i = '  ';
  l.push('version: "3.8"'); l.push(''); l.push('services:');
  l.push(i + 'php:');
  l.push(i + i + `image: php:8.2-apache`);
  l.push(i + i + `container_name: ${pn}-php`);
  l.push(i + i + `ports: ["${wp}:80"]`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'volumes:'); l.push(i + i + i + '- ./html:/var/www/html');
  l.push(i + i + 'depends_on:'); l.push(i + i + i + '- db');
  l.push('');
  l.push(i + 'db:');
  l.push(i + i + `image: mysql:8.0`);
  l.push(i + i + `container_name: ${pn}-db`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'environment:');
  l.push(i + i + i + `MYSQL_ROOT_PASSWORD: ${yamlVal(dbpass)}`);
  l.push(i + i + i + `MYSQL_DATABASE: ${yamlVal(dbname)}`);
  l.push(i + i + `ports: ["${dbp}:3306"]`);
  if (vols) { l.push(i + i + 'volumes:'); l.push(i + i + i + '- db_data:/var/lib/mysql'); }
  l.push('');
  l.push(i + 'phpmyadmin:');
  l.push(i + i + `image: phpmyadmin:latest`);
  l.push(i + i + `container_name: ${pn}-pma`);
  l.push(i + i + `ports: ["8080:80"]`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'environment:'); l.push(i + i + i + 'PMA_HOST: db'); l.push(i + i + i + 'UPLOAD_LIMIT: 64M');
  l.push(i + i + 'depends_on:'); l.push(i + i + i + '- db');
  l.push('');
  if (vols) { l.push('volumes:'); l.push(i + 'db_data:'); }
  return l.join('\n');
}

function genMEAN(pn, wp, dbp, dbpass, dbname, extra, vols, net, restart) {
  const l = []; const i = '  ';
  l.push('version: "3.8"'); l.push(''); l.push('services:');
  l.push(i + 'angular:');
  l.push(i + i + `image: nginx:alpine`);
  l.push(i + i + `container_name: ${pn}-web`);
  l.push(i + i + `ports: ["${wp}:80"]`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + 'volumes:'); l.push(i + i + i + '- ./dist:/usr/share/nginx/html');
  l.push('');
  l.push(i + 'api:');
  l.push(i + i + `build: ./api`);
  l.push(i + i + `container_name: ${pn}-api`);
  l.push(i + i + `restart: ${restart}`);
  l.push(i + i + `ports: ["3000:3000"]`);
  l.push(i + i + 'environment:');
  l.push(i + i + i + `MONGO_URI: mongodb://db:27017/${dbname}`);
  l.push(i + i + i + `PORT: "3000"`);
  addEnv(l, i + i + i, extra);
  l.push(i + i + 'depends_on:'); l.push(i + i + i + '- db');
  l.push('');
  l.push(i + 'db:');

function copyIt() {
  const t=document.getElementById('output').textContent; if (t.includes('选择场景')) return;
  navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector('.btn-row .btn-secondary');const o=b.textContent;b.textContent='✅ 已复制';setTimeout(()=>b.textContent=o,2000)}).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});
}
function downloadIt() {
  const t=document.getElementById('output').textContent; if (t.includes('选择场景')) return;
  const b=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='docker-compose.yml';a.click();URL.revokeObjectURL(a.href);
}
document.querySelectorAll('input, select, textarea').forEach(el=>{el.addEventListener('change',generate);el.addEventListener('input',generate)});
generate();

<!-- 反馈收集 -->
<div id="feedback-widget" style="position:fixed;bottom:20px;right:20px;z-index:1000">
<button id="feedback-toggle" onclick="toggleFeedback()" style="width:48px;height:48px;border-radius:50%;background:rgba(6,182,212,.2);border:2px solid rgba(6,182,212,.5);color:#22d3ee;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">💬</button>
<div id="feedback-panel" style="display:none;position:absolute;bottom:56px;right:0;width:320px;background:#1e293b;border:1px solid rgba(6,182,212,.3);border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.4)">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<span style="color:#f1f5f9;font-size:.95rem;font-weight:600">📝 反馈建议</span>
<button onclick="toggleFeedback()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
</div>
<select id="feedback-type" style="width:100%;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none">
<option value="feedback">💡 功能建议</option>
<option value="bug">🐛 问题反馈</option>
<option value="other">💬 其他</option>
</select>
<textarea id="feedback-text" placeholder="请描述您的建议或遇到的问题..." style="width:100%;height:100px;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:10px;color:#e2e8f0;font-size:.85rem;resize:vertical;outline:none;font-family:inherit" maxlength="1000"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">提交</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ 感谢反馈！已提交到GitHub Issues</div>
</div>
</div>
<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){var ft=document.getElementById('feedback-text');if(ft){ft.style.borderColor='#ef4444';setTimeout(function(){ft.style.borderColor=''},2000)};return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
