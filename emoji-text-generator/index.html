<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}
function setExample(t){document.getElementById('textInput').value=t;generate();}

var STYLES=[
  {name:'彩色方块',fn:function(c){return '🅰️ '+c.toUpperCase()+' 🅱️';}},
  {name:'装饰边框',fn:function(c){return '꧁ '+c+' ꧂';}},
  {name:'双线边框',fn:function(c){return '【 '+c+' 】';}},
  {name:'星号包围',fn:function(c){return '★ '+c+' ★';}},
  {name:'花体',fn:function(c){return '✦ '+c+' ✦';}},
  {name:'波浪装饰',fn:function(c){return '〰️ '+c+' 〰️';}},
  {name:'括号装饰',fn:function(c){return '〔 '+c+' 〕';}},
  {name:'引号装饰',fn:function(c){return '「 '+c+' 」';}},
  {name:'圆角边框',fn:function(c){return '║ '+c+' ║';}},
  {name:'三角装饰',fn:function(c){return '◤ '+c+' ◢';}},
  {name:'花括号',fn:function(c){return '{ '+c+' }';}},
  {name:'波纹包围',fn:function(c){return '≋ '+c+' ≋';}},
  {name:'点线装饰',fn:function(c){return '•.¸¸.•*¨ '+c+' ¨*•.¸¸.•';}},
  {name:'心形装饰',fn:function(c){return '❤️ '+c+' ❤️';}},
  {name:'火焰装饰',fn:function(c){return '🔥 '+c+' 🔥';}},
  {name:'皇冠装饰',fn:function(c){return '👑 '+c+' 👑';}},
  {name:'棱角边框',fn:function(c){return '◇ '+c+' ◇';}},
  {name:'波浪线',fn:function(c){return '≋≋≋ '+c+' ≋≋≋';}},
  {name:'斜线装饰',fn:function(c){return '╱ '+c+' ╲';}},
  {name:'括号花',fn:function(c){return '✿ '+c+' ✿';}},
  {name:'菱形包围',fn:function(c){return '◈ '+c+' ◈';}},
  {name:'云朵装饰',fn:function(c){return '☁️ '+c+' ☁️';}},
  {name:'雪花装饰',fn:function(c){return '❄️ '+c+' ❄️';}},
  {name:'彩虹装饰',fn:function(c){return '🌈 '+c+' 🌈';}},
  {name:'闪电装饰',fn:function(c){return '⚡ '+c+' ⚡';}},
  {name:'音乐装饰',fn:function(c){return '🎵 '+c+' 🎵';}},
  {name:'星星装饰',fn:function(c){return '⭐ '+c+' ⭐';}},
  {name:'月亮装饰',fn:function(c){return '🌙 '+c+' 🌙';}},
  {name:'宝石装饰',fn:function(c){return '💎 '+c+' 💎';}},
  {name:'皇冠+心',fn:function(c){return '👑❤️ '+c+' ❤️👑';}}
];

function generate(){
  var text=document.getElementById('textInput').value.trim();
  if(!text){document.getElementById('resultSection').style.display='none';return;}
  var grid=document.getElementById('resultsGrid');
  var html='';
  STYLES.forEach(function(s){
    html+='<div class="result-item" onclick="copySingle(this,\''+s.fn(text).replace(/'/g,"\\'").replace(/"/g,"&quot;")+'\')">';
    html+='<div class="label"><span>'+s.name+'</span><span class="copy-hint">点击复制</span></div>';
    html+='<div class="text">'+s.fn(text)+'</div>';
    html+='</div>';
  });
  grid.innerHTML=html;
  document.getElementById('resultSection').style.display='block';
}

function copySingle(el,text){
  navigator.clipboard.writeText(text).then(function(){showToast('已复制: '+text.substring(0,20)+'...');}).catch(function(){showToast('复制失败');});
}
</script>

<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){var ft=document.getElementById('feedback-text');if(ft){ft.style.borderColor='#ef4444';setTimeout(function(){ft.style.borderColor=''},2000)};return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
