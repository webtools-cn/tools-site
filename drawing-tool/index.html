<body>
<div class="header">
<h1>🎨 绘图工具</h1>
<div class="lang-switch"><a href="./" class="active">中文</a><a href="../en/drawing-tool/">EN</a></div>
</div>
<div class="toolbar">
<button class="tool-btn active" data-tool="pen" onclick="setTool('pen',this)">✏️ 画笔</button>
<button class="tool-btn" data-tool="eraser" onclick="setTool('eraser',this)">🧹 橡皮</button>
<button class="tool-btn" data-tool="line" onclick="setTool('line',this)">📏 直线</button>
<button class="tool-btn" data-tool="rect" onclick="setTool('rect',this)">⬜ 矩形</button>
<button class="tool-btn" data-tool="circle" onclick="setTool('circle',this)">⭕ 圆形</button>
<button class="tool-btn" data-tool="text" onclick="setTool('text',this)">📝 文字</button>
<button class="tool-btn" data-tool="fill" onclick="setTool('fill',this)">🪣 填充</button>
<div class="separator"></div>
<input type="color" class="color-input" id="color-picker" value="#000000" title="颜色">
<input type="number" class="size-input" id="size-picker" value="3" min="1" max="50" title="线宽">
<div class="separator"></div>
<button class="btn btn-secondary" onclick="undo()">↩️ 撤销</button>
<button class="btn btn-secondary" onclick="redo()">↪️ 重做</button>
<button class="btn btn-secondary" onclick="clearCanvas()">🗑️ 清空</button>
<div class="separator"></div>
<button class="btn btn-primary" onclick="exportPNG()">📥 PNG</button>
<button class="btn btn-primary" onclick="exportSVG()">📥 SVG</button>
</div>
<div class="canvas-wrap">
<canvas id="draw-canvas" width="1200" height="700"></canvas>
</div>
<script>
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let tool = 'pen', drawing = false, startX, startY;
let history = [], historyIdx = -1;
let tempCanvas = document.createElement('canvas');
tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
let tempCtx = tempCanvas.getContext('2d');

function saveState(){
  historyIdx++;
  history = history.slice(0, historyIdx);
  history.push(canvas.toDataURL());
  if(history.length > 50) { history.shift(); historyIdx--; }
}

function undo(){
  if(historyIdx <= 0) return;
  historyIdx--;
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = history[historyIdx];
}

function redo(){
  if(historyIdx >= history.length - 1) return;
  historyIdx++;
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = history[historyIdx];
}

function setTool(t, el){
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  canvas.style.cursor = t === 'eraser' ? 'cell' : t === 'fill' ? 'crosshair' : t === 'text' ? 'text' : 'crosshair';
}

function getColor(){ return document.getElementById('color-picker').value; }
function getSize(){ return parseInt(document.getElementById('size-picker').value) || 3; }

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  if(tool === 'fill'){
    floodFill(Math.round(x), Math.round(y), getColor());
    saveState();
    return;
  }
  
  if(tool === 'text'){
    const text = prompt('输入文字：');
    if(text){
      ctx.font = getSize() * 5 + 'px sans-serif';
      ctx.fillStyle = getColor();
      ctx.fillText(text, x, y);
      saveState();
    }
    return;
  }
  
  drawing = true;
  startX = x; startY = y;
  
  if(tool === 'pen' || tool === 'eraser'){
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : getColor();
    ctx.lineWidth = tool === 'eraser' ? getSize() * 3 : getSize();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  } else {
    tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
    tempCtx.drawImage(canvas, 0, 0);
  }
});

canvas.addEventListener('mousemove', e => {
  if(!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  if(tool === 'pen' || tool === 'eraser'){
    ctx.lineTo(x, y);
    ctx.stroke();
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(tempCanvas, 0, 0);
    ctx.strokeStyle = getColor();
    ctx.lineWidth = getSize();
    ctx.lineCap = 'round';
    
    if(tool === 'line'){
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else if(tool === 'rect'){
      ctx.strokeRect(startX, startY, x - startX, y - startY);
    } else if(tool === 'circle'){
      const rx = Math.abs(x - startX) / 2;
      const ry = Math.abs(y - startY) / 2;
      const cx = startX + (x - startX) / 2;
      const cy = startY + (y - startY) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
});

canvas.addEventListener('mouseup', () => { if(drawing){ drawing = false; saveState(); } });
canvas.addEventListener('mouseleave', () => { if(drawing){ drawing = false; saveState(); } });

// Touch support
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', {clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); });

function floodFill(sx, sy, fillColor){
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const w = canvas.width, h = canvas.height;
  const idx = (sy * w + sx) * 4;
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
  
  // Parse fill color
  const temp = document.createElement('canvas').getContext('2d');
  temp.fillStyle = fillColor;
  temp.fillRect(0,0,1,1);
  const fc = temp.getImageData(0,0,1,1).data;
  
  if(targetR === fc[0] && targetG === fc[1] && targetB === fc[2] && targetA === fc[3]) return;
  
  const stack = [[sx, sy]];
  const visited = new Set();
  
  while(stack.length){
    const [x, y] = stack.pop();
    if(x < 0 || x >= w || y < 0 || y >= h) continue;
    const key = y * w + x;
    if(visited.has(key)) continue;
    const i = key * 4;
    if(Math.abs(data[i]-targetR)>30 || Math.abs(data[i+1]-targetG)>30 || Math.abs(data[i+2]-targetB)>30) continue;
    visited.add(key);
    data[i] = fc[0]; data[i+1] = fc[1]; data[i+2] = fc[2]; data[i+3] = 255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imageData, 0, 0);
}

function clearCanvas(){
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

function exportPNG(){
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'drawing-' + new Date().toISOString().slice(0,10) + '.png';
  a.click();
}

function exportSVG(){
  const dataUrl = canvas.toDataURL('image/png');
  const svg = `\x3Csvg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">\x3Cimage href="${dataUrl}" width="${canvas.width}" height="${canvas.height}"/>\x3C/svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'drawing-' + new Date().toISOString().slice(0,10) + '.svg';
  a.click();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key === 'z'){ e.preventDefault(); undo(); }
  if(e.ctrlKey && e.key === 'y'){ e.preventDefault(); redo(); }
});

// Init
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
saveState();
</script>
</body>
