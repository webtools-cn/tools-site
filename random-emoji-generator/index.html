let regSelectedCat = 'all';

function regGenerate(){
  const cat = regSelectedCat;
  const count = parseInt(document.getElementById('regCount').value) || 5;
  let pool = [];
  if(cat === 'all'){
    for(const k in EMOJI_DB) pool = pool.concat(EMOJI_DB[k]);
  } else {
    pool = EMOJI_DB[cat] || [];
  }
  if(pool.length === 0) return;
  const result = [];
  for(let i = 0; i < count; i++){
    result.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  const allText = result.join(' ');
  const display = document.getElementById('regDisplay');
  if(count === 1){
    display.innerHTML = '<span class="emoji single">'+result[0]+'</span>';
  } else {
    display.innerHTML = result.map(e => '<span class="emoji">'+e+'</span>').join('');
  }
  const grid = document.getElementById('regGrid');
  grid.innerHTML = result.map(e => '<div class="emoji-cell" onclick="regCopySingle(this)" title="Click to copy">'+e+'</div>').join('');
}

function regCopySingle(el){
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const orig = el.innerHTML;
    el.innerHTML = '✓';
    setTimeout(()=>el.innerHTML=orig, 800);
  });
}

function regCopy(){
  const text = document.getElementById('regDisplay').textContent.trim();
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.btn-secondary');
    const old = btn.textContent;
    btn.textContent = '✓ '+(document.querySelector('html').lang==='en'?'Copied!':'已复制!');
    setTimeout(()=>btn.textContent=old,1500);
  });
}

document.querySelectorAll('#regCategories .reg-cat-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('#regCategories .reg-cat-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    regSelectedCat = this.dataset.cat;
    regGenerate();
  });
});
document.getElementById('regCount').addEventListener('input', function(){
  document.getElementById('regCountVal').textContent = this.value;
  regGenerate();
});
document.addEventListener('DOMContentLoaded', regGenerate);
