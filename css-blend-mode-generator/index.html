<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}

function update(){
  var bgBlend=document.getElementById('bgBlend').value;
  var mixBlend=document.getElementById('mixBlend').value;
  var bg1=document.getElementById('bg1').value;
  var bg2=document.getElementById('bg2').value;
  var fg1=document.getElementById('fg1').value;
  var pageBg=document.getElementById('pageBg').value;

  document.getElementById('blendBg').style.background='linear-gradient(135deg,'+bg1+','+bg2+')';
  document.getElementById('blendBg').style.backgroundBlendMode=bgBlend;
  document.getElementById('blendFg').style.background='linear-gradient(45deg,'+fg1+','+bg2+')';
  document.getElementById('blendFg').style.mixBlendMode=mixBlend;
  document.getElementById('previewArea').style.background=pageBg;

  var css='.container {\n  position: relative;\n  background: '+bg1+';\n  background: linear-gradient(135deg, '+bg1+', '+bg2+');\n  background-blend-mode: '+bgBlend+';\n}\n\n.overlay {\n  background: '+fg1+';\n  background: linear-gradient(45deg, '+fg1+', '+bg2+');\n  mix-blend-mode: '+mixBlend+';\n}';
  document.getElementById('codeBox').textContent=css;
}

function copyCode(){
  var code=document.getElementById('codeBox').textContent;
  navigator.clipboard.writeText(code).then(function(){showToast('CSS代码已复制 ✅')}).catch(function(){showToast('复制失败');});
}

update();
</script>
