<script>
const sample=`<?xml version="1.0" encoding="UTF-8"?>
\x3Cbookstore>
  \x3Cbook category="fiction">
    \x3Ctitle>The Great Gatsby\x3C/title>
    \x3Cauthor>F. Scott Fitzgerald\x3C/author>
    \x3Cyear>1925\x3C/year>

    \x3Cprice currency="USD">15.99\x3C/price>
  \x3C/book>
\x3C/bookstore>`;

function formatXml(xml){let formatted='',indent='';xml.split(/>\s*</).forEach(node=>{if(node.match(/^\/\w/))indent=indent.substring(2);formatted+=indent+'<'+node+'>\n';if(node.match(/^<?\w[^>]*[^\/]$/)&&!node.startsWith('?'))indent+='  ';});return formatted.substring(1,formatted.length-2);}

function validateXML(xml){
try{
const parser=new DOMParser();const doc=parser.parseFromString(xml,'text/xml');
const errNode=doc.querySelector('parsererror');
if(errNode){
const errText=errNode.textContent;const lineMatch=errText.match(/line\s+(\d+)/i);const colMatch=errText.match(/column\s+(\d+)/i);
let msg='❌ XML格式错误：\n'+errText.split('\n')[0];
if(lineMatch)msg+=`\n位置：第 ${lineMatch[1]} 行`+(colMatch?`，第 ${colMatch[1]} 列`:'');
return{success:false,message:msg};
}
const serializer=new XMLSerializer();const formatted=formatXml(serializer.serializeToString(doc));
const lines=formatted.split('\n').length;
return{success:true,message:`✅ XML格式正确！\n\n${formatted}\n\n📊 统计：共 ${lines} 行，${xml.length} 字符`};
}catch(e){return{success:false,message:'❌ 解析异常：'+e.message};}
}

function showOutput(result){
const out=document.getElementById('output');
out.className='output-area '+(result.success?'output-success':'output-error');
out.textContent=result.message;
}

document.getElementById('validateBtn').addEventListener('click',()=>{const xml=document.getElementById('xmlInput').value.trim();if(!xml){showOutput({success:false,message:'⚠️ 请输入XML内容'});return;}showOutput(validateXML(xml));});
document.getElementById('formatBtn').addEventListener('click',()=>{const xml=document.getElementById('xmlInput').value.trim();if(!xml){showOutput({success:false,message:'⚠️ 请输入XML内容'});return;}const r=validateXML(xml);if(r.success){document.getElementById('xmlInput').value=formatXml(xml);showOutput({success:true,message:'✅ XML已格式化'});}else showOutput(r);});
document.getElementById('clearBtn').addEventListener('click',()=>{document.getElementById('xmlInput').value='';document.getElementById('output').className='output-area output-info';document.getElementById('output').textContent='验证结果显示在这里';});
document.getElementById('sampleBtn').addEventListener('click',()=>{document.getElementById('xmlInput').value=sample;document.getElementById('output').className='output-area output-info';document.getElementById('output').textContent='示例已加载，点击「验证XML」开始';});

<script>
(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) {
      hash = ((hash << 5) - hash) + path.charCodeAt(i);
      hash = hash & hash;
    }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => {
        s.classList.toggle('active', i < Math.round(value));
      });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN 
        ? '(' + (avgData.count || 128) + ' 人评分)' 
        : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) {
      thanks.style.display = 'inline';
      container.style.pointerEvents = 'none';
      container.style.opacity = '0.7';
      return;
    }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none';
        container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() {
      updateDisplay(saved ? parseInt(saved) : avgData.value);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initRating);
  } else {
    initRating();
  }
})();
