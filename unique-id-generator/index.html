// === ID Generation ===
const typeInfo={nanoid:{desc:'NanoID: 默认21字符，URL安全，高熵值。广泛应用于现代Web应用。',len:21},ulid:{desc:'ULID: 26字符，时间排序（毫秒精度），Crockford Base32编码。适合数据库主键。',len:26},uuid:{desc:'UUID v4: 36字符（含连字符），128位随机数。标准化唯一标识格式。',len:36},custom:{desc:'自定义: 自由配置长度、字符集、前缀后缀等参数。适合有特殊需求的场景。',len:16}};

const ULID_CROCKFORD='0123456789ABCDEFGHJKMNPQRSTVWXYZ';

let idHistory=[];

// Encode timestamp to Crockford Base32 for ULID
function encodeULIDTime(now){const chars=ULID_CROCKFORD;let t=now;let result='';for(let i=0;i<10;i++){result=chars[t%32]+result;t=Math.floor(t/32)}return result.padStart(10,'0')}

function generateRandomULID(){const now=Date.now();const timePart=encodeULIDTime(now);let randomPart='';for(let i=0;i<16;i++){randomPart+=ULID_CROCKFORD[Math.floor(Math.random()*32)]}return timePart+randomPart}

function generateUUIDv4(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){const r=Math.random()*16|0;const v=c==='x'?r:(r&0x3|0x8);return v.toString(16)})}

function generateNanoID(length,alphabet){let result='';const bytes=new Uint8Array(length);crypto.getRandomValues(bytes);for(let i=0;i<length;i++){result+=alphabet[bytes[i]%alphabet.length]}return result}

function getAlphabet(){const checks=document.querySelectorAll('#alphabetCheckboxes input:checked');let alpha='';checks.forEach(function(cb){alpha+=cb.value});if(!alpha)alpha='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';return alpha}

function applyCase(str,option){if(option==='lower')return str.toLowerCase();if(option==='upper')return str.toUpperCase();return str}

function applyFormat(str,option){if(option==='default')return str;if(option==='hyphen'){const parts=[];for(let i=0;i<str.length;i+=4){parts.push(str.substr(i,4))}return parts.join('-')}if(option==='camel'){return str.replace(/[a-zA-Z]/g,function(c,i){return i%2===0?c.toUpperCase():c.toLowerCase()})}return str}

function generateIDs(){const type=document.querySelector('#typeTabs .tab-btn.active').dataset.type;const count=parseInt(document.getElementById('count').value)||5;let length=parseInt(document.getElementById('idLength').value)||21;const prefix=document.getElementById('prefix').value;const suffix=document.getElementById('suffix').value;const caseOpt=document.getElementById('caseOption').value;const fmtOpt=document.getElementById('formatOption').value;const ids=[];for(let i=0;i<count;i++){let id='';switch(type){case'nanoid':{const alpha=getAlphabet();id=generateNanoID(length,alpha);break}case'ulid':{id=generateRandomULID();length=26;break}case'uuid':{id=generateUUIDv4();length=36;break}case'custom':{const alpha=getAlphabet();id=generateNanoID(length,alpha);break}}id=applyCase(id,caseOpt);id=applyFormat(id,fmtOpt);id=prefix+id+suffix;ids.push(id)}return ids}

function renderIDs(ids){const area=document.getElementById('outputArea');if(!ids||ids.length===0){area.innerHTML='<div style="color:#aaa;text-align:center;padding:20px">点击「生成 ID」开始生成</div>';document.getElementById('generatedCount').textContent='已生成: 0';return}let html='';ids.forEach(function(id,i){html+='<div class="output-item"><span class="output-text">'+(i+1)+'. '+escapeHtml(id)+'</span><button class="copy-btn" onclick="copyText(\''+escapeHtml(id)+'\',this)">📋 复制</button></div>'});area.innerHTML=html;document.getElementById('generatedCount').textContent='已生成: '+ids.length;document.getElementById('lastGenerated').style.display='inline';document.getElementById('lastGenTime').textContent=new Date().toLocaleTimeString()}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showToast(msg){const t=document.createElement('div');t.className='toast show';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove()},300)},2000)}

function copyText(text,btn){navigator.clipboard.writeText(text).then(function(){const orig=btn.textContent;btn.textContent='✅ 已复制';setTimeout(function(){btn.textContent=orig},1500)}).catch(function(){showToast('复制失败')})}

document.getElementById('generateBtn').addEventListener('click',function(){const ids=generateIDs();idHistory=ids;renderIDs(ids);document.getElementById('idLength').disabled=false});

document.getElementById('copyAllBtn').addEventListener('click',function(){if(idHistory.length===0){showToast('请先生成ID');return}navigator.clipboard.writeText(idHistory.join('\n')).then(function(){showToast('已复制 '+idHistory.length+' 个ID')}).catch(function(){showToast('复制失败')})});

// Tab switching
