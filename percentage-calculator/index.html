(function(){var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>\uD83E\uDDEE Mode</h2><select id="calcMode"><option value="pctOf">What is X% of Y?</option><option value="whatPct">X is what % of Y?</option><option value="pctChange">% change from X to Y?</option><option value="pctDiff">% difference X vs Y?</option></select><div class="row"><div class="field"><label id="labelA">Value X</label><input type="number" id="valA" value="200"></div><div class="field"><label id="labelB">Value Y</label><input type="number" id="valB" value="50"></div></div></div><div class="result-section show" id="pctResult"><h2>\u2705 Result</h2><div id="pctAnswer" style="font-size:2rem;color:#22d3ee;font-weight:700;text-align:center;padding:16px"></div><div id="pctSteps" style="color:#94a3b8;font-size:.85rem;text-align:center;padding:8px"></div></div>';
function updateLabels(){var m=document.getElementById('calcMode').value;var la=document.getElementById('labelA'),lb=document.getElementById('labelB');if(m==='pctOf'){la.textContent='Value (X)';lb.textContent='Percentage (Y%)';}else if(m==='whatPct'){la.textContent='Value (X)';lb.textContent='Total (Y)';}else if(m==='pctChange'){la.textContent='Initial (X)';lb.textContent='Final (Y)';}else{la.textContent='Value X';lb.textContent='Value Y';}}

function calc(){var m=document.getElementById('calcMode').value;var a=parseFloat(document.getElementById('valA').value)||0,b=parseFloat(document.getElementById('valB').value)||0,ans,steps;if(m==='pctOf'){ans=(a*b/100).toFixed(2);steps=a+' \u00d7 '+b+'% = '+ans;}else if(m==='whatPct'){if(b===0){ans='N/A';steps='';}else{var p=(a/b*100);ans=p.toFixed(2)+'%';steps=a+' \u00f7 '+b+' \u00d7 100% = '+ans;}}else if(m==='pctChange'){if(a===0){ans='N/A';steps='';}else{var c=((b-a)/a*100);ans=(c>=0?'+':'')+c.toFixed(2)+'%';steps='('+b+' - '+a+') \u00f7 '+a+' \u00d7 100% = '+ans;}}else if(m==='pctDiff'){var avg=(a+b)/2;if(avg===0){ans='N/A';steps='';}else{var d=Math.abs((a-b)/avg*100);ans=d.toFixed(2)+'%';steps='|'+a+' - '+b+'| \u00f7 (('+a+'+'+b+')\u00f72) \u00d7 100% = '+ans;}}document.getElementById('pctAnswer').textContent=ans;document.getElementById('pctSteps').textContent=steps||'';}
