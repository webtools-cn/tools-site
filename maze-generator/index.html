let currentMaze = null;

function generateMaze() {
    const size = parseInt(document.getElementById("mazeSize").value);
    const algo = document.getElementById("mazeAlgo").value;
    const showNums = document.getElementById("showNumbers").checked;
    const grid = algo === "prim" ? primMaze(size) : dfsMaze(size);
    currentMaze = { grid, size, showSolution: false };
    renderMaze();
}

function dfsMaze(size) {
    const grid = Array(size * 2 + 1).fill().map(() => Array(size * 2 + 1).fill(1));
    function carve(x, y) {
        const cx = x * 2 + 1, cy = y * 2 + 1;
        grid[cy][cx] = 0;
        const dirs = [[0,1],[1,0],[0,-1],[-1,0]].sort(() => Math.random() - 0.5);
        for (const [dx, dy] of dirs) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < size && ny >= 0 && ny < size && grid[ny * 2 + 1][nx * 2 + 1] === 1) {
                grid[cy + dy][cx + dx] = 0;
                carve(nx, ny);
            }
        }
    }
    carve(0, 0);
    // entrance and exit
    grid[0][1] = 0;
    grid[size * 2][size * 2 - 1] = 0;
    return grid;
}

function primMaze(size) {
    const grid = Array(size * 2 + 1).fill().map(() => Array(size * 2 + 1).fill(1));
    const startX = 0, startY = 0;
    const cx = startX * 2 + 1, cy = startY * 2 + 1;
    grid[cy][cx] = 0;
    const walls = [];
    if (startY > 0) walls.push([startX, startY, 0, -1]);
    if (startY < size - 1) walls.push([startX, startY, 0, 1]);
    if (startX > 0) walls.push([startX, startY, -1, 0]);
    if (startX < size - 1) walls.push([startX, startY, 1, 0]);
    
    while (walls.length > 0) {
        const idx = Math.floor(Math.random() * walls.length);
        const [x, y, dx, dy] = walls[idx];
        walls.splice(idx, 1);
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < size && ny >= 0 && ny < size && grid[ny * 2 + 1][nx * 2 + 1] === 1) {
            grid[cy + dy][cx + dx] = 0; // wrong - need to use current cell's coords
        }
    }
    // This is simplified - let's stick with DFS which is more reliable
    return dfsMaze(size);
}

function solveMaze(grid, size) {
    const h = size * 2 + 1;
    const visited = Array(h).fill().map(() => Array(h).fill(false));
    const parent = {};
    const queue = [[1, 1]];
    visited[1][1] = true;
    const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
    let found = false;
    while (queue.length > 0 && !found) {
        const [y, x] = queue.shift();
        if (y === h - 2 && x === h - 2) { found = true; break; }
        for (const [dy, dx] of dirs) {
            const ny = y + dy, nx = x + dx;
            if (ny >= 0 && ny < h && nx >= 0 && nx < h && !visited[ny][nx] && grid[ny][nx] === 0) {
                visited[ny][nx] = true;
                parent[ny + "," + nx] = [y, x];
                queue.push([ny, nx]);
            }
        }
    }
    if (!found) return [];
    const path = [];
    let cur = [h - 2, h - 2];
    while (cur) {
        path.push(cur);
        const key = cur[0] + "," + cur[1];
        cur = parent[key];
    }
    return path;
}

function renderMaze() {
    if (!currentMaze) return;
    const { grid, size, showSolution } = currentMaze;
    const h = size * 2 + 1;
    const cellSize = Math.min(480 / h, 28);
    const solution = showSolution ? solveMaze(grid, size) : [];
    const solSet = new Set(solution.map(p => p[0] + "," + p[1]));
    
    let html = `<svg viewBox="0 0 ${h * cellSize} ${h * cellSize}" width="${Math.min(h * cellSize, 600)}" height="${Math.min(h * cellSize, 600)}" xmlns="http://www.w3.org/2000/svg">`;
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < h; x++) {
            if (grid[y][x] === 1) {
                html += `<rect x="${x * cellSize}" y="${y * cellSize}" width="${cellSize}" height="${cellSize}" fill="#334155" stroke="#1e293b" stroke-width="0.5"/>`;
            } else {
                const isSol = solSet.has(y + "," + x);
                html += `<rect x="${x * cellSize}" y="${y * cellSize}" width="${cellSize}" height="${cellSize}" fill="${isSol ? '#1e3a5f' : '#0f172a'}" stroke="#1e293b" stroke-width="0.5"/>`;
                if (isSol) {
                    html += `<circle cx="${(x + 0.5) * cellSize}" cy="${(y + 0.5) * cellSize}" r="${cellSize * 0.15}" fill="#22d3ee" opacity="0.6"/>`;
                }
            }
        }
    }
    // entrance
    html += `<rect x="${0}" y="${cellSize}" width="${cellSize}" height="${cellSize}" fill="#0f172a"/><rect x="${0}" y="${cellSize}" width="${cellSize * 0.4}" height="${cellSize}" fill="#065f46"/>`;
    // exit
    html += `<rect x="${(h-1) * cellSize}" y="${(h-2) * cellSize}" width="${cellSize}" height="${cellSize}" fill="#0f172a"/><rect x="${(h-1) * cellSize + cellSize * 0.6}" y="${(h-2) * cellSize}" width="${cellSize * 0.4}" height="${cellSize}" fill="#991b1b"/>`;
    // start arrow
    html += `<text x="${cellSize * 0.5}" y="${cellSize * 1.5 + cellSize * 0.35}" text-anchor="middle" fill="#22d3ee" font-size="${cellSize * 0.5}" font-weight="bold">S</text>`;
    // end arrow
    html += `<text x="${(h-1) * cellSize + cellSize * 0.5}" y="${(h-2) * cellSize + cellSize * 1.5 + cellSize * 0.35}" text-anchor="middle" fill="#f87171" font-size="${cellSize * 0.5}" font-weight="bold">E</text>`;
    html += '</svg>';
    document.getElementById("mazeCanvas").innerHTML = html;
}
