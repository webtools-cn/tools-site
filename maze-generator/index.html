<script>
var mazeGrid=[],mazeSolution=[],mazeW=20,mazeH=20,cellPx=16;
var dirs=[[0,-1],[1,0],[0,1],[-1,0]];

function mazeGenerate(){
  var canvas=document.getElementById("mazeCanvas");
  mazeW=parseInt(document.getElementById("mazeSize").value);
  mazeH=mazeW;
  cellPx=parseInt(document.getElementById("cellSize").value);
  canvas.width=mazeW*cellPx+2;
  canvas.height=mazeH*cellPx+2;
  var ctx=canvas.getContext("2d");

  mazeGrid=[];mazeSolution=[];
  for(var y=0;y<mazeH;y++){
    mazeGrid[y]=[];
    for(var x=0;x<mazeW;x++)mazeGrid[y][x]={visited:false,walls:[true,true,true,true]};
  }

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

  function dfs(x,y,endX,endY){
    mazeGrid[y][x].visited=true;
    mazeSolution.push([x,y]);
    if(x===endX&&y===endY)return true;

    var order=[0,1,2,3];shuffle(order);
    for(var d of order){
      var dx=dirs[d],nx=x+dx[0],ny=y+dx[1];
      if(nx>=0&&ny>=0&&nx<mazeW&&ny<mazeH&&!mazeGrid[ny][nx].visited){
        mazeGrid[y][x].walls[d]=false;
        mazeGrid[ny][nx].walls[(d+2)%4]=false;
        if(dfs(nx,ny,endX,endY))return true;
      }
    }
    mazeSolution.pop();
    return false;
  }

  dfs(0,0,mazeW-1,mazeH-1);

  ctx.fillStyle="#f8fafc";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0ea5e9";
  ctx.fillRect(1,1,cellPx-2,cellPx-2);
  ctx.fillStyle="#ef4444";
  ctx.fillRect((mazeW-1)*cellPx+1,(mazeH-1)*cellPx+1,cellPx-2,cellPx-2);

  ctx.strokeStyle="#475569";
  ctx.lineWidth=1;
  for(var y=0;y<mazeH;y++){
    for(var x=0;x<mazeW;x++){
      var px=x*cellPx,py=y*cellPx;
      var w=mazeGrid[y][x].walls;
      if(w[0]){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+cellPx,py);ctx.stroke();}
      if(w[3]){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,py+cellPx);ctx.stroke();}
    }
  }
  ctx.strokeRect(0,0,canvas.width-1,canvas.height-1);
}

function mazeSolve(){
  if(!mazeSolution.length){mazeGenerate();return;}
  var canvas=document.getElementById("mazeCanvas");
  var ctx=canvas.getContext("2d");
  ctx.strokeStyle="#22c55e";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(mazeSolution[0][0]*cellPx+cellPx/2,mazeSolution[0][1]*cellPx+cellPx/2);
  for(var i=1;i<mazeSolution.length;i++){
    ctx.lineTo(mazeSolution[i][0]*cellPx+cellPx/2,mazeSolution[i][1]*cellPx+cellPx/2);
  }
  ctx.stroke();
}

function mazeDownload(){
  var canvas=document.getElementById("mazeCanvas");
  var link=document.createElement("a");
  link.download="maze.png";
  link.href=canvas.toDataURL();
  link.click();
}

window.addEventListener("DOMContentLoaded",mazeGenerate);
</script>
