<script>
var examples={basic:"<div>Sample HTML with <strong>bold</strong>, <ul><li>items</li></ul>, <img src='x.jpg'> and &amp; entities.</div>",entities:"<p>&lt;div&gt;nested&lt;/div&gt;</p><p>&amp; &lt; &gt; &quot; &#39;</p>"};
function loadExample(type){document.getElementById('inputHtml').value=examples[type]||'';}
function stripHtml(){
  var html=document.getElementById('inputHtml').value;
  if(!html.trim()){showToast('请输入HTML内容');return;}
  var keepNewline=document.getElementById('keepNewline').checked;
  var keepSpace=document.getElementById('keepSpace').checked;
  var decodeEntities=document.getElementById('decodeEntities').checked;
  var removeScripts=document.getElementById('removeScripts').checked;
  if(removeScripts){
    html=html.replace(/<script[\s\S]*?<\/script>/gi,'');
    html=html.replace(/<style[\s\S]*?<\/style>/gi,'');
  }
  var tagCount=(html.match(/<[^>]+>/g)||[]).length;
  if(keepNewline){html=html.replace(/<br\s*\/?>/gi,'\n');html=html.replace(/<\/(div|p|h[1-6]|li|tr|blockquote|section|article|header|footer|nav|main)>/gi,'\n');html=html.replace(/<hr\s*\/?>/gi,'\n---\n');}
  var result=html.replace(/<[^>]+>/g,'');
  if(decodeEntities){var ta=document.createElement('textarea');ta.innerHTML=result;result=ta.value;}
  if(keepSpace){result=result.replace(/[ \t]+/g,' ');result=result.replace(/\n\s*\n/g,'\n\n');result=result.trim();}
  document.getElementById('resultBox').textContent=result;
  document.getElementById('statTags').textContent=tagCount;
  document.getElementById('statChars').textContent=result.length;
  document.getElementById('resultSection').style.display='block';
}
function copyResult(){
  navigator.clipboard.writeText(document.getElementById('resultBox').textContent).then(function(){showToast('已复制到剪贴板 ✅')}).catch(function(){showToast('复制失败');});
}
