<script>

(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>📍 Coordinates</h2><div class="options"><label><input type="radio" name="dim" value="2d" checked> 2D (x, y)</label><label><input type="radio" name="dim" value="3d"> 3D (x, y, z)</label></div><div class="row"><div class="field"><label>Point A</label><div class="row"><div class="field"><label>x₁</label><input type="number" id="ax" value="0" step="any"></div><div class="field"><label>y₁</label><input type="number" id="ay" value="0" step="any"></div><div class="field" id="azField"><label>z₁</label><input type="number" id="az" value="0" step="any" style="display:none"></div></div></div><div class="field"><label>Point B</label><div class="row"><div class="field"><label>x₂</label><input type="number" id="bx" value="3" step="any"></div><div class="field"><label>y₂</label><input type="number" id="by" value="4" step="any"></div><div class="field" id="bzField"><label>z₂</label><input type="number" id="bz" value="0" step="any" style="display:none"></div></div></div></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">Calculate Distance</button><button class="btn btn-secondary" id="clearBtn">Clear</button></div></div><div class="result-section" id="result"><h2>✅ Result</h2><div id="resultDisplay" style="font-size:1.8rem;text-align:center;padding:16px;color:#22d3ee"></div><div id="stepsDisplay" style="text-align:center;padding:8px;color:#94a3b8;font-size:.85rem;white-space:pre-wrap"></div></div>';

function calc(){var ax=parseFloat(document.getElementById('ax').value)||0;var ay=parseFloat(document.getElementById('ay').value)||0;var az=parseFloat(document.getElementById('az').value)||0;var bx=parseFloat(document.getElementById('bx').value)||0;var by=parseFloat(document.getElementById('by').value)||0;var bz=parseFloat(document.getElementById('bz').value)||0;var d3=document.querySelector('input[name="dim"]:checked').value==='3d';var dx=bx-ax,dy=by-ay,dz=bz-az;var d;if(d3){d=Math.sqrt(dx*dx+dy*dy+dz*dz);document.getElementById('resultDisplay').textContent='d = '+d.toFixed(6);document.getElementById('stepsDisplay').textContent='d = √[('+bx+'-'+ax+')² + ('+by+'-'+ay+')² + ('+bz+'-'+az+')²]\n  = √['+dx.toFixed(2)+'² + '+dy.toFixed(2)+'² + '+dz.toFixed(2)+'²]\n  = √['+(dx*dx).toFixed(2)+' + '+(dy*dy).toFixed(2)+' + '+(dz*dz).toFixed(2)+']\n  = √['+(dx*dx+dy*dy+dz*dz).toFixed(2)+']\n  = '+d.toFixed(6);}else{d=Math.sqrt(dx*dx+dy*dy);document.getElementById('resultDisplay').textContent='d = '+d.toFixed(6);document.getElementById('stepsDisplay').textContent='d = √[('+bx+'-'+ax+')² + ('+by+'-'+ay+')²]\n  = √['+dx.toFixed(2)+'² + '+dy.toFixed(2)+'²]\n  = √['+(dx*dx).toFixed(2)+' + '+(dy*dy).toFixed(2)+']\n  = √['+(dx*dx+dy*dy).toFixed(2)+']\n  = '+d.toFixed(6);}
document.getElementById('result').classList.add('show');}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('clearBtn').addEventListener('click',function(){document.getElementById('ax').value='0';document.getElementById('ay').value='0';document.getElementById('az').value='0';document.getElementById('bx').value='3';document.getElementById('by').value='4';document.getElementById('bz').value='0';document.getElementById('result').classList.remove('show');});
setDim();})();
