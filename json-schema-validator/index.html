<main>

<button onclick="loadSample('userSchema')">👤 用户Schema</button>
<button onclick="loadSample('productSchema')">📦 商品Schema</button>

<script>
var samples={
  data:'{"name":"张三","age":25,"email":"zhangsan@example.com","hobbies":["读书","编程"]}',
  product:'{"id":"PROD-001","name":"无线蓝牙耳机","price":299,"inStock":true,"tags":["电子","音频"]}',
  userSchema:'{"type":"object","properties":{"name":{"type":"string","minLength":1},"age":{"type":"number","minimum":0,"maximum":150},"email":{"type":"string","format":"email"},"hobbies":{"type":"array","items":{"type":"string"}}},"required":["name","age"]}',
  productSchema:'{"type":"object","properties":{"id":{"type":"string","pattern":"^PROD-\\\\d{3}$"},"name":{"type":"string"},"price":{"type":"number","minimum":0},"inStock":{"type":"boolean"},"tags":{"type":"array","items":{"type":"string"}}},"required":["id","name","price"]}'
};
</script>
<script>
function showToast(msg){
  var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
  m.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function loadSample(name){
  if(name==='data'||name==='product'){document.getElementById('jsonInput').value=samples[name];}
  else{document.getElementById('schemaInput').value=samples[name];}
}
function clearAll(){
  document.getElementById('jsonInput').value='';
  document.getElementById('schemaInput').value='';
  document.getElementById('resultArea').style.display='none';
}
function swapData(){
  var a=document.getElementById('jsonInput').value;
  var b=document.getElementById('schemaInput').value;
  document.getElementById('jsonInput').value=b;
  document.getElementById('schemaInput').value=a;
}
</script>
<script>
function validate(){
  var jsonText=document.getElementById('jsonInput').value.trim();
  var schemaText=document.getElementById('schemaInput').value.trim();
  if(!jsonText){showToast('请输入JSON数据');return;}
  if(!schemaText){showToast('请输入JSON Schema');return;}
  var data,schema;
  try{data=JSON.parse(jsonText);}catch(e){showResult(false,['JSON数据解析失败: '+e.message]);return;}
  try{schema=JSON.parse(schemaText);}catch(e){showResult(false,['JSON Schema解析失败: '+e.message]);return;}
  var errors=validateSchema(data,schema,'$');
  showResult(errors.length===0,errors);
}
function validateSchema(data,schema,path){
  var errors=[];
  if(schema.type){
    var types=schema.type;
    if(typeof types==='string') types=[types];
    var actualType=Array.isArray(data)?'array':typeof data;
    if(data===null) actualType='null';
    if(types.indexOf(actualType)===-1){
      errors.push(path+': 期望类型 '+types.join('/')+'，实际为 '+actualType);
      return errors;
    }
  }
  if(schema.type==='object'&&typeof data==='object'&&data!==null&&!Array.isArray(data)){
    if(schema.required){
      for(var i=0;i<schema.required.length;i++){
        var req=schema.required[i];
        if(!(req in data)) errors.push(path+': 缺少必需字段 "'+req+'"');
      }
    }
    if(schema.properties){
      for(var key in schema.properties){
        if(!schema.properties.hasOwnProperty(key)) continue;
        var subPath=path+'.'+key;
        if(key in data){
          errors=errors.concat(validateSchema(data[key],schema.properties[key],subPath));
        }
      }
    }
    if(schema.additionalProperties===false){
      for(var k in data){
        if(!data.hasOwnProperty(k)) continue;
        if(!schema.properties||!(k in schema.properties)){
          errors.push(path+': 不允许额外字段 "'+k+'"');
        }
      }
    }
  }
  if(schema.type==='array'&&Array.isArray(data)){
    if(schema.minItems!==undefined&&data.length<schema.minItems){
      errors.push(path+': 数组最少需要 '+schema.minItems+' 个元素，实际 '+data.length);
    }
    if(schema.maxItems!==undefined&&data.length>schema.maxItems){
      errors.push(path+': 数组最多 '+schema.maxItems+' 个元素，实际 '+data.length);
    }
    if(schema.items){
      for(var j=0;j<data.length;j++){
        errors=errors.concat(validateSchema(data[j],schema.items,path+'['+j+']'));
      }
    }
  }
  if(schema.type==='string'&&typeof data==='string'){
    if(schema.minLength!==undefined&&data.length<schema.minLength){
      errors.push(path+': 字符串最短 '+schema.minLength+' 字符，实际 '+data.length);
    }
    if(schema.maxLength!==undefined&&data.length>schema.maxLength){
      errors.push(path+': 字符串最长 '+schema.maxLength+' 字符，实际 '+data.length);
    }
    if(schema.pattern){
      try{var re=new RegExp(schema.pattern);if(!re.test(data)) errors.push(path+': 不匹配模式 '+schema.pattern);}
      catch(e){errors.push(path+': 无效的正则表达式 "'+schema.pattern+'"');}
    }
    if(schema.format==='email'&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data)){
      errors.push(path+': 不是有效的邮箱格式');
    }
  }
  if(schema.type==='number'||schema.type==='integer'){
    if(typeof data!=='number'){errors.push(path+': 期望数字类型');return errors;}
    if(schema.type==='integer'&&!Number.isInteger(data)){errors.push(path+': 期望整数');}
    if(schema.minimum!==undefined&&data<schema.minimum){errors.push(path+': 值 '+data+' 小于最小值 '+schema.minimum);}
    if(schema.maximum!==undefined&&data>schema.maximum){errors.push(path+': 值 '+data+' 大于最大值 '+schema.maximum);}
  }
  return errors;
}
function showResult(passed,errors){
  var area=document.getElementById('resultArea');
  if(passed){
    area.innerHTML='<div class="result-box result-pass">✅ <strong>验证通过！</strong> JSON数据完全符合Schema定义。</div>';
  }else{
    var html='<div class="result-box result-fail">❌ <strong>验证失败</strong>，发现 '+errors.length+' 个问题：';
    for(var i=0;i<errors.length;i++){
      html+='<div class="error-item">🔸 '+errors[i]+'</div>';
    }
    html+='</div>';
    area.innerHTML=html;
  }
  area.style.display='block';
}
</script>
</body>
