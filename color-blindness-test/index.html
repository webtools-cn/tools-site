  const optArr = shuffleArray(Array.from(opts));
  btns.innerHTML = optArr.map(o => 
    `<button class="answer-btn" onclick="answerPlate(${o}, ${answer})">${o}</button>`
  ).join('');
  
  if(answered) {
    document.querySelectorAll('.answer-btn').forEach(b => {
      const v = parseInt(b.textContent);
      if(v === answer) b.className = 'answer-btn correct';
      else if(results[currentIdx] !== undefined && v === results[currentIdx]) b.className = 'answer-btn wrong';
    });
  }
  answered = false;
}

function answerPlate(val, correct){
  if(results[currentIdx] !== undefined) return;
  answered = true;
  results[currentIdx] = val;
  const isCorrect = val === correct;
  document.querySelectorAll('.answer-btn').forEach(b => {
    const v = parseInt(b.textContent);
    if(v === correct) b.className = 'answer-btn correct';
    else if(v === val && !isCorrect) b.className = 'answer-btn wrong';
  });
  setTimeout(() => {
    if(currentIdx < plates.length - 1){
      currentIdx++;
      drawPlate(currentIdx);
    } else {
      showResults();
    }
  }, 800);
}

function skipPlate(){
  if(results[currentIdx] !== undefined) return;
  results[currentIdx] = -1;
  if(currentIdx < plates.length - 1){
    currentIdx++;
    drawPlate(currentIdx);
  } else {
    showResults();
  }
}

function showResults(){
  document.getElementById('resultSection').classList.add('show');
  const correct = results.filter((r,i) => r === plates[i].answer).length;
  const total = plates.length;
  const pct = Math.round(correct/total*100);
  document.getElementById('scoreFill').style.width = pct + '%';
  document.getElementById('scoreText').textContent = correct + '/' + total + ' 正确';
  
  const summary = document.getElementById('summaryBox');
  if(pct >= 80){
    summary.className = 'summary-box normal';
    summary.innerHTML = '<h3>✅ 色觉正常</h3><p>您的色觉在正常范围内。如果仍有担忧，建议咨询专业眼科医生。</p>';
  } else if(pct >= 50){
    summary.className = 'summary-box abnormal';
    summary.innerHTML = '<h3>⚠️ 可能存在轻微色觉异常</h3><p>建议咨询专业眼科医生进行进一步检查。</p>';
  } else {
    summary.className = 'summary-box abnormal';
    summary.innerHTML = '<h3>🔴 可能存在色觉异常</h3><p>您的测试结果提示可能存在色盲或色弱，建议预约眼科医生进行全面检查。</p><p style="font-size:.85rem;color:#94a3b8;margin-top:8px">注意：本测试仅作筛查参考，不能替代专业医学诊断。</p>';
  }
  
  const details = document.getElementById('resultDetails');
  details.innerHTML = '<h3 style="color:#f1f5f9;margin-bottom:8px">逐题详情</h3>';
  plates.forEach((p, i) => {
    const r = results[i];
    const isCorrect = r === p.answer;
    const status = r === -1 ? '跳过' : (isCorrect ? '✓ 正确' : '✗ 错误');
    details.innerHTML += 
      `<div class="result-item"><span class="label">第${i+1}题 - 数字 ${p.answer}</span><span class="val ${isCorrect ? 'pass' : 'fail'}">${status}</span></div>`;
  });
}

function restartTest(){
  currentIdx = 0;
  results = [];
  answered = false;
  document.getElementById('resultSection').classList.remove('show');
  drawPlate(0);
}

document.addEventListener('DOMContentLoaded', () => drawPlate(0));
</script>
</body>
</html>
