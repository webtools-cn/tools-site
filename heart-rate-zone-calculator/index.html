<script>
(function(){
document.getElementById('app').innerHTML=`
<div class="input-section">
  <h2>📊 输入参数</h2>
  <div class="row">
    <div class="field">
      <label>年龄</label>
      <input type="number" id="age" value="30" min="10" max="120">
    </div>
    <div class="field">
      <label>静息心率 (次/分)</label>
      <input type="number" id="restHr" value="65" min="30" max="120">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>计算方法</label>
      <select id="method">
        <option value="karvonen">Karvonen公式（推荐）</option>
        <option value="percentage">最大心率百分比法</option>
      </select>
    </div>
    <div class="field">
      <label>最大心率公式</label>
      <select id="maxMethod">
        <option value="standard">220 - 年龄（标准）</option>
        <option value="tanaka">206.9 - (0.67×年龄)（更精确）</option>
      </select>
    </div>
  </div>
</div>
<div class="result-section" id="resultSection">
  <h2>✅ 心率区间</h2>
  <div id="maxHrDisplay" style="text-align:center;margin-bottom:12px">
    <span style="color:#94a3b8;font-size:.9rem">最大心率: </span>
    <span id="maxHrVal" style="font-size:1.5rem;color:#22d3ee;font-weight:700"></span>
    <span style="color:#94a3b8;font-size:.9rem"> bpm &nbsp;|&nbsp; 心率储备: </span>
    <span id="hrReserve" style="font-size:1.2rem;color:#fbbf24;font-weight:600"></span>
  </div>
  <div class="zone-bar" id="zoneBar"></div>
  <div class="table-wrap"><table class="data" id="zoneTable"></table></div>
</div>
`;
function calc(){
  var age=parseInt(document.getElementById('age').value)||30;
  var rest=parseFloat(document.getElementById('restHr').value)||65;
  var method=document.getElementById('method').value;
  var maxMethod=document.getElementById('maxMethod').value;
  var maxHr=maxMethod==='standard'?220-age:(206.9-0.67*age);
  var reserve=maxHr-rest;
  document.getElementById('maxHrVal').textContent=Math.round(maxHr);
  document.getElementById('hrReserve').textContent=Math.round(reserve)+' bpm';
  var zones=[
    {name:'Zone1 热身区',min:50,max:60,color:'#22d3ee',desc:'热身/恢复，低强度'},
    {name:'Zone2 燃脂区',min:60,max:70,color:'#4ade80',desc:'脂肪燃烧，长距离训练'},
    {name:'Zone3 有氧区',min:70,max:80,color:'#fbbf24',desc:'心肺耐力提升，中等强度'},
    {name:'Zone4 无氧区',min:80,max:90,color:'#f97316',desc:'乳酸阈值，高强度'},
    {name:'Zone5 极限区',min:90,max:100,color:'#ef4444',desc:'最大摄氧量，极限冲刺'}
  ];
  var barHtml='',tableHtml='<tr><th>区间</th><th>强度</th><th>心率范围</th><th>作用</th></tr>';
  for(var i=0;i<zones.length;i++){
    var z=zones[i];
    var low,high;
    if(method==='karvonen'){
      low=Math.round(rest+z.min/100*reserve);
      high=Math.round(rest+z.max/100*reserve);
    }else{
      low=Math.round(maxHr*z.min/100);
      high=Math.round(maxHr*z.max/100);
    }
    barHtml+='<div class="zone-seg" style="flex:'+(z.max-z.min)+';background:'+z.color+'">Z'+(i+1)+'</div>';
    tableHtml+='<tr><td><span style="color:'+z.color+';font-weight:600">'+z.name+'</span></td><td>'+z.min+'%-'+z.max+'%</td><td>'+low+'-'+high+' bpm</td><td>'+z.desc+'</td></tr>';
  }
  document.getElementById('zoneBar').innerHTML=barHtml;
  document.getElementById('zoneTable').innerHTML=tableHtml;
}
['age','restHr','method','maxMethod'].forEach(function(id){
  var el=document.getElementById(id);
  if(el){el.addEventListener('input',calc);el.addEventListener('change',calc);}
});
calc();
})();
</script>
