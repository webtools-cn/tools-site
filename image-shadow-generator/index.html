<script>
(function(){
const fileInput = document.getElementById('shadowFileInput');
const fileName = document.getElementById('shadowFileName');
const preview = document.getElementById('shadowPreview');
const shadowColor = document.getElementById('shadowColor');
const shadowBlur = document.getElementById('shadowBlur');
const shadowBlurVal = document.getElementById('shadowBlurVal');
const shadowOffsetX = document.getElementById('shadowOffsetX');
const shadowOffsetXVal = document.getElementById('shadowOffsetXVal');
const shadowOffsetY = document.getElementById('shadowOffsetY');
const shadowOffsetYVal = document.getElementById('shadowOffsetYVal');
const shadowSpread = document.getElementById('shadowSpread');
const shadowSpreadVal = document.getElementById('shadowSpreadVal');
const downloadBtn = document.getElementById('downloadShadowBtn');

let currentImg = null;

function renderShadow() {
  if (!currentImg) return;
  const color = shadowColor.value;
  const blur = parseInt(shadowBlur.value);
  const ox = parseInt(shadowOffsetX.value);
  const oy = parseInt(shadowOffsetY.value);
  const spread = parseInt(shadowSpread.value);
  
  const pad = blur + spread + Math.max(Math.abs(ox), Math.abs(oy)) + 20;
  const canvas = document.createElement('canvas');
  canvas.width = currentImg.width + pad * 2;
  canvas.height = currentImg.height + pad * 2;
  const ctx = canvas.getContext('2d');
  
  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw shadow
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.shadowOffsetX = ox;
  ctx.shadowOffsetY = oy;
  
  // For spread, draw a slightly larger rect
  const sx = pad + spread/2;
  const sy = pad + spread/2;
  const sw = currentImg.width - spread;
  const sh = currentImg.height - spread;
  
  // Draw shadow via image
  ctx.filter = 'none';
  ctx.drawImage(currentImg, sx, sy, currentImg.width, currentImg.height);
  
  // Reset shadow and redraw image on top
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.drawImage(currentImg, sx, sy, currentImg.width, currentImg.height);
  
  preview.innerHTML = '';
  preview.appendChild(canvas);
}

fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  fileName.textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      currentImg = img;
      renderShadow();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

[shadowColor, shadowBlur, shadowOffsetX, shadowOffsetY, shadowSpread].forEach(el => {
  el.addEventListener('input', function() {
    shadowBlurVal.textContent = shadowBlur.value;
    shadowOffsetXVal.textContent = shadowOffsetX.value;
    shadowOffsetYVal.textContent = shadowOffsetY.value;
    shadowSpreadVal.textContent = shadowSpread.value;
    renderShadow();
  });
});

downloadBtn.addEventListener('click', function() {
  const canvas = preview.querySelector('canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'shadowed-image.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});
})();
</script>
