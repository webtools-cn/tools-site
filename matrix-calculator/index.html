        for(var j=0;j<n;j++) invT[i][j]=inv[j][i];
      }
      result=formatMatrix(A,'A')+'<div style="text-align:center;color:#22d3ee;font-size:1.2rem;padding:8px">det(A) = '+d.toFixed(2)+'</div>'+'<div style="text-align:center;color:#22d3ee;font-size:1rem;padding:4px">↓ A⁻¹</div>'+formatMatrix(invT,'Ainv');
    }
    document.getElementById('resultDisplay').innerHTML=result;
    document.getElementById('resultSection').classList.add('show');
  }catch(e){
    document.getElementById('resultDisplay').innerHTML='<p style="color:#f87171">计算出错：'+e.message+'</p>';
    document.getElementById('resultSection').classList.add('show');
  }
});
})();


</script>
