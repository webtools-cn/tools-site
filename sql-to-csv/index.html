<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

function escCsv(v,delim){
  if(v===null||v===undefined)return '';
  v=String(v).replace(/^['"]|['"]$/g,'');
  if(v.indexOf(delim)>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0||v.indexOf('\r')>=0){
    return '"'+v.replace(/"/g,'""')+'"';
  }
  return v;
}

function parseSqlInsert(sql){
  var rows=[],cols=null;
  var cleaned=sql.replace(/--.*$/gm,'').replace(/\/\*[\s\S]*?\*\//g,'').trim();
  var insertRe=/INSERT\s+(?:INTO\s+)?(?:`?(\w+)`?\.)?`?(\w+)`?\s*\(([^)]*)\)\s*VALUES\s*/gim;
  var m;
  while((m=insertRe.exec(cleaned))!==null){
    if(!cols){
      cols=m[3].split(',').map(function(c){return c.trim().replace(/[`"']/g,'')}).filter(function(c){return c});
    }
    var rest=cleaned.substring(m.index+m[0].length);
    // Extract value groups
    var valRe=/\(([^)]*)\)/g;
    var vm;
    while((vm=valRe.exec(rest))!==null){
      var valStr=vm[1];
      var vals=[];
      var cur='',inQ=false,qc=null;
      for(var i=0;i<valStr.length;i++){
        var c=valStr[i];
        if(inQ){
          if(c===qc){if(i+1<valStr.length&&valStr[i+1]===qc){cur+=c;i++}else{inQ=false}}
          else{cur+=c}
        }else{
          if(c==='"'||c==="'"){inQ=true;qc=c}
          else if(c===','){vals.push(cur.trim());cur=''}
          else{cur+=c}
        }
      }
      if(cur.trim())vals.push(cur.trim());
      var row={};
      for(var j=0;j<cols.length;j++){row[cols[j]]=j<vals.length?vals[j]:''}
      rows.push(row);
    }
    break; // Only process first INSERT pattern
  }
  return{cols:cols||[],rows:rows};
}

function convertSql(){
  var sql=document.getElementById('sqlInput').value;
  var delim=document.getElementById('delimiter').value;
  var incHeader=document.getElementById('optHeader').checked;
  var trimVals=document.getElementById('optTrim').checked;
  var outEl=document.getElementById('csvOutput');
  var metaEl=document.getElementById('csvMeta');
  var secEl=document.getElementById('resultSection');

  if(!sql.trim()){showToast('请输入SQL语句');return}

  var result=parseSqlInsert(sql);
  if(result.rows.length===0){showToast('未识别到INSERT语句');return}

  var lines=[];
  if(incHeader&&result.cols.length>0){
    lines.push(result.cols.map(function(c){return escCsv(c,delim)}).join(delim));
  }
  for(var i=0;i<result.rows.length;i++){
    var row=result.rows[i];
    var vals=result.cols.map(function(c){
      var v=row[c]||'';
      if(trimVals)v=String(v).trim();
      return escCsv(v,delim);
    });
    lines.push(vals.join(delim));
  }

  var csv=lines.join('\n');
  outEl.textContent=csv;
  metaEl.textContent='已转换 '+result.rows.length+' 行数据，'+result.cols.length+' 列';
  secEl.style.display='block';
  window._lastCsv=csv;
}

document.getElementById('convSql').addEventListener('click',convertSql);
document.getElementById('clearSql').addEventListener('click',function(){
  document.getElementById('sqlInput').value='';
  document.getElementById('csvOutput').textContent='';
  document.getElementById('csvMeta').textContent='';
  document.getElementById('resultSection').style.display='none';
  window._lastCsv='';
});
document.getElementById('copyCsv').addEventListener('click',function(){
  var csv=window._lastCsv||document.getElementById('csvOutput').textContent;
  if(!csv){showToast('没有可复制的内容');return}
  navigator.clipboard.writeText(csv).then(function(){showToast('已复制到剪贴板')}).catch(function(){showToast('复制失败')});
});
document.getElementById('downloadCsv').addEventListener('click',function(){
  var csv=window._lastCsv||document.getElementById('csvOutput').textContent;
  if(!csv){showToast('没有可下载的内容');return}
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='output.csv';a.click();URL.revokeObjectURL(a.href);
  showToast('CSV文件已下载');
});
document.getElementById('optWrap').addEventListener('change',function(){
  document.getElementById('csvOutput').style.whiteSpace=this.checked?'pre-wrap':'pre';
});
</script>
