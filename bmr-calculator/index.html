<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

let currentGender = 'male';

function setGender(g) {
  currentGender = g;
  document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-gender="${g}"]`).classList.add('active');
}

function calculate() {
  const age = parseFloat(document.getElementById('age').value) || 0;
  const height = parseFloat(document.getElementById('height').value) || 0;
  const weight = parseFloat(document.getElementById('weight').value) || 0;

  if (!age || !height || !weight || age < 10 || age > 100 || height < 50 || height > 250 || weight < 20 || weight > 300) {
    showToast('请输入有效的数据（年龄10-100岁，身高50-250cm，体重20-300kg）');
    return;
  }

  let bmrMSJ, bmrHB;

  if (currentGender === 'male') {
    bmrMSJ = 10 * weight + 6.25 * height - 5 * age + 5;
    bmrHB = 88.362 + 13.397 * weight + 4.799 * height - 5.677 * age;
  } else {
    bmrMSJ = 10 * weight + 6.25 * height - 5 * age - 161;
    bmrHB = 447.593 + 9.247 * weight + 3.098 * height - 4.330 * age;
  }

  bmrMSJ = Math.round(bmrMSJ);
  bmrHB = Math.round(bmrHB);

  document.getElementById('bmrValue').textContent = bmrMSJ;
  document.getElementById('bmrHarris').textContent = bmrHB;

  // TDEE levels
  const levels = [
    { name: '久坐（几乎不运动）', factor: 1.2 },
    { name: '轻度活动（每周1-3天）', factor: 1.375 },
    { name: '中度活动（每周3-5天）', factor: 1.55 },
    { name: '高度活动（每周6-7天）', factor: 1.725 },
    { name: '极高活动（体力劳动）', factor: 1.9 }
  ];

  const tdeeGrid = document.getElementById('tdeeGrid');
  tdeeGrid.innerHTML = levels.map(l => {
    const tdee = Math.round(bmrMSJ * l.factor);
    return `<div class="result-card"><div class="value">${tdee}</div><div class="label">${l.name}</div><div class="sub">系数 ${l.factor}x</div></div>`;
  }).join('');

  const tdeeModerate = Math.round(bmrMSJ * 1.55);
  document.getElementById('maintainCal').textContent = tdeeModerate + ' 大卡';
  document.getElementById('loseCal').textContent = Math.round(tdeeModerate - 500) + ' ~ ' + Math.round(tdeeModerate - 300) + ' 大卡';
  document.getElementById('gainCal').textContent = Math.round(tdeeModerate + 300) + ' ~ ' + Math.round(tdeeModerate + 500) + ' 大卡';
  document.getElementById('proteinNeed').textContent = Math.round(weight * 1.6) + ' ~ ' + Math.round(weight * 2.2) + 'g';

  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('age').value = 30;
  document.getElementById('height').value = 170;
  document.getElementById('weight').value = 70;
  currentGender = 'male';
  document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('active'));
  document.querySelector('[data-gender="male"]').classList.add('active');
  document.getElementById('resultSection').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.input-group input').forEach(input => {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') calculate();
    });
  });
});
