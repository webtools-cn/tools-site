<script>
(function(){
document.getElementById('app').innerHTML=
'<div class="card">'+
'  <h2>🎯 燃油效率转换</h2>'+
'  <div class="row">'+
'    <div class="field"><label>数值</label><input type="number" id="inputVal" value="30" min="0" step="any"></div>'+
'    <div class="field"><label>单位</label><select id="inputUnit"><option value="mpgUS">MPG (美制)</option><option value="mpgUK">MPG (英制)</option><option value="kmpl">km/L</option><option value="lp100km">L/100km</option></select></div>'+
'  </div>'+
'  <div class="result-grid" id="resultGrid"></div>'+
'</div>';
function update(){
  var val=parseFloat(document.getElementById('inputVal').value)||0;
  var unit=document.getElementById('inputUnit').value;
  var lp100km=0;
  switch(unit){
    case 'mpgUS': lp100km=235.215/val; break;
    case 'mpgUK': lp100km=282.481/val; break;
    case 'kmpl': lp100km=100/val; break;
    case 'lp100km': lp100km=val; break;
  }
  var results=[
    {label:'MPG (美制)',value:lp100km>0?235.215/lp100km:0,id:'mpgUS'},
    {label:'MPG (英制)',value:lp100km>0?282.481/lp100km:0,id:'mpgUK'},
    {label:'km/L',value:lp100km>0?100/lp100km:0,id:'kmpl'},
    {label:'L/100km',value:lp100km,id:'lp100km'}
  ];
  var html='';
  results.forEach(function(r){
    var cls=(r.id===unit)?'value highlight':'value';
    html+='<div class="result-item"><div class="label">'+r.label+'</div><div class="'+cls+'">'+r.value.toFixed(2).replace(/\.?0+$/,'')+'</div></div>';
  });
  document.getElementById('resultGrid').innerHTML=html;
}
document.getElementById('inputVal').addEventListener('input',update);
document.getElementById('inputUnit').addEventListener('change',update);
update();
})();
</script>
