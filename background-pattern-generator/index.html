<script>
function generatePattern(){
  const type = document.querySelector('.pattern-type-btn.active').dataset.type;
  const bg = document.getElementById('bgColor').value;
  const c1 = document.getElementById('ptColor').value;
  const c2 = document.getElementById('ptColor2').value;
  const sz = parseInt(document.getElementById('patternSize').value);
  let css = '';
  switch(type){
    case 'stripes-h':
      css = 'background: repeating-linear-gradient(\n  0deg,\n  '+c1+',\n  '+c1+' '+Math.round(sz*0.3)+'px,\n  '+bg+' '+Math.round(sz*0.3)+'px,\n  '+bg+' '+sz+'px\n);';
      break;
    case 'stripes-v':
      css = 'background: repeating-linear-gradient(\n  90deg,\n  '+c1+',\n  '+c1+' '+Math.round(sz*0.3)+'px,\n  '+bg+' '+Math.round(sz*0.3)+'px,\n  '+bg+' '+sz+'px\n);';
      break;
    case 'stripes-d':
      css = 'background: repeating-linear-gradient(\n  45deg,\n  '+c1+',\n  '+c1+' '+Math.round(sz*0.3)+'px,\n  '+bg+' '+Math.round(sz*0.3)+'px,\n  '+bg+' '+sz+'px\n);';
      break;
    case 'dots':
      const dotR = Math.round(sz*0.15);
      const dotGap = sz - dotR*2;
      css = 'background: '+bg+';\n'+
        'background-image: radial-gradient(\n  '+c1+' '+dotR+'px,\n  transparent '+dotR+'px\n);\n'+
        'background-size: '+sz+'px '+sz+'px;';
      break;
    case 'checker':
      const half = Math.round(sz/2);
      css = 'background: '+c1+';\n'+
        'background-image: linear-gradient(45deg, '+bg+' 25%, transparent 25%),\n  linear-gradient(-45deg, '+bg+' 25%, transparent 25%),\n  linear-gradient(45deg, transparent 75%, '+bg+' 75%),\n  linear-gradient(-45deg, transparent 75%, '+bg+' 75%);\n'+
        'background-size: '+sz+'px '+sz+'px;\n'+
        'background-position: 0 0, 0 '+half+'px, '+half+'px '+(-half)+'px, '+(-half)+'px 0px;';
      break;
    case 'zigzag':
      css = 'background: '+bg+';\n'+
        'background-image: linear-gradient(135deg, '+c1+' 25%, transparent 25%),\n  linear-gradient(225deg, '+c1+' 25%, transparent 25%),\n  linear-gradient(315deg, '+c1+' 25%, transparent 25%),\n  linear-gradient(45deg, '+c1+' 25%, transparent 25%);\n'+
        'background-size: '+sz+'px '+sz+'px;\n'+
        'background-position: '+Math.round(sz/2)+'px 0, '+Math.round(sz/2)+'px 0, 0 0, 0 0;';
      break;
    case 'grid':
      css = 'background: '+bg+';\n'+
        'background-image: linear-gradient('+c1+' 1px, transparent 1px),\n  linear-gradient(90deg, '+c1+' 1px, transparent 1px);\n'+
        'background-size: '+sz+'px '+sz+'px;';
      break;
    case 'herringbone':
      const s2 = Math.round(sz/2);
      css = 'background: '+c1+';\n'+
        'background-image: linear-gradient(45deg, '+bg+' 25%, transparent 25%),\n  linear-gradient(-45deg, '+bg+' 25%, transparent 25%),\n  linear-gradient(135deg, '+bg+' 25%, transparent 25%),\n  linear-gradient(-135deg, '+bg+' 25%, transparent 25%);\n'+
        'background-size: '+sz+'px '+sz+'px;\n'+
        'background-position: 0 0, 0 '+s2+'px, '+s2+'px '+(-s2)+'px, '+(-s2)+'px 0px;';
      break;
  }
  document.getElementById('patternCssOutput').textContent = css;
  document.getElementById('patternPreview').style.cssText = css.replace(/\n/g,' ').replace(/\s+/g,' ').trim()+';';
}
function copyPatternCss(){
  navigator.clipboard.writeText(document.getElementById('patternCssOutput').textContent).then(()=>{
    const btn = document.querySelector('.result-section .btn-primary');
    const old = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(()=>btn.textContent=old,1500);
  });
}
document.querySelectorAll('.pattern-type-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.pattern-type-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    generatePattern();
  });
});
['bgColor','ptColor','ptColor2'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    document.getElementById(id+'Hex').value=this.value;
    generatePattern();
  });
  document.getElementById(id+'Hex').addEventListener('input',function(){
    if(/^#[0-9a-f]{6}$/i.test(this.value)){
      document.getElementById(id).value=this.value;
      generatePattern();
    }
  });
});
document.getElementById('patternSize').addEventListener('input',function(){
  document.getElementById('patternSizeVal').textContent=this.value+'px';
  generatePattern();
});
document.addEventListener('DOMContentLoaded',generatePattern);
</script>
