<script>
var currentKeyframes="";
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function getKeyframes(type){
  var kfs={
    fade:{from:{opacity:0},to:{opacity:1}},
    slide:{from:{transform:"translateX(-30px)",opacity:0},to:{transform:"translateX(0)",opacity:1}},
    bounce:{0:{transform:"translateY(0)"},25:{transform:"translateY(-20px)"},50:{transform:"translateY(0)"},75:{transform:"translateY(-10px)"},100:{transform:"translateY(0)"}},
    rotate:{from:{transform:"rotate(0deg)"},to:{transform:"rotate(360deg)"}},
    scale:{0:{transform:"scale(0)",opacity:0},50:{transform:"scale(1.2)",opacity:1},100:{transform:"scale(1)",opacity:1}},
    shake:{0:{transform:"translateX(0)"},20:{transform:"translateX(-8px)"},40:{transform:"translateX(8px)"},60:{transform:"translateX(-6px)"},80:{transform:"translateX(6px)"},100:{transform:"translateX(0)"}},
    float:{0:{transform:"translateY(0)"},50:{transform:"translateY(-15px)"},100:{transform:"translateY(0)"}},
    pulse:{0:{transform:"scale(1)"},50:{transform:"scale(1.15)"},100:{transform:"scale(1)"}}
  };return kfs[type]||kfs.fade;}
function cssObjToStr(obj){var r="";for(var k in obj){r+=k+":"+obj[k]+";"}return r}
function generateCss(){
  var type=document.getElementById("animType").value;
  var dur=document.getElementById("animDuration").value;
  var delay=document.getElementById("animDelay").value;
  var easing=document.getElementById("animEasing").value;
  var dir=document.getElementById("animDirection").value;
  var iter=document.getElementById("animIterations").value;
  var preview=document.getElementById("usePreview").checked;
  var kf=getKeyframes(type);
  var animName="anim_"+type;
  var kfCss="@keyframes "+animName+" {\n";
  for(var p in kf){
    var pct=(p==="from"||p==="0")?"0%":(p==="to"||p==="100")?"100%":p;
    kfCss+="  "+pct+" { "+cssObjToStr(kf[p])+" }\n";
  }
  kfCss+="}";
  var propCss=".my-animation {\n  animation: "+animName+" "+dur+"s "+easing+" "+delay+"s "+iter+" "+dir+";\n}";
  var fullCss=kfCss+"\n\n"+propCss;
  document.getElementById("resultCss").textContent=fullCss;
  document.getElementById("resultArea").style.display="block";
  currentKeyframes=fullCss;
  if(preview){
    var el=document.getElementById("animTarget");
    el.style.animation="none";
    void el.offsetWidth;
    el.style.animation=animName+" "+dur+"s "+easing+" "+delay+"s "+iter+" "+dir;
  }
}
function copyResult(){
  var text=currentKeyframes||document.getElementById("resultCss").textContent;
  navigator.clipboard.writeText(text).then(function(){toast("已复制！")})
}
document.addEventListener("DOMContentLoaded",function(){generateCss()});
</script>
