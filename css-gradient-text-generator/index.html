<script>
(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🌈 输入文字</h2><input type="text" id="textInput" value="渐变文字效果" placeholder="输入文字..."><div class="row"><div class="field"><label>渐变类型</label><select id="gradType"><option value="linear">线性渐变</option><option value="radial">径向渐变</option></select></div><div class="field"><label>角度 (线性)</label><input type="range" id="angle" min="0" max="360" value="90"></div></div><h2 style="font-size:1.1rem;color:#f1f5f9;margin:12px 0 8px">🎨 颜色</h2><div class="row"><div class="field"><label>颜色1</label><input type="color" id="color1" value="#f97316"></div><div class="field"><label>颜色2</label><input type="color" id="color2" value="#ec4899"></div><div class="field"><label>颜色3 (可选)</label><input type="color" id="color3" value="#8b5cf6"></div></div><div class="row"><div class="field"><label>颜色4 (可选)</label><input type="color" id="color4" value="#06b6d4"></div><div class="field"><label>文字大小</label><input type="range" id="fontSize" min="16" max="96" value="48"></div></div><div class="options"><label><input type="checkbox" id="boldOpt" checked> 粗体</label><label><input type="checkbox" id="shadowOpt"> 文字阴影</label></div></div><div class="preview-box" id="previewBox"><span id="previewText" class="gradient-text" style="font-size:48px;font-weight:800">渐变文字效果</span></div><div class="result-section show" id="resultSection"><h2>📋 CSS代码</h2><div class="result-box" id="cssOutput">background: linear-gradient(90deg, #f97316, #ec4899);\\n-webkit-background-clip: text;\\n-webkit-text-fill-color: transparent;\\nbackground-clip: text;</div><div class="btn-row"><button class="btn btn-success" id="copyCssBtn">📋 复制CSS</button></div></div>';
document.getElementById('usageContent').innerHTML='<p>输入文字并选择渐变颜色，实时预览渐变文字效果。支持线性渐变和径向渐变两种类型。</p><p>可自定义渐变角度、文字大小、粗细和阴影效果。生成的CSS代码可直接用于网页开发。</p>';

function updatePreview(){
  var text=document.getElementById('textInput').value||'渐变文字';
  var type=document.getElementById('gradType').value;
  var angle=document.getElementById('angle').value;
  var c1=document.getElementById('color1').value;
  var c2=document.getElementById('color2').value;
  var c3=document.getElementById('color3').value;
  var c4=document.getElementById('color4').value;
  var size=document.getElementById('fontSize').value;
  var bold=document.getElementById('boldOpt').checked;
  var shadow=document.getElementById('shadowOpt').checked;
  var colors=[c1,c2];
  if(c3&&c3!=='#000000') colors.push(c3);
  if(c4&&c4!=='#000000') colors.push(c4);
  var grad='';
  if(type==='linear'){
    grad='linear-gradient('+angle+'deg, '+colors.join(', ')+')';
  }else{
    grad='radial-gradient(circle, '+colors.join(', ')+')';
  }
  var el=document.getElementById('previewText');
  el.textContent=text;
  el.style.fontSize=size+'px';
  el.style.fontWeight=bold?'800':'400';
  el.style.background=grad;
  el.style.webkitBackgroundClip='text';
  el.style.webkitTextFillColor='transparent';
  el.style.backgroundClip='text';
  if(shadow){
    el.style.textShadow='2px 2px 8px rgba(0,0,0,.3)';
  }else{
    el.style.textShadow='none';
  }
  var css='/* Gradient Text CSS */\\n.element {\\n  background: '+grad+';\\n  -webkit-background-clip: text;\\n  -webkit-text-fill-color: transparent;\\n  background-clip: text;\\n  font-size: '+size+'px;\\n  font-weight: '+(bold?'800':'400')+';\\n'+(shadow?'  text-shadow: 2px 2px 8px rgba(0,0,0,.3);\\n':'')+'}';
  document.getElementById('cssOutput').textContent=css;
}

var inputs=document.querySelectorAll('#textInput,#gradType,#angle,#color1,#color2,#color3,#color4,#fontSize,#boldOpt,#shadowOpt');
inputs.forEach(function(el){el.addEventListener('input',updatePreview);el.addEventListener('change',updatePreview);});
updatePreview();

document.getElementById('copyCssBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(function(){
    document.getElementById('copyCssBtn').textContent='✅ 已复制';
    setTimeout(function(){document.getElementById('copyCssBtn').textContent='📋 复制CSS';},2000);
  });
});
})();
