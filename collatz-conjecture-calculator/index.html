<main>
<h1>🌀 考拉兹猜想计算器</h1>
<p class="subtitle">输入正整数，生成完整的Collatz序列，查看每一步计算过程</p>
<div class="card">
<h3>📝 输入正整数</h3>
<input type="number" id="numInput" placeholder="例如：27" min="1" onkeydown="if(event.key==='Enter')calculate()">
<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-primary" onclick="calculate()">🔍 计算</button>
<button class="btn btn-outline" onclick="loadSample()">✨ 示例</button>
<button class="btn btn-outline" onclick="clearAll()">🗑 清空</button>
</div>
<div class="result-area" id="resultArea">
<div class="stats-grid">
<div class="stat-item">
<div class="stat-value" id="statSteps">0</div>
<div class="stat-label">总步数</div>
</div>
<div class="stat-item">
<div class="stat-value" id="statMax">0</div>
<div class="stat-label">最大值</div>
</div>
<div class="stat-item">
<div class="stat-value" id="statLen">0</div>
<div class="stat-label">序列长度</div>
</div>
</div>
<h3 style="margin-bottom:12px">📋 计算序列</h3>
<ul class="seq-list" id="seqList"></ul>
</div>
</div>
<div class="card">
<h3>📖 考拉兹猜想规则</h3>
<ul class="info-list">
<li>① 如果当前数是偶数，则除以2（n → n/2）</li>
<li>② 如果当前数是奇数，则乘3加1（n → 3n+1）</li>
<li>③ 重复上述步骤，最终都会到达1</li>
<li>④ 这个猜想尚未被证明，是数学界著名的未解难题</li>
</ul>
</div>
</main>
<div class="toast" id="toast"><span id="toastMsg"></span></div>

</footer>
<script>
function showToast(msg){
  var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
  m.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function calculate(){
  var n=parseInt(document.getElementById('numInput').value);
  if(!n||isNaN(n)||n<1){showToast('请输入正整数');return;}
  if(n>1e12){showToast('数字过大，可能导致浏览器卡顿');return;}
  var sequence=[];
  var steps=[];
  var stepNum=0;
  var current=n;
  var maxVal=n;
  sequence.push(current);
  while(current!==1){
    stepNum++;
    var prev=current;
    if(current%2===0){
      current=current/2;
      steps.push({num:stepNum,from:prev,op:prev+' ÷ 2 = '+current});
    }else{
      current=3*current+1;
      steps.push({num:stepNum,from:prev,op:prev+' × 3 + 1 = '+current});
    }
    sequence.push(current);
    if(current>maxVal){maxVal=current;}
  }
  document.getElementById('statSteps').textContent=stepNum;
  document.getElementById('statMax').textContent=maxVal.toLocaleString();
  document.getElementById('statLen').textContent=sequence.length;
  var list=document.getElementById('seqList');
  list.innerHTML='';
  for(var i=0;i<sequence.length;i++){
    var li=document.createElement('li');
    if(sequence[i]===maxVal&&i>0){li.className='peak';}
    if(sequence[i]===1&&i===sequence.length-1){li.className='end';}
    var html='<span class="seq-num">'+i+'</span><span>'+escapeHtml(String(sequence[i]).toLocaleString())+'</span>';
    if(i<steps.length){
      html+='<span class="seq-op">← '+escapeHtml(steps[i].op)+'</span>';
    }else{
      html+='<span class="seq-op">✓ 到达1</span>';
    }
    li.innerHTML=html;
    list.appendChild(li);
  }
  document.getElementById('resultArea').classList.add('show');
}
function loadSample(){
  document.getElementById('numInput').value='27';
  calculate();
}
function clearAll(){
  document.getElementById('numInput').value='';
  document.getElementById('resultArea').classList.remove('show');
}
</script>
</body>
