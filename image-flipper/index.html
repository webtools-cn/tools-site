<body>

            <input type="radio" name="flipMode" value="none" checked>
            <span class="icon">➡️</span>
            <span class="label">原图（无翻转）<span class="desc">保持原始方向</span></span>
          </label>
          <label class="flip-option">
            <input type="radio" name="flipMode" value="horizontal">
            <span class="icon">↔️</span>

          </label>
          <label class="flip-option">
            <input type="radio" name="flipMode" value="vertical">
            <span class="icon">↕️</span>

          </label>
          <label class="flip-option">
            <input type="radio" name="flipMode" value="both">
            <span class="icon">🔄</span>

          </label>
        </div>
      </div>
      <div class="control-group">
        <label>导出格式</label>
        <div class="format-select">
          <label><input type="radio" name="format" value="png" checked> PNG</label>
          <label><input type="radio" name="format" value="jpeg"> JPEG</label>
          <label><input type="radio" name="format" value="webp"> WebP</label>
        </div>
      </div>
      <div class="quality-control" id="qualityControl">
        <label>画质</label>
        <input type="range" id="qualitySlider" min="10" max="100" value="92">
        <span class="value" id="qualityValue">92%</span>
      </div>
      <button class="btn btn-success" id="downloadBtn" style="width:100%" disabled>
        ⬇️ 下载翻转图片
      </button>

        🔄 重新选择图片
      </button>
    </div>
    <div class="preview-area">
      <div class="drop-zone" id="dropZone">
        <div class="icon">📁</div>

        <span class="hint">支持 PNG / JPG / WebP / GIF / BMP / SVG</span>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      </div>

        <button class="btn btn-primary" id="flipHorizontalBtn">↔️ 水平翻转</button>
        <button class="btn btn-primary" id="flipVerticalBtn">↕️ 垂直翻转</button>

</div>
<div class="footer">
  <p>纯前端本地处理 · 数据不上传服务器 · 支持离线使用</p>
</div>
<script>
(function(){
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const canvasWrapper = document.getElementById('canvasWrapper');
  const fileInfo = document.getElementById('fileInfo');
  const fileCount = document.getElementById('fileCount');
  const fileList = document.getElementById('fileList');
  const previewActions = document.getElementById('previewActions');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');
  const flipHorizontalBtn = document.getElementById('flipHorizontalBtn');
  const flipVerticalBtn = document.getElementById('flipVerticalBtn');
  const flipBothBtn = document.getElementById('flipBothBtn');
  const qualitySlider = document.getElementById('qualitySlider');
  const qualityValue = document.getElementById('qualityValue');
  const qualityControl = document.getElementById('qualityControl');

  let images = [];
  let currentIndex = 0;
  let flipMode = 'none';

  qualitySlider.addEventListener('input', function(){
    qualityValue.textContent = this.value + '%';
    if(images.length > 0) renderPreview();
  });

  // Format change triggers quality control visibility
  document.querySelectorAll('input[name="format"]').forEach(r => {
    r.addEventListener('change', function(){
      qualityControl.style.display = this.value === 'png' ? 'none' : 'flex';
      if(images.length > 0) renderPreview();
    });
  });

  // File drop zone
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if(e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    if(fileInput.files.length > 0) handleFiles(fileInput.files);
  });

  // Flip mode radio buttons
  document.querySelectorAll('input[name="flipMode"]').forEach(r => {
    r.addEventListener('change', function(){
      document.querySelectorAll('.flip-option').forEach(el => el.classList.remove('active'));
      this.closest('.flip-option').classList.add('active');
    });
  });

  // Quick action buttons
  flipHorizontalBtn.addEventListener('click', () => {
    document.querySelector('input[name="flipMode"][value="horizontal"]').click();
    document.querySelector('input[name="flipMode"][value="horizontal"]').dispatchEvent(new Event('change'));
    if(images.length > 0) renderPreview();
  });
  flipVerticalBtn.addEventListener('click', () => {
    document.querySelector('input[name="flipMode"][value="vertical"]').click();
    document.querySelector('input[name="flipMode"][value="vertical"]').dispatchEvent(new Event('change'));
    if(images.length > 0) renderPreview();
  });
  flipBothBtn.addEventListener('click', () => {
    document.querySelector('input[name="flipMode"][value="both"]').click();
    document.querySelector('input[name="flipMode"][value="both"]').dispatchEvent(new Event('change'));
    if(images.length > 0) renderPreview();
  });

  function handleFiles(files){
    images = [];
    currentIndex = 0;
    let loaded = 0;
    for(let f of files){
      if(!f.type.startsWith('image/')) continue;
      const img = new Image();
      img.onload = function(){
        images.push({ img, name: f.name, size: f.size, type: f.type });
        loaded++;
        if(loaded === count) afterLoad();
      };
      img.onerror = function(){ loaded++; if(loaded === count) afterLoad(); };
      img.src = URL.createObjectURL(f);
    }
    const count = files.length;
    if(count === 0) return;
  }

  function afterLoad(){
    if(images.length === 0) return;
    dropZone.style.display = 'none';
    canvasWrapper.style.display = 'flex';
    previewActions.style.display = 'flex';
    downloadBtn.disabled = false;
    resetBtn.disabled = false;
    updateFileList();
    showCurrentImage();
  }

  function showCurrentImage(){
    if(images.length === 0) return;
    const info = images[currentIndex];
    fileInfo.style.display = 'block';
    fileInfo.textContent = info.name;
    updateFileList();
    renderPreview();
  }

  function updateFileList(){
    if(images.length <= 1){
      fileCount.style.display = 'none';
      fileList.style.display = 'none';
      return;
    }
    fileCount.style.display = 'block';
    fileCount.textContent = `共 ${images.length} 张图片，当前第 ${currentIndex+1} 张`;
    fileList.style.display = 'flex';
    fileList.innerHTML = '';
    images.forEach((img, i) => {
      const el = document.createElement('span');
      el.className = 'file-item' + (i === currentIndex ? ' active' : '');
      el.textContent = img.name.length > 20 ? img.name.slice(0,17)+'...' : img.name;
      el.addEventListener('click', () => { currentIndex = i; showCurrentImage(); });
      fileList.appendChild(el);
    });
  }

  function renderPreview(){
    if(images.length === 0) return;
    const info = images[currentIndex];
    const img = info.img;
    const format = document.querySelector('input[name="format"]:checked').value;
    const quality = parseInt(qualitySlider.value) / 100;
    
    flipMode = document.querySelector('input[name="flipMode"]:checked').value;
    
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    // Apply flip transformations
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.translate(cx, cy);
    if(flipMode === 'horizontal' || flipMode === 'both'){
      ctx.scale(-1, 1);
    }
    if(flipMode === 'vertical' || flipMode === 'both'){
      ctx.scale(1, -1);
    }
    ctx.drawImage(img, -img.width/2, -img.height/2);
    ctx.restore();
  }

  downloadBtn.addEventListener('click', function(){
    if(images.length === 0) return;
    const format = document.querySelector('input[name="format"]:checked').value;
    const quality = parseInt(qualitySlider.value) / 100;
    const info = images[currentIndex];
    const mimeType = format === 'jpeg' ? 'image/jpeg' : format === 'webp' ? 'image/webp' : 'image/png';
    const ext = format === 'jpeg' ? 'jpg' : format;
    
    renderPreview();
    
    const link = document.createElement('a');
    const baseName = info.name.replace(/\.[^.]+$/, '');
    link.download = `${baseName}_${flipMode !== 'none' ? flipMode : 'original'}.${ext}`;
    
    if(format === 'png'){
      link.href = canvas.toDataURL('image/png');
    } else {
      link.href = canvas.toDataURL(mimeType, quality);
    }
    link.click();
  });

  resetBtn.addEventListener('click', function(){
    images.forEach(img => { if(img.img.src) URL.revokeObjectURL(img.img.src); });
    images = [];
    currentIndex = 0;
    flipMode = 'none';
    document.querySelector('input[name="flipMode"][value="none"]').checked = true;
    document.querySelectorAll('.flip-option').forEach(el => el.classList.remove('active'));
    document.querySelector('.flip-option').classList.add('active');
    dropZone.style.display = 'flex';
    canvasWrapper.style.display = 'none';
    previewActions.style.display = 'none';
    fileInfo.style.display = 'none';
    fileCount.style.display = 'none';
    fileList.style.display = 'none';
    downloadBtn.disabled = true;
    resetBtn.disabled = true;
    fileInput.value = '';
  });
})();
</script>
