<script>

function escapeDartClass(name){return name.replace(/[^a-zA-Z0-9_]/g,'').replace(/^[0-9]/,'_')}

function toPascalCase(s){return s.replace(/[^a-zA-Z0-9]/g,' ').replace(/\s+(.)/g,function(_,c){return c.toUpperCase()}).replace(/\s/g,'').replace(/^./,function(c){return c.toUpperCase()})}

function toCamelCase(s){const p=toPascalCase(s);return p.charAt(0).toLowerCase()+p.slice(1)}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

function inferType(value,jsonKey){
  if(value===null||value===undefined)return 'dynamic';
  if(typeof value==='string'){
    if(/^\d{4}-\d{2}-\d{2}/.test(value)||/^\d{4}\/\d{2}\/\d{2}/.test(value))return 'DateTime';
    return 'String';
  }
  if(typeof value==='boolean')return 'bool';
  if(typeof value==='number'){
    if(Number.isInteger(value))return 'int';
    return 'double';
  }
  if(Array.isArray(value)){
    if(value.length===0)return 'List<dynamic>';
    const itemTypes=value.map(function(v){return inferType(v)});
    const uniqueTypes=[...new Set(itemTypes)];
    if(uniqueTypes.length===1&&uniqueTypes[0]!=='dynamic')return 'List<'+uniqueTypes[0]+'>';
    // Check if items are objects (nested classes)
    if(typeof value[0]==='object'&&value[0]!==null&&!Array.isArray(value[0])){
      const className=toPascalCase(jsonKey)+'Item';
      return 'List<'+className+'>';
    }
    return 'List<dynamic>';
  }
  if(typeof value==='object'&&value!==null){
    return toPascalCase(jsonKey);
  }
  return 'dynamic';
}

let generatedClasses='';
let rootClassName='';

function generateDart(){
  const input=document.getElementById('jsonInput').value.trim();
  const errorBox=document.getElementById('errorBox');
  
  if(!input){errorBox.style.display='block';errorBox.textContent='请输入JSON数据';return}
  
  let data;
  try{data=JSON.parse(input)}catch(e){errorBox.style.display='block';errorBox.textContent='JSON格式错误: '+e.message;return}
  errorBox.style.display='none';
  
  const useCopyWith=document.getElementById('useCopyWith').checked;
  const useJsonSerializable=document.getElementById('useJsonSerializable').checked;
  const useFreezed=document.getElementById('useFreezed').checked;
  const useFinal=document.getElementById('useFinal').checked;
  const useEquatable=document.getElementById('useEquatable').checked;
  
  if(useJsonSerializable&&useFreezed){errorBox.style.display='block';errorBox.textContent='请选择 json_serializable 或 freezed，不能同时勾选';return}
  
  const classes={};
  let mainClassName='';
  
  // Analyze JSON structure
  function analyze(obj,name,classes){
    if(obj===null||obj===undefined||typeof obj!=='object'||Array.isArray(obj)){
      if(Array.isArray(obj)&&obj.length>0&&typeof obj[0]==='object'&&obj[0]!==null){
        analyze(obj[0],name+'Item',classes);
      }
      return;
    }
    
    if(classes[name])return; // Already processed
    classes[name]={fields:[],hasArrayOfObjects:false};
    
    const keys=Object.keys(obj);
    keys.forEach(function(key){
      const val=obj[key];
      let type=inferType(val,key);
      
      // Check if it's a nested object
      if(typeof val==='object'&&val!==null&&!Array.isArray(val)){
        const className=type;
        analyze(val,className,classes);
      }
      
      // Check if it's an array of objects
      if(Array.isArray(val)&&val.length>0&&typeof val[0]==='object'&&val[0]!==null){
        const itemClassName=type.replace('List<','').replace('>','');
        analyze(val[0],itemClassName,classes);
        classes[name].hasArrayOfObjects=true;
      }
      
      const isRequired=val!==null&&val!==undefined;
      const dartKey=toCamelCase(key);
      classes[name].fields.push({jsonKey:key,dartKey:dartKey,type:type,isRequired:isRequired});
    });
  }
  
  // Determine root name
  const rootName='RootModel';
  mainClassName=rootName;
  analyze(data,rootName,classes);
  
  // Generate Dart code
  let code='';
  const sortedClassNames=Object.keys(classes);
  
  sortedClassNames.forEach(function(className,i){
    const cls=classes[className];
    
    if(useJsonSerializable){
      code+="import 'package:json_annotation/json_annotation.dart';\n";
      code+="part '"+toCamelCase(className)+".g.dart';\n\n";
    }
    if(useFreezed){
      code+="import 'package:freezed_annotation/freezed_annotation.dart';\n";
      code+="import 'package:flutter/foundation.dart';\n";
      code+="part '"+toCamelCase(className)+".freezed.dart';\n";
      code+="part '"+toCamelCase(className)+".g.dart';\n\n";
    }
    if(useEquatable&&!useFreezed){
      code+="import 'package:equatable/equatable.dart';\n\n";
    }
    
    if(useFreezed){
      // Freezed class
      code+='@freezed\n';
      code+="class "+className+" with _\\$"+className+" {\n";
      code+='  const factory '+className+'({\n';
      cls.fields.forEach(function(f){
        if(!f.isRequired)code+='    @Default(null) ';
        code+='    '+f.type+(f.isRequired?'':'?')+' '+f.dartKey+',\n';
      });
      code+='  }) = _'+className+';\n\n';
      code+='  factory '+className+'.fromJson(Map<String, dynamic> json) => _\\$'+className+'FromJson(json);\n';
      code+='}\n\n';
    }else if(useJsonSerializable){
      code+='@JsonSerializable()\n';
      code+='class '+className+(useEquatable?' extends Equatable':'')+' {\n';
      cls.fields.forEach(function(f){
        code+='  final '+f.type+(f.isRequired?'':'?')+' '+f.dartKey+';\n';
      });
      code+='\n  '+className+'({\n';
      cls.fields.forEach(function(f){
        code+='    '+((f.isRequired&&!useFinal)?'required ':'')+f.type+(f.isRequired?'':'?')+' '+f.dartKey+',\n';
      });
      code+='  });\n\n';
      code+='  factory '+className+'.fromJson(Map<String, dynamic> json) => _\\$'+className+'FromJson(json);\n\n';
      code+='  Map<String, dynamic> toJson() => _\\$'+className+'ToJson(this);\n\n';
      if(useCopyWith){
        code+='  '+className+' copyWith({\n';
        cls.fields.forEach(function(f){
          code+='    '+('Optional<String>'==='Optional<String>'?f.type+(f.isRequired?'?':''):f.type+(f.isRequired?'?':'?'))+' Function()? '+f.dartKey+',\n';
        });
        code+='  }) {\n    return '+className+'(\n';
        cls.fields.forEach(function(f){
          code+='      '+f.dartKey+': '+f.dartKey+'?.call() ?? this.'+f.dartKey+',\n';
        });
        code+='    );\n  }\n';
      }
      if(useEquatable){
        code+='\n  @override\n  List<Object?> get props => ['+cls.fields.map(function(f){return f.dartKey}).join(', ')+'];\n';
      }
      code+='}\n\n';
    }else{
      // Plain Dart class
      code+='class '+className+(useEquatable?' extends Equatable':'')+' {\n';
      // Constructor
      code+='  const '+className+'({\n';
      cls.fields.forEach(function(f){
        code+='    '+((f.isRequired&&!useFinal)?'required ':'')+f.type+(f.isRequired?'':'?')+' '+f.dartKey+(useFinal?'':'')+',\n';
      });
      code+='  });\n\n';
      // Fields
      cls.fields.forEach(function(f){
        code+='  final '+f.type+(f.isRequired?'':'?')+' '+f.dartKey+';\n';
      });
      code+='\n';
      // fromJson
      code+='  factory '+className+'.fromJson(Map<String, dynamic> json) {\n    return '+className+'(\n';
      cls.fields.forEach(function(f){
        let val='json['+JSON.stringify(f.jsonKey)+']';
        if(f.type==='DateTime'){code+='      '+f.dartKey+': '+val+' != null ? DateTime.parse('+val+') : null,\n'}
        else if(f.type.startsWith('List<')){const innerType=f.type.replace('List<','').replace('>','');if(innerType!=='dynamic'&&classes[innerType]){code+='      '+f.dartKey+': ('+val+' as List<dynamic>?)?.map((e) => '+innerType+'.fromJson(e as Map<String,dynamic>)).toList(),\n'}else{code+='      '+f.dartKey+': ('+val+' as List<dynamic>?)?.cast<'+innerType+'>(),\n'}}
        else if(classes[f.type]){code+='      '+f.dartKey+': '+val+' != null ? '+f.type+'.fromJson('+val+' as Map<String, dynamic>) : null,\n'}
        else if(f.type==='int'||f.type==='double'){code+='      '+f.dartKey+': ('+val+' as num?)?.to'+capitalize(f.type)+'(),\n'}
        else{code+='      '+f.dartKey+': '+val+' as '+f.type+'?,\n'}
      });
      code+='    );\n  }\n\n';
      // toJson
      code+='  Map<String, dynamic> toJson() {\n    return {\n';
      cls.fields.forEach(function(f){
        let val=f.dartKey;
        if(f.type==='DateTime'){code+='      '+JSON.stringify(f.jsonKey)+': '+val+'?.toIso8601String(),\n'}
        else if(f.type.startsWith('List<')){const innerType=f.type.replace('List<','').replace('>','');if(classes[innerType]){code+='      '+JSON.stringify(f.jsonKey)+': '+val+'?.map((e) => e.toJson()).toList(),\n'}else{code+='      '+JSON.stringify(f.jsonKey)+': '+val+',\n'}}
        else if(classes[f.type]){code+='      '+JSON.stringify(f.jsonKey)+': '+val+'?.toJson(),\n'}
        else{code+='      '+JSON.stringify(f.jsonKey)+': '+val+',\n'}
      });
      code+='    };\n  }\n';
      // copyWith
      if(useCopyWith){
        code+='\n  '+className+' copyWith({\n';
        cls.fields.forEach(function(f){
          code+='    '+f.type+(f.isRequired?'?':'?')+' Function()? '+f.dartKey+',\n';
        });
        code+='  }) {\n    return '+className+'(\n';
        cls.fields.forEach(function(f){
          code+='      '+f.dartKey+': '+f.dartKey+'?.call() ?? this.'+f.dartKey+',\n';
        });
        code+='    );\n  }\n';
      }
      if(useEquatable){
        code+='\n  @override\n  List<Object?> get props => ['+cls.fields.map(function(f){return f.dartKey}).join(', ')+'];\n';
      }
      code+='}\n\n';
    }
  });
  
  document.getElementById('codeOutput').textContent=code;
  generatedClasses=code;
  rootClassName=mainClassName;
}

function copyCode(){
  if(!generatedClasses){showToast('请先生成代码');return}
  navigator.clipboard.writeText(generatedClasses).then(function(){showToast('已复制到剪贴板')}).catch(function(){showToast('复制失败')});
}

  document.getElementById('jsonInput').value='';
  document.getElementById('codeOutput').textContent='// 输入JSON后点击"生成 Dart 类"';
  document.getElementById('errorBox').style.display='none';
  generatedClasses='';
}

function loadExample(type){
