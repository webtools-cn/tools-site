function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

// Tool-specific JavaScript
const TOOL_SLUG = 'base64-decode';
function showToast(msg) {
  const t = document.getElementById('toast-msg') || (()=>{const d=document.createElement('div');d.id='toast-msg';d.className='toast';document.body.appendChild(d);return d;})();
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));
}

function downloadFile(content, filename, mime='text/plain') {
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}


function initTool() {
  const ui = document.getElementById('tool-ui');
  ui.innerHTML = `
    <textarea id="input-text" class="input-textarea" placeholder="输入要解码的Base64字符串..."></textarea>
    <div class="input-row" style="margin-top:12px">
      <div class="input-group">
        <label>输入格式</label>
        <select id="input-format">
          <option value="auto">自动检测</option>
          <option value="standard">标准Base64</option>
          <option value="urlsafe">Base64URL</option>
        </select>
      </div>
      <div class="input-group">
        <label>输出方式</label>
        <select id="output-mode">
          <option value="text">文本</option>
          <option value="file">文件下载</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-large" onclick="decode()">解码</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>
  `;
}
initTool();

function decode() {
  const input = document.getElementById('input-text').value.trim();
  if (!input) { showToast('请输入Base64字符串'); return; }
  
  let format = document.getElementById('input-format').value;
  let processed = input;
  
  // Auto-detect format
  if (format === 'auto') {
    format = (input.includes('-') || input.includes('_')) ? 'urlsafe' : 'standard';
  }
  
  // Convert from urlsafe to standard
  if (format === 'urlsafe') {
    processed = processed.replace(/-/g,'+').replace(/_/g,'/');
    while (processed.length % 4 !== 0) processed += '=';
  }
  
  try {
    const binaryStr = atob(processed);
    const outputMode = document.getElementById('output-mode').value;
    
    if (outputMode === 'file') {
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i) & 0xFF;
      const blob = new Blob([bytes]);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'decoded_file';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('文件已下载');
      document.getElementById('result-section').classList.remove('show');
    } else {
      // Try UTF-8 decode
      try {
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i) & 0xFF;
        const text = new TextDecoder('utf-8', {fatal: true}).decode(bytes);
        displayResult(text);
      } catch(e) {
        // Fallback: show as text but note it might be binary
        displayResult(binaryStr + '\n\n⚠️ 可能不是纯文本数据，请尝试文件下载模式');
      }
    }
  } catch(e) {
    showToast('解码失败：无效的Base64字符串');
  }
}

function displayResult(text) {
  document.getElementById('result-section').classList.add('show');
  const safe = text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  document.getElementById('result-content').innerHTML = `
    <textarea class="output-textarea" readonly>${safe}</textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyToClipboard(document.querySelector('.output-textarea').value)">📋 复制</button>
    </div>
  `;
  document.getElementById('char-count').textContent = `长度: ${text.length} 字符`;
}

function clearAll() {
  document.getElementById('input-text').value = '';
  document.getElementById('result-section').classList.remove('show');
}
