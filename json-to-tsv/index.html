  <h2>📝 输入JSON</h2>
  <div class="drop-zone" id="drop-zone">📁 拖拽JSON文件到此处<input type="file" id="file-input" accept=".json,.txt" style="display:none"></div>

<script>
function flattenObj(obj,prefix){
  const result={};
  Object.keys(obj).forEach(key=>{
    const fullKey=prefix?prefix+'.'+key:key;
    const val=obj[key];
    if(val&&typeof val==='object'&&!Array.isArray(val))Object.assign(result,flattenObj(val,fullKey));
    else if(Array.isArray(val))result[fullKey]=JSON.stringify(val);
    else result[fullKey]=val;
  });
  return result;
}
function convertJSON(){
  const input=document.getElementById('json-input').value.trim();
  const errEl=document.getElementById('error-msg');errEl.classList.remove('show');
  if(!input){errEl.textContent='请输入JSON内容';errEl.classList.add('show');return;}
  try{
    let data=JSON.parse(input);
    const flattenOn=document.getElementById('toggle-flatten').classList.contains('on');
    const headerOn=document.getElementById('toggle-header').classList.contains('on');
    const nullHandling=document.getElementById('null-handling').value;
    if(!Array.isArray(data))data=[data];
    const processed=data.map(item=>{
      if(flattenOn&&typeof item==='object'&&item!==null)return flattenObj(item,'');
      return item;
    });
    const allKeys=new Set();
    processed.forEach(item=>{if(typeof item==='object'&&item!==null)Object.keys(item).forEach(k=>allKeys.add(k));});
    const keys=Array.from(allKeys);
    const nullVal=nullHandling==='empty'?'':nullHandling==='null'?'null':'N/A';
    const rows=processed.map(item=>{
      if(typeof item!=='object'||item===null)return [String(item)];
      return keys.map(k=>{
        const v=item[k];
        if(v===null||v===undefined)return nullVal;
        if(typeof v==='object')return JSON.stringify(v);
        return String(v);
      });
    });
    let tsv='';
    if(headerOn)tsv+=keys.join('\t')+'\n';
    tsv+=rows.map(row=>row.join('\t')).join('\n');
    document.getElementById('result-output').value=tsv;
    document.getElementById('stats-row').innerHTML='\x3Cdiv class="stat-item">\x3Cdiv class="num" style="color:#06b6d4">'+processed.length+'\x3C/div>\x3Cdiv class="lbl">行数\x3C/div>\x3C/div>\x3Cdiv class="stat-item">\x3Cdiv class="num" style="color:#10b981">'+keys.length+'\x3C/div>\x3Cdiv class="lbl">列数\x3C/div>\x3C/div>';
    document.getElementById('result-panel').style.display='block';
  }catch(e){errEl.textContent='JSON解析错误: '+e.message;errEl.classList.add('show');}
}
function copyResult(){const v=document.getElementById('result-output').value;if(v)navigator.clipboard.writeText(v);}
function downloadResult(){const v=document.getElementById('result-output').value;if(!v)return;const blob=new Blob([v],{type:'text/tab-separated-values'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.tsv';a.click();}
function loadExample(){
  document.getElementById('json-input').value='[\n  {"name":"张三","age":25,"email":"zhang@example.com","address":{"city":"北京","district":"海淀"}},\n  {"name":"李四","age":30,"email":"li@example.com","address":{"city":"上海","district":"浦东"}},\n  {"name":"王五","age":28,"email":"wang@example.com","address":{"city":"广州","district":"天河"}}\n]';
  convertJSON();
}
function clearAll(){document.getElementById('json-input').value='';document.getElementById('result-output').value='';document.getElementById('result-panel').style.display='none';document.getElementById('error-msg').classList.remove('show');}
const dz=document.getElementById('drop-zone');const fi=document.getElementById('file-input');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('json-input').value=ev.target.result;convertJSON();};r.readAsText(f);}});
fi.addEventListener('change',e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('json-input').value=ev.target.result;convertJSON();};r.readAsText(f);}});
document.getElementById('json-input').addEventListener('input',function(){clearTimeout(this._timer);this._timer=setTimeout(convertJSON,600);});
document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){convertJSON();e.preventDefault();}if(e.ctrlKey&&e.shiftKey&&e.key==='C'){copyResult();e.preventDefault();}if(e.ctrlKey&&e.shiftKey&&e.key==='X'){clearAll();e.preventDefault();}});
window.addEventListener('load',loadExample);
</script>
