<script>

(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🚗 交通出行</h2><div class="row"><div class="field"><label>汽车行驶里程（公里/年）</label><input type="number" id="carKm" value="12000" min="0"></div><div class="field"><label>汽车类型</label><select id="carType"><option value="gas">汽油车</option><option value="diesel" selected>柴油车</option><option value="hybrid">混合动力</option><option value="electric">电动车</option></select></div></div><div class="row"><div class="field"><label>短途飞行（小时/年）</label><input type="number" id="flightShort" value="0" min="0"></div><div class="field"><label>长途飞行（小时/年）</label><input type="number" id="flightLong" value="0" min="0"></div></div><div class="row"><div class="field"><label>公共交通（公里/周）</label><input type="number" id="transit" value="50" min="0"></div></div></div><div class="input-section"><h2>🏠 家庭能耗</h2><div class="row"><div class="field"><label>月用电量（kWh）</label><input type="number" id="electricity" value="300" min="0"></div><div class="field"><label>月天然气用量（m³）</label><input type="number" id="gas" value="20" min="0"></div></div></div><div class="input-section"><h2>🍽️ 饮食</h2><div class="options"><label>饮食类型：<select id="diet"><option value="meat-heavy">多肉食（每天肉食）</option><option value="average" selected>普通饮食（混合）</option><option value="vegetarian">素食（不吃肉）</option><option value="vegan">纯素食</option></select></label></div></div><div class="input-section"><h2>🛍️ 消费</h2><div class="options"><label>消费水平：<select id="spending"><option value="low">低消费（基本需求）</option><option value="average" selected>中等消费</option><option value="high">高消费（频繁购物）</option></select></label></div></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">🌍 计算碳足迹</button></div><div class="result-section" id="resultSection"><h2>📊 计算结果</h2><div id="resultContent"></div></div>';
document.getElementById('usageContent').innerHTML='<p>填写您的交通出行、家庭能耗、饮食和消费信息，估算个人年度碳排放量（单位：kg CO₂e/年）。</p><p>数据基于全球平均排放因子估算。实际排放会因地区能源结构、车辆型号等因素有所不同。</p>';

function calc() {
  var carKm = parseFloat(document.getElementById('carKm').value) || 0;
  var carType = document.getElementById('carType').value;
  var flightShort = parseFloat(document.getElementById('flightShort').value) || 0;
  var flightLong = parseFloat(document.getElementById('flightLong').value) || 0;
  var transit = parseFloat(document.getElementById('transit').value) || 0;
  var electricity = parseFloat(document.getElementById('electricity').value) || 0;
  var gas = parseFloat(document.getElementById('gas').value) || 0;
  var diet = document.getElementById('diet').value;
  var spending = document.getElementById('spending').value;

  // Emission factors (kg CO2e per unit)
  var carFactors = {gas: 0.21, diesel: 0.25, hybrid: 0.12, electric: 0.05};
  var carEm = carKm * (carFactors[carType] || 0.21);
  var flightEm = flightShort * 90 + flightLong * 180;
  var transitEm = transit * 52 * 0.035;
  var elecEm = electricity * 12 * 0.52;
  var gasEm = gas * 12 * 2.1;
  var dietFactors = {'meat-heavy': 3200, 'average': 1800, 'vegetarian': 900, 'vegan': 600};
  var dietEm = dietFactors[diet] || 1800;
  var spendFactors = {low: 500, average: 1500, high: 3500};
  var spendEm = spendFactors[spending] || 1500;

  var total = carEm + flightEm + transitEm + elecEm + gasEm + dietEm + spendEm;
  var globalAvg = 4500;
  var chinaAvg = 7500;
  var target = 2000;

  var breakdown = [
    {name: '🚗 交通出行', em: carEm + flightEm + transitEm, pct: 0},
    {name: '🏠 家庭能耗', em: elecEm + gasEm, pct: 0},
    {name: '🍽️ 饮食', em: dietEm, pct: 0},
    {name: '🛍️ 消费', em: spendEm, pct: 0},
  ];
  breakdown.forEach(function(b){b.pct = total > 0 ? Math.round(b.em/total*100) : 0;});

  var html = '<div style="margin-bottom:16px;padding:16px;background:rgba(6,182,212,.1);border-radius:8px;border:1px solid rgba(6,182,212,.2);text-align:center">';
  html += '<div style="font-size:3rem;font-weight:700;color:#22d3ee">' + Math.round(total).toLocaleString() + '</div>';
  html += '<div style="color:#94a3b8;font-size:.9rem">kg CO₂e / 年</div></div>';

  html += '<h3 style="margin-bottom:8px;color:#f1f5f9">📊 排放结构</h3><div class="table-wrap"><table class="data"><tr><th>类别</th><th>排放量 (kg)</th><th>占比</th></tr>';
  breakdown.forEach(function(b){
    html += '<tr><td>' + b.name + '</td><td>' + Math.round(b.em).toLocaleString() + '</td><td>' + b.pct + '%</td></tr>';
  });
  html += '<tr style="background:rgba(6,182,212,.08)"><td><strong>总计</strong></td><td><strong>' + Math.round(total).toLocaleString() + '</strong></td><td><strong>100%</strong></td></tr></table></div>';

  html += '<h3 style="margin:12px 0 8px;color:#f1f5f9">📈 对比参考</h3><div class="table-wrap"><table class="data"><tr><th>对比对象</th><th>排放量 (kg/年)</th></tr>';
  html += '<tr><td>您的排放</td><td style="color:#22d3ee;font-weight:600">' + Math.round(total).toLocaleString() + '</td></tr>';
  html += '<tr><td>全球人均</td><td>' + globalAvg.toLocaleString() + '</td></tr>';
  html += '<tr><td>中国人均</td><td>' + chinaAvg.toLocaleString() + '</td></tr>';
  html += '<tr><td>巴黎协定目标</td><td>' + target.toLocaleString() + '</td></tr></table></div>';

  var tips = [];
  if (carEm > 1000) tips.push('🚗 考虑使用公共交通或电动车，减少驾车里程');
  if (flightEm > 500) tips.push('✈️ 减少长途飞行，考虑视频会议替代');
  if (elecEm > 1500) tips.push('💡 使用节能电器，随手关灯，考虑太阳能');
  if (dietEm > 2000) tips.push('🥦 减少红肉消费，增加蔬菜比例');
  if (total > chinaAvg) tips.push('🎯 您的排放高于中国平均水平，以下措施可帮助降低：');
  if (tips.length === 0) tips.push('🎉 您的碳排放控制得不错！继续保持！');
  html += '<h3 style="margin:12px 0 8px;color:#f1f5f9">💡 减排建议</h3><ul style="color:#94a3b8;font-size:.9rem;padding-left:20px">';
  tips.slice(0,5).forEach(function(t){html += '<li style="margin-bottom:6px">' + t + '</li>';});
  html += '</ul>';

  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('resultSection').classList.add('show');
}

document.getElementById('calcBtn').addEventListener('click', calc);
calc();
})();

</script>
