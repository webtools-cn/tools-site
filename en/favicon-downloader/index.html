<div id="toast" class="toast"></div>
<script>
var currentIconUrl="";
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function fetchFavicon(){
  var domain=document.getElementById("domain").value.trim();
  if(!domain){showToast("请输入域名");return}
  domain=domain.replace(/^https?:\/\//,"").replace(/\/.*$/,"");
  document.getElementById("result").innerHTML='<div style="color:#facc15;padding:20px">⏳ 正在获取...</div>';
  document.getElementById("sizes").innerHTML="";
  var sources=[
    "https://www.google.com/s2/favicons?domain="+domain+"&sz=128",
    "https://"+domain+"/favicon.ico",
    "https://"+domain+"/favicon.png",
    "https://icons.duckduckgo.com/ip3/"+domain+".ico"
  ];
  tryEach(sources,0,domain);
}
function tryEach(sources,idx,domain){
  if(idx>=sources.length){
    document.getElementById("result").innerHTML='<div style="color:#f87171;padding:20px">❌ 无法获取图标，请检查域名是否正确</div>';
    return;
  }
  var img=new Image();
  img.onload=function(){
    currentIconUrl=sources[idx];
    document.getElementById("result").innerHTML='<img src="'+currentIconUrl+'" alt="favicon" style="max-width:128px;max-height:128px"><div style="color:#94a3b8;font-size:.8rem;margin-top:8px">'+domain+'</div>';
    document.getElementById("downloadBtn").style.display="block";
    var sizesEl=document.getElementById("sizes");
    [16,32,64,128].forEach(function(s){
      var d=document.createElement("div");d.className="icon-size-item";
      d.innerHTML='<img src="https://www.google.com/s2/favicons?domain='+domain+'&sz='+s+'" width="'+s+'" height="'+s+'" onerror="this.parentElement.style.display=\'none\'"><span>'+s+'×'+s+'</span>';
      sizesEl.appendChild(d);
    });
  };
  img.onerror=function(){tryEach(sources,idx+1,domain)};
  img.src=sources[idx];
}
function downloadIcon(){
  if(!currentIconUrl){showToast("请先获取图标");return}
  var a=document.createElement("a");a.href=currentIconUrl;a.download="favicon";a.click();
}
</script>
