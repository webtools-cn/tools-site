  <div class="tool-section"><h2>❓ 常见问题</h2>
    <div class="faq-item"><h3>什么是HTML转义？</h3><p>HTML转义是将特殊字符（&lt; &gt; &amp; &quot; &#39;）转换为实体编码（&amp;lt; &amp;gt; &amp;amp; &amp;quot; &amp;#39;），防止在HTML页面中被解析为标签或属性。这是防止XSS攻击的基本手段。</p></div>
    <div class="faq-item"><h3>什么时候需要转义？</h3><p>在网页中显示用户输入内容、代码片段、HTML源码时必须转义。例如博客中显示&lt;script&gt;代码，不转义会导致脚本执行。所有用户生成内容（UGC）都建议转义后再显示。</p></div>
    <div class="faq-item"><h3>转义和反转义有什么区别？</h3><p>转义（Escape）：将 &lt; 变成 &amp;lt;（安全显示）；反转义（Unescape）：将 &amp;lt; 还原为 &lt;（还原为原始字符）。本工具同时支持两种操作，一键切换。</p></div>

<script>
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function htmlEscape(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function htmlUnescape(str){
  return str.replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&amp;/g,"&");
}
function convert(){
  var input=document.getElementById("input").value;
  var mode=document.querySelector("input[name=mode]:checked").value;
  var result=mode==="escape"?htmlEscape(input):htmlUnescape(input);
  document.getElementById("output").value=result;
}
function copyOutput(){
  var t=document.getElementById("output").value;
  if(!t){showToast("没有可复制的结果");return}
  navigator.clipboard.writeText(t).then(function(){showToast("已复制到剪贴板")}).catch(function(){showToast("复制失败")});
}
function clearAll(){document.getElementById("input").value="";document.getElementById("output").value="";showToast("已清空")}
convert();
</script>
