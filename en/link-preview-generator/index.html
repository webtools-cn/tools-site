app.innerHTML='<div class="input-section"><h2>🔗 Enter URL</h2><div class="row"><div class="field" style="flex:3"><label>URL</label><input type="url" id="urlInput" placeholder="https://example.com/article"></div><div class="field" style="flex:1"><label>&nbsp;</label><button class="btn btn-primary" id="fetchBtn" style="width:100%">🔍 Fetch</button></div></div></div><div class="input-section"><h2>📱 Preview</h2><div style="color:#64748b;font-size:.85rem;text-align:center;padding:16px">Enter a URL and click Fetch to preview how it looks on social platforms</div><div id="previewArea"></div></div>';
