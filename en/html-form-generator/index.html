<script>
var fields=[];var idCounter=0;var editingId=null;
var types={'text':{lbl:'Text',hasLbl:true,hasPh:true,hasReq:true,hasVal:true},'email':{lbl:'Email',hasLbl:true,hasPh:true,hasReq:true,hasVal:true},'password':{lbl:'Password',hasLbl:true,hasPh:true,hasReq:true,hasVal:true},'number':{lbl:'Number',hasLbl:true,hasPh:true,hasReq:true,hasVal:true},'textarea':{lbl:'Textarea',hasLbl:true,hasPh:true,hasReq:true,hasVal:true,rows:4},'select':{lbl:'Dropdown',hasLbl:true,hasReq:true,hasOpts:true},'radio':{lbl:'Radio',hasLbl:true,hasReq:true,hasOpts:true},'checkbox':{lbl:'Checkbox',hasLbl:true,hasOpts:true},'color':{lbl:'Color',hasLbl:true,hasVal:true},'date':{lbl:'Date',hasLbl:true,hasReq:true,hasVal:true},'range':{lbl:'Slider',hasLbl:true,hasVal:true},'submit':{lbl:'Submit',hasLbl:false,hasVal:true}};
function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function addField(type){
  var f={id:++idCounter,type:type,label:types[type].lbl+' '+(idCounter),placeholder:'',value:'',required:false,options:'Option 1\nOption 2\nOption 3',min:0,max:100,rows:4};
  if(type==='submit')f.value='Submit';
  if(type==='range'){f.min=0;f.max=100;f.value=50;}
  if(type==='color')f.value='#06b6d4';
  fields.push(f);render();
}
function render(){
  var c=document.getElementById('formPreview');
  if(!fields.length){c.innerHTML='<div class="empty-state">Click "Add Field" to start building</div>';return}
  var h='<form onsubmit="return false">';
  for(var i=0;i<fields.length;i++){var f=fields[i];
    h+='<div class="fg">';
    if(f.label&&f.type!=='submit')h+='<label>'+esc(f.label)+(f.required?' <span class="required">*</span>':'')+'</label>';
    h+=renderField(f);
    h+='<div class="f-actions"><button onclick="editField('+f.id+')">✏️ Edit</button><button class="del" onclick="deleteField('+f.id+')">🗑️</button></div></div>';
  }
  h+='</form>';c.innerHTML=h;
}
function renderField(f){
  var n='f'+f.id;var r=f.required?' required':'';var p=esc(f.placeholder);
  switch(f.type){
    case'text':return '<input type="text" name="'+n+'" placeholder="'+p+'" value="'+esc(f.value)+'"'+r+'>';
    case'email':return '<input type="email" name="'+n+'" placeholder="'+p+'" value="'+esc(f.value)+'"'+r+'>';
    case'password':return '<input type="password" name="'+n+'" placeholder="'+p+'"'+r+'>';
    case'number':return '<input type="number" name="'+n+'" placeholder="'+p+'" value="'+esc(f.value)+'"'+r+'>';
    case'textarea':return '<textarea name="'+n+'" placeholder="'+p+'" rows="'+f.rows+'"'+r+'>'+esc(f.value)+'</textarea>';
    case'select':{var o=(f.options||'').split('\n').filter(Boolean);if(!o.length)o=['Option 1'];var s='<select name="'+n+'"'+r+'>';for(var j=0;j<o.length;j++)s+='<option value="'+esc(o[j])+'">'+esc(o[j])+'</option>';s+='</select>';return s;}
    case'radio':{var o=(f.options||'').split('\n').filter(Boolean);if(!o.length)o=['Option 1'];var s='<div class="opts">';for(var j=0;j<o.length;j++)s+='<label><input type="radio" name="'+n+'" value="'+esc(o[j])+'"'+r+'> '+esc(o[j])+'</label>';s+='</div>';return s;}
    case'checkbox':{var o=(f.options||'').split('\n').filter(Boolean);if(!o.length)o=['Option 1'];var s='<div class="opts">';for(var j=0;j<o.length;j++)s+='<label><input type="checkbox" name="'+n+'" value="'+esc(o[j])+'"> '+esc(o[j])+'</label>';s+='</div>';return s;}
    case'color':return '<input type="color" name="'+n+'" value="'+(f.value||'#06b6d4')+'">';
    case'date':return '<input type="date" name="'+n+'" value="'+esc(f.value)+'"'+r+'>';
    case'range':return '<input type="range" name="'+n+'" min="'+f.min+'" max="'+f.max+'" value="'+(f.value||50)+'">';
    case'submit':return '<button type="submit" style="padding:8px 20px;background:#06b6d4;color:#fff;border:none;border-radius:5px;cursor:pointer">'+esc(f.value)+'</button>';
    default:return '<input type="text" name="'+n+'">';
  }
}
function editField(id){editingId=id;var f=fields.find(function(x){return x.id===id});if(!f)return;
  var p=document.getElementById('editPanel'),ef=document.getElementById('editFields'),h='';
  var ft=types[f.type];h+='<div class="er"><label>Type</label><input type="text" value="'+ft.lbl+'" disabled style="opacity:.5"></div>';
  if(ft.hasLbl&&f.type!=='submit')h+='<div class="er"><label>Label</label><input type="text" id="el" value="'+esc(f.label)+'"></div>';
  if(ft.hasPh)h+='<div class="er"><label>Placeholder</label><input type="text" id="ep" value="'+esc(f.placeholder)+'"></div>';
  if(ft.hasVal&&f.type!=='submit')h+='<div class="er"><label>Default value</label><input type="text" id="ev" value="'+esc(f.value)+'"></div>';
  if(f.type==='submit')h+='<div class="er"><label>Button text</label><input type="text" id="ev" value="'+esc(f.value)+'"></div>';
  if(ft.hasReq)h+='<div class="er"><label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="erq"'+(f.required?' checked':'')+'> Required field</label></div>';
  if(ft.hasOpts)h+='<div class="er"><label>Options (one per line)</label><textarea id="eo" style="width:100%;padding:7px;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:5px;color:#e2e8f0;font-size:.82rem;resize:vertical" rows="5">'+esc(f.options)+'</textarea></div>';
  if(f.type==='range'){h+='<div class="er"><label>Min</label><input type="number" id="emin" value="'+f.min+'"></div>';h+='<div class="er"><label>Max</label><input type="number" id="emax" value="'+f.max+'"></div>';h+='<div class="er"><label>Default</label><input type="number" id="ev" value="'+(f.value||50)+'"></div>';}
  if(f.type==='textarea')h+='<div class="er"><label>Rows</label><input type="number" id="erows" value="'+f.rows+'"></div>';
  if(f.type==='color')h+='<div class="er"><label>Default color</label><input type="color" id="ev" value="'+(f.value||'#06b6d4')+'"></div>';
  if(f.type==='date')h+='<div class="er"><label>Default date</label><input type="date" id="ev" value="'+esc(f.value)+'"></div>';
  ef.innerHTML=h;p.classList.add('show');
}
function saveEdit(){var f=fields.find(function(x){return x.id===editingId});if(!f)return;
  var ft=types[f.type];
  if(ft.hasLbl&&f.type!=='submit'){var e=document.getElementById('el');if(e)f.label=e.value;}
  if(ft.hasPh){var e=document.getElementById('ep');if(e)f.placeholder=e.value;}
  if(ft.hasVal){var e=document.getElementById('ev');if(e)f.value=e.value;}
  if(f.type==='submit'){var e=document.getElementById('ev');if(e)f.value=e.value;}
  if(ft.hasReq){var e=document.getElementById('erq');if(e)f.required=e.checked;}
  if(ft.hasOpts){var e=document.getElementById('eo');if(e)f.options=e.value;}
  if(f.type==='range'){var e1=document.getElementById('emin'),e2=document.getElementById('emax');if(e1)f.min=parseInt(e1.value)||0;if(e2)f.max=parseInt(e2.value)||100;var e3=document.getElementById('ev');if(e3)f.value=e3.value;}
  if(f.type==='textarea'){var e=document.getElementById('erows');if(e)f.rows=parseInt(e.value)||4;}
  closeEdit();render();
}
function closeEdit(){document.getElementById('editPanel').classList.remove('show');editingId=null;}
function deleteField(id){fields=fields.filter(function(x){return x.id!==id});render();}
function clearAll(){if(!fields.length)return;if(!confirm('Clear all fields?'))return;fields=[];render();document.getElementById('codeOutput').textContent='&lt;!-- Add fields and click "Generate Code" --&gt;';}
function generateCode(){
  if(!fields.length){showToast('Please add fields first');return;}
  var h='<form action="/submit" method="POST">\n';
  for(var i=0;i<fields.length;i++){var f=fields[i],n='f'+f.id,r=f.required?' required':'';
    if(f.type==='submit'){h+='  <button type="submit">'+esc(f.value)+'</button>\n';continue;}
    if(f.label){h+='  <div class="form-group">\n    <label for="'+n+'">'+esc(f.label)+(f.required?' <span class="required">*</span>':'')+'</label>\n';}
    switch(f.type){
      case'text':h+='    <input type="text" id="'+n+'" name="'+n+'" placeholder="'+esc(f.placeholder)+'" value="'+esc(f.value)+'"'+r+'>\n';break;
      case'email':h+='    <input type="email" id="'+n+'" name="'+n+'" placeholder="'+esc(f.placeholder)+'" value="'+esc(f.value)+'"'+r+'>\n';break;
      case'password':h+='    <input type="password" id="'+n+'" name="'+n+'" placeholder="'+esc(f.placeholder)+'"'+r+'>\n';break;
      case'number':h+='    <input type="number" id="'+n+'" name="'+n+'" placeholder="'+esc(f.placeholder)+'" value="'+esc(f.value)+'"'+r+'>\n';break;
      case'textarea':h+='    <textarea id="'+n+'" name="'+n+'" placeholder="'+esc(f.placeholder)+'" rows="'+f.rows+'"'+r+'>'+esc(f.value)+'</textarea>\n';break;
      case'select':{var o=(f.options||'').split('\n').filter(Boolean);if(!o.length)o=['Option 1'];h+='    <select id="'+n+'" name="'+n+'"'+r+'>\n';for(var j=0;j<o.length;j++)h+='      <option value="'+esc(o[j])+'">'+esc(o[j])+'</option>\n';h+='    </select>\n';break;}
      case'radio':{var o=(f.options||'').split('\n').filter(Boolean);if(!o.length)o=['Option 1'];for(var j=0;j<o.length;j++)h+='    <label><input type="radio" name="'+n+'" value="'+esc(o[j])+'"'+r+'> '+esc(o[j])+'</label>\n';break;}
      case'checkbox':{var o=(f.options||'').split('\n').filter(Boolean);if(!o.length)o=['Option 1'];for(var j=0;j<o.length;j++)h+='    <label><input type="checkbox" name="'+n+'" value="'+esc(o[j])+'"> '+esc(o[j])+'</label>\n';break;}
      case'color':h+='    <input type="color" id="'+n+'" name="'+n+'" value="'+esc(f.value)+'">\n';break;
      case'date':h+='    <input type="date" id="'+n+'" name="'+n+'" value="'+esc(f.value)+'"'+r+'>\n';break;
      case'range':h+='    <input type="range" id="'+n+'" name="'+n+'" min="'+f.min+'" max="'+f.max+'" value="'+esc(f.value)+'">\n';break;
    }
    if(f.label)h+='  </div>\n';
  }
  h+='</form>';
  document.getElementById('codeOutput').textContent=h;showToast('✅ HTML code generated!');
}
function copyCode(){var c=document.getElementById('codeOutput').textContent;if(c.indexOf('Add fields')!==-1){showToast('Please add fields first');return}
  navigator.clipboard.writeText(c).then(function(){showToast('✅ HTML code copied to clipboard')}).catch(function(){showToast('Copy failed')})}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove('show')},2500)}
</script>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">Submit</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ 感谢反馈！已Submit到GitHub Issues</div>
</div>
</div>
<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){alert('Please enter your feedback');return;}
const typeLabel={feedback:'💡 Feature Request',bug:'🐛 Bug Report',other:'💬 Other'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
</body>
</html>
