<script>
(function(){
const textInput = document.getElementById('tbText');
const sizeSlider = document.getElementById('tbSize');
const sizeVal = document.getElementById('tbSizeVal');
const strokeSlider = document.getElementById('tbStroke');
const strokeVal = document.getElementById('tbStrokeVal');
const strokeColor = document.getElementById('tbStrokeColor');
const fillColor = document.getElementById('tbFillColor');
const bgColor = document.getElementById('tbBgColor');
const preview = document.getElementById('tbPreview');
const downloadBtn = document.getElementById('downloadTbBtn');

function renderText() {
  const text = textInput.value || 'Text';
  const size = parseInt(sizeSlider.value);
  const stroke = parseInt(strokeSlider.value);
  
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  // Measure text
  ctx.font = 'bold ' + size + 'px Arial, sans-serif';
  const metrics = ctx.measureText(text);
  const textWidth = metrics.width;
  const padding = stroke * 2 + 20;
  canvas.width = Math.max(textWidth + padding * 2, 100);
  canvas.height = size * 2 + padding * 2;
  
  // Background
  ctx.fillStyle = bgColor.value;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Text
  const x = canvas.width / 2;
  const y = canvas.height / 2 + size / 3;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + size + 'px Arial, sans-serif';
  
  // Stroke
  ctx.strokeStyle = strokeColor.value;
  ctx.lineWidth = stroke;
  ctx.lineJoin = 'round';
  ctx.strokeText(text, x, y);
  
  // Fill
  ctx.fillStyle = fillColor.value;
  ctx.fillText(text, x, y);
  
  preview.innerHTML = '';
  preview.appendChild(canvas);
}

[textInput, sizeSlider, strokeSlider, strokeColor, fillColor, bgColor].forEach(el => {
  el.addEventListener('input', function() {
    sizeVal.textContent = sizeSlider.value;
    strokeVal.textContent = strokeSlider.value;
    renderText();
  });
});

downloadBtn.addEventListener('click', function() {
  const canvas = preview.querySelector('canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'outlined-text.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

renderText();
})();
</script>
