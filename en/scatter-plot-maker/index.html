  </div>

<script>
const defaultBorders = ['#06b6d4','#8b5cf6','#f59e0b','#10b981','#ef4444'];
const defaultSeries = [
  {name:'Series A',color:'#06b6d4',data:'1,2\n2,4\n3,5\n4,7\n5,8\n6,10\n7,11\n8,14\n9,15\n10,17'},
  {name:'Series B',color:'#8b5cf6',data:'1,8\n2,7\n3,9\n4,6\n5,7\n6,5\n7,4\n8,3\n9,5\n10,2'}
];

let seriesList = JSON.parse(JSON.stringify(defaultSeries));

function initSeries(){
  const container=document.getElementById('seriesContainer');
  container.innerHTML='';
  seriesList.forEach((s,si)=>{
    const div=document.createElement('div');
    div.style.cssText='background:#0f172a;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid rgba(148,163,184,.1)';
    div.innerHTML=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input type="color" value="${s.color}" class="color-picker-inline" oninput="seriesList[${si}].color=this.value;drawScatter()">
      <input type="text" value="${s.name}" style="flex:1;padding:4px 8px;background:#1e293b;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:4px;font-size:.85rem" oninput="seriesList[${si}].name=this.value;drawScatter()">
      <button class="btn btn-danger" style="padding:4px 10px;font-size:.75rem" onclick="seriesList.splice(${si},1);initSeries();drawScatter()">Remove</button>
    </div>
    <textarea rows="4" style="width:100%;padding:8px;background:#1e293b;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:4px;font-size:.8rem;font-family:monospace;resize:vertical" oninput="seriesList[${si}].data=this.value;drawScatter()" placeholder="X,Y one per line">${s.data}</textarea>`;
    container.appendChild(div);
  });
}

function addSeries(){
  seriesList.push({name:'Series '+(seriesList.length+1),color:defaultBorders[seriesList.length%defaultBorders.length],data:'1,1\n2,2\n3,3'});
  initSeries();drawScatter();
}

function resetAll(){
  seriesList=JSON.parse(JSON.stringify(defaultSeries));
  initSeries();drawScatter();
}

function parseData(text){
  const points=[];
  text.split('\n').forEach(line=>{
    const parts=line.trim().split(',');
    if(parts.length>=2){
      const x=parseFloat(parts[0]),y=parseFloat(parts[1]);
      if(!isNaN(x)&&!isNaN(y))points.push({x,y});
    }
  });
  return points;
}

function linearRegression(points){
  const n=points.length;
  if(n<2)return null;
  let sx=0,sy=0,sxy=0,sx2=0;
  points.forEach(p=>{sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sx2+=p.x*p.x;});
  const denom=n*sx2-sx*sx;
  if(denom===0)return null;
  const slope=(n*sxy-sx*sy)/denom;
  const intercept=(sy-slope*sx)/n;
  return{slope,intercept};
}

function drawScatter(){
  const canvas=document.getElementById('scatterCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=2;
  canvas.width=600*dpr;canvas.height=500*dpr;
  canvas.style.width='600px';canvas.style.height='500px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,600,500);

  const title=document.getElementById('chartTitle').value;
  const xLabel=document.getElementById('xLabel').value;
  const yLabel=document.getElementById('yLabel').value;
  const showTrend=document.getElementById('showTrend').checked;
  const showGrid=document.getElementById('showGrid').checked;
  const dotSize=parseInt(document.getElementById('dotSize').value);

  const allPoints=[];
  const parsedSeries=seriesList.map(s=>{
    const pts=parseData(s.data);
    pts.forEach(p=>allPoints.push(p));
    return{...s,points:pts};
  });

  if(allPoints.length===0){
    ctx.fillStyle='#94a3b8';ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText('Please enter data',300,250);return;
  }

  let minX=Math.min(...allPoints.map(p=>p.x));
  let maxX=Math.max(...allPoints.map(p=>p.x));
  let minY=Math.min(...allPoints.map(p=>p.y));
  let maxY=Math.max(...allPoints.map(p=>p.y));
  const xPad=(maxX-minX)*0.1||1;
  const yPad=(maxY-minY)*0.1||1;
  minX-=xPad;maxX+=xPad;minY-=yPad;maxY+=yPad;

  const padding={top:50,right:30,bottom:60,left:60};
  const chartW=600-padding.left-padding.right;
  const chartH=500-padding.top-padding.bottom;

  const toX=v=>padding.left+((v-minX)/(maxX-minX))*chartW;
  const toY=v=>padding.top+chartH-((v-minY)/(maxY-minY))*chartH;

  ctx.fillStyle='#1e293b';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText(title,300,28);

  if(showGrid){
    ctx.strokeStyle='#f1f5f9';ctx.lineWidth=0.5;
    for(let i=0;i<=5;i++){
      const x=padding.left+(i/5)*chartW;
      ctx.beginPath();ctx.moveTo(x,padding.top);ctx.lineTo(x,padding.top+chartH);ctx.stroke();
      const y=padding.top+(i/5)*chartH;
      ctx.beginPath();ctx.moveTo(padding.left,y);ctx.lineTo(padding.left+chartW,y);ctx.stroke();
    }
  }

  ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padding.left,padding.top);ctx.lineTo(padding.left,padding.top+chartH);ctx.lineTo(padding.left+chartW,padding.top+chartH);ctx.stroke();

  ctx.fillStyle='#64748b';ctx.font='11px sans-serif';ctx.textAlign='center';
  for(let i=0;i<=5;i++){
    const val=minX+(i/5)*(maxX-minX);
    ctx.fillText(val.toFixed(1),padding.left+(i/5)*chartW,padding.top+chartH+18);
  }
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=0;i<=5;i++){
    const val=maxY-(i/5)*(maxY-minY);
    ctx.fillText(val.toFixed(1),padding.left-8,padding.top+(i/5)*chartH);
  }

  ctx.fillStyle='#475569';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText(xLabel,padding.left+chartW/2,490);
  ctx.save();ctx.translate(15,padding.top+chartH/2);ctx.rotate(-Math.PI/2);ctx.fillText(yLabel,0,0);ctx.restore();

  parsedSeries.forEach((s,si)=>{
    if(showTrend&&s.points.length>=2){
      const reg=linearRegression(s.points);
      if(reg){
        const x1=minX,y1=reg.slope*x1+reg.intercept;
        const x2=maxX,y2=reg.slope*x2+reg.intercept;
        ctx.beginPath();ctx.moveTo(toX(x1),toY(y1));ctx.lineTo(toX(x2),toY(y2));
        ctx.strokeStyle=s.color+'88';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);
      }
    }

    s.points.forEach(p=>{
      ctx.beginPath();ctx.arc(toX(p.x),toY(p.y),dotSize,0,Math.PI*2);
      ctx.fillStyle=s.color;ctx.fill();
      ctx.strokeStyle='white';ctx.lineWidth=1;ctx.stroke();
    });
  });

  const ly=42;
  ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
  let lx=padding.left;
  parsedSeries.forEach((s,i)=>{
    ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(lx+6,ly,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#475569';ctx.fillText(s.name,lx+16,ly);
    lx+=80;
  });
}

function exportPNG(){
  const canvas=document.getElementById('scatterCanvas');
  const link=document.createElement('a');
  link.download='scatter-plot.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

initSeries();drawScatter();
</script>
