<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🎂 Enter Birthday</h2><div class="row"><div class="field"><label>Your birthday</label><input type="date" id="birthDate"></div></div><div class="btn-row"><button class="btn btn-primary" id="startBtn">🎂 Start Countdown</button></div></div><div class="result-section show" id="countdownSection"><h2>🎂 Time Until Next Birthday</h2><div class="countdown-display" id="countdownDisplay"><span id="days">0</span>d <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span></div><div style="text-align:center;margin-top:8px"><span id="ageInfo" class="zodiac-badge"></span> <span id="zodiacInfo" class="zodiac-badge"></span></div></div>';
document.getElementById('usageContent').innerHTML='<p>Enter your birth date and click "Start Countdown" to see the real-time countdown to your next birthday.</p><p>Also displays your current age and zodiac sign. Perfect for personal reminders and social media sharing.</p>';

var timer=null;
document.getElementById('startBtn').addEventListener('click',function(){
  var val=document.getElementById('birthDate').value;
  if(!val){showToast('Please select your birthday');return;}
  var parts=val.split('-');
  var month=parseInt(parts[1]),day=parseInt(parts[2]);
  var birthYear=parseInt(parts[0]);
  if(timer) clearInterval(timer);
  updateCountdown(month,day,birthYear);
  timer=setInterval(function(){updateCountdown(month,day,birthYear);},1000);
});

function updateCountdown(month,day,birthYear){
  var now=new Date();
  var year=now.getFullYear();
  var next=new Date(year,month-1,day);
  if(next<=now) next=new Date(year+1,month-1,day);
  var diff=next-now;
  var days=Math.floor(diff/(86400000));
  var hours=Math.floor((diff%(86400000))/(3600000));
  var minutes=Math.floor((diff%(3600000))/(60000));
  var seconds=Math.floor((diff%(60000))/1000);
  document.getElementById('days').textContent=days;
  document.getElementById('hours').textContent=('0'+hours).slice(-2);
  document.getElementById('minutes').textContent=('0'+minutes).slice(-2);
  document.getElementById('seconds').textContent=('0'+seconds).slice(-2);
  var age=year-birthYear;
  if(next.getTime()>now.getTime()&&next.getFullYear()>year) age++;
  document.getElementById('ageInfo').textContent='🎂 '+age+' years old';
  var zodiac=getZodiac(month,day);
  document.getElementById('zodiacInfo').textContent=zodiac;
}

function getZodiac(m,d){
  var signs=[{name:'♑ Capricorn',start:'12-22',end:'01-19'},{name:'♒ Aquarius',start:'01-20',end:'02-18'},{name:'♓ Pisces',start:'02-19',end:'03-20'},{name:'♈ Aries',start:'03-21',end:'04-19'},{name:'♉ Taurus',start:'04-20',end:'05-20'},{name:'♊ Gemini',start:'05-21',end:'06-20'},{name:'♋ Cancer',start:'06-21',end:'07-22'},{name:'♌ Leo',start:'07-23',end:'08-22'},{name:'♍ Virgo',start:'08-23',end:'09-22'},{name:'♎ Libra',start:'09-23',end:'10-22'},{name:'♏ Scorpio',start:'10-23',end:'11-21'},{name:'♐ Sagittarius',start:'11-22',end:'12-21'}];
  var md=(m<10?'0':'')+m+'-'+(d<10?'0':'')+d;
  for(var i=0;i<signs.length;i++){
    var s=signs[i];
    if(s.start<=s.end){
      if(md>=s.start&&md<=s.end) return s.name;
    }else{
      if(md>=s.start||md<=s.end) return s.name;
    }
  }
  return '';
}
})();
