<script>
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function parseCurl(cmd){
  cmd=cmd.replace(/\n/g," ").replace(/\\\s*\n/g," ");
  var method="GET",url="",headers={},data=null;
  var m=cmd.match(/-X\s+(\w+)/i);if(m)method=m[1].toUpperCase();
  m=cmd.match(/curl\s+(?:-[^\s]+\s+)*['"]?(https?:\/\/[^\s'"]+)/i);if(m)url=m[1];
  var hRe=/-H\s+['"]([^'"]+)['"]/g;while((m=hRe.exec(cmd))!==null){var parts=m[1].split(":");headers[parts[0].trim()]=parts.slice(1).join(":").trim()}
  m=cmd.match(/-d\s+'([^']+)'/);if(m)data=m[1];
  if(!m)m=cmd.match(/-d\s+"([^"]+)"/);if(m)data=m[1];
  if(!m)m=cmd.match(/--data\s+'([^']+)'/);if(m)data=m[1];
  if(!url)m=cmd.match(/['"]?(https?:\/\/[^\s'"]+)/);if(m)url=m[1];
  return{method:method,url:url||"https://example.com",headers:headers,data:data};
}
function convert(){
  var cmd=document.getElementById("input").value.trim();
  if(!cmd){showToast("请输入cURL命令");return}
  if(!cmd.match(/curl/i)){showToast("请输入有效的cURL命令（以curl开头）");return}
  var parsed=parseCurl(cmd);
  var lang=document.getElementById("lang").value;
  var code="";
  try{
    switch(lang){
      case "python":
        code='import requests\n\nurl = "'+parsed.url+'"\nheaders = '+JSON.stringify(parsed.headers,null,2).replace(/"/g,"'")+'\n';
        if(parsed.data)code+='data = \''+parsed.data+'\'\n';
        if(parsed.method==="GET")code+='\nresponse = requests.get(url, headers=headers)';
        else code+='\nresponse = requests.'+parsed.method.toLowerCase()+'(url, headers=headers'+(parsed.data?', data=data':'')+')';
        code+='\nprint(response.status_code)\nprint(response.json())';
        break;
      case "javascript":
        var fetchOpts={method:parsed.method,headers:parsed.headers};
        if(parsed.data)fetchOpts.body=parsed.data;
        code='fetch("'+parsed.url+'", '+JSON.stringify(fetchOpts,null,2)+')\n  .then(response => response.json())\n  .then(data => console.log(data))\n  .catch(error => console.error("Error:", error));';
        break;
      case "go":
        code='package main\n\nimport (\n\t"fmt"\n\t"io"\n\t"net/http"\n\t"strings"\n)\n\nfunc main() {\n\turl := "'+parsed.url+'"\n';
        if(parsed.data)code+='\tpayload := strings.NewReader(`'+parsed.data+'`)\n\treq, _ := http.NewRequest("'+parsed.method+'", url, payload)\n';
        else code+='\treq, _ := http.NewRequest("'+parsed.method+'", url, nil)\n';
        for(var k in parsed.headers)code+='\treq.Header.Set("'+k+'", "'+parsed.headers[k]+'")\n';
        code+='\n\tclient := &http.Client{}\n\tresp, err := client.Do(req)\n\tif err != nil { panic(err) }\n\tdefer resp.Body.Close()\n\tbody, _ := io.ReadAll(resp.Body)\n\tfmt.Println(string(body))\n}';
        break;
      case "java":
        code='import java.net.HttpURLConnection;\nimport java.net.URL;\nimport java.io.*;\n\nURL url = new URL("'+parsed.url+'");\nHttpURLConnection conn = (HttpURLConnection) url.openConnection();\nconn.setRequestMethod("'+parsed.method+'");\n';
        for(var k in parsed.headers)code+='conn.setRequestProperty("'+k+'", "'+parsed.headers[k]+'");\n';
        if(parsed.data)code+='conn.setDoOutput(true);\ntry(OutputStream os = conn.getOutputStream()) {\n    os.write("'+parsed.data+'".getBytes());\n}\n';
        code+='\nint responseCode = conn.getResponseCode();\nBufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));\nString line, response = "";\nwhile ((line = br.readLine()) != null) response += line;\nbr.close();\nconn.disconnect();';
        break;
      case "php":
        code='$ch = curl_init();\ncurl_setopt($ch, CURLOPT_URL, "'+parsed.url+'");\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, "'+parsed.method+'");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\n$headers = [\n';
        for(var k in parsed.headers)code+='    "'+k+': '+parsed.headers[k]+'",\n';
        code+='];\ncurl_setopt($ch, CURLOPT_HTTPHEADER, $headers);\n';
        if(parsed.data)code+='curl_setopt($ch, CURLOPT_POSTFIELDS, \''+parsed.data+'\');\n';
        code+='$response = curl_exec($ch);\ncurl_close($ch);\necho $response;';
        break;
    }
    document.getElementById("output").textContent=code;
  }catch(e){
    document.getElementById("output").textContent="转换失败: "+e.message;
  }
}
function copyCode(){
  var t=document.getElementById("output").textContent;
  if(!t||t.indexOf("点击")>=0){showToast("请先转换");return}
  navigator.clipboard.writeText(t).then(function(){showToast("已复制")}).catch(function(){showToast("复制失败")});
}
convert();
</script>
