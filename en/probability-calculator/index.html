<script>
(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🎲 Select Scenario</h2><div class="row"><div class="field"><label>Scenario</label><select id="scene"><option value="coin">Coin Flip</option><option value="dice">Dice Roll</option><option value="cards">Card Draw</option><option value="combo">Combination</option><option value="conditional">Conditional</option></select></div></div><div id="sceneInputs"></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">🎲 Calculate</button></div></div><div class="result-section" id="resultSection"><h2>📊 Probability Result</h2><div class="result-box" id="resultDisplay"></div></div>';
document.getElementById('usageContent').innerHTML='<p>Select a probability scenario, set parameters, and click "Calculate" to get event probability.</p><p>Supports coin flips, dice rolls, card draws, combinations, and conditional probability. Results in fraction, decimal, and percentage.</p>';

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t;}return a;}
function fraction(num,den){
  if(num===0) return '0';
  if(den===0) return '∞';
  var g=gcd(num,den);
  num/=g;den/=g;
  if(den===1) return num.toString();
  return num+'/'+den;
}

function showSceneInputs(scene){
  var html='';
  if(scene==='coin'){
    html='<div class="row"><div class="field"><label>Number of flips</label><input type="number" id="coinTosses" value="1" min="1" max="100"></div><div class="field"><label>Expected heads</label><input type="number" id="coinHeads" value="1" min="0"></div></div><p style="color:#64748b;font-size:.8rem">Probability of getting exactly k heads in n flips</p>';
  }else if(scene==='dice'){
    html='<div class="row"><div class="field"><label>Dice sides</label><select id="diceSides"><option value="6">6-sided</option><option value="10">10-sided</option><option value="20">20-sided</option><option value="100">100-sided</option></select></div><div class="field"><label>Target number</label><input type="number" id="diceValue" value="6" min="1"></div></div><p style="color:#64748b;font-size:.8rem">Probability of rolling a specific number</p>';
  }else if(scene==='cards'){
    html='<div class="row"><div class="field"><label>Cards drawn</label><input type="number" id="cardDraw" value="1" min="1" max="52"></div><div class="field"><label>Target suit</label><select id="cardSuit"><option value="spade">Spade</option><option value="heart">Heart</option><option value="diamond">Diamond</option><option value="club">Club</option></select></div></div><p style="color:#64748b;font-size:.8rem">Probability of drawing from a specific suit (without replacement)</p>';
  }else if(scene==='combo'){
    html='<div class="row"><div class="field"><label>Total (n)</label><input type="number" id="comboN" value="10" min="1"></div><div class="field"><label>Choose (k)</label><input type="number" id="comboK" value="3" min="0"></div><div class="field"><label>Event ways</label><input type="number" id="comboEvent" value="1" min="1"></div></div><p style="color:#64748b;font-size:.8rem">P = Event ways / C(n,k)</p>';
  }else if(scene==='conditional'){
    html='<div class="row"><div class="field"><label>P(A∩B) both</label><input type="number" id="condAB" value="0.3" min="0" max="1" step="0.01"></div><div class="field"><label>P(B) event B</label><input type="number" id="condB" value="0.5" min="0" max="1" step="0.01"></div></div><p style="color:#64748b;font-size:.8rem">P(A|B) = P(A∩B) / P(B)</p>';
  }
  document.getElementById('sceneInputs').innerHTML=html;
}

document.getElementById('scene').addEventListener('change',function(){
  showSceneInputs(this.value);
});
showSceneInputs('coin');

document.getElementById('calcBtn').addEventListener('click',function(){
  var scene=document.getElementById('scene').value;
  var result='';
  try{
    if(scene==='coin'){
      var n=parseInt(document.getElementById('coinTosses').value);
      var k=parseInt(document.getElementById('coinHeads').value);
      if(k>n){result='<p style="color:#f87171">Heads cannot exceed flips</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var comb=1;
      for(var i=1;i<=k;i++) comb=comb*(n-k+i)/i;
      var prob=comb*Math.pow(0.5,n);
      var total=Math.pow(2,n);
      result='<table class="data"><tr><th>Parameter</th><th>Value</th></tr>';
      result+='<tr><td>Flips</td><td>'+n+'</td></tr>';
      result+='<tr><td>Heads</td><td>'+k+'</td></tr>';
      result+='<tr><td>Total outcomes</td><td>2<sup>'+n+'</sup> = '+total+'</td></tr>';
      result+='<tr><td>Favorable outcomes</td><td>C('+n+','+k+') = '+comb+'</td></tr>';
      result+='<tr><td>Probability (fraction)</td><td>'+fraction(comb,total)+'</td></tr>';
      result+='<tr><td>Probability (decimal)</td><td>'+prob.toFixed(6)+'</td></tr>';
      result+='<tr><td>Probability (percent)</td><td>'+(prob*100).toFixed(2)+'%</td></tr></table>';
    }else if(scene==='dice'){
      var sides=parseInt(document.getElementById('diceSides').value);
      var val=parseInt(document.getElementById('diceValue').value);
      if(val<1||val>sides){result='<p style="color:#f87171">Value must be between 1 and '+sides+'</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      result='<table class="data"><tr><th>Parameter</th><th>Value</th></tr>';
      result+='<tr><td>Sides</td><td>'+sides+'</td></tr>';
      result+='<tr><td>Target</td><td>'+val+'</td></tr>';
      result+='<tr><td>Probability (fraction)</td><td>1/'+sides+'</td></tr>';
      result+='<tr><td>Probability (decimal)</td><td>'+(1/sides).toFixed(6)+'</td></tr>';
      result+='<tr><td>Probability (percent)</td><td>'+(100/sides).toFixed(2)+'%</td></tr></table>';
    }else if(scene==='cards'){
      var draw=parseInt(document.getElementById('cardDraw').value);
      var suit=document.getElementById('cardSuit').value;
      var suitNames={'spade':'Spade','heart':'Heart','diamond':'Diamond','club':'Club'};
      if(draw>52){result='<p style="color:#f87171">Max 52 cards</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var prob=1;
      for(var i=0;i<draw;i++){prob*=(13-i)/(52-i);}
      var pct=prob*100;
      result='<table class="data"><tr><th>Parameter</th><th>Value</th></tr>';
      result+='<tr><td>Cards drawn</td><td>'+draw+'</td></tr>';
      result+='<tr><td>Target suit</td><td>'+suitNames[suit]+'</td></tr>';
      result+='<tr><td>Probability (fraction)</td><td>'+fraction(Math.round(prob*1000000),1000000)+'</td></tr>';
      result+='<tr><td>Probability (decimal)</td><td>'+prob.toFixed(6)+'</td></tr>';
      result+='<tr><td>Probability (percent)</td><td>'+pct.toFixed(2)+'%</td></tr>';
      result+='<tr><td>Odds (1 : )</td><td>1 : '+(prob>0?((1-prob)/prob).toFixed(2):'∞')+'</td></tr></table>';
    }else if(scene==='combo'){
      var n=parseInt(document.getElementById('comboN').value);
      var k=parseInt(document.getElementById('comboK').value);
      var eventWays=parseInt(document.getElementById('comboEvent').value);
      if(k>n){result='<p style="color:#f87171">k cannot exceed n</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var comb=1;
      for(var i=1;i<=k;i++) comb=comb*(n-k+i)/i;
      var prob=eventWays/comb;
      result='<table class="data"><tr><th>Parameter</th><th>Value</th></tr>';
      result+='<tr><td>Total n</td><td>'+n+'</td></tr>';
      result+='<tr><td>Choose k</td><td>'+k+'</td></tr>';
      result+='<tr><td>Total combinations C(n,k)</td><td>'+comb+'</td></tr>';
      result+='<tr><td>Favorable ways</td><td>'+eventWays+'</td></tr>';
      result+='<tr><td>Probability (fraction)</td><td>'+fraction(eventWays,comb)+'</td></tr>';
      result+='<tr><td>Probability (decimal)</td><td>'+prob.toFixed(6)+'</td></tr>';
      result+='<tr><td>Probability (percent)</td><td>'+(prob*100).toFixed(2)+'%</td></tr></table>';
    }else if(scene==='conditional'){
      var pAB=parseFloat(document.getElementById('condAB').value);
      var pB=parseFloat(document.getElementById('condB').value);
      if(pB<=0){result='<p style="color:#f87171">P(B) must be > 0</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      if(pAB>pB){result='<p style="color:#f87171">P(A∩B) cannot exceed P(B)</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var pAgivenB=pAB/pB;
      result='<table class="data"><tr><th>Parameter</th><th>Value</th></tr>';
      result+='<tr><td>P(A∩B)</td><td>'+pAB+'</td></tr>';
      result+='<tr><td>P(B)</td><td>'+pB+'</td></tr>';
      result+='<tr><td>P(A|B)</td><td>'+pAgivenB.toFixed(4)+'</td></tr>';
      result+='<tr><td>P(A|B) percent</td><td>'+(pAgivenB*100).toFixed(2)+'%</td></tr></table>';
    }
    document.getElementById('resultDisplay').innerHTML=result;
    document.getElementById('resultSection').classList.add('show');
  }catch(e){
    document.getElementById('resultDisplay').innerHTML='<p style="color:#f87171">Error: '+e.message+'</p>';
    document.getElementById('resultSection').classList.add('show');
  }
});
})();
