<body>
<div class="container">
  <a href="../" class="back-link">← Back to Home</a>
  <div class="lang-bar">
    <a href="../text-to-handwriting/">CN</a>
    <a href="." class="active">EN</a>
  </div>
  <h1>✍️ Text to Handwriting</h1>
  <p class="subtitle">Convert typed text into realistic handwritten-style images. Supports Chinese and English, customizable paper and ink styles. Download as PNG.</p>

  <div class="card">
    <h2>Enter Text</h2>
    <div class="form-group">
      <textarea id="textInput" placeholder="Type or paste your text here..." maxlength="1000">Hello! Welcome to the Text to Handwriting generator. This is a demo of the handwriting effect. The quick brown fox jumps over the lazy dog. Have a wonderful day!</textarea>
      <div class="char-count"><span id="charCount">158</span>/1000 characters</div>
    </div>

    <h2>Ink Settings</h2>
    <div class="controls">
      <div class="control-item">
        <label>Paper Style</label>
        <select id="paperStyle">
          <option value="lined">Lined Paper</option>
          <option value="grid">Grid Paper</option>
          <option value="blank" selected>Blank Paper</option>
        </select>
      </div>
      <div class="control-item">
        <label>Ink Color</label>
        <input type="color" id="inkColor" value="#1a1a2e">
      </div>
      <div class="control-item">
        <label>Font Size</label>
        <input type="range" id="fontSize" min="14" max="40" value="24">
        <span class="range-value" id="fontSizeVal">24px</span>
      </div>
      <div class="control-item">
        <label>Line Height</label>
        <input type="range" id="lineHeight" min="1.0" max="2.5" step="0.1" value="1.6">
        <span class="range-value" id="lineHeightVal">1.6</span>
      </div>
      <div class="control-item">
        <label>Tilt Angle</label>
        <input type="range" id="skewAngle" min="-15" max="15" value="2">
        <span class="range-value" id="skewAngleVal">2°</span>
      </div>
      <div class="control-item">
        <label>Writing Pressure</label>
        <input type="range" id="pressure" min="0.5" max="2.0" step="0.1" value="1.0">
        <span class="range-value" id="pressureVal">1.0</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn">✍️ Generate</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>⬇️ Download PNG</button>
    </div>
  </div>

  <div class="card result-area" id="resultArea" style="display:none">
    <h2>Preview</h2>
    <div class="preview-info" id="previewInfo"></div>
    <canvas id="handwritingCanvas"></canvas>
    <div class="result-actions">
      <button class="btn btn-success" id="downloadBtn2" disabled>⬇️ Download PNG Image</button>
    </div>
  </div>
</div>

<script>
(function(){
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const paperStyle = document.getElementById('paperStyle');
  const inkColor = document.getElementById('inkColor');
  const fontSize = document.getElementById('fontSize');
  const fontSizeVal = document.getElementById('fontSizeVal');
  const lineHeight = document.getElementById('lineHeight');
  const lineHeightVal = document.getElementById('lineHeightVal');
  const skewAngle = document.getElementById('skewAngle');
  const skewAngleVal = document.getElementById('skewAngleVal');
  const pressure = document.getElementById('pressure');
  const pressureVal = document.getElementById('pressureVal');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const downloadBtn2 = document.getElementById('downloadBtn2');
  const resultArea = document.getElementById('resultArea');
  const canvas = document.getElementById('handwritingCanvas');
  const previewInfo = document.getElementById('previewInfo');
  const ctx = canvas.getContext('2d');

  let generated = false;

  textInput.addEventListener('input', function(){
    const len = this.value.length;
    charCount.textContent = len;
    if(len > 1000) this.value = this.value.substring(0,1000);
  });

  fontSize.addEventListener('input', function(){ fontSizeVal.textContent = this.value + 'px'; });
  lineHeight.addEventListener('input', function(){ lineHeightVal.textContent = this.value; });
  skewAngle.addEventListener('input', function(){ skewAngleVal.textContent = this.value + '°'; });
  pressure.addEventListener('input', function(){ pressureVal.textContent = this.value; });

  function loadFont(){
    return new Promise((resolve) => {
      if(document.fonts && document.fonts.check('16px "Dancing Script"')){ resolve(); return; }
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&display=swap';
      link.onload = () => { document.fonts.ready.then(() => resolve()); };
      link.onerror = () => resolve();
      document.head.appendChild(link);
      setTimeout(resolve, 3000);
    });
  }

  function getLines(text, maxWidth, fontStr){
    const lines = [];
    const paragraphs = text.split('\n');
    for(const para of paragraphs){
      if(para === ''){ lines.push(''); continue; }
      const words = para.split(/(\s+)/);
      let currentLine = '';
      for(let i = 0; i < words.length; i++){
        const testLine = currentLine + words[i];
        ctx.font = fontStr;
        const w = ctx.measureText(testLine).width;
        if(w > maxWidth && currentLine !== ''){
          lines.push(currentLine.trimEnd());
          currentLine = words[i].trimStart();
        } else {
          currentLine = testLine;
        }
      }
      if(currentLine) lines.push(currentLine);
    }
    return lines;
  }

  function generateHandwriting(){
    const text = textInput.value.trim();
    if(!text){ alert('Please enter some text'); return; }

    const paper = paperStyle.value;
    const color = inkColor.value;
    const fSize = parseInt(fontSize.value);
    const lHeight = parseFloat(lineHeight.value);
    const skew = parseFloat(skewAngle.value);
    const press = parseFloat(pressure.value);

    const cw = 800;
    const margin = 40;
    const maxW = cw - margin * 2;
    const lineH = fSize * lHeight;

    // English handwriting fonts
    const fontStr = `${fSize}px "Dancing Script", "Caveat", "Comic Sans MS", "Brush Script MT", cursive`;

    const lines = getLines(text, maxW, fontStr);
    const totalH = Math.max(lineH * lines.length + margin * 2, 200);

    canvas.width = cw;
    canvas.height = totalH;

    // Background
    ctx.fillStyle = '#faf9f5';
    ctx.fillRect(0, 0, cw, totalH);

    // Paper style
    if(paper === 'lined'){
      ctx.strokeStyle = '#c4b998';
      ctx.lineWidth = 0.8;
      for(let i = 0; i < lines.length; i++){
        const y = margin + i * lineH;
        ctx.beginPath();
        ctx.moveTo(margin - 10, y + fSize * 0.85);
        ctx.lineTo(cw - margin + 10, y + fSize * 0.85);
        ctx.stroke();
      }
      ctx.strokeStyle = '#e8c4c4';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(margin - 5, margin);
      ctx.lineTo(margin - 5, totalH - margin);
      ctx.stroke();
    } else if(paper === 'grid'){
      ctx.strokeStyle = '#d4cfc4';
      ctx.lineWidth = 0.5;
      for(let i = 0; i < lines.length + 2; i++){
        const y = margin - fSize * 0.3 + i * lineH;
        ctx.beginPath();
        ctx.moveTo(margin, y);
        ctx.lineTo(cw - margin, y);
        ctx.stroke();
      }
      for(let x = margin; x <= cw - margin; x += fSize){
        ctx.beginPath();
        ctx.moveTo(x, margin - fSize * 0.3);
        ctx.lineTo(x, Math.max(totalH - margin, margin + lines.length * lineH + fSize * 0.3));
        ctx.stroke();
      }
    }

    // Handwriting effect
    ctx.font = fontStr;
    ctx.fillStyle = color;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';

    const baseAlpha = 0.85 + press * 0.15;

    for(let i = 0; i < lines.length; i++){
      const line = lines[i];
      if(!line) continue;

      let x = margin + (Math.random() - 0.5) * 4;
      const y = margin + i * lineH + fSize * 0.5 + (Math.random() - 0.5) * 2;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(skew * Math.PI / 180);

      for(let j = 0; j < line.length; j++){
        const ch = line[j];
        if(ch === ' '){ ctx.translate(fSize * 0.3, 0); continue; }

        const offsetX = (Math.random() - 0.5) * 1.5;
        const offsetY = (Math.random() - 0.5) * 2;
        const rot = (Math.random() - 0.5) * 0.03;
        const alpha = Math.max(0.6, baseAlpha - Math.random() * 0.2);

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.rotate(rot);
        ctx.globalAlpha = alpha;
        ctx.fillText(ch, 0, 0);
        ctx.restore();

        const charW = ctx.measureText(ch).width || fSize * 0.6;
        ctx.translate(charW + (Math.random() - 0.5) * 1.0, 0);
      }

      ctx.restore();
    }

    // Paper texture
    const imageData = ctx.getImageData(0, 0, cw, totalH);
    const data = imageData.data;
    for(let i = 0; i < data.length; i += 4){
      const noise = (Math.random() - 0.5) * 6;
      data[i] = Math.min(255, Math.max(0, data[i] + noise));
      data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
      data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
    }
    ctx.putImageData(imageData, 0, 0);

    resultArea.style.display = 'block';
    downloadBtn.disabled = false;
    downloadBtn2.disabled = false;
    generated = true;

    previewInfo.textContent = `${text.length} characters, ${lines.length} lines | Canvas ${cw}×${Math.round(totalH)}px`;
  }

  function downloadImage(){
    if(!generated) return;
    const link = document.createElement('a');
    link.download = `handwriting-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  generateBtn.addEventListener('click', generateHandwriting);
  downloadBtn.addEventListener('click', downloadImage);
  downloadBtn2.addEventListener('click', downloadImage);

  loadFont().then(() => {
    generateHandwriting();
  }).catch(() => {
    generateHandwriting();
  });
})();
</script>
</body>
