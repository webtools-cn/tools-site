<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}


(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>✏️ 文字设置</h2><div class="row"><div class="field"><label>文字内容</label><input type="text" id="textInput" value="描边文字"></div></div><div class="row"><div class="field"><label>字号 (px)</label><input type="number" id="fontSize" value="64" min="12" max="200"></div><div class="field"><label>字体颜色</label><input type="color" id="textColor" value="#ffffff"></div></div></div><div class="input-section"><h2>✏️ 描边设置 (text-stroke)</h2><div class="row"><div class="field"><label>描边宽度 (px)</label><input type="number" id="strokeWidth" value="2" min="0" max="20" step="0.5"></div><div class="field"><label>描边颜色</label><input type="color" id="strokeColor" value="#06b6d4"></div></div></div><div class="input-section"><h2>💡 发光设置 (text-shadow)</h2><div class="row"><div class="field"><label>X偏移 (px)</label><input type="number" id="shadowX" value="0"></div><div class="field"><label>Y偏移 (px)</label><input type="number" id="shadowY" value="0"></div></div><div class="row"><div class="field"><label>模糊半径 (px)</label><input type="number" id="shadowBlur" value="8" min="0" max="100"></div><div class="field"><label>发光颜色</label><input type="color" id="shadowColor" value="#22d3ee"></div></div><div class="options"><label><input type="checkbox" id="enableShadow" checked> 启用text-shadow发光</label></div></div><div class="result-section show" id="previewSection"><h2>👁️ 实时预览</h2><div id="previewBox" style="display:flex;justify-content:center;align-items:center;padding:40px;background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:12px;min-height:160px;overflow:hidden"></div></div><div class="result-section show" id="codeSection"><h2>📋 CSS代码</h2><div class="btn-row"><button class="btn btn-success" id="copyBtn">📋 复制CSS</button></div><div id="codeOutput" class="result-box"></div></div>';
document.getElementById('usageContent').innerHTML='<p>输入文字内容，调整字号和颜色。通过<strong>text-stroke</strong>添加描边效果，通过<strong>text-shadow</strong>添加发光效果。</p><p>实时预览文字样式变化，一键复制生成的CSS代码。适合制作标题、Logo文字和海报文案。</p>';

function render(){
  var text = document.getElementById('textInput').value || 'Text';
  var fontSize = parseInt(document.getElementById('fontSize').value) || 64;
  var textColor = document.getElementById('textColor').value;
  var strokeWidth = parseFloat(document.getElementById('strokeWidth').value) || 0;
  var strokeColor = document.getElementById('strokeColor').value;
  var shadowX = parseInt(document.getElementById('shadowX').value) || 0;
  var shadowY = parseInt(document.getElementById('shadowY').value) || 0;
  var shadowBlur = parseInt(document.getElementById('shadowBlur').value) || 0;
  var shadowColor = document.getElementById('shadowColor').value;
  var enableShadow = document.getElementById('enableShadow').checked;

  var preview = document.getElementById('previewBox');
  preview.innerHTML = '<div style="font-size:'+fontSize+'px;font-weight:800;color:'+textColor+';';
  var cssParts = [];
  if (strokeWidth > 0) {
    preview.children[0].style.webkitTextStroke = strokeWidth+'px '+strokeColor;
    preview.children[0].style.textStroke = strokeWidth+'px '+strokeColor;
    cssParts.push('-webkit-text-stroke: '+strokeWidth+'px '+strokeColor+';');
    cssParts.push('text-stroke: '+strokeWidth+'px '+strokeColor+';');
  }
  if (enableShadow && (shadowX !== 0 || shadowY !== 0 || shadowBlur > 0)) {
    preview.children[0].style.textShadow = shadowX+'px '+shadowY+'px '+shadowBlur+'px '+shadowColor;
    cssParts.push('text-shadow: '+shadowX+'px '+shadowY+'px '+shadowBlur+'px '+shadowColor+';');
  } else if (!enableShadow) {
    preview.children[0].style.textShadow = 'none';
  }
  preview.children[0].textContent = text;

  var code = '/* CSS Text Outline */\n.text-outline {\n  font-size: '+fontSize+'px;\n  font-weight: 800;\n  color: '+textColor+';\n';
  if (strokeWidth > 0) {
    code += '  -webkit-text-stroke: '+strokeWidth+'px '+strokeColor+';\n';
    code += '  text-stroke: '+strokeWidth+'px '+strokeColor+';\n';
  }
  if (enableShadow && (shadowX !== 0 || shadowY !== 0 || shadowBlur > 0)) {
    code += '  text-shadow: '+shadowX+'px '+shadowY+'px '+shadowBlur+'px '+shadowColor+';\n';
  }
  code += '}';
  document.getElementById('codeOutput').textContent = code;
}

var inputs = document.querySelectorAll('#textInput,#fontSize,#textColor,#strokeWidth,#strokeColor,#shadowX,#shadowY,#shadowBlur,#shadowColor,#enableShadow');
inputs.forEach(function(el){el.addEventListener('input',render);el.addEventListener('change',render);});
document.getElementById('copyBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(document.getElementById('codeOutput').textContent).then(function(){showToast('CSS代码已复制！');});
});
render();
})();

</script>
