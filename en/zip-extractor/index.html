<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let zipInstance = null;
let fileEntries = [];

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const resultArea = document.getElementById('resultArea');
const fileList = document.getElementById('fileList');
const statsArea = document.getElementById('statsArea');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processZip(file);
});
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) processZip(file);
});

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function getIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',svg:'🖼',webp:'🖼',pdf:'📄',doc:'📝',docx:'📝',txt:'📃',md:'📃',json:'📋',xml:'📋',html:'🌐',css:'🎨',js:'⚡',ts:'🔷',py:'🐍',zip:'📦',rar:'📦',gz:'📦',mp3:'🎵',mp4:'🎬',avi:'🎬',mov:'🎬'};
  return icons[ext] || '📄';
}

function getType(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ext.toUpperCase();
}

async function processZip(file) {
  if (!file.name.endsWith('.zip')) {
    alert('Please select a ZIP file');
    return;
  }
  try {
    const arrayBuffer = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(arrayBuffer);
    zipInstance = zip;
    fileEntries = [];
    
    zip.forEach((relativePath, zipEntry) => {
      if (!zipEntry.dir) {
        fileEntries.push({
          name: relativePath,
          size: zipEntry._data ? zipEntry._data.uncompressedSize || 0 : 0,
          compressedSize: zipEntry._data ? zipEntry._data.compressedSize || 0 : 0
        });
      }
    });

    let totalSize = 0;
    fileEntries.forEach(f => totalSize += f.size);
    
    statsArea.innerHTML = `
      <div class="stat-item">📦 <strong>${fileEntries.length}</strong> files</div>
      <div class="stat-item">💾 Total <strong>${formatSize(totalSize)}</strong></div>
      <div class="stat-item">📁 ${file.name}</div>
    `;

    renderFileList();
    uploadZone.style.display = 'none';
    resultArea.style.display = 'block';
  } catch (err) {
    alert('Extraction failed: ' + err.message);
    console.error(err);
  }
}

function renderFileList() {
  fileList.innerHTML = fileEntries.map((f, i) => `
    <div class="file-item">
      <input type="checkbox" id="cb${i}" checked>
      <span class="file-icon">${getIcon(f.name)}</span>
      <span class="file-name">${f.name}</span>
      <span class="file-type">${getType(f.name)}</span>
      <span class="file-size">${formatSize(f.size)}</span>
    </div>
  `).join('');
}

function selectAll() {
  document.querySelectorAll('.file-item input[type="checkbox"]').forEach(cb => cb.checked = true);
}

function deselectAll() {
  document.querySelectorAll('.file-item input[type="checkbox"]').forEach(cb => cb.checked = false);
}

async function downloadSelected() {
  const checkboxes = document.querySelectorAll('.file-item input[type="checkbox"]');
  const selected = [];
  checkboxes.forEach((cb, i) => {
    if (cb.checked) selected.push(i);
  });

  if (selected.length === 0) {
    alert('Please select at least one file');
    return;
  }

  if (selected.length === 1) {
    const idx = selected[0];
    const entry = fileEntries[idx];
    const blob = await zipInstance.file(entry.name).async('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = entry.name.split('/').pop();
    a.click();
    URL.revokeObjectURL(url);
  } else {
    const newZip = new JSZip();
    for (const idx of selected) {
      const entry = fileEntries[idx];
      const blob = await zipInstance.file(entry.name).async('blob');
      newZip.file(entry.name, blob);
    }
    const content = await newZip.generateAsync({type: 'blob'});
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'extracted.zip';
    a.click();
    URL.revokeObjectURL(url);
  }
}

function resetAll() {
  zipInstance = null;
  fileEntries = [];
  fileInput.value = '';
  resultArea.style.display = 'none';
  uploadZone.style.display = 'block';
}
</script>
<script>
(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) { hash = ((hash << 5) - hash) + path.charCodeAt(i); hash = hash & hash; }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
</script>

<script>
(function() {
  'use strict';
  var s = document.getElementById('related-tools-section');
  if (!s) return;
  var p = window.location.pathname;
  var en = p.indexOf('/en/') !== -1;
  p = p.replace(/\/en\//g, '/');
  var slug = p.split('/').filter(Boolean).pop() || '';
  if (!slug) { s.innerHTML = ''; return; }
  var depth = en ? '../../' : '../';
  var u = depth + 'related-tools.json';
  fetch(u).then(function(r) {
    if (!r.ok) throw new Error('not found');
    return r.json();
  }).then(function(d) {
    var data = en ? d.en : d.cn;
    var t = data[slug];
    if (!t || !t.related || !t.related.length) { s.innerHTML = ''; return; }
    var h = '<div class="related-tools-inner"><h3 class="related-tools-title">'
      + (en ? '🔗 You May Also Like' : '🔗 相关工具推荐')
      + '</h3><div class="related-tools-grid">';
    t.related.forEach(function(r) {
      var link = en ? '../../en/' + r.slug + '/' : '../' + r.slug + '/';
      h += '<a href="' + link + '" class="related-tool-card">'
        + '<span class="related-tool-icon">' + (r.icon || '🔧') + '</span>'
        + '<span class="related-tool-name">' + r.name + '</span></a>';
    });
    h += '</div></div>';
    s.innerHTML = h;
  }).catch(function() { s.innerHTML = ''; });
})();
</script>
