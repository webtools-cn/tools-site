<body>
<div class="container">
  <div class="header"><h1>📦 Shipping Cost Calculator</h1><div class="lang-switch"><a href="index.html" class="active">中文</a><a href="../../shipping-calculator/">中文</a></div></div>
  <div class="nav-back"><a href="../../index.html">&larr; Back to Home</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Enter package weight and shipping distance to estimate delivery costs.</p>
    <div id="packages">
      <div class="form-row pkg-item" data-idx="0">
        <div class="form-group"><label>Package 1</label></div>
        <div class="form-group"><label>Weight (kg)</label><input type="number" id="pkg_w_0" step="0.1" min="0" placeholder="e.g. 2"></div>
        <div class="form-group"><label>Distance</label><select id="pkg_d_0">
          <option value="near">Local (<50km)</option>
      <option value="mid">Regional (50-500km)</option>
      <option value="far">Cross-country (500-2000km)</option>
      <option value="xfar">Remote (>2000km)</option>
        </select></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="addPackage()">+ Add Package</button>
      <button class="btn btn-primary" onclick="calculate()">Calculate Shipping</button>
    </div>
    <div class="result-grid" style="margin-top:16px">
      <div class="result-item"><div class="label">Total Cost</div><div class="value highlight" id="resTotal">&mdash;</div></div>
      <div class="result-item"><div class="label">Packages</div><div class="value" id="resCount">&mdash;</div></div>
      <div class="result-item"><div class="label">Average Cost</div><div class="value" id="resAvg">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>FAQ</h2>

  </div>
  <div class="footer"><p>Shipping Cost Calculator - Pure client-side | Actual rates vary</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
var pkgIdx=1;
var LABEL_WEIGHT="Weight (kg)";
var LABEL_DIST="Distance";
var LABEL_PKG="Package";
var DIST_OPTS=[{value:"near",label:"Local (<50km)"},{value:"mid",label:"Regional (50-500km)"},{value:"far",label:"Cross-country (500-2000km)"},{value:"xfar",label:"Remote (>2000km)"}];
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function addPackage(){
  var div=document.createElement("div");div.className="form-row pkg-item";div.style.marginTop="8px";
  var selHtml="<select id=\"pkg_d_"+pkgIdx+"\">";
  for(var i=0;i<DIST_OPTS.length;i++){selHtml+="<option value=\"\"+DIST_OPTS[i].value+"\">\"+DIST_OPTS[i].label+"</option>";}
  selHtml+="</select>";
  var h="<div class=\"form-group\"><label>"+LABEL_PKG+" "+(pkgIdx+1)+"</label></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_WEIGHT+"</label><input type=\"number\" id=\"pkg_w_"+pkgIdx+"\" step=\"0.1\" min=\"0\" placeholder=\"e.g. 2\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_DIST+"</label>"+selHtml+"</div>";
  h+="<div style=\"display:flex;align-items:flex-end;margin-bottom:14px\"><button class=\"btn btn-secondary\" onclick=\"this.parentElement.parentElement.remove()\" style=\"padding:8px 12px\">\u2715</button></div>";
  div.innerHTML=h;document.getElementById("packages").appendChild(div);pkgIdx++;
}
function getRate(dist){var r={near:[8,2],mid:[10,3],far:[12,5],xfar:[15,7]};return r[dist]||[10,3];}
function calculate(){
  var items=document.querySelectorAll(".pkg-item");var totalCost=0,count=0;
  for(var i=0;i<items.length;i++){
    var idx=items[i].querySelector("select").id.split("_")[2];
    var w=parseFloat(document.getElementById("pkg_w_"+idx).value);
    var dist=document.getElementById("pkg_d_"+idx).value;
    if(isNaN(w)||w<=0)continue;count++;
    var rate=getRate(dist);var cost=rate[0];if(w>1)cost+=Math.ceil(w-1)*rate[1];totalCost+=cost;
  }
  if(count===0){toast("Add at least one package");return}
  document.getElementById("resTotal").textContent=totalCost.toFixed(2);
  document.getElementById("resCount").textContent=count;
  document.getElementById("resAvg").textContent=(totalCost/count).toFixed(2);
}
</script>
