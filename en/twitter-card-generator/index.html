<script>
(function(){
const typeSelect = document.getElementById('tcType');
const tcTitle = document.getElementById('tcTitle');
const tcDesc = document.getElementById('tcDesc');
const tcSite = document.getElementById('tcSite');
const tcCreator = document.getElementById('tcCreator');
const tcImage = document.getElementById('tcImage');
const tcUrl = document.getElementById('tcUrl');
const preview = document.getElementById('tcPreview');
const codeOutput = document.getElementById('tcCode');
const copyBtn = document.getElementById('copyTcBtn');

function generateCard() {
  const type = typeSelect.value;
  const title = tcTitle.value || 'Untitled';
  const desc = tcDesc.value || '';
  const site = tcSite.value || '@website';
  const creator = tcCreator.value;
  const image = tcImage.value;
  const url = tcUrl.value || 'https://example.com';
  
  let tags = '';
  let html = '';
  
  if (type === 'summary_large_image') {
    tags = `<!-- Twitter Card (Large Image) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${title}">
<meta name="twitter:description" content="${desc}">
<meta name="twitter:image" content="${image}">
<meta name="twitter:url" content="${url}">
<meta name="twitter:site" content="${site}">
${creator ? '<meta name="twitter:creator" content="' + creator + '">' : ''}`;
    
    html = '<div style="border:1px solid rgba(148,163,184,.2);border-radius:12px;overflow:hidden;max-width:500px;background:#1e293b">';
    html += '<div style="height:200px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem">🖼️</div>';
    html += '<div style="padding:12px">';
    html += '<div style="color:#94a3b8;font-size:.7rem;margin-bottom:4px">' + url + '</div>';
    html += '<div style="color:#f1f5f9;font-weight:600;font-size:.95rem;margin-bottom:4px">' + title + '</div>';
    html += '<div style="color:#94a3b8;font-size:.8rem">' + desc + '</div>';
    html += '</div></div>';
    
  } else if (type === 'summary') {
    tags = `<!-- Twitter Card (Summary) -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="${title}">
<meta name="twitter:description" content="${desc}">
<meta name="twitter:image" content="${image}">
<meta name="twitter:url" content="${url}">
<meta name="twitter:site" content="${site}">
${creator ? '<meta name="twitter:creator" content="' + creator + '">' : ''}`;
    
    html = '<div style="border:1px solid rgba(148,163,184,.2);border-radius:12px;overflow:hidden;max-width:500px;background:#1e293b;display:flex">';
    html += '<div style="width:120px;height:120px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;flex-shrink:0">🖼️</div>';
    html += '<div style="padding:12px;flex:1">';
    html += '<div style="color:#94a3b8;font-size:.7rem;margin-bottom:4px">' + url + '</div>';
    html += '<div style="color:#f1f5f9;font-weight:600;font-size:.9rem;margin-bottom:4px">' + title + '</div>';
    html += '<div style="color:#94a3b8;font-size:.8rem;max-height:40px;overflow:hidden">' + desc + '</div>';
    html += '</div></div>';
    
  } else if (type === 'app') {
    tags = `<!-- Twitter Card (App) -->
<meta name="twitter:card" content="app">
<meta name="twitter:title" content="${title}">
<meta name="twitter:description" content="${desc}">
<meta name="twitter:url" content="${url}">
<meta name="twitter:site" content="${site}">
<meta name="twitter:app:name:iphone" content="${title}">
<meta name="twitter:app:id:iphone" content="">
<meta name="twitter:app:url:iphone" content="${url}">
<meta name="twitter:app:name:googleplay" content="${title}">
<meta name="twitter:app:id:googleplay" content="">
<meta name="twitter:app:url:googleplay" content="${url}">
${creator ? '<meta name="twitter:creator" content="' + creator + '">' : ''}`;
    
    html = '<div style="border:1px solid rgba(148,163,184,.2);border-radius:12px;overflow:hidden;max-width:500px;background:#1e293b">';
    html += '<div style="padding:16px;text-align:center">';
    html += '<div style="font-size:3rem;margin-bottom:8px">📱</div>';
    html += '<div style="color:#f1f5f9;font-weight:600;font-size:1.1rem">' + title + '</div>';
    html += '<div style="color:#94a3b8;font-size:.85rem;margin-top:4px">' + desc + '</div>';
    html += '<div style="margin-top:12px"><span style="display:inline-block;padding:6px 20px;background:rgba(6,182,212,.2);color:#22d3ee;border-radius:6px;font-size:.85rem">📲 View App</span></div>';
    html += '</div></div>';
  }
  
  preview.innerHTML = html;
  codeOutput.textContent = tags;
}

[typeSelect, tcTitle, tcDesc, tcSite, tcCreator, tcImage, tcUrl].forEach(el => {
  el.addEventListener('input', generateCard);
  el.addEventListener('change', generateCard);
});

copyBtn.addEventListener('click', function() {
  navigator.clipboard.writeText(codeOutput.textContent).then(function() {
    copyBtn.textContent = 'Copied!';
    setTimeout(function() { copyBtn.textContent = 'Copy HTML'; }, 1500);
  });
});

generateCard();
})();
</script>
