<body>
<div class="container">
  <div class="header"><h1>📈 Investment Calculator</h1><div class="lang-switch"><a href="index.html" class="active">中文</a><a href="../../investment-calculator/">中文</a></div></div>
  <div class="nav-back"><a href="../../index.html">&larr; Back to Home</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Calculate compound investment growth. Enter initial amount, monthly contribution, expected annual return.</p>
    <div class="form-row">
      <div class="form-group"><label>Initial Amount</label><input type="number" id="initial" step="any" min="0" placeholder="e.g. 10000"></div>
      <div class="form-group"><label>Monthly Contribution</label><input type="number" id="monthly" step="any" min="0" placeholder="e.g. 1000"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Annual Return (%)</label><input type="number" id="annualRate" step="0.1" min="0" placeholder="e.g. 10"></div>
      <div class="form-group"><label>Investment Period</label><select id="years">
        <option value="1">1 years</option><option value="3">3 years</option><option value="5">5 years</option>
        <option value="10" selected>10 years</option><option value="15">15 years</option>
        <option value="20">20 years</option><option value="30">30 years</option>
      </select></div>
    </div>
    <div class="btn-group"><button class="btn btn-primary" onclick="calculate()">Calculate Returns</button></div>
    <div class="result-grid" style="margin-top:16px">
      <div class="result-item"><div class="label">Total Invested</div><div class="value" id="resInvested">&mdash;</div></div>
      <div class="result-item"><div class="label">Final Value</div><div class="value highlight" id="resFinal">&mdash;</div></div>
      <div class="result-item"><div class="label">Total Return</div><div class="value" id="resReturn">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>FAQ</h2>

  </div>
  <div class="footer"><p>Investment Calculator - Pure client-side | Compound interest</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function calculate(){
  var initial=parseFloat(document.getElementById("initial").value);
  var monthly=parseFloat(document.getElementById("monthly").value);
  var rate=parseFloat(document.getElementById("annualRate").value);
  var years=parseInt(document.getElementById("years").value);
  if(isNaN(initial)||initial<0||isNaN(monthly)||monthly<0||isNaN(rate)||rate<0||isNaN(years)||years<=0){toast("Enter valid numbers");return}
  var n=years*12;var r=rate/100/12;
  var lsFinal=initial*Math.pow(1+r,n);
  var sipFinal=r>0?monthly*(Math.pow(1+r,n)-1)/r:monthly*n;
  var total=lsFinal+sipFinal;
  var totalInvested=initial+monthly*n;
  document.getElementById("resInvested").textContent=totalInvested.toFixed(2);
  document.getElementById("resFinal").textContent=total.toFixed(2);
  document.getElementById("resReturn").textContent=(total-totalInvested).toFixed(2);
}
</script>
