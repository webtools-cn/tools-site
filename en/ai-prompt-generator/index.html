<div class="container">

    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Select AI model and prompt type, fill in key details, and get a structured high-quality prompt. Supports multiple AI platforms.</p>
    <div class="form-row">
      <div class="form-group"><label>AI Model</label>
        <select id="aiModel"><option value="chatgpt">ChatGPT</option><option value="midjourney">Midjourney</option><option value="dalle">DALL-E 3</option><option value="sd">Stable Diffusion</option></select>
      </div>
      <div class="form-group"><label>Prompt Type</label>
        <select id="promptType"><option value="general">General Chat</option><option value="writing">Writing</option><option value="code">Programming</option><option value="image">Image Generation</option><option value="business">Business</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full"><label>Subject/Description</label><input type="text" id="subject" placeholder="e.g. Write a business email, draw a cyberpunk cat..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Style/Tone</label><input type="text" id="style" placeholder="e.g. Professional, humorous, minimalist..."></div>
      <div class="form-group"><label>Target Audience</label><input type="text" id="audience" placeholder="e.g. beginners, experts, children..."></div>
    </div>
    <div class="form-row">

    </div>

      <button class="btn btn-primary" onclick="generate()">Generate Prompt</button>
    </div>

<div class="toast" id="toast"></div>
<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function generate(){
  var model=document.getElementById("aiModel").value;
  var type=document.getElementById("promptType").value;
  var sub=document.getElementById("subject").value.trim();
  var style=document.getElementById("style").value.trim();
  var aud=document.getElementById("audience").value.trim();
  var det=document.getElementById("detail").value.trim();
  if(!sub){toast("Please enter a subject or description");return}
  var prompt="";
  if(model==="midjourney"||model==="dalle"||model==="sd"){
    prompt="/imagine prompt: "+sub;
    if(style) prompt+=", "+style;
    if(det) prompt+=", "+det;
    if(model==="midjourney") prompt+=" --ar 16:9 --v 6";
    if(model==="sd") prompt+=", detailed, high quality, 8k";
  }else{
    prompt="You are an expert assistant. ";
    if(aud) prompt+="Target audience: "+aud+". ";
    if(style) prompt+="Style: "+style+". ";
    prompt+="Task: "+sub+". ";
    if(det) prompt+="Requirements: "+det+".";
  }
  document.getElementById("resultPrompt").textContent=prompt;
  document.getElementById("resultArea").style.display="block";
}
function copyResult(){
  var text=document.getElementById("resultPrompt").textContent;
  navigator.clipboard.writeText(text).then(function(){toast("Copied!")})
}
</script>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">Submit</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ 感谢反馈！已Submit到GitHub Issues</div>
</div>

<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){alert('Please enter your feedback');return;}
const typeLabel={feedback:'💡 Feature Request',bug:'🐛 Bug Report',other:'💬 Other'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
