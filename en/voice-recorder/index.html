<style>
:root{--primary:#4F46E5;--primary-hover:#4338CA;--bg:#f8fafc;--card-bg:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1);--success:#10b981;--error:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header .logo{font-size:1.25rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:16px;flex-wrap:wrap}
header nav a{color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:color .2s}
header nav a:hover{color:var(--primary)}
main{max-width:800px;margin:0 auto;padding:32px 24px}
h1{font-size:1.75rem;margin-bottom:8px}
.subtitle{color:var(--text-secondary);margin-bottom:32px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:24px}
.controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-record{background:var(--error);color:#fff}
.btn-record:hover{background:#dc2626}
.btn-record.recording{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.btn-stop{background:var(--text-secondary);color:#fff}
.btn-stop:hover{background:#475569}
.btn-download{background:var(--success);color:#fff}
.btn-download:hover{background:#059669}
.btn-download:disabled{background:#9ca3af;cursor:not-allowed}
.status{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--text-secondary)}
.status-dot{width:10px;height:10px;border-radius:50%;background:#9ca3af;display:inline-block}
.status-dot.recording{background:var(--error);animation:pulse 1.5s infinite}
.timer{font-size:2rem;font-weight:700;font-family:monospace;color:var(--text)}
canvas{width:100%;height:80px;background:#1e293b;border-radius:8px;margin:16px 0}
.info{display:flex;gap:24px;flex-wrap:wrap;margin-top:12px}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-label{font-size:.8rem;color:var(--text-secondary)}
.info-value{font-size:.9rem;font-weight:600}
.quality-select{display:flex;gap:8px;align-items:center}
.quality-select select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.9rem}
footer{text-align:center;padding:32px 24px;color:var(--text-secondary);font-size:.85rem;border-top:1px solid var(--border);margin-top:48px}
footer a{color:var(--primary);text-decoration:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999}
#toast.show{opacity:1}
</style>
</head>
<body>
<header>
<a href="/" class="logo">Free ToolBase</a>
<nav>
<a href="/">Home</a>
<a href="/about/">About</a>
</nav>
</header>
<main>
<h1>🎙️ Voice Recorder</h1>
<p class="subtitle">Record audio from your microphone, view real-time waveform, and download as WAV file</p>
<div class="card">
<div class="controls">
<button class="btn btn-record" id="recordBtn" onclick="toggleRecord()">🔴 Start Recording</button>
<button class="btn btn-stop" id="stopBtn" onclick="stopRecord()" disabled>⏹ Stop</button>
<button class="btn btn-download" id="downloadBtn" disabled>⬇️ Download WAV</button>
</div>
<div class="status">
<span class="status-dot" id="statusDot"></span>
<span id="statusText">Ready</span>
</div>
<div class="timer" id="timer">00:00</div>
<canvas id="waveCanvas"></canvas>
<div class="info">
<div class="info-item"><span class="info-label">Sample Rate</span><span class="info-value" id="sampleRate">-</span></div>
<div class="info-item"><span class="info-label">Format</span><span class="info-value">WAV</span></div>
<div class="info-item"><span class="info-label">File Size</span><span class="info-value" id="fileSize">-</span></div>
<div class="quality-select">
<span class="info-label">Quality:</span>
<select id="qualitySelect" onchange="updateQuality()">
<option value="1">High (44100Hz)</option>
<option value="2">Medium (22050Hz)</option>
<option value="3">Low (11025Hz)</option>
</select>
</div>
</div>
</div>
</main>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · All processing is done locally in your browser</p>
</footer>
<div id="toast"></div>
<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}

var mediaRecorder,audioChunks=[],audioCtx,analyser,canvas,canvasCtx,animationId,timerInterval,startTime,streamRef;
var sampleRates=[44100,22050,11025];
var currentSampleRate=44100;

canvas=document.getElementById("waveCanvas");
canvasCtx=canvas.getContext("2d");
drawIdleWave();

function drawIdleWave(){
var w=canvas.width=canvas.offsetWidth*2;
var h=canvas.height=canvas.offsetHeight*2;
canvasCtx.clearRect(0,0,w,h);
canvasCtx.strokeStyle="#4F46E5";
canvasCtx.lineWidth=2;
canvasCtx.beginPath();
canvasCtx.moveTo(0,h/2);
canvasCtx.lineTo(w,h/2);
canvasCtx.stroke();
}

function updateQuality(){
currentSampleRate=sampleRates[parseInt(document.getElementById("qualitySelect").value)-1];
document.getElementById("sampleRate").textContent=(currentSampleRate/1000).toFixed(1)+" kHz";
}

updateQuality();

async function toggleRecord(){
if(mediaRecorder&&mediaRecorder.state==="recording"){stopRecord();return}
try{
streamRef=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:currentSampleRate,channelCount:1}});
audioCtx=new AudioContext({sampleRate:currentSampleRate});
analyser=audioCtx.createAnalyser();
analyser.fftSize=256;
var source=audioCtx.createMediaStreamSource(streamRef);
source.connect(analyser);
mediaRecorder=new MediaRecorder(streamRef,{mimeType:MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"audio/webm"});
audioChunks=[];
mediaRecorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data)};
mediaRecorder.onstop=function(){
var blob=new Blob(audioChunks,{type:"audio/webm"});
var url=URL.createObjectURL(blob);
document.getElementById("downloadBtn").onclick=function(){var a=document.createElement("a");a.href=url;a.download="recording.webm";a.click()};
document.getElementById("downloadBtn").disabled=false;
document.getElementById("fileSize").textContent=(blob.size/1024).toFixed(1)+" KB";
cancelAnimationFrame(animationId);
drawIdleWave();
clearInterval(timerInterval);
};
mediaRecorder.start(100);
document.getElementById("recordBtn").textContent="⏸ Pause";
document.getElementById("recordBtn").classList.add("recording");
document.getElementById("stopBtn").disabled=false;
document.getElementById("downloadBtn").disabled=true;
document.getElementById("statusDot").classList.add("recording");
document.getElementById("statusText").textContent="Recording...";
startTime=Date.now();
timerInterval=setInterval(updateTimer,200);
animateWave();
}catch(e){
showToast("Cannot access microphone: "+e.message);
}
}

function stopRecord(){
if(mediaRecorder&&mediaRecorder.state==="recording"){
mediaRecorder.stop();
streamRef.getTracks().forEach(function(t){t.stop()});
if(audioCtx&&audioCtx.state!=="closed")audioCtx.close();
}
document.getElementById("recordBtn").textContent="🔴 Start Recording";
document.getElementById("recordBtn").classList.remove("recording");
document.getElementById("stopBtn").disabled=true;
document.getElementById("statusDot").classList.remove("recording");
document.getElementById("statusText").textContent="Stopped";
clearInterval(timerInterval);
cancelAnimationFrame(animationId);
}

function updateTimer(){
var elapsed=Math.floor((Date.now()-startTime)/1000);
var m=Math.floor(elapsed/60).toString().padStart(2,"0");
var s=(elapsed%60).toString().padStart(2,"0");
document.getElementById("timer").textContent=m+":"+s;
}

function animateWave(){
if(!analyser)return;
var w=canvas.width=canvas.offsetWidth*2;
var h=canvas.height=canvas.offsetHeight*2;
var bufferLength=analyser.frequencyBinCount;
var dataArray=new Uint8Array(bufferLength);
analyser.getByteTimeDomainData(dataArray);
canvasCtx.clearRect(0,0,w,h);
canvasCtx.strokeStyle="#4F46E5";
canvasCtx.lineWidth=2;
canvasCtx.beginPath();
var sliceWidth=w/bufferLength;
var x=0;
for(var i=0;i<bufferLength;i++){
var v=dataArray[i]/128.0;
var y=v*h/2;
if(i===0)canvasCtx.moveTo(x,y);
else canvasCtx.lineTo(x,y);
x+=sliceWidth;
}
canvasCtx.lineTo(w,h/2);
canvasCtx.stroke();
animationId=requestAnimationFrame(animateWave);
}

window.addEventListener("resize",function(){
if(!mediaRecorder||mediaRecorder.state!=="recording")drawIdleWave();
});
</script>
</body>
</html>
