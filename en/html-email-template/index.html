<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function generate(){
  var title=document.getElementById("emailTitle").value.trim();
  if(!title){toast("Please enter email title");return}
  var heading=document.getElementById("emailHeading").value.trim()||title;
  var content=document.getElementById("emailContent").value.trim();
  var btnText=document.getElementById("emailBtnText").value.trim();
  var btnUrl=document.getElementById("emailBtnUrl").value.trim();
  var company=document.getElementById("emailCompany").value.trim()||"Company";
  var footer=document.getElementById("emailFooter").value.trim();
  var type=document.getElementById("emailType").value;
  var bgColor="#f4f4f4",headBg="#1e293b",btnBg="#06b6d4",headColor="#ffffff";
  if(type==="welcome"){headBg="#10b981"}else if(type==="promotion"){headBg="#f59e0b"}else if(type==="notification"){headBg="#3b82f6"}
  var html="<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\" \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\">\n";
  html+="<html xmlns=\"http://www.w3.org/1999/xhtml\"><head><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\">\n";
  html+="<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n";
  html+="<title>"+escapeHtml(title)+"</title>\n";
  html+="<style>body{margin:0;padding:0;background-color:"+bgColor+";font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,sans-serif}.container{max-width:600px;margin:0 auto;padding:20px 10px}.header{background:"+headBg+";color:"+headColor+";padding:30px 20px;text-align:center;border-radius:8px 8px 0 0}.header h1{margin:0;font-size:24px;font-weight:600}.body{padding:20px;background:#ffffff;border-radius:0 0 8px 8px}.body p{color:#333;font-size:15px;line-height:1.6;margin:0 0 16px}.btn{display:inline-block;padding:12px 28px;background:"+btnBg+";color:#fff !important;text-decoration:none;border-radius:6px;font-weight:600;font-size:15px}.footer{text-align:center;padding:20px;color:#999;font-size:12px}.footer a{color:#999;text-decoration:underline}</style></head><body>\n";
  html+="<div class=\"container\">\n";
  html+="  <div class=\"header\"><h1>"+escapeHtml(heading)+"</h1></div>\n";
  html+="  <div class=\"body\">\n";
  if(content) html+="    <p>"+escapeHtml(content).replace(/\n/g,"</p><p>")+"</p>\n";
  if(btnText&&btnUrl) html+="    <div style=\"text-align:center;margin:24px 0\"><a class=\"btn\" href=\""+escapeHtml(btnUrl)+"\">"+escapeHtml(btnText)+"</a></div>\n";
  html+="  </div>\n";
  html+="  <div class=\"footer\">\n";
  if(footer) html+=escapeHtml(footer)+"<br>\n";
  html+="    &copy; "+escapeHtml(company)+"</div>\n";
  html+="</div></body></html>";
  document.getElementById("resultEmail").textContent=html;
  document.getElementById("resultArea").style.display="block";
}
function copyResult(){
  var text=document.getElementById("resultEmail").textContent;
  navigator.clipboard.writeText(text).then(function(){toast("Copied!")})
}
</script>
