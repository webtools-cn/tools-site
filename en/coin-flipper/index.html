<script>
var totalHeads=0,totalTails=0;
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function flipCoin(){
  var count=parseInt(document.getElementById("count").value);
  var coin=document.getElementById("coin");
  var resultText=document.getElementById("resultText");
  var history=document.getElementById("history");
  coin.classList.add("flipping");
  history.innerHTML="";
  var heads=0,tails=0;
  for(var i=0;i<count;i++){
    var isHeads=Math.random()<0.5;
    if(isHeads)heads++;else tails++;
    var span=document.createElement("span");
    span.className=isHeads?"h-heads":"h-tails";
    span.textContent=isHeads?"H":"T";
    history.appendChild(span);
  }
  setTimeout(function(){
    coin.classList.remove("flipping");
    var lastIsHeads=heads>=tails;
    coin.className="coin "+(lastIsHeads?"heads":"tails");
    coin.textContent=lastIsHeads?"H":"T";
    resultText.textContent=count===1?(lastIsHeads?"正面!":"反面!"):("抛"+count+"次: "+heads+"正面, "+tails+"反面");
    totalHeads+=heads;totalTails+=tails;
    document.getElementById("headsCount").textContent=totalHeads;
    document.getElementById("tailsCount").textContent=totalTails;
    document.getElementById("totalCount").textContent=totalHeads+totalTails;
  },600);
}
function resetStats(){totalHeads=0;totalTails=0;document.getElementById("headsCount").textContent="0";document.getElementById("tailsCount").textContent="0";document.getElementById("totalCount").textContent="0";document.getElementById("history").innerHTML="";document.getElementById("coin").className="coin";document.getElementById("coin").textContent="🪙";document.getElementById("resultText").textContent="已重置";}
</script>

<script>
(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) { hash = ((hash << 5) - hash) + path.charCodeAt(i); hash = hash & hash; }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
</script>

      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
</script>

<div class="related-tools-section" id="related-tools-section"><div class="related-tools-loading">Loading related tools...</div></div>
<script>
(function() {
  'use strict';
  var s = document.getElementById('related-tools-section');
  if (!s) return;
  var p = window.location.pathname;
  var en = p.indexOf('/en/') !== -1;
  p = p.replace(/\/en\//g, '/');
  var slug = p.split('/').filter(Boolean).pop() || '';
  if (!slug) { s.innerHTML = ''; return; }
  var depth = en ? '../../' : '../';
  var u = depth + 'related-tools.json';
  fetch(u).then(function(r) {
    if (!r.ok) throw new Error('not found');
    return r.json();
  }).then(function(d) {
    var data = en ? d.en : d.cn;
    var t = data[slug];
    if (!t || !t.related || !t.related.length) { s.innerHTML = ''; return; }
    var h = '<div class="related-tools-inner"><h3 class="related-tools-title">'
      + (en ? '🔗 You May Also Like' : '🔗 相关工具推荐')
      + '</h3><div class="related-tools-grid">';
    t.related.forEach(function(r) {
      var link = en ? '../../en/' + r.slug + '/' : '../' + r.slug + '/';
      h += '<a href="' + link + '" class="related-tool-card">'
        + '<span class="related-tool-icon">' + (r.icon || '🔧') + '</span>'
        + '<span class="related-tool-name">' + r.name + '</span></a>';
    });
    h += '</div></div>';
    s.innerHTML = h;
  }).catch(function() { s.innerHTML = ''; });
})();
</script>
