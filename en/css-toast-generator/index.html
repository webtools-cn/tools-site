(function(){

var c=colors[type];var enterAnim='';if(enter==='slide'){if(pos.includes('right'))enterAnim='@keyframes toastEnter { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }';else if(pos.includes('left'))enterAnim='@keyframes toastEnter { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }';else enterAnim='@keyframes toastEnter { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }';}
else if(enter==='fade')enterAnim='@keyframes toastEnter { from { opacity: 0; } to { opacity: 1; } }';else if(enter==='bounce')enterAnim='@keyframes toastEnter { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }';
var exitAnim='@keyframes toastExit { to { opacity: 0; transform: translateY(-20px); } }';
var posCSS='';if(pos==='top-right')posCSS='top: 20px; right: 20px;';else if(pos==='top-left')posCSS='top: 20px; left: 20px;';else if(pos==='bottom-right')posCSS='bottom: 20px; right: 20px;';else if(pos==='bottom-left')posCSS='bottom: 20px; left: 20px;';else if(pos==='top-center')posCSS='top: 20px; left: 50%; transform: translateX(-50%);';

var html='<div class="toast-container">\n  <div class="toast">\n    <span class="toast-icon">'+c.icon+'</span>\n    <span>'+message+'</span>\n    <button class="toast-close">&times;</button>\n  </div>\n</div>';
