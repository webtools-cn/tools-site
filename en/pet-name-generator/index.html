document.getElementById('genBtn').addEventListener('click',function(){
  var type=document.getElementById('petType').value;
  var style=document.getElementById('petStyle').value;
  var count=parseInt(document.getElementById('petCount').value);
  var pool=PET_NAMES[type]&&PET_NAMES[type][style]?PET_NAMES[type][style]:PET_NAMES.dog.cute;
  var grid=document.getElementById('nameGrid');
  grid.innerHTML='';
  var shuffled=[].concat(pool);
  for(var i=shuffled.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=shuffled[i];shuffled[i]=shuffled[j];shuffled[j]=tmp;
  }
  var selected=shuffled.slice(0,Math.min(count,shuffled.length));
  selected.forEach(function(n){
    var card=document.createElement('div');
    card.className='name-card';
    card.innerHTML='<div class="name-text">'+n+'</div><div class="name-desc">Click to copy</div>';
    card.addEventListener('click',function(){
      navigator.clipboard.writeText(this.querySelector('.name-text').textContent).then(function(){
        card.querySelector('.name-desc').textContent='✅ Copied!';
        setTimeout(function(){card.querySelector('.name-desc').textContent='Click to copy';},1500);
      });
    });
    grid.appendChild(card);
  });
  document.getElementById('resultSection').classList.add('show');
});

document.getElementById('copyAllBtn').addEventListener('click',function(){
  var texts=[].map.call(document.querySelectorAll('.name-card .name-text'),function(el){return el.textContent;});
  navigator.clipboard.writeText(texts.join('\\n')).then(function(){
    document.getElementById('copyAllBtn').textContent='✅ Copied All!';
    setTimeout(function(){document.getElementById('copyAllBtn').textContent='📋 Copy All';},2000);
  });
});
})();
