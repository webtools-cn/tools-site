  <div class="tool-section"><h2>❓ 常见问题</h2>
    <div class="faq-item"><h3>什么是HTTP请求头？</h3><p>HTTP请求头是客户端发送给服务器的元数据，包含认证信息（Authorization）、内容类型（Content-Type）、浏览器标识（User-Agent）、Cookie等。服务器根据这些信息处理请求。</p></div>
    <div class="faq-item"><h3>如何获取HTTP请求头？</h3><p>从浏览器DevTools（F12→Network→Headers→Request Headers）、curl命令（-v参数）、API调试工具（Postman）中复制原始请求头文本，粘贴到本工具即可解析。</p></div>
    <div class="faq-item"><h3>常见的请求头有哪些？</h3><p>Authorization（认证令牌）、Content-Type（内容类型）、User-Agent（浏览器标识）、Accept（接受的响应类型）、Cookie（会话信息）、Host（目标主机）、Referer（来源页面）等。</p></div>

<div id="toast" class="toast"></div>
<script>
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function parseHeaders(){
  var input=document.getElementById("input").value.trim();
  if(!input){showToast("请输入HTTP请求头");return}
  var lines=input.split("\n"),requestLine="",headers=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    if(i===0&&line.match(/^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS|CONNECT|TRACE)\s/)){
      requestLine=line;continue;
    }
    var idx=line.indexOf(":");
    if(idx>0){headers.push({key:line.substring(0,idx).trim(),value:line.substring(idx+1).trim()})}
  }
  var html="";
  if(requestLine)html+='<div class="request-line">📨 '+requestLine+'</div>';
  if(headers.length===0){html+='<div style="color:#f87171;text-align:center;padding:20px">⚠️ 未找到有效的HTTP头字段</div>'}
  else{
    html+='<table class="result-table"><thead><tr><th>头字段</th><th>值</th></tr></thead><tbody>';
    headers.forEach(function(h){
      var desc="";
      switch(h.key.toLowerCase()){
        case "host":desc="目标主机";break;
        case "authorization":desc="认证令牌";break;
        case "content-type":desc="请求体类型";break;
        case "user-agent":desc="客户端标识";break;
        case "accept":desc="接受类型";break;
        case "cookie":desc="会话Cookie";break;
        case "referer":desc="来源页面";break;
        case "content-length":desc="请求体长度";break;
        case "origin":desc="请求来源";break;
        case "cache-control":desc="缓存控制";break;
      }
      html+='<tr><td><strong>'+h.key+'</strong>'+(desc?'<div style="color:#64748b;font-size:.75rem">'+desc+'</div>':'')+'</td><td>'+h.value+'</td></tr>';
    });
    html+='</tbody></table>';
    html+='<div style="color:#64748b;font-size:.8rem;margin-top:8px">解析到 '+headers.length+' 个头字段</div>';
  }
  document.getElementById("result").innerHTML=html;
}
function loadExample(){parseHeaders()}
function clearAll(){document.getElementById("input").value="";document.getElementById("result").innerHTML="";showToast("已清空")}
parseHeaders();
</script>
