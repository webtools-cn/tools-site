    <h2>HTML Validation Knowledge</h2>
    <h3>Why Validate HTML Code?</h3>
    <p>Browsers have powerful error-recovery capabilities and will try to render even malformed HTML. However, this forgiveness comes at a cost: different browsers may handle errors differently, leading to inconsistent page behavior across environments. Additionally, invalid HTML can negatively impact search engine crawling, screen reader parsing (accessibility), and the proper functioning of CSS and JavaScript.</p>

    <h3>Common HTML Error Types</h3>
    <ul>
      <li><strong>Unclosed tags</strong>: e.g., <code>&lt;div&gt;</code> missing its matching <code>&lt;/div&gt;</code></li>
      <li><strong>Invalid nesting</strong>: e.g., <code>&lt;b&gt;&lt;i&gt;text&lt;/b&gt;&lt;/i&gt;</code> (crossed nesting)</li>
      <li><strong>Missing attribute quotes</strong>: e.g., <code>&lt;div class=box&gt;</code> should be <code>&lt;div class="box"&gt;</code></li>
      <li><strong>Incorrect self-closing syntax</strong>: e.g., <code>&lt;br&gt;&lt;/br&gt;</code> should be <code>&lt;br&gt;</code> or <code>&lt;br /&gt;</code></li>
      <li><strong>Illegal child elements</strong>: e.g., <code>&lt;ul&gt;</code> can only contain <code>&lt;li&gt;</code> as direct children</li>
    </ul>

    <section class="info-section">

      <p>This HTML code validator is simple yet powerful. Here is the detailed usage guide:</p>
      <p><strong>Validate Code:</strong> Paste or type the HTML code you want to validate into the input box, then click the "Validate" button. The tool will analyze the code structure in real time, checking tag closure, nesting relationships, and attribute syntax. The validation result will show the overall status (Pass / Warning / Fail) and list all discovered issues with their specific locations.</p>
      <p><strong>Format Code:</strong> Click the "Format Code" button to automatically reformat your HTML with standard indentation. The formatted code will appear in the result area, ready to copy and use. The formatting handles tag alignment, attribute wrapping, and empty line cleanup, making the code much more readable.</p>
      <p><strong>Load Example:</strong> If you are unsure how to start, click the "Load Example" button to insert a sample HTML snippet containing several common errors. Validate this example first to observe how the tool detects and reports issues, then try validating your own code.</p>
    </section>

    <section class="info-section">
      <h2>Use Cases</h2>
      <p>The HTML code validator has broad applications in front-end development workflows:</p>
      <p><strong>Development Debugging:</strong> Validate code structure at any time while writing HTML templates or components. This is especially valuable when using frameworks like Vue or React, where complex nesting logic can easily produce tag closure errors. Use this tool to quickly catch structural problems before committing code.</p>
      <p><strong>Code Review:</strong> In team collaboration, lead developers can use this tool to batch-check HTML code submitted by team members, ensuring consistent code quality standards. Integrating validation into your CI/CD pipeline can automatically block builds that contain structural errors.</p>
      <p><strong>Learning and Teaching:</strong> For HTML beginners, this tool is an excellent learning aid. By intentionally writing incorrect code and observing the validation results, learners can intuitively understand HTML syntax rules and browser error-recovery behavior. Teachers can also use this tool in class to demonstrate common mistakes and their impact.</p>
    </section>

    <section class="info-section">
      <h2>Extended Knowledge</h2>
      <p><strong>HTML Parsing Error Recovery:</strong> When parsing HTML, browsers follow the error-recovery rules defined in the HTML5 specification. For example, an unclosed <code>&lt;p&gt;</code> tag is automatically closed when the next block-level element is encountered; a missing <code>&lt;tbody&gt;</code> inside a table is implicitly inserted. While browsers try their best to fix errors, this implicit behavior may vary slightly across browsers, so explicitly writing correct structure is the best practice.</p>
      <p><strong>Accessibility and Semantics:</strong> Validating HTML structure not only affects rendering consistency but also directly impacts web accessibility. Screen readers rely on correct HTML structure to understand page content hierarchy. For example, <code>&lt;button&gt;</code> is more accessible than <code>&lt;div onclick&gt;</code> because it carries built-in keyboard interaction and focus management semantics.</p>
      <p><strong>Related Standards:</strong> Beyond HTML structure validation, front-end development also involves CSS syntax validation (CSS Validator), JavaScript linting (ESLint), and overall code style consistency (Prettier). Using these tools together establishes a complete front-end code quality assurance system.</p>
    </section>

<script>
var htmlInput = document.getElementById('htmlInput');
var resultSection = document.getElementById('resultSection');
var statusBadge = document.getElementById('statusBadge');
var resultStats = document.getElementById('resultStats');
var errorList = document.getElementById('errorList');
var formattedOutput = document.getElementById('formattedOutput');
var codeOutput = document.getElementById('codeOutput');
var inputStats = document.getElementById('inputStats');
var toast = document.getElementById('toast');

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

function updateInputStats() {
  var text = htmlInput.value;
  var lines = text.length ? text.split('\n').length : 0;
  inputStats.innerHTML = '<span>Chars: ' + text.length + '</span><span>Lines: ' + lines + '</span>';
}

var voidTags = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
var html5Tags = new Set(['a','abbr','address','area','article','aside','audio','b','base','bdi','bdo','blockquote','body','br','button','canvas','caption','cite','code','col','colgroup','data','datalist','dd','del','details','dfn','dialog','div','dl','dt','em','embed','fieldset','figcaption','figure','footer','form','h1','h2','h3','h4','h5','h6','head','header','hgroup','hr','html','i','iframe','img','input','ins','kbd','label','legend','li','link','main','map','mark','math','menu','meta','meter','nav','noscript','object','ol','optgroup','option','output','p','param','picture','pre','progress','q','rp','rt','ruby','s','samp','script','search','section','select','slot','small','source','span','strong','style','sub','summary','sup','svg','table','tbody','td','template','textarea','tfoot','th','thead','time','title','tr','track','u','ul','var','video','wbr']);

function validateHtml() {
  var html = htmlInput.value.trim();
  if (!html) { showToast('Please enter HTML code'); return; }

  var errors = [];
  var warnings = [];

  // Check DOCTYPE
  if (!/<!DOCTYPE\s+html/i.test(html)) {
    warnings.push({line: 1, msg: 'Missing DOCTYPE declaration', hint: 'Add <!DOCTYPE html> at the beginning'});
  }

  // Parse tags
  var tagRegex = /<\/?([a-zA-Z][a-zA-Z0-9-]*)[^>]*?\/?>/g;
  var stack = [];
  var match;
  var lineNum = 1;

  while ((match = tagRegex.exec(html)) !== null) {
    var fullTag = match[0];
    var tagName = match[1].toLowerCase();
    var startPos = match.index;

    // Calculate line number
    lineNum = 1;
    for (var i = 0; i < startPos; i++) {
      if (html[i] === '\n') lineNum++;
    }

    var isClosing = fullTag[1] === '/';
    var isSelfClosing = fullTag[fullTag.length - 2] === '/' || voidTags.has(tagName);

    if (!html5Tags.has(tagName)) {
      warnings.push({line: lineNum, msg: 'Unknown tag: <' + tagName + '>', hint: 'Please verify the tag name spelling'});
      continue;
    }

    if (isClosing) {
      var found = false;
      for (var si = stack.length - 1; si >= 0; si--) {
        if (stack[si].name === tagName) {
          for (var j = stack.length - 1; j > si; j--) {
            errors.push({line: stack[j].line, msg: 'Tag not properly closed: <' + stack[j].name + '> (opened at line ' + stack[j].line + ')', hint: 'Missing </' + stack[j].name + '> before </' + tagName + '>'});
          }
          stack.length = si;
          found = true;
          break;
        }
      }
      if (!found) {
        errors.push({line: lineNum, msg: 'Extra closing tag: </' + tagName + '>', hint: 'No matching opening tag <' + tagName + '>'});
      }
    } else if (!isSelfClosing) {
      stack.push({name: tagName, line: lineNum});
    }

    // Check attribute quotes
    var attrRegex = /\s([a-zA-Z-:]+)=(?!"|')([^\s>]*)/g;
    var attrMatch;
    while ((attrMatch = attrRegex.exec(fullTag)) !== null) {
      warnings.push({line: lineNum, msg: 'Missing quotes on attribute: ' + attrMatch[1] + '=' + attrMatch[2], hint: 'Use ' + attrMatch[1] + '="' + attrMatch[2] + '"'});
    }
  }

  // Unclosed tags
  for (var ui = 0; ui < stack.length; ui++) {
    errors.push({line: stack[ui].line, msg: 'Unclosed tag: <' + stack[ui].name + '>', hint: 'Missing </' + stack[ui].name + '> at end of document'});
  }

  // Display results
  resultSection.style.display = 'block';
  var totalIssues = errors.length + warnings.length;

  if (totalIssues === 0) {
    statusBadge.innerHTML = '<span class="status-badge status-pass">✅ Validation Passed - No issues found</span>';
  } else if (errors.length === 0) {
    statusBadge.innerHTML = '<span class="status-badge status-warn">⚠️ ' + warnings.length + ' warning(s) found</span>';
  } else {
    statusBadge.innerHTML = '<span class="status-badge status-fail">❌ ' + errors.length + ' error(s), ' + warnings.length + ' warning(s)</span>';
  }

  resultStats.innerHTML = '<span>Errors: ' + errors.length + '</span><span>Warnings: ' + warnings.length + '</span><span>Total Lines: ' + html.split('\n').length + '</span>';

  var errorHtml = '';
  for (var ei = 0; ei < errors.length; ei++) {
    var e = errors[ei];
    errorHtml += '<div class="error-item"><span class="error-line">Line ' + e.line + '</span><div><div class="error-msg">❌ ' + e.msg + '</div><div class="error-hint">💡 ' + e.hint + '</div></div></div>';
  }
  for (var wi = 0; wi < warnings.length; wi++) {
    var w = warnings[wi];
    errorHtml += '<div class="error-item warn"><span class="error-line">Line ' + w.line + '</span><div><div class="error-msg">⚠️ ' + w.msg + '</div><div class="error-hint">💡 ' + w.hint + '</div></div></div>';
  }

  if (totalIssues === 0) {
    errorHtml = '<p style="color:#4ade80;font-size:.9rem">🎉 Congratulations! Your HTML code structure is perfect - no issues found.</p>';
  }
  errorList.innerHTML = errorHtml;
  formattedOutput.style.display = 'none';

  resultSection.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function formatHtml() {
  var html = htmlInput.value.trim();
  if (!html) { showToast('Please enter HTML code'); return; }

  var formatted = '';
  var indent = 0;
  var indentSize = 2;
  var tokens = html.split(/(<[^>]+>)/g);
  for (var ti = 0; ti < tokens.length; ti++) {
    var token = tokens[ti].trim();
    if (!token) continue;

    if (token[0] === '<') {
      var fc = token[1] === '/';
      var sc = token[token.length - 2] === '/' || voidTags.has(token.replace(/[<\/>]/g, '').split(' ')[0].toLowerCase());
      var tn = token.replace(/[<\/>]/g, '').split(' ')[0].toLowerCase();

      if (fc) {
        indent = Math.max(0, indent - indentSize);
        formatted += ' '.repeat(indent) + token + '\n';
      } else if (sc) {
        formatted += ' '.repeat(indent) + token + '\n';
      } else {
        formatted += ' '.repeat(indent) + token + '\n';
        if (!['html','head','body'].includes(tn)) {
          indent += indentSize;
        }
      }
    } else {
      var lines = token.split(/\s+/).filter(function(s) { return s; });
      if (lines.length > 0) {
        formatted += ' '.repeat(indent) + lines.join(' ') + '\n';
      }
    }
  }

  resultSection.style.display = 'block';
  statusBadge.innerHTML = '<span class="status-badge status-pass">✨ Formatting Complete</span>';
  resultStats.innerHTML = '<span>Original Lines: ' + html.split('\n').length + '</span><span>Formatted Lines: ' + formatted.split('\n').length + '</span>';
  errorList.innerHTML = '';
  codeOutput.textContent = formatted;
  formattedOutput.style.display = 'block';
  resultSection.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function copyFormatted() {
  var text = codeOutput.textContent;
  if (!text) { showToast('Nothing to copy'); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('Copied to clipboard'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  }
}

function loadExample() {
  var example = '<!DOCTYPE html>\n<html>\n<head>\n  <title>Example Page</title>\n</head>\n<body>\n  <div class=container>\n    <div>Title</div>\n    <p>Paragraph content</p>\n    <ul>\n      <li>Item 1\n      <li>Item 2</li>\n    </ul>\n    <img src=test.png>\n  </div>\n</body>\n</html>';
  htmlInput.value = example;
  updateInputStats();
  showToast('Example loaded');
}

function clearAll() {
  htmlInput.value = '';
  resultSection.style.display = 'none';
  inputStats.innerHTML = '';
  formattedOutput.style.display = 'none';
}

htmlInput.addEventListener('input', updateInputStats);
</script>
