<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Text Shadow Generator - Free ToolBase</title>
<meta name="description" content="Visual CSS text-shadow generator. Adjust shadow offset, blur, color in real-time with multi-layer support. Copy CSS code instantly.">
<meta property="og:title" content="CSS Text Shadow Generator - Free ToolBase">
<meta property="og:description" content="Visual CSS text-shadow generator with real-time preview and multi-layer shadow support.">
<meta property="og:type" content="website">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "CSS Text Shadow Generator",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Web",
  "description": "Visual CSS text-shadow generator. Adjust shadow offset, blur, color in real-time with multi-layer support. Copy CSS code instantly."
}
</script>
<style>
:root{--primary:#4F46E5;--primary-hover:#4338CA;--bg:#f8fafc;--card-bg:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1);--success:#10b981}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header .logo{font-size:1.25rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:16px;flex-wrap:wrap}
header nav a{color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:color .2s}
header nav a:hover{color:var(--primary)}
main{max-width:1100px;margin:0 auto;padding:32px 24px}
h1{font-size:1.75rem;margin-bottom:8px}
.subtitle{color:var(--text-secondary);margin-bottom:32px}
.layout{display:grid;grid-template-columns:360px 1fr;gap:24px}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.card h2{font-size:1.1rem;margin-bottom:16px;color:var(--primary)}
.form-group{margin-bottom:14px}
.form-group label{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text-secondary)}
.form-group label span{font-weight:400;color:var(--primary)}
.form-group input[type="range"]{width:100%;accent-color:var(--primary)}
.form-group input[type="color"]{width:40px;height:32px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px}
.form-group input[type="text"]{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--bg)}
.form-group input[type="text"]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.preview-box{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--radius);padding:48px 24px;text-align:center;min-height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.preview-text{font-size:3rem;font-weight:900;color:#fff;transition:text-shadow .1s}
.code-box{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;font-family:monospace;font-size:.85rem;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.code-box code{flex:1;white-space:pre-wrap;word-break:break-all}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#cbd5e1}
.btn-sm{padding:6px 12px;font-size:.8rem}
.actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.preset-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg);cursor:pointer;font-size:.8rem;transition:all .2s}
.preset-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.layers-list{margin-top:16px}
.layer-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;font-size:.8rem;font-family:monospace}
.layer-item .remove-layer{cursor:pointer;color:var(--text-secondary);font-size:1.1rem;padding:0 4px}
.layer-item .remove-layer:hover{color:#ef4444}
footer{text-align:center;padding:32px 24px;color:var(--text-secondary);font-size:.85rem;border-top:1px solid var(--border);margin-top:48px}
footer a{color:var(--primary);text-decoration:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999}
#toast.show{opacity:1}
</style>
</head>
<body>
<header>
<a href="/" class="logo">Free ToolBase</a>
<nav>
<a href="/en/">Home</a>
<a href="/en/about/">About</a>
</nav>
</header>
<main>
<h1>💫 CSS Text Shadow Generator</h1>
<p class="subtitle">Visually adjust text-shadow parameters with multi-layer support. Copy CSS code instantly.</p>
<div class="layout">
<div class="card">
<h2>🎨 Shadow Parameters</h2>
<div class="presets">
<button class="preset-btn" data-preset="simple">Simple Shadow</button>
<button class="preset-btn" data-preset="neon">Neon</button>
<button class="preset-btn" data-preset="3d">3D Effect</button>
<button class="preset-btn" data-preset="glow">Glow</button>
<button class="preset-btn" data-preset="outline">Outline</button>
<button class="preset-btn" data-preset="double">Double</button>
</div>
<div class="form-group">
<label>Offset X <span id="xVal">0px</span></label>
<input type="range" id="offsetX" min="-30" max="30" value="2" step="1">
</div>
<div class="form-group">
<label>Offset Y <span id="yVal">2px</span></label>
<input type="range" id="offsetY" min="-30" max="30" value="2" step="1">
</div>
<div class="form-group">
<label>Blur Radius <span id="blurVal">4px</span></label>
<input type="range" id="blur" min="0" max="50" value="4" step="1">
</div>
<div class="form-group">
<label>Shadow Color <input type="color" id="shadowColor" value="#000000"></label>
</div>
<div class="form-group">
<label>Opacity <span id="alphaVal">0.3</span></label>
<input type="range" id="alpha" min="0" max="100" value="30" step="1">
</div>
<div class="form-group">
<label>Preview Text</label>
<input type="text" id="previewText" value="Hello World" maxlength="30">
</div>
<div class="actions">
<button class="btn btn-primary" id="addLayerBtn">➕ Add Layer</button>
<button class="btn btn-secondary" id="resetBtn">🔄 Reset</button>
</div>
<div class="layers-list" id="layersList"></div>
</div>
<div>
<div class="preview-box">
<div class="preview-text" id="previewEl">Hello World</div>
</div>
<div class="card">
<h2>📋 CSS Code</h2>
<div class="code-box">
<code id="cssCode">text-shadow: 2px 2px 4px rgba(0,0,0,0.3);</code>
<button class="btn btn-sm btn-primary" id="copyBtn">📋 Copy</button>
</div>
</div>
</div>
</div>
</main>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · Pure frontend tool. No data is uploaded.</p>
</footer>
<div id="toast"></div>
<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}

var layers=[{x:2,y:2,blur:4,color:'rgba(0,0,0,0.3)'}];
var currentLayerIdx=0;

var els={
  offsetX:document.getElementById('offsetX'),
  offsetY:document.getElementById('offsetY'),
  blur:document.getElementById('blur'),
  shadowColor:document.getElementById('shadowColor'),
  alpha:document.getElementById('alpha'),
  previewText:document.getElementById('previewText'),
  previewEl:document.getElementById('previewEl'),
  cssCode:document.getElementById('cssCode'),
  xVal:document.getElementById('xVal'),
  yVal:document.getElementById('yVal'),
  blurVal:document.getElementById('blurVal'),
  alphaVal:document.getElementById('alphaVal'),
  layersList:document.getElementById('layersList')
};

function hexToRgba(hex,a){
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+(a/100)+')';
}

function updateSliders(){
  var l=layers[currentLayerIdx];
  els.offsetX.value=l.x; els.xVal.textContent=l.x+'px';
  els.offsetY.value=l.y; els.yVal.textContent=l.y+'px';
  els.blur.value=l.blur; els.blurVal.textContent=l.blur+'px';
  var rgbaMatch=l.color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+),\s*([\d.]+)\)/);
  if(rgbaMatch){
    els.shadowColor.value='#'+parseInt(rgbaMatch[1]).toString(16).padStart(2,'0')+parseInt(rgbaMatch[2]).toString(16).padStart(2,'0')+parseInt(rgbaMatch[3]).toString(16).padStart(2,'0');
    els.alpha.value=Math.round(parseFloat(rgbaMatch[4])*100);
    els.alphaVal.textContent=parseFloat(rgbaMatch[4]).toFixed(2);
  }
}

function updatePreview(){
  var shadowStrs=layers.map(function(l){return l.x+'px '+l.y+'px '+l.blur+'px '+l.color});
  els.previewEl.style.textShadow=shadowStrs.join(', ');
  els.cssCode.textContent='text-shadow: '+shadowStrs.join(',\n            ')+';';
  renderLayers();
}

function renderLayers(){
  var html='';
  layers.forEach(function(l,i){
    html+='<div class="layer-item" style="'+(i===currentLayerIdx?'border:2px solid var(--primary)':'')+'">';
    html+='<span>#'+(i+1)+': '+l.x+'px '+l.y+'px '+l.blur+'px '+l.color+'</span>';
    html+='<div>';
    if(i===currentLayerIdx) html+='<span style="font-size:.7rem;color:var(--primary);margin-right:4px">Active</span>';
    else html+='<span class="remove-layer" data-idx="'+i+'" title="选中">👆</span>';
    html+='<span class="remove-layer" data-del="'+i+'" title="删除">✕</span>';
    html+='</div></div>';
  });
  els.layersList.innerHTML=html;
  
  document.querySelectorAll('.remove-layer[data-idx]').forEach(function(el){
    el.addEventListener('click',function(){
      currentLayerIdx=parseInt(el.dataset.idx);
      updateSliders();
      updatePreview();
    });
  });
  document.querySelectorAll('.remove-layer[data-del]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var idx=parseInt(el.dataset.del);
      if(layers.length<=1){showToast('Keep at least one layer');return}
      layers.splice(idx,1);
      if(currentLayerIdx>=layers.length) currentLayerIdx=layers.length-1;
      updateSliders();
      updatePreview();
    });
  });
}

function setPreset(name){
  switch(name){
    case 'simple': layers=[{x:2,y:2,blur:4,color:'rgba(0,0,0,0.3)'}]; break;
    case 'neon': layers=[{x:0,y:0,blur:10,color:'rgba(0,255,255,0.8)'},{x:0,y:0,blur:20,color:'rgba(0,255,255,0.4)'},{x:0,y:0,blur:40,color:'rgba(0,255,255,0.2)'}]; break;
    case '3d': layers=[{x:1,y:1,blur:0,color:'rgba(0,0,0,0.2)'},{x:2,y:2,blur:0,color:'rgba(0,0,0,0.2)'},{x:3,y:3,blur:0,color:'rgba(0,0,0,0.2)'},{x:4,y:4,blur:0,color:'rgba(0,0,0,0.2)'},{x:5,y:5,blur:0,color:'rgba(0,0,0,0.2)'}]; break;
    case 'glow': layers=[{x:0,y:0,blur:15,color:'rgba(255,255,255,0.8)'},{x:0,y:0,blur:30,color:'rgba(255,255,255,0.4)'}]; break;
    case 'outline': layers=[{x:-1,y:-1,blur:0,color:'rgba(0,0,0,0.5)'},{x:1,y:-1,blur:0,color:'rgba(0,0,0,0.5)'},{x:-1,y:1,blur:0,color:'rgba(0,0,0,0.5)'},{x:1,y:1,blur:0,color:'rgba(0,0,0,0.5)'}]; break;
    case 'double': layers=[{x:3,y:3,blur:0,color:'rgba(255,0,128,0.5)'},{x:-3,y:-3,blur:0,color:'rgba(0,128,255,0.5)'}]; break;
  }
  currentLayerIdx=0;
  updateSliders();
  updatePreview();
}

document.querySelectorAll('.preset-btn').forEach(function(btn){
  btn.addEventListener('click',function(){setPreset(btn.dataset.preset)});
});

els.offsetX.addEventListener('input',function(){layers[currentLayerIdx].x=parseInt(this.value);els.xVal.textContent=this.value+'px';updatePreview()});
els.offsetY.addEventListener('input',function(){layers[currentLayerIdx].y=parseInt(this.value);els.yVal.textContent=this.value+'px';updatePreview()});
els.blur.addEventListener('input',function(){layers[currentLayerIdx].blur=parseInt(this.value);els.blurVal.textContent=this.value+'px';updatePreview()});
els.alpha.addEventListener('input',function(){
  els.alphaVal.textContent=(this.value/100).toFixed(2);
  var hex=els.shadowColor.value;
  layers[currentLayerIdx].color=hexToRgba(hex,parseInt(this.value));
  updatePreview();
});
els.shadowColor.addEventListener('input',function(){
  layers[currentLayerIdx].color=hexToRgba(this.value,parseInt(els.alpha.value));
  updatePreview();
});
els.previewText.addEventListener('input',function(){els.previewEl.textContent=this.value||'Hello World'});

document.getElementById('addLayerBtn').addEventListener('click',function(){
  layers.push({x:2,y:2,blur:4,color:'rgba(0,0,0,0.3)'});
  currentLayerIdx=layers.length-1;
  updateSliders();
  updatePreview();
  showToast('Layer #'+(layers.length));
});

document.getElementById('resetBtn').addEventListener('click',function(){
  layers=[{x:2,y:2,blur:4,color:'rgba(0,0,0,0.3)'}];
  currentLayerIdx=0;
  updateSliders();
  updatePreview();
});

document.getElementById('copyBtn').addEventListener('click',function(){
  var code=els.cssCode.textContent;
  navigator.clipboard.writeText(code).then(function(){showToast('CSS code copied!')}).catch(function(){showToast('Copy failed')});
});

updatePreview();
</script>
</body>
</html>
