<body>
<div class="container">
  <div class="header"><h1>⚡ Electricity Cost Calculator</h1><div class="lang-switch"><a href="index.html" class="active">中文</a><a href="../../electricity-calculator/">中文</a></div></div>
  <div class="nav-back"><a href="../../index.html">&larr; Back to Home</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Enter appliance power (watts), daily usage (hours), and electricity rate to calculate costs.</p>
    <div class="form-row">
      <div class="form-group"><label>Rate (per kWh)</label><input type="number" id="rate" step="0.01" min="0" placeholder="e.g. 0.6"></div>
    </div>
    <div id="appliances">
      <div class="form-row appliance-item" data-idx="0">
        <div class="form-group"><label>Appliance</label><input type="text" id="name_0" value="Appliance 1"></div>
        <div class="form-group"><label>Power (W)</label><input type="number" id="power_0" step="1" min="0" placeholder="e.g. 1000"></div>
        <div class="form-group"><label>Daily Use (hours)</label><input type="number" id="hours_0" step="0.5" min="0" placeholder="e.g. 4"></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="addAppliance()">+ Add Appliance</button>
      <button class="btn btn-primary" onclick="calculate()">Calculate Cost</button>
    </div>
    <div class="result-grid" style="margin-top:16px" id="resultSection">
      <div class="result-item"><div class="label">Daily Cost</div><div class="value" id="resDaily">&mdash;</div></div>
      <div class="result-item"><div class="label">Monthly Cost</div><div class="value" id="resMonthly">&mdash;</div></div>
      <div class="result-item"><div class="label">Yearly Cost</div><div class="value highlight" id="resYearly">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>FAQ</h2>

  </div>
  <div class="footer"><p>Electricity Cost Calculator - Pure client-side | Estimate based on power and usage</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
var appIdx=1;
var LABEL_NAME="Appliance";
var LABEL_POWER="Power (W)";
var LABEL_HOURS="Daily Use (hours)";
var LABEL_APPLIANCE="Appliance";
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function addAppliance(){
  var div=document.createElement("div");div.className="form-row appliance-item";div.style.marginTop="8px";
  var h="<div class=\"form-group\"><label>"+LABEL_NAME+"</label><input type=\"text\" id=\"name_"+appIdx+"\" value=\" "+LABEL_APPLIANCE+" "+(appIdx+1)+"\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_POWER+"</label><input type=\"number\" id=\"power_"+appIdx+"\" step=\"1\" min=\"0\" placeholder=\"e.g. 1000\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_HOURS+"</label><input type=\"number\" id=\"hours_"+appIdx+"\" step=\"0.5\" min=\"0\" placeholder=\"e.g. 4\"></div>";
  h+="<div style=\"display:flex;align-items:flex-end;margin-bottom:14px\"><button class=\"btn btn-secondary\" onclick=\"this.parentElement.parentElement.remove()\" style=\"padding:8px 12px\">\u2715</button></div>";
  div.innerHTML=h;document.getElementById("appliances").appendChild(div);appIdx++;
}
function calculate(){
  var rate=parseFloat(document.getElementById("rate").value);
  if(isNaN(rate)||rate<=0){toast("Enter electricity rate");return}
  var totalDaily=0;var items=document.querySelectorAll(".appliance-item");
  for(var i=0;i<items.length;i++){
    var idx=items[i].querySelector("input[type=\"text\"]").id.split("_")[1];
    var power=parseFloat(document.getElementById("power_"+idx).value);
    var hours=parseFloat(document.getElementById("hours_"+idx).value);
    if(isNaN(power)||power<=0||isNaN(hours)||hours<0)continue;
    totalDaily+=power*hours/1000*rate;
  }
  document.getElementById("resDaily").textContent=totalDaily.toFixed(2);
  document.getElementById("resMonthly").textContent=(totalDaily*30).toFixed(2);
  document.getElementById("resYearly").textContent=(totalDaily*365).toFixed(2);
}
</script>
