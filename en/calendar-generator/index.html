<script>
var WEEKS_ZH=["一","二","三","四","五","六","日"];
var now=new Date();
var yearSel=document.getElementById("year"),monthSel=document.getElementById("month");
for(var y=now.getFullYear()-10;y<=now.getFullYear()+10;y++){var o=document.createElement("option");o.value=y;o.textContent=y+"年";if(y===now.getFullYear())o.selected=true;yearSel.appendChild(o)}
for(var m=1;m<=12;m++){var o=document.createElement("option");o.value=m;o.textContent=m+"月";if(m===now.getMonth()+1)o.selected=true;monthSel.appendChild(o)}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function generateCalendar(){
  var y=parseInt(yearSel.value),m=parseInt(monthSel.value);
  var firstDay=new Date(y,m-1,1).getDay();firstDay=firstDay===0?6:firstDay-1;
  var daysInMonth=new Date(y,m,0).getDate();
  var today=new Date();
  var html='<div class="calendar-container" id="calContainer"><div class="cal-month-title">'+y+'年 '+m+'月</div><table><thead><tr>';
  for(var i=0;i<7;i++)html+='<th>'+WEEKS_ZH[i]+'</th>';
  html+='</tr></thead><tbody><tr>';
  var day=1;
  for(var w=0;w<6;w++){
    for(var d=0;d<7;d++){
      if(w===0&&d<firstDay){html+='<td class="empty"></td>'}
      else if(day>daysInMonth){html+='<td class="empty"></td>'}
    }
    html+='</tr>';
    if(day>daysInMonth)break;
    if(w<5)html+='<tr>';
  }
  html+='</tbody></table></div>';
  document.getElementById("calendarPreview").innerHTML=html;
}
function downloadCal(){
  var el=document.getElementById("calContainer");
  if(!el){showToast("请先生成日历");return}
  // Simple: use a basic canvas approach
  var canvas=document.createElement("canvas");
  canvas.width=800;canvas.height=600;
  var ctx=canvas.getContext("2d");
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,800,600);
  ctx.fillStyle="#1e293b";ctx.font="bold 32px sans-serif";ctx.textAlign="center";
  ctx.fillText(yearSel.value+"年 "+monthSel.value+"月",400,60);
  var days=["一","二","三","四","五","六","日"];
  var firstDay=new Date(parseInt(yearSel.value),parseInt(monthSel.value)-1,1).getDay();
  firstDay=firstDay===0?6:firstDay-1;
  var daysInMonth=new Date(parseInt(yearSel.value),parseInt(monthSel.value),0).getDate();
  var colW=90,rowH=60,startX=85,startY=100;
  ctx.font="bold 18px sans-serif";ctx.fillStyle="#64748b";
  for(var i=0;i<7;i++){ctx.fillText(days[i],startX+i*colW,startY)}
  var day=1;
  for(var r=0;r<6;r++){
    for(var c=0;c<7;c++){
      if(r===0&&c<firstDay||day>daysInMonth){}else{
        ctx.fillStyle=(c>=5?"#ef4444":"#334155");
        ctx.fillText(day,startX+c*colW,startY+(r+1)*rowH);
        day++;
      }
    }
    if(day>daysInMonth)break;
  }
  var a=document.createElement("a");a.href=canvas.toDataURL("image/png");a.download="calendar-"+yearSel.value+"-"+monthSel.value+".png";a.click();
}
function printCal(){window.print()}
generateCalendar();
</script>
