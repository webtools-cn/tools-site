<body>
<div class="container">
  <div class="header"><h1>🎓 GPA Calculator</h1><div class="lang-switch"><a href="index.html" class="active">中文</a><a href="../../gpa-calculator/">中文</a></div></div>
  <div class="nav-back"><a href="../../index.html">&larr; Back to Home</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Choose your GPA scale (4.0/5.0/Percentage), enter course credits and grades.</p>
    <div class="form-row">
      <div class="form-group"><label>GPA Scale</label><select id="scaleType">
        <option value="4.0">Standard 4.0</option><option value="5.0">Standard 5.0</option><option value="100">Percentage to 4.0</option>
      </select></div>
    </div>
    <div id="courses">
      <div class="form-row course-item" data-idx="0">
        <div class="form-group"><label>Course</label><input type="text" id="cname_0" value="Course 1"></div>
        <div class="form-group"><label>Credits</label><input type="number" id="credit_0" step="0.5" min="0" placeholder="e.g. 3"></div>
        <div class="form-group"><label>Grade</label><input type="number" id="grade_0" step="any" min="0" max="100" placeholder="e.g. 85"></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="addCourse()">+ Add Course</button>
      <button class="btn btn-primary" onclick="calculate()">Calculate GPA</button>
    </div>
    <div class="result-grid" style="margin-top:16px">
      <div class="result-item"><div class="label">Weighted GPA</div><div class="value highlight" id="resGPA">&mdash;</div></div>
      <div class="result-item"><div class="label">Total Credits</div><div class="value" id="resCredits">&mdash;</div></div>
      <div class="result-item"><div class="label">Courses</div><div class="value" id="resCourses">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>FAQ</h2>

  </div>
  <div class="footer"><p>GPA Calculator - Pure client-side | 4.0/5.0/Percentage scales</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
var courseIdx=1;
var LABEL_COURSE="Course";
var LABEL_CREDIT="Credits";
var LABEL_GRADE="Grade";
var LABEL_PKG="Course";
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function addCourse(){
  var div=document.createElement("div");div.className="form-row course-item";div.style.marginTop="8px";
  var h="<div class=\"form-group\"><label>"+LABEL_COURSE+"</label><input type=\"text\" id=\"cname_"+courseIdx+"\" value=\" "+LABEL_PKG+" "+(courseIdx+1)+"\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_CREDIT+"</label><input type=\"number\" id=\"credit_"+courseIdx+"\" step=\"0.5\" min=\"0\" placeholder=\"e.g. 3\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_GRADE+"</label><input type=\"number\" id=\"grade_"+courseIdx+"\" step=\"any\" min=\"0\" max=\"100\" placeholder=\"e.g. 85\"></div>";
  h+="<div style=\"display:flex;align-items:flex-end;margin-bottom:14px\"><button class=\"btn btn-secondary\" onclick=\"this.parentElement.parentElement.remove()\" style=\"padding:8px 12px\">\u2715</button></div>";
  div.innerHTML=h;document.getElementById("courses").appendChild(div);courseIdx++;
}
function toGPA(grade,scale){
  if(scale==="4.0"){
    if(grade>=90)return 4.0;if(grade>=85)return 3.7;if(grade>=82)return 3.3;
    if(grade>=78)return 3.0;if(grade>=75)return 2.7;if(grade>=72)return 2.3;
    if(grade>=68)return 2.0;if(grade>=64)return 1.5;if(grade>=60)return 1.0;return 0.0;
  }else if(scale==="5.0"){
    if(grade>=95)return 5.0;if(grade>=90)return 4.5;if(grade>=85)return 4.0;
    if(grade>=80)return 3.5;if(grade>=75)return 3.0;if(grade>=70)return 2.5;
    if(grade>=65)return 2.0;if(grade>=60)return 1.5;return 0.0;
  }
  return grade;
}
function calculate(){
  var scale=document.getElementById("scaleType").value;
  var items=document.querySelectorAll(".course-item");
  var totalPoints=0,totalCredits=0,count=0;
  for(var i=0;i<items.length;i++){
    var idx=items[i].querySelector("input[type=\"text\"]").id.split("_")[1];
    var credit=parseFloat(document.getElementById("credit_"+idx).value);
    var grade=parseFloat(document.getElementById("grade_"+idx).value);
    if(isNaN(credit)||credit<=0||isNaN(grade)||grade<0)continue;count++;
    totalPoints+=toGPA(grade,scale)*credit;totalCredits+=credit;
  }
  if(totalCredits===0){toast("Add courses and credits");return}
  document.getElementById("resGPA").textContent=(totalPoints/totalCredits).toFixed(3);
  document.getElementById("resCredits").textContent=totalCredits;
  document.getElementById("resCourses").textContent=count;
}
</script>
</body>
