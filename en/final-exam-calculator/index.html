<body>
<div class="container">
  <div class="header"><h1>📝 Final Exam Calculator</h1><div class="lang-switch"><a href="index.html" class="active">中文</a><a href="../../final-exam-calculator/">中文</a></div></div>
  <div class="nav-back"><a href="../../index.html">&larr; Back to Home</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Enter your current grade, final exam weight, and target grade to calculate what score you need on the final.</p>
    <div class="form-row">
      <div class="form-group"><label>Current Grade</label><input type="number" id="current" step="any" min="0" max="100" placeholder="e.g. 85"></div>
      <div class="form-group"><label>Final Weight (%)</label><input type="number" id="weight" step="any" min="0" max="100" placeholder="e.g. 30"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Target Grade</label><input type="number" id="target" step="any" min="0" max="100" placeholder="e.g. 90"></div>
    </div>
    <div class="btn-group"><button class="btn btn-primary" onclick="calculate()">Calculate Needed Score</button></div>
    <div class="result-grid" style="margin-top:16px">
      <div class="result-item"><div class="label">Score Needed on Final</div><div class="value highlight" id="resNeeded">&mdash;</div></div>
      <div class="result-item"><div class="label">Possible?</div><div class="value" id="resPossible">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>FAQ</h2>

  </div>
  <div class="footer"><p>Final Exam Calculator - Pure client-side | For reference only</p></div>

<div class="toast" id="toast"></div>
<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function calculate(){
  var current=parseFloat(document.getElementById("current").value);
  var weight=parseFloat(document.getElementById("weight").value);
  var target=parseFloat(document.getElementById("target").value);
  if(isNaN(current)||current<0||current>100||isNaN(weight)||weight<=0||weight>100||isNaN(target)||target<0||target>100){toast("Enter valid numbers (0-100)");return}
  var w=weight/100;var needed=(target-current*(1-w))/w;
  var el=document.getElementById("resPossible");
  document.getElementById("resNeeded").textContent=needed.toFixed(2)+"%";
  if(needed>100){el.textContent="⚠️ Would need over 100%";el.style.color="#f59e0b";if(needed>120){el.textContent="❌ Impossible, even with 100%";el.style.color="#ef4444";}}
  else if(needed<0){el.textContent="✅ Already achieved!";el.style.color="#22d3ee";}
  else{el.textContent="✅ Yes, you can do it!";el.style.color="#22d3ee";}
}
</script>
