<div class="container">
  <div class="header">

    <div id="usageContent"></div>

<script>
(function(){
var app=document.getElementById('app');

app.innerHTML='<div class="input-section"><h2>🔋 Battery Status</h2><div id="batteryInfo" style="text-align:center;padding:20px 0">Detecting battery info...</div></div>';
document.getElementById('usageContent').innerHTML='<p>This tool uses the Battery API to read your device's battery information, displaying battery level, charging status, and remaining time in real-time.</p><p>Note: Some browsers may not support the Battery API or require HTTPS. Use Chrome/Edge via HTTPS if detection fails.</p>';

function showBattery(battery){
  var level=Math.round(battery.level*100);
  var charging=battery.charging;
  var timeRem=battery.dischargingTime;
  var timeCharging=battery.chargingTime;
  var icon=charging?'⚡':'🔋';
  var statusText='';

  if(charging){statusText='Charging';}
  else if(level<=15){statusText='Critically Low';}
  else if(level<=30){statusText='Low';}
  else if(level>=90){statusText='Full';}
  else{statusText='Normal';}

  var color=level<=15?'#ef4444':level<=30?'#f59e0b':'#22c55e';
  var html='';
  html+='<div style="position:relative;width:160px;height:260px;margin:0 auto 16px">';
  html+='<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:25px;border:3px solid #475569;border-radius:5px 5px 0 0;background:#1e293b"></div>';
  html+='<div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);width:120px;height:200px;border:3px solid #475569;border-radius:8px;background:#1e293b;overflow:hidden">';
  html+='<div style="position:absolute;bottom:0;width:100%;height:'+level+'%;background:'+color+';transition:height 0.5s;border-radius:0 0 5px 5px;opacity:0.8"></div>';
  html+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:700;color:#f1f5f9;text-shadow:0 2px 8px rgba(0,0,0,0.5)">'+level+'%</div>';
  html+='</div></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto">';
  
  var t1 = "Status";
  var v1 = charging ? ("⚡ Charging") : ("🔋 Not Charging");
  
  var t2 = "Battery Level";
  var v2 = level+'% ('+statusText+')';
  
  html+=_infoCard(t1,v1);
  html+=_infoCard(t2,v2);
  
  if(timeRem!==Infinity && timeRem!==null){
    var hrs=Math.floor(timeRem/3600);
    var mins=Math.floor((timeRem%3600)/60);
    html+=_infoCard("Time Remaining", hrs+'h '+mins+'m');
  }
  if(timeCharging!==Infinity && timeCharging!==null && charging){
    var hrs=Math.floor(timeCharging/3600);
    var mins=Math.floor((timeCharging%3600)/60);
    html+=_infoCard("Charge Time", hrs+'h '+mins+'m');
  }
  html+='</div>';
  document.getElementById('batteryInfo').innerHTML=html;
}
function _infoCard(t,v){
  return '<div style="background:#0f172a;border-radius:8px;padding:12px;border:1px solid rgba(148,163,184,.08)"><div style="color:#64748b;font-size:.75rem;margin-bottom:4px">'+t+'</div><div style="color:#e2e8f0;font-size:.9rem;font-weight:500">'+v+'</div></div>';
}
if(navigator.getBattery){
  navigator.getBattery().then(function(battery){
    showBattery(battery);
    battery.addEventListener('levelchange',function(){showBattery(battery);});
    battery.addEventListener('chargingchange',function(){showBattery(battery);});
    battery.addEventListener('dischargingtimechange',function(){showBattery(battery);});
    battery.addEventListener('chargingtimechange',function(){showBattery(battery);});
  }).catch(function(){
    document.getElementById('batteryInfo').innerHTML='<div style="color:#ef4444;padding:20px">❌ Cannot access battery info. Use Chrome/Edge via HTTPS.</div>';
  });
} else {
  document.getElementById('batteryInfo').innerHTML='<div style="color:#f59e0b;padding:20px">⚠️ Your browser does not support the Battery API. Please use Chrome/Edge.</div>';
}
})();

</script>
