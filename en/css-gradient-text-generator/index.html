<script>
(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🌈 Enter Text</h2><input type="text" id="textInput" value="Gradient Text" placeholder="Enter text..."><div class="row"><div class="field"><label>Gradient Type</label><select id="gradType"><option value="linear">Linear</option><option value="radial">Radial</option></select></div><div class="field"><label>Angle (linear)</label><input type="range" id="angle" min="0" max="360" value="90"></div></div><h2 style="font-size:1.1rem;color:#f1f5f9;margin:12px 0 8px">🎨 Colors</h2><div class="row"><div class="field"><label>Color 1</label><input type="color" id="color1" value="#f97316"></div><div class="field"><label>Color 2</label><input type="color" id="color2" value="#ec4899"></div><div class="field"><label>Color 3 (optional)</label><input type="color" id="color3" value="#8b5cf6"></div></div><div class="row"><div class="field"><label>Color 4 (optional)</label><input type="color" id="color4" value="#06b6d4"></div><div class="field"><label>Font Size</label><input type="range" id="fontSize" min="16" max="96" value="48"></div></div><div class="options"><label><input type="checkbox" id="boldOpt" checked> Bold</label><label><input type="checkbox" id="shadowOpt"> Text Shadow</label></div></div><div class="preview-box" id="previewBox"><span id="previewText" class="gradient-text" style="font-size:48px;font-weight:800">Gradient Text</span></div><div class="result-section show" id="resultSection"><h2>📋 CSS Code</h2><div class="result-box" id="cssOutput">background: linear-gradient(90deg, #f97316, #ec4899);\\n-webkit-background-clip: text;\\n-webkit-text-fill-color: transparent;\\nbackground-clip: text;</div><div class="btn-row"><button class="btn btn-success" id="copyCssBtn">📋 Copy CSS</button></div></div>';
document.getElementById('usageContent').innerHTML='<p>Enter text and choose gradient colors to create stunning gradient text effects in real-time. Supports linear and radial gradients.</p><p>Customize angle, font size, bold, and shadow. The generated CSS code can be used directly in your web projects.</p>';

function updatePreview(){
  var text=document.getElementById('textInput').value||'Gradient';
  var type=document.getElementById('gradType').value;
  var angle=document.getElementById('angle').value;
  var c1=document.getElementById('color1').value;
  var c2=document.getElementById('color2').value;
  var c3=document.getElementById('color3').value;
  var c4=document.getElementById('color4').value;
  var size=document.getElementById('fontSize').value;
  var bold=document.getElementById('boldOpt').checked;
  var shadow=document.getElementById('shadowOpt').checked;
  var colors=[c1,c2];
  if(c3&&c3!=='#000000') colors.push(c3);
  if(c4&&c4!=='#000000') colors.push(c4);
  var grad='';
  if(type==='linear'){
    grad='linear-gradient('+angle+'deg, '+colors.join(', ')+')';
  }else{
    grad='radial-gradient(circle, '+colors.join(', ')+')';
  }
  var el=document.getElementById('previewText');
  el.textContent=text;
  el.style.fontSize=size+'px';
  el.style.fontWeight=bold?'800':'400';
  el.style.background=grad;
  el.style.webkitBackgroundClip='text';
  el.style.webkitTextFillColor='transparent';
  el.style.backgroundClip='text';
  if(shadow){
    el.style.textShadow='2px 2px 8px rgba(0,0,0,.3)';
  }else{
    el.style.textShadow='none';
  }
  var css='/* Gradient Text CSS */\\n.element {\\n  background: '+grad+';\\n  -webkit-background-clip: text;\\n  -webkit-text-fill-color: transparent;\\n  background-clip: text;\\n  font-size: '+size+'px;\\n  font-weight: '+(bold?'800':'400')+';\\n'+(shadow?'  text-shadow: 2px 2px 8px rgba(0,0,0,.3);\\n':'')+'}';
  document.getElementById('cssOutput').textContent=css;
}

var inputs=document.querySelectorAll('#textInput,#gradType,#angle,#color1,#color2,#color3,#color4,#fontSize,#boldOpt,#shadowOpt');
inputs.forEach(function(el){el.addEventListener('input',updatePreview);el.addEventListener('change',updatePreview);});
updatePreview();

document.getElementById('copyCssBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(function(){
    document.getElementById('copyCssBtn').textContent='✅ Copied';
    setTimeout(function(){document.getElementById('copyCssBtn').textContent='📋 Copy CSS';},2000);
  });
});
})();
