<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function toggleFeedback(){const p=document.getElementById("feedback-panel");p.style.display=p.style.display==="none"?"block":"none";}
document.addEventListener("DOMContentLoaded",function(){const ft=document.getElementById("feedback-text");if(ft){ft.addEventListener("input",function(){const c=document.getElementById("feedback-count");if(c)c.textContent=this.value.length+"/1000";});}});
function submitFeedback(){const type=document.getElementById("feedback-type").value;const text=document.getElementById("feedback-text").value.trim();if(!text){showToast("Please enter feedback");return;}
const typeLabel={feedback:"💡 Suggestion",bug:"🐛 Bug Report",other:"💬 Other"}[type];
const title=encodeURIComponent(typeLabel+" - "+window.location.pathname);
const body=encodeURIComponent("**Page**: "+window.location.href+"\n**Type**: "+typeLabel+"\n\n"+text);
window.open("https://github.com/webtools-cn/tools-site/issues/new?title="+title+"&body="+body,"_blank");
document.getElementById("feedback-success").style.display="block";
setTimeout(function(){document.getElementById("feedback-success").style.display="none";toggleFeedback();document.getElementById("feedback-text").value="";const c=document.getElementById("feedback-count");if(c)c.textContent="0/1000";},3000);}
</script>
