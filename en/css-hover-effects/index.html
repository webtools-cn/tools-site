  {name:'Blink',css:'@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}.effect-el:hover{animation:blink .8s}'},
  {name:'Ripple',css:'.effect-el{position:relative;overflow:hidden}.effect-el::after{content:"";position:absolute;border-radius:50%;background:rgba(6,182,212,.3);width:100px;height:100px;margin-top:-50px;margin-left:-50px;top:50%;left:50%;transform:scale(0);opacity:0;transition:all .5s}.effect-el:hover::after{transform:scale(3);opacity:1}'},
  {name:'Text Gradient',css:'.effect-el{background:linear-gradient(90deg,#06b6d4,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 100%;transition:background-position .5s}.effect-el:hover{background-position:100% 0}'},
];

var selectedEffect=0;
var grid=document.getElementById('effectsGrid');
effects.forEach(function(ef,i){
  var card=document.createElement('div');
  card.className='effect-card'+(i===0?' selected':'');
  card.innerHTML='<div class="demo-el">'+ef.name+'</div>';
  card.addEventListener('click',function(){
    document.querySelectorAll('.effect-card').forEach(function(c){c.classList.remove('selected');});
    card.classList.add('selected');
    selectedEffect=i;
    updateDemo();
  });
  grid.appendChild(card);
});

function updateDemo(){
  var el=document.getElementById('demoEl');
  var text=document.getElementById('demoText').value||'Hover Me!';
  var speed=document.getElementById('speed').value;
  var ef=effects[selectedEffect];
  el.textContent=text;
  el.style.cssText='padding:16px 36px;border-radius:8px;display:inline-block;font-size:1.1rem;cursor:default;';
  var useCustom=document.getElementById('customColor').checked;
  if(useCustom){
    el.style.background=document.getElementById('bgColor').value;
    el.style.color=document.getElementById('textColor').value;
    el.style.border='none';
  }else{
    el.style.background='rgba(6,182,212,.15)';
    el.style.color='#22d3ee';
    el.style.border='none';
  }
  var css=ef.css.replace(/\.effect-el/g,'.hover-demo');
  css=css.replace(/transition:all \.3s/g,'transition:all '+speed+'s');
  css=css.replace(/transition:([^;]+) \.3s/g,'transition:$1 '+speed+'s');
  css=css.replace(/(transition-duration:)[^;]+/g,'$1'+speed+'s');
  el.className='demo-el hover-demo';
  var styleEl=document.getElementById('hoverStyle')||document.createElement('style');
  styleEl.id='hoverStyle';
  styleEl.textContent=css;
  document.head.appendChild(styleEl);
  document.getElementById('cssOutput').textContent='/* '+ef.name+' */\\n.hover-demo {'+css.replace(/^[^{]+{/,'').replace(/}$/,'')+'}';
}

var uiInputs=document.querySelectorAll('#speed,#demoText,#customColor,#bgColor,#textColor');
uiInputs.forEach(function(el){el.addEventListener('input',updateDemo);el.addEventListener('change',updateDemo);});
document.getElementById('customColor').addEventListener('change',function(){
  document.getElementById('colorRow').style.display=this.checked?'flex':'none';
  updateDemo();
});
updateDemo();

document.getElementById('copyCssBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(function(){
    document.getElementById('copyCssBtn').textContent='✅ Copied';
    setTimeout(function(){document.getElementById('copyCssBtn').textContent='📋 Copy CSS';},2000);
  });
});
})();

</script>
