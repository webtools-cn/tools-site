<script>
var pngBlob=null;
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
var uz=document.getElementById("uploadZone");
uz.addEventListener("dragover",function(e){e.preventDefault();uz.classList.add("dragover")});
uz.addEventListener("dragleave",function(){uz.classList.remove("dragover")});
uz.addEventListener("drop",function(e){e.preventDefault();uz.classList.remove("dragover");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});
function handleFile(file){
  if(!file||!file.type.match(/image\/avif/)){showToast("请选择AVIF格式的图片");return}
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      canvas.width=img.width;canvas.height=img.height;
      var ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);
      canvas.toBlob(function(blob){
        pngBlob=blob;
        document.getElementById("previewImg").src=URL.createObjectURL(blob);
        document.getElementById("previewInfo").textContent="尺寸: "+img.width+"×"+img.height+" | PNG大小: "+(blob.size/1024).toFixed(1)+" KB";
        document.getElementById("preview").style.display="block";
      },"image/png");
    };
    img.onerror=function(){showToast("无法解析该AVIF文件，请确认文件格式正确")};
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function downloadPNG(){
  if(!pngBlob){showToast("请先选择AVIF图片");return}
  var a=document.createElement("a");a.href=URL.createObjectURL(pngBlob);a.download="converted.png";a.click();
}
</script>
