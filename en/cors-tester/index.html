<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS Tester - Free ToolBase</title>
<meta name="description" content="Online CORS testing tool. Check cross-origin resource sharing policies for any URL with custom request methods and headers. View real-time response results.">
<meta property="og:title" content="CORS Tester - Free ToolBase">
<meta property="og:description" content="Online CORS testing tool. Check cross-origin resource sharing policies for any URL.">
<meta property="og:type" content="website">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "CORS Tester",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Web",
  "description": "Online CORS testing tool. Check cross-origin resource sharing policies for any URL with custom request methods and headers."
}
</script>
<style>
:root{--primary:#4F46E5;--primary-hover:#4338CA;--bg:#f8fafc;--card-bg:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1);--success:#10b981;--error:#ef4444;--warning:#f59e0b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header .logo{font-size:1.25rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:16px;flex-wrap:wrap}
header nav a{color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:color .2s}
header nav a:hover{color:var(--primary)}
main{max-width:960px;margin:0 auto;padding:32px 24px}
h1{font-size:1.75rem;margin-bottom:8px}
.subtitle{color:var(--text-secondary);margin-bottom:32px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.card h2{font-size:1.1rem;margin-bottom:16px;color:var(--primary)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--text-secondary)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:monospace;background:var(--bg);transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-group textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#cbd5e1}
.btn-sm{padding:6px 12px;font-size:.8rem}
.result-area{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;font-family:monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;min-height:120px}
.result-area .key{color:#93c5fd}
.result-area .val{color:#86efac}
.result-area .err{color:#fca5a5}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:600}
.status-success{background:#d1fae5;color:#065f46}
.status-error{background:#fee2e2;color:#991b1b}
.status-warning{background:#fef3c7;color:#92400e}
.status-loading{background:#dbeafe;color:#1e40af}
.timing{font-size:.8rem;color:var(--text-secondary);margin-top:8px}
.method-btns{display:flex;gap:8px;flex-wrap:wrap}
.method-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.method-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
footer{text-align:center;padding:32px 24px;color:var(--text-secondary);font-size:.85rem;border-top:1px solid var(--border);margin-top:48px}
footer a{color:var(--primary);text-decoration:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999}
#toast.show{opacity:1}
</style>
</head>
<body>
<header>
<a href="/" class="logo">Free ToolBase</a>
<nav>
<a href="/en/">Home</a>
<a href="/en/about/">About</a>
</nav>
</header>
<main>
<h1>🔍 CORS Tester</h1>
<p class="subtitle">Check CORS policies for any URL with custom request methods and headers</p>
<div class="layout">
<div class="card">
<h2>⚙️ Request Config</h2>
<div class="form-group">
<label>Target URL</label>
<input type="url" id="targetUrl" placeholder="https://api.example.com/data" value="https://jsonplaceholder.typicode.com/posts/1">
</div>
<div class="form-group">
<label>Request Method</label>
<div class="method-btns" id="methodBtns">
<button class="method-btn active" data-method="GET">GET</button>
<button class="method-btn" data-method="POST">POST</button>
<button class="method-btn" data-method="PUT">PUT</button>
<button class="method-btn" data-method="DELETE">DELETE</button>
<button class="method-btn" data-method="PATCH">PATCH</button>
<button class="method-btn" data-method="OPTIONS">OPTIONS</button>
<button class="method-btn" data-method="HEAD">HEAD</button>
</div>
</div>
<div class="form-group">
<label>Custom Headers (one per line: Header-Name: value)</label>
<textarea id="customHeaders" placeholder="Authorization: Bearer xxx&#10;X-Custom-Header: test"></textarea>
</div>
<div class="form-group">
<label>Request Body (JSON, POST/PUT/PATCH only)</label>
<textarea id="requestBody" placeholder='{"key": "value"}' rows="3"></textarea>
</div>
<button class="btn btn-primary" id="sendBtn">🚀 Send Request</button>
</div>
<div class="card">
<h2>📋 Test Results</h2>
<div id="statusArea"></div>
<div id="timingArea" class="timing"></div>
<div class="result-area" id="resultArea">Waiting for request...</div>
</div>
</div>
</main>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · Pure frontend tool. No data is uploaded.</p>
</footer>
<div id="toast"></div>
<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}

// Method buttons
document.querySelectorAll('.method-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.method-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    // Toggle body textarea visibility
    var m=btn.dataset.method;
    var bodyGroup=document.getElementById('requestBody').closest('.form-group');
    bodyGroup.style.display=(m==='POST'||m==='PUT'||m==='PATCH')?'block':'none';
  });
});

document.getElementById('sendBtn').addEventListener('click',function(){
  var url=document.getElementById('targetUrl').value.trim();
  if(!url){showToast('请输入Target URL');return}
  
  var method=document.querySelector('.method-btn.active').dataset.method;
  var resultArea=document.getElementById('resultArea');
  var statusArea=document.getElementById('statusArea');
  var timingArea=document.getElementById('timingArea');
  
  resultArea.textContent='Sending '+method+' request to '+url+'...';
  statusArea.innerHTML='<span class="status-badge status-loading">Sending...</span>';
  timingArea.textContent='';
  
  var startTime=performance.now();
  var headers={};
  var rawHeaders=document.getElementById('customHeaders').value.trim();
  if(rawHeaders){
    rawHeaders.split('\n').forEach(function(line){
      var idx=line.indexOf(':');
      if(idx>0){
        var k=line.substring(0,idx).trim();
        var v=line.substring(idx+1).trim();
        if(k&&v) headers[k]=v;
      }
    });
  }
  
  var fetchOpts={method:method,headers:headers};
  if(method==='POST'||method==='PUT'||method==='PATCH'){
    var body=document.getElementById('requestBody').value.trim();
    if(body){
      try{JSON.parse(body);headers['Content-Type']=headers['Content-Type']||'application/json'}
      catch(e){}
      fetchOpts.body=body;
    }
  }
  
  // Also do a preflight OPTIONS check for non-simple requests
  var preflightPromise=null;
  if(method!=='GET'&&method!=='HEAD'&&method!=='OPTIONS'){
    preflightPromise=fetch(url,{method:'OPTIONS',headers:{'Access-Control-Request-Method':method}}).catch(function(){return null});
  }
  
  fetch(url,fetchOpts)
    .then(function(response){
      var elapsed=Math.round(performance.now()-startTime);
      var ct=response.headers.get('content-type')||'';
      return response.text().then(function(text){
        return {status:response.status,statusText:response.statusText,headers:response.headers,body:text,contentType:ct,elapsed:elapsed};
      });
    })
    .then(function(data){
      var output=[];
      output.push('=== Response Status ===');
      output.push('HTTP '+data.status+' '+data.statusText);
      output.push('');
      output.push('=== Response Headers ===');
      var corsHeaders={};
      data.headers.forEach(function(v,k){
        output.push(k+': '+v);
        if(k.toLowerCase().startsWith('access-control-')) corsHeaders[k]=v;
      });
      output.push('');
      output.push('=== CORS Headers ===');
      if(Object.keys(corsHeaders).length===0){
        output.push('⚠ No CORS response headers detected!');
        output.push('This server may not support cross-origin requests.');
      }else{
        Object.keys(corsHeaders).forEach(function(k){output.push(k+': '+corsHeaders[k])});
      }
      output.push('');
      output.push('=== Response Body ===');
      try{
        var parsed=JSON.parse(data.body);
        output.push(JSON.stringify(parsed,null,2));
      }catch(e){
        output.push(data.body.substring(0,2000));
        if(data.body.length>2000) output.push('...(truncated)');
      }
      output.push('');
      output.push('=== Performance ===');
      output.push('Duration: '+data.elapsed+'ms');
      
      resultArea.textContent=output.join('\n');
      
      var hasCors=Object.keys(corsHeaders).length>0;
      var acao=corsHeaders['access-control-allow-origin']||'';
      if(data.status>=200&&data.status<300){
        statusArea.innerHTML='<span class="status-badge status-success">✅ Success ('+data.status+')</span>';
        if(hasCors&&acao==='*')statusArea.innerHTML+=' <span class="status-badge status-success">CORS: Wildcard</span>';
        else if(hasCors)statusArea.innerHTML+=' <span class="status-badge status-success">CORS: Configured</span>';
        else statusArea.innerHTML+=' <span class="status-badge status-warning">CORS: Not detected</span>';
      }else{
        statusArea.innerHTML='<span class="status-badge status-error">❌ Failed ('+data.status+')</span>';
      }
      timingArea.textContent='⏱ Duration: '+data.elapsed+'ms';
    })
    .catch(function(err){
      var elapsed=Math.round(performance.now()-startTime);
      resultArea.textContent='=== Failed ===\nError: '+err.message+'\n\nPossible causes:\n1. Network connectivity issue\n2. CORS policy blocked (browser fetch cannot bypass server CORS)\n3. URL unreachable\n4. Browser security policy (e.g. Mixed Content)\n\nNote: This is a pure frontend tool, subject to browser same-origin policy.\nIf the target server does not have CORS configured, the request will be blocked by the browser.';
      statusArea.innerHTML='<span class="status-badge status-error">❌ Request Blocked</span>';
      timingArea.textContent='⏱ Duration: '+elapsed+'ms';
    });
});
</script>
</body>
</html>
