<style>
*{box-sizing:border-box;margin:0;padding:0}

.flash-message.show{opacity:1}

.preset-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-chip{padding:5px 14px;border-radius:20px;background:#0f172a;border:1px solid #334155;color:#94a3b8;cursor:pointer;font-size:.8rem;transition:all .2s;user-select:none}
.preset-chip:hover{border-color:rgba(6,182,212,.3);color:#22d3ee}

<body>
<div class="container">
  <a href="../" class="back-link">← Back to Home</a>
  <h1>🔁 Text Repeater</h1>
  <p class="subtitle">Repeat any text multiple times with custom separators, prefixes, and numbering</p>

  <div class="card">
    <div class="opt-group">
      <label>Text to Repeat</label>
      <textarea id="inputText" placeholder="Enter text to repeat...">Hello World</textarea>
    </div>

    <div class="preset-chips" id="presetChips">
      <span class="preset-chip">Hello World</span>
      <span class="preset-chip">abc</span>
      <span class="preset-chip">123</span>
      <span class="preset-chip">test data</span>
      <span class="preset-chip">#️⃣ tag</span>
      <span class="preset-chip">abc123</span>
    </div>

    <div class="row">
      <div class="opt-group">
        <label>Repeat Count</label>
        <input type="number" id="repeatCount" value="10" min="1" max="10000" step="1">
      </div>
      <div class="opt-group">
        <label>Separator</label>
        <select id="separator">
          <option value="\n">Newline (\n)</option>
          <option value=", ">Comma+Space (, )</option>
          <option value=",">Comma (,)</option>
          <option value=" ">Space ( )</option>
          <option value="\t">Tab</option>
          <option value="custom">Custom...</option>
        </select>
      </div>
    </div>

    <div class="row" id="customSepRow" style="display:none">
      <div class="opt-group">
        <label>Custom Separator</label>
        <input type="text" id="customSep" placeholder="Enter custom separator" value=" | ">
      </div>
      <div></div>
    </div>

    <div class="row">
      <div class="opt-group">
        <label>Prefix (optional)</label>
        <input type="text" id="prefix" placeholder="e.g., - ">
      </div>
      <div class="opt-group">
        <label>Suffix (optional)</label>
        <input type="text" id="suffix" placeholder="e.g., ;">
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="addNumbers">
      <label for="addNumbers">Add numbering (1. 2. 3. ...)</label>
    </div>

    <div class="checkbox-row" style="margin-bottom:16px">
      <input type="checkbox" id="trimOutput">
      <label for="trimOutput">Trim extra whitespace</label>
    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="generate()">🚀 Generate</button>
  </div>

  <div class="card" id="outputCard" style="display:none">
    <h3 style="color:#f1f5f9;margin-bottom:12px;font-size:1.05rem">📋 Result</h3>

    <div class="output-area">
      <pre id="outputText"></pre>
    </div>

    <div class="stats" id="statsArea">
      <div class="stat-item">Lines: <span id="totalLines">0</span></div>
      <div class="stat-item">Characters: <span id="totalChars">0</span></div>
    </div>

    <div class="output-actions">
      <button class="btn btn-copy" onclick="copyOutput()">📋 Copy</button>
      <button class="btn btn-download" onclick="downloadOutput()">⬇️ Download TXT</button>
      <button class="btn btn-secondary" onclick="clearOutput()">🗑️ Clear</button>
    </div>
  </div>
</div>

<div class="flash-message" id="flashMsg"></div>

<script>
function showFlash(msg, type) {
  const el = document.getElementById('flashMsg');
  el.textContent = msg;
  el.className = 'flash-message flash-' + type + ' show';
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

document.getElementById('separator').addEventListener('change', function() {
  document.getElementById('customSepRow').style.display = this.value === 'custom' ? 'block' : 'none';
});

document.querySelectorAll('.preset-chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    document.getElementById('inputText').value = this.textContent;
  });
});

function getSeparator() {
  const sel = document.getElementById('separator').value;
  if (sel === 'custom') return document.getElementById('customSep').value;
  if (sel === '\\n') return '\n';
  return sel;
}

function generate() {
  const text = document.getElementById('inputText').value;
  const count = parseInt(document.getElementById('repeatCount').value);
  const prefix = document.getElementById('prefix').value;
  const suffix = document.getElementById('suffix').value;
  const addNumbers = document.getElementById('addNumbers').checked;
  const trimOutput = document.getElementById('trimOutput').checked;
  const sep = getSeparator();

  if (!text) {
    showFlash('⚠️ Please enter text to repeat', 'success');
    return;
  }

  if (isNaN(count) || count < 1) {
    showFlash('⚠️ Count must be >= 1', 'success');
    return;
  }

  if (count > 10000) {
    showFlash('⚠️ Maximum count is 10,000', 'success');
    return;
  }

  var maxChars = count * (text.length + prefix.length + suffix.length + (addNumbers ? String(count).length + 2 : 0));
  if (maxChars > 5000000) {
    showFlash('⚠️ Output too large. Reduce repeat count.', 'success');
    return;
  }

  var parts = [];
  for (var i = 0; i < count; i++) {
    var line = '';
    if (addNumbers) line += (i + 1) + '. ';
    line += prefix + text + suffix;
    parts.push(line);
  }

  var output = parts.join(sep);

  if (trimOutput) {
    output = output.replace(/^\s+|\s+$/g, '').replace(/\n{3,}/g, '\n\n');
  }

  document.getElementById('outputText').textContent = output;
  document.getElementById('totalLines').textContent = count.toLocaleString();
  document.getElementById('totalChars').textContent = output.length.toLocaleString();
  document.getElementById('outputCard').style.display = 'block';

  showFlash('✅ Done! ' + count.toLocaleString() + ' lines generated', 'success');
}

window.copyOutput = function() {
  const text = document.getElementById('outputText').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(function() {
    showFlash('📋 Copied to clipboard', 'success');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showFlash('📋 Copied to clipboard', 'success'); } catch(e) { showFlash('Copy failed. Please select manually.', 'success'); }
    document.body.removeChild(ta);
  });
};

window.downloadOutput = function() {
  const text = document.getElementById('outputText').textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'repeated-text.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showFlash('⬇️ File downloaded', 'success');
};

window.clearOutput = function() {
  document.getElementById('outputText').textContent = '';
  document.getElementById('outputCard').style.display = 'none';
};

document.getElementById('inputText').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});
</script>
</body>
</html>
