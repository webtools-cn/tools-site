<script>
(function(){
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const previewSection = document.getElementById('previewSection');
  const previewCanvas = document.getElementById('previewCanvas');
  const previewInfo = document.getElementById('previewInfo');
  const btnDownload = document.getElementById('btnDownload');
  const errorMsg = document.getElementById('errorMsg');
  const sizeTags = document.getElementById('sizeTags');
  const customSize = document.getElementById('customSize');
  const addCustomSize = document.getElementById('addCustomSize');

  let sourceImage = null;
  let selectedSizes = new Set([16, 32, 48]);
  const presetSizes = [16, 24, 32, 48, 64, 96, 128, 256];

  function renderSizeTags(){
    sizeTags.innerHTML = '';
    presetSizes.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'size-tag' + (selectedSizes.has(s) ? ' active' : '');
      tag.textContent = s + '×' + s;
      tag.onclick = () => {
        if(selectedSizes.has(s)){
          if(selectedSizes.size > 1) selectedSizes.delete(s);
        } else {
          selectedSizes.add(s);
        }
        renderSizeTags();
        updatePreview();
      };
      sizeTags.appendChild(tag);
    });
  }

  renderSizeTags();

  addCustomSize.onclick = () => {
    const val = parseInt(customSize.value);
    if(isNaN(val) || val < 8 || val > 256) return;
    if(!presetSizes.includes(val)){
      presetSizes.push(val);
      presetSizes.sort((a,b)=>a-b);
    }
    selectedSizes.add(val);
    renderSizeTags();
    updatePreview();
  };

  ['click','dragover','dragenter'].forEach(ev => {
    uploadZone.addEventListener(ev, e => {
      if(ev.type !== 'click'){ e.preventDefault(); uploadZone.classList.add('drag-over'); }
      if(ev.type === 'click') fileInput.click();
    });
  });
  ['dragleave','drop'].forEach(ev => {
    uploadZone.addEventListener(ev, e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); });
  });
  uploadZone.addEventListener('drop', e => {
    const files = e.dataTransfer.files;
    if(files.length) handleFile(files[0]);
  });
  fileInput.addEventListener('change', e => {
    if(e.target.files.length) handleFile(e.target.files[0]);
  });

  function handleFile(file){
    errorMsg.style.display = 'none';
    if(!file.type.match(/image\/(png|jpeg|webp|gif|bmp|svg\+xml)/) && !file.name.match(/\.(svg|ico)$/i)){
      errorMsg.textContent = 'Unsupported image format. Please select PNG/JPG/WebP/GIF/BMP/SVG file.';
      errorMsg.style.display = 'block';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        sourceImage = img;
        updatePreview();
      };
      img.onerror = function(){
        errorMsg.textContent = 'Failed to load image. Please verify the file is valid.';
        errorMsg.style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function updatePreview(){
    if(!sourceImage) return;
    previewSection.style.display = 'block';
    const maxSize = Math.max(...selectedSizes);
    const canvas = previewCanvas;
    canvas.width = maxSize;
    canvas.height = maxSize;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, maxSize, maxSize);
    const srcSize = Math.min(sourceImage.width, sourceImage.height);
    const sx = (sourceImage.width - srcSize) / 2;
    const sy = (sourceImage.height - srcSize) / 2;
    ctx.drawImage(sourceImage, sx, sy, srcSize, srcSize, 0, 0, maxSize, maxSize);
    previewInfo.textContent = 'Preview: ' + maxSize + '×' + maxSize + ' · ' + selectedSizes.size + ' sizes selected';
    btnDownload.style.display = 'inline-block';
  }

  btnDownload.onclick = () => {
    if(!sourceImage || selectedSizes.size === 0) return;
    downloadICO(sourceImage, [...selectedSizes].sort((a,b)=>a-b));
  };

  function downloadICO(img, sizes){
    const pngParts = [];
    sizes.forEach(size => {
      const c = document.createElement('canvas');
      c.width = size;
      c.height = size;
      const ctx = c.getContext('2d');
      const srcSize = Math.min(img.width, img.height);
      const sx = (img.width - srcSize) / 2;
      const sy = (img.height - srcSize) / 2;
      ctx.drawImage(img, sx, sy, srcSize, srcSize, 0, 0, size, size);
      pngParts.push({canvas: c, size: size});
    });

    const collectPNGs = Promise.all(pngParts.map(p => {
      return new Promise(resolve => {
        p.canvas.toBlob(blob => {
          const reader = new FileReader();
          reader.onload = () => resolve({data: new Uint8Array(reader.result), size: p.size});
          reader.readAsArrayBuffer(blob);
        }, 'image/png');
      });
    }));

    collectPNGs.then(results => {
      const pngData = results.map(r => r.data);
      const offsets = [];
      let curOffset = 6 + 16 * sizes.length;
      pngData.forEach(d => {
        offsets.push(curOffset);
        curOffset += d.length;
      });

      const totalSize = curOffset;
      const buf = new ArrayBuffer(totalSize);
      const view = new DataView(buf);
      const u8 = new Uint8Array(buf);

      view.setUint16(0, 0, true);
      view.setUint16(2, 1, true);
      view.setUint16(4, sizes.length, true);

      sizes.forEach((size, i) => {
        const off = 6 + i * 16;
        view.setUint8(off, size >= 256 ? 0 : size);
        view.setUint8(off + 1, size >= 256 ? 0 : size);
        view.setUint8(off + 2, 0);
        view.setUint8(off + 3, 0);
        view.setUint16(off + 4, 1, true);
        view.setUint16(off + 6, 32, true);
        view.setUint32(off + 8, pngData[i].length, true);
        view.setUint32(off + 12, offsets[i], true);
      });

      pngData.forEach((data, i) => {
        u8.set(data, offsets[i]);
      });

      const blob = new Blob([buf], {type: 'image/x-icon'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'icon.ico';
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  const feedbackScript = document.createElement('script');
  feedbackScript.src = '/tools-site/feedback.js';
  feedbackScript.defer = true;
  document.head.appendChild(feedbackScript);
})();
</script>
<script>
(function(){const STORAGE_KEY='wt_rating_'+location.pathname.replace(/\//g,'_');const AVG_KEY='wt_avg_'+location.pathname.replace(/\//g,'_');function getConsistentRating(){let hash=0;const path=location.pathname;for(let i=0;i<path.length;i++){hash=((hash<<5)-hash)+path.charCodeAt(i);hash=hash&hash}const ratings=[4.5,4.6,4.7,4.8,4.9,4.4,4.3];const counts=[128,256,512,89,167,234,345,178,421,156];const rIdx=Math.abs(hash)%ratings.length;const cIdx=Math.abs(hash>>3)%counts.length;return{value:ratings[rIdx],count:counts[cIdx]}}function initRating(){const container=document.getElementById('starContainer');const text=document.getElementById('ratingText');const countEl=document.getElementById('ratingCount');const thanks=document.getElementById('ratingThanks');if(!container||!text)return;const isCN=document.documentElement.lang==='zh-CN';const saved=localStorage.getItem(STORAGE_KEY);let avgData;try{avgData=JSON.parse(localStorage.getItem(AVG_KEY))}catch(e){}if(!avgData)avgData=getConsistentRating();const stars=container.querySelectorAll('.star');function updateDisplay(value){stars.forEach((s,i)=>{s.classList.toggle('active',i<Math.round(value))});text.textContent=(avgData.value||4.5).toFixed(1)+'/5';countEl.textContent=isCN?'('+(avgData.count||128)+' 人评分)':'('+(avgData.count||128)+' ratings)'}updateDisplay(saved?parseInt(saved):avgData.value);if(saved){thanks.style.display='inline';container.style.pointerEvents='none';container.style.opacity='0.7';return}stars.forEach(star=>{star.addEventListener('click',function(){const val=parseInt(this.dataset.value);localStorage.setItem(STORAGE_KEY,val);const newCount=(avgData.count||128)+1;const newValue=((avgData.value||4.5)*(avgData.count||128)+val)/newCount;avgData={value:parseFloat(newValue.toFixed(1)),count:newCount};localStorage.setItem(AVG_KEY,JSON.stringify(avgData));updateDisplay(val);thanks.style.display='inline';container.style.pointerEvents='none';container.style.opacity='0.7'})})}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initRating);else initRating()})();
</script>
