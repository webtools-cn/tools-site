<script>
(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🔢 Matrix Setup</h2><div class="row"><div class="field"><label>Matrix Size</label><select id="matrixSize"><option value="2">2×2</option><option value="3" selected>3×3</option><option value="4">4×4</option></select></div><div class="field"><label>Operation</label><select id="operation"><option value="add">Add (A+B)</option><option value="subtract">Subtract (A-B)</option><option value="multiply">Multiply (A×B)</option><option value="transpose">Transpose (Aᵀ)</option><option value="determinant">Determinant (|A|)</option><option value="inverse">Inverse (A⁻¹)</option></select></div></div><div class="row"><div class="field"><h3 style="color:#22d3ee;font-size:.95rem;margin-bottom:8px">Matrix A</h3><div id="matrixA"></div></div><div class="field" id="matrixBField"><h3 style="color:#f97316;font-size:.95rem;margin-bottom:8px">Matrix B</h3><div id="matrixB"></div></div></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">🔢 Calculate</button><button class="btn btn-secondary" id="resetBtn">🔄 Reset</button></div></div><div class="result-section" id="resultSection"><h2>📊 Result</h2><div class="result-box" id="resultDisplay"></div></div>';
document.getElementById('usageContent').innerHTML='<p>Select matrix size and operation, enter values, and click "Calculate" to get the result.</p><p>Supports addition, subtraction, multiplication, transpose, determinant, and inverse for 2×2, 3×3, and 4×4 matrices.</p>';

function createMatrixInputs(containerId,size){
  var container=document.getElementById(containerId);
  var html='';
  for(var i=0;i<size;i++){
    html+='<div class="matrix-row">';
    for(var j=0;j<size;j++){
      html+='<input type="number" class="matrix-input" data-row="'+i+'" data-col="'+j+'" value="'+(i===j?'1':'0')+'" step="any">';
    }
    html+='</div>';
  }
  container.innerHTML=html;
}

function readMatrix(containerId,size){
  var m=[];
  var inputs=document.querySelectorAll('#'+containerId+' .matrix-input');
  for(var i=0;i<size;i++){
    m[i]=[];
    for(var j=0;j<size;j++){
      m[i][j]=parseFloat(inputs[i*size+j].value)||0;
    }
  }
  return m;
}

function formatMatrix(m,label){
  var size=m.length;
  var html='<div class="matrix-wrap"><span class="bracket">[</span><span style="display:inline-block;vertical-align:middle">';
  for(var i=0;i<size;i++){
    html+='<div class="matrix-row" style="justify-content:flex-start">';
    for(var j=0;j<size;j++){
      var v=m[i][j];
      var s=typeof v==='number'?(Number.isInteger(v)?v.toString():v.toFixed(2)):v;
      html+='<span style="display:inline-block;width:60px;text-align:center;padding:4px;font-size:.85rem">'+s+'</span>';
    }
    html+='</div>';
  }
  html+='</span><span class="bracket">]</span></div>';
  return html;
}

document.getElementById('matrixSize').addEventListener('change',function(){
  var size=parseInt(this.value);
  createMatrixInputs('matrixA',size);
  createMatrixInputs('matrixB',size);
  var op=document.getElementById('operation').value;
  document.getElementById('matrixBField').style.display=(op==='transpose'||op==='determinant'||op==='inverse')?'none':'block';
});

document.getElementById('operation').addEventListener('change',function(){
  var op=this.value;
  document.getElementById('matrixBField').style.display=(op==='transpose'||op==='determinant'||op==='inverse')?'none':'block';
});

document.getElementById('resetBtn').addEventListener('click',function(){
  var size=parseInt(document.getElementById('matrixSize').value);
  createMatrixInputs('matrixA',size);
  createMatrixInputs('matrixB',size);
  document.getElementById('resultSection').classList.remove('show');
});

var size=parseInt(document.getElementById('matrixSize').value);
createMatrixInputs('matrixA',size);
createMatrixInputs('matrixB',size);

document.getElementById('calcBtn').addEventListener('click',function(){
  var size=parseInt(document.getElementById('matrixSize').value);
  var op=document.getElementById('operation').value;
  var A=readMatrix('matrixA',size);
  var result='';
  try{
    if(op==='add'||op==='subtract'){
      var B=readMatrix('matrixB',size);
      var C=[];
      for(var i=0;i<size;i++){
        C[i]=[];
        for(var j=0;j<size;j++){
          C[i][j]=op==='add'?A[i][j]+B[i][j]:A[i][j]-B[i][j];
        }
      }
      result=formatMatrix(A,'A')+'<div style="text-align:center;color:#22d3ee;font-size:1.5rem;padding:8px">'+(op==='add'?'+':'-')+'</div>'+formatMatrix(B,'B')+'<div style="text-align:center;color:#22d3ee;font-size:1.5rem;padding:8px">=</div>'+formatMatrix(C,'C');
    }else if(op==='multiply'){
      var B=readMatrix('matrixB',size);
      var C=[];
      for(var i=0;i<size;i++){
        C[i]=[];
        for(var j=0;j<size;j++){
          C[i][j]=0;
          for(var k=0;k<size;k++) C[i][j]+=A[i][k]*B[k][j];
        }
      }
      result=formatMatrix(A,'A')+'<div style="text-align:center;color:#22d3ee;font-size:1.5rem;padding:8px">×</div>'+formatMatrix(B,'B')+'<div style="text-align:center;color:#22d3ee;font-size:1.5rem;padding:8px">=</div>'+formatMatrix(C,'C');
    }else if(op==='transpose'){
      var C=[];
      for(var i=0;i<size;i++){
        C[i]=[];
        for(var j=0;j<size;j++) C[i][j]=A[j][i];
      }
      result=formatMatrix(A,'A')+'<div style="text-align:center;color:#22d3ee;font-size:1.5rem;padding:8px">→ Aᵀ</div>'+formatMatrix(C,'AT');
    }else if(op==='determinant'){
      function det(m){
        var n=m.length;
        if(n===1) return m[0][0];
        if(n===2) return m[0][0]*m[1][1]-m[0][1]*m[1][0];
        var d=0;
        for(var c=0;c<n;c++){
          var sub=[];
          for(var i=1;i<n;i++){
            sub[i-1]=[];
            for(var j=0;j<n;j++) if(j!==c) sub[i-1].push(m[i][j]);
          }
          d+=((c%2===0)?1:-1)*m[0][c]*det(sub);
        }
        return d;
      }
      var d=det(A);
      result=formatMatrix(A,'A')+'<div class="formula-box">det(A) = '+d+'</div>';
    }else if(op==='inverse'){
      function det(m){
        var n=m.length;
        if(n===1) return m[0][0];
        if(n===2) return m[0][0]*m[1][1]-m[0][1]*m[1][0];
        var d=0;
        for(var c=0;c<n;c++){
          var sub=[];
          for(var i=1;i<n;i++){
            sub[i-1]=[];
            for(var j=0;j<n;j++) if(j!==c) sub[i-1].push(m[i][j]);
          }
          d+=((c%2===0)?1:-1)*m[0][c]*det(sub);
        }
        return d;
      }
      var d=det(A);
      if(d===0){result='<p style="color:#f87171">Matrix is singular (determinant = 0)</p>';document.getElementById('resultDisplay').innerHTML=result;document.getElementById('resultSection').classList.add('show');return;}
      var n=size;
      var inv=[];
      for(var i=0;i<n;i++){
        inv[i]=[];
        for(var j=0;j<n;j++){
          var sub=[];
          for(var r=0;r<n;r++){
            if(r===i) continue;
            var row=[];
            for(var c=0;c<n;c++){
              if(c===j) continue;
              row.push(A[r][c]);
            }
            sub.push(row);
          }
          var minor=det(sub);
          inv[i][j]=((i+j)%2===0?1:-1)*minor/d;
        }
      }
      var invT=[];
      for(var i=0;i<n;i++){
        invT[i]=[];
        for(var j=0;j<n;j++) invT[i][j]=inv[j][i];
      }
      result=formatMatrix(A,'A')+'<div style="text-align:center;color:#22d3ee;font-size:1.2rem;padding:8px">det(A) = '+d.toFixed(2)+'</div>'+'<div style="text-align:center;color:#22d3ee;font-size:1rem;padding:4px">↓ A⁻¹</div>'+formatMatrix(invT,'Ainv');
    }
    document.getElementById('resultDisplay').innerHTML=result;
    document.getElementById('resultSection').classList.add('show');
  }catch(e){
    document.getElementById('resultDisplay').innerHTML='<p style="color:#f87171">Error: '+e.message+'</p>';
    document.getElementById('resultSection').classList.add('show');
  }
});
})();
