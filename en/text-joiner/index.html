<style>:root{--primary:#2563eb;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--hover:#eff6ff;--radius:12px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}header .logo{font-size:1.3rem;font-weight:700;color:var(--primary);text-decoration:none}header nav{display:flex;gap:8px;flex-wrap:wrap}header nav a{color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:0.9rem;transition:all .2s}header nav a:hover{background:var(--hover);color:var(--primary)}main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:32px 20px 60px}h1{font-size:1.8rem;margin-bottom:8px;color:var(--text)}.subtitle{color:var(--text2);margin-bottom:28px;font-size:0.95rem}.card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:20px}.card h3{font-size:1rem;margin-bottom:16px;color:var(--text)}textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.95rem;font-family:'SF Mono',Monaco,monospace;background:#fafbfc;resize:vertical;min-height:160px;transition:border-color .2s;line-height:1.5}textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15)}.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3)}.btn-outline{background:var(--card);color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover{background:var(--hover)}.btn-success{background:#059669;color:#fff}.btn-success:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(5,150,105,.3)}.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.sep-group{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.sep-option{padding:6px 16px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:0.9rem;color:var(--text2);transition:all .2s}.sep-option:hover{border-color:var(--primary);color:var(--primary)}.sep-option.active{border-color:var(--primary);background:var(--hover);color:var(--primary);font-weight:600}.sep-custom{display:flex;gap:8px;align-items:center;margin-top:8px}.sep-custom input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;max-width:120px}.sep-custom input:focus{outline:none;border-color:var(--primary)}.result-box{background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-top:16px;font-family:'SF Mono',Monaco,monospace;font-size:0.9rem;word-break:break-all;line-height:1.6;max-height:200px;overflow-y:auto;white-space:pre-wrap;display:none}.stats{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;font-size:0.85rem;color:var(--text2)}.stats span{background:#f1f5f9;padding:4px 12px;border-radius:6px}footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;color:var(--text2);font-size:0.85rem;margin-top:auto}footer a{color:var(--primary);text-decoration:none}@media(max-width:640px){main{padding:20px 12px 40px}h1{font-size:1.4rem}.card{padding:16px}}</style>

<body>
<header>
<a href="/en/" class="logo">🧰 Free ToolBase</a>
<nav>
<a href="/en/">🏠 Home</a>
<a href="/text-joiner/">中文</a>
</nav>
</header>
<main>
<h1>🔗 Text Joiner</h1>
<p class="subtitle">Combine multiple lines of text into one with your choice of separator</p>
<div class="card">
<h3>📝 Input Text (one item per line)</h3>
<textarea id="inputText" placeholder="apple&#10;banana&#10;orange&#10;grape&#10;watermelon"></textarea>
<div class="sep-group" id="sepGroup">
<span class="sep-option active" data-sep=", ">, Comma+Space</span>
<span class="sep-option" data-sep=",">, Comma</span>
<span class="sep-option" data-sep=" ">Space</span>
<span class="sep-option" data-sep="|"> | Pipe</span>
<span class="sep-option" data-sep="
">Newline</span>
<span class="sep-option" data-sep="">None</span>
</div>
<div class="sep-custom">
<label style="color:var(--text2);font-size:0.9rem">Custom separator:</label>
<input type="text" id="customSep" placeholder="Type your own..." maxlength="20">
</div>
<div class="btn-group">
<button class="btn btn-primary" onclick="joinText()">🔗 Join</button>
<button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
<button class="btn btn-outline" onclick="clearAll()">🗑 Clear</button>
</div>
<div id="resultBox" class="result-box"></div>
<div class="stats" id="stats"></div>
</div>
</main>
<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/en/">Free ToolBase</a> · Free Online Tools · <a href="/en/privacy-policy/">Privacy Policy</a></p>
</footer>
<script>
function showToast(msg){
  var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
  m.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function clearAll(){
  document.getElementById('inputText').value='';
  document.getElementById('resultBox').style.display='none';
  document.getElementById('stats').innerHTML='';
  document.querySelectorAll('.sep-option')[0].click();
}
</script>
<script>
(function(){
  var options=document.querySelectorAll('.sep-option');
  for(var i=0;i<options.length;i++){
    (function(opt){
      opt.addEventListener('click',function(){
        options.forEach(function(o){o.classList.remove('active');});
        opt.classList.add('active');
        document.getElementById('customSep').value='';
      });
    })(options[i]);
  }
  document.getElementById('customSep').addEventListener('input',function(){
    options.forEach(function(o){o.classList.remove('active');});
  });
  document.getElementById('inputText').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&e.ctrlKey){joinText();}
  });
})();
function getSeparator(){
  var custom=document.getElementById('customSep').value;
  if(custom) return custom;
  var active=document.querySelector('.sep-option.active');
  if(active) return active.getAttribute('data-sep');
  return ', ';
}
function joinText(){
  var text=document.getElementById('inputText').value;
  if(!text.trim()){showToast('Please enter text');return;}
  var lines=text.split('\n');
  var sep=getSeparator();
  var result=lines.join(sep);
  var box=document.getElementById('resultBox');
  box.textContent=result;
  box.style.display='block';
  var stats=document.getElementById('stats');
  var totalLines=lines.length;
  var nonEmpty=lines.filter(function(l){return l.trim()!=='';}).length;
  var totalChars=result.length;
  stats.innerHTML='<span>📊 Total lines: '+totalLines+'</span><span>✅ Non-empty: '+nonEmpty+'</span><span>📏 Length: '+totalChars+' chars</span>';
}
function copyResult(){
  var box=document.getElementById('resultBox');
  if(box.style.display==='none'||!box.textContent){showToast('Please join text first');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(box.textContent).then(function(){
      showToast('✅ Copied to clipboard');
    }).catch(function(){
      fallbackCopy(box.textContent);
    });
  }else{fallbackCopy(box.textContent);}
}
function fallbackCopy(t){
  var ta=document.createElement('textarea');
  ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('✅ Copied to clipboard');}catch(e){showToast('❌ Copy failed');}
  document.body.removeChild(ta);
}
</script>
<style>.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;padding:12px 24px;border-radius:8px;font-size:.9rem;border:1px solid rgba(148,163,184,.15);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}.toast.show{opacity:1}</style>
</body>
</html>
