    <div class="faq-item">
      <h3>Base32是什么？</h3>
      <p>Base32是一种将二进制数据编码为32个可打印字符（A-Z和2-7）的编码方式。它比Base64更易于人类阅读和手动输入，因为排除了容易混淆的字符（如0、O、1、I、L）。广泛用于密钥分享、OTP双因素认证、DNS安全（如DNSSEC）等领域。</p>
    </div>
    <div class="faq-item">
      <h3>Base32和Base64有什么区别？</h3>
      <p>Base32使用32个字符集（A-Z和2-7），Base64使用64个字符集（A-Z、a-z、0-9、+、/）。Base32编码后的体积比Base64大约20%，但字符集不区分大小写且避免了易混淆字符，更适合人工阅读和口头传达。Base32常用于OTP密钥和Tor洋葱域名，Base64常用于邮件附件编码和Data URL。</p>
    </div>

<script>
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
var BASE32_ALPHABET="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
function base32Encode(input){
  var bytes=new TextEncoder().encode(input);
  var bits="",result="";
  for(var i=0;i<bytes.length;i++)bits+=bytes[i].toString(2).padStart(8,"0");
  for(var i=0;i<bits.length;i+=5){
    var chunk=bits.substring(i,i+5);
    if(chunk.length<5)chunk=chunk.padEnd(5,"0");
    result+=BASE32_ALPHABET[parseInt(chunk,2)];
  }
  var padding=8-(result.length%8);
  if(padding>0&&padding<8)result+="=".repeat(padding);
  return result;
}
function base32Decode(input){
  input=input.toUpperCase().replace(/[^A-Z2-7=]/g,"").replace(/=+$/,"");
  var bits="";
  for(var i=0;i<input.length;i++){
    var idx=BASE32_ALPHABET.indexOf(input[i]);
    if(idx===-1)continue;
    bits+=idx.toString(2).padStart(5,"0");
  }
  var bytes=[];
  for(var i=0;i+8<=bits.length;i+=8)bytes.push(parseInt(bits.substring(i,i+8),2));
  return new TextDecoder().decode(new Uint8Array(bytes));
}
function convert(){
  var input=document.getElementById("input").value;
  if(!input){showToast("请输入内容");return}
  var mode=document.querySelector("input[name=mode]:checked").value;
  var result;
  try{
    if(mode==="encode")result=base32Encode(input);
    else result=base32Decode(input);
    document.getElementById("result").textContent=result;
  }catch(e){
    document.getElementById("result").textContent="❌ 转换失败："+e.message;
  }
}
function copyResult(){
  var t=document.getElementById("result").textContent;
  if(!t||t.indexOf("结果将")>=0){showToast("没有可复制的结果");return}
  navigator.clipboard.writeText(t).then(function(){showToast("已复制到剪贴板")}).catch(function(){showToast("复制失败")});
}
function clearAll(){document.getElementById("input").value="";document.getElementById("result").innerHTML='<span class="placeholder">结果将显示在这里...</span>'}
</script>
