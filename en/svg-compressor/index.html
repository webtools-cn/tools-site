<body>
<div class="container">
<div class="header">
<div><h1>📦 SVG Compressor</h1></div>
<div class="lang-switch"><a href="/svg-compressor/">中文</a><a href="/en/svg-compressor/" class="active">EN</a></div>
</div>
<div class="nav-back">← <a href="/en/">Back to Tools</a></div>

<div class="card">
<div class="upload-area" id="dropArea">
<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 2v6h6" fill="none" stroke="#64748b" stroke-width="2"/><path d="M12 18v-6m-3 3l3-3 3 3" fill="none" stroke="#64748b" stroke-width="2"/></svg>
<p>Drop SVG file here, or click to upload</p>
<p class="hint">Supports .svg format</p>
<input type="file" id="fileInput" accept=".svg" style="display:none">
</div>

<div class="options">
<label><input type="checkbox" id="optRemoveComments" checked> Remove comments</label>
<label><input type="checkbox" id="optRemoveMetadata" checked> Remove metadata</label>
<label><input type="checkbox" id="optRemoveEditorNS" checked> Clean editor attributes</label>
<label><input type="checkbox" id="optCollapseGroups" checked> Collapse single-child groups</label>
<label><input type="checkbox" id="optPrecision" checked> Round decimal precision</label>
</div>
</div>

<div class="stats">
<div class="stat"><div class="num" id="originalSize">0</div><div class="label">Original (bytes)</div></div>
<div class="stat"><div class="num" id="compressedSize">0</div><div class="label">Compressed (bytes)</div></div>
<div class="stat"><div class="num" id="savingsPercent">0%</div><div class="label savings">Savings</div></div>
</div>

<div class="editor-grid">
<div class="card" style="margin:0">
<h2>📥 Input SVG</h2>
<div class="code-box">
<div class="code-header"><label>Paste or upload SVG code</label><span class="size-info" id="origSizeLabel"></span></div>
<textarea class="svg-editor" id="inputSvg" placeholder="Paste SVG code here, or upload a .svg file..."></textarea>
</div>
<div class="controls">
<button class="btn btn-primary" onclick="compress()">⚡ Compress</button>
<button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear</button>
<button class="btn btn-sm btn-secondary" onclick="loadExample1()">📋 Example 1</button>
<button class="btn btn-sm btn-secondary" onclick="loadExample2()">📋 Example 2</button>
</div>
</div>

<div class="card" style="margin:0">
<h2>📤 Compressed Result</h2>
<div class="code-box">
<div class="code-header"><label>Optimized SVG</label><span class="size-info" id="compSizeLabel"></span></div>
<div class="svg-output" id="outputSvg">Click "Compress" to see result</div>
</div>
<div class="controls">
<button class="btn btn-sm btn-primary" onclick="copyOutput()">📋 Copy Result</button>
<button class="btn btn-sm btn-secondary" onclick="downloadSvg()">⬇️ Download SVG</button>
</div>
</div>
</div>

<div class="card" style="margin-top:16px">
<div class="preview-box" id="previewBox"><span style="color:#64748b;font-size:.85rem">SVG preview will appear here</span></div>
</div>

</div>

<div class="copy-toast" id="copyToast">✅ Copied to clipboard!</div>

<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');

dropArea.addEventListener('click', () => fileInput.click());
dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.svg')) readFile(file);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('inputSvg').value = e.target.result;
    updateStats();
  };
  reader.readAsText(file);
}

function compress() {
  const input = document.getElementById('inputSvg').value;
  if (!input.trim()) return;
  try {
    const result = optimizeSvg(input);
    document.getElementById('outputSvg').textContent = result;
    updateStats();
    updatePreview(result);
  } catch(e) {
    document.getElementById('outputSvg').textContent = '❌ Error: ' + e.message;
  }
}

function optimizeSvg(svg) {
  let result = svg;
  if (document.getElementById('optRemoveComments').checked) result = result.replace(/<!--[\s\S]*?-->/g, '');
  if (document.getElementById('optRemoveMetadata').checked) {
    result = result.replace(/<metadata[\s\S]*?<\/metadata>/gi, '');
    result = result.replace(/<title[\s\S]*?<\/title>/gi, '');
    result = result.replace(/<desc[\s\S]*?<\/desc>/gi, '');
  }
  if (document.getElementById('optRemoveEditorNS').checked) {
    result = result.replace(/\s+(inkscape|sodipodi|svg|xmlns:inkscape|xmlns:sodipodi):[^=]+="[^"]*"/gi, '');
    result = result.replace(/\s+data-[^=]+="[^"]*"/gi, '');
    result = result.replace(/\s+id="[^"]*"/gi, '');
    result = result.replace(/\s+xmlns:(cc|dc|rdf|inkscape|sodipodi)="[^"]*"/gi, '');
  }
  if (document.getElementById('optCollapseGroups').checked) {
    result = result.replace(/<g[^>]*>(\s*)<([a-z][^>]*\/?>[\s\S]*?)<\/g>/gi, (match, ws, inner) => ws + inner);
  }
  if (document.getElementById('optPrecision').checked) {
    result = result.replace(/(\d+\.\d+)/g, (m) => {
      const n = parseFloat(m);
      return n.toFixed(2).replace(/\.?0+$/, '');
    });
  }
  result = result.replace(/\s+[a-z-]+=""/gi, '');
  result = result.replace(/<\?xml[^>]*\?>\s*/gi, '');
  result = result.replace(/>\s+</g, '><');
  result = result.replace(/\s{2,}/g, ' ');
  result = result.trim();
  if (!result.match(/<svg/i)) throw new Error('Input is not valid SVG');
  return result;
}

function updateStats() {
  const input = document.getElementById('inputSvg').value;
  const output = document.getElementById('outputSvg').textContent;
  const origSize = new Blob([input]).size;
  const compSize = output.startsWith('Click') || output.startsWith('❌') ? origSize : new Blob([output]).size;
  document.getElementById('originalSize').textContent = origSize;
  document.getElementById('compressedSize').textContent = compSize === origSize ? 0 : compSize;
  document.getElementById('origSizeLabel').textContent = origSize + ' B';
  document.getElementById('compSizeLabel').textContent = (compSize === origSize ? '' : compSize + ' B');
  if (origSize > 0 && compSize < origSize) {
    document.getElementById('savingsPercent').textContent = Math.round((1 - compSize / origSize) * 100) + '%';
  } else {
    document.getElementById('savingsPercent').textContent = '0%';
  }
}

function updatePreview(svgContent) {
  document.getElementById('previewBox').innerHTML = svgContent;
}

function copyOutput() {
  const text = document.getElementById('outputSvg').textContent;
  if (text && !text.startsWith('Click') && !text.startsWith('❌')) {
    navigator.clipboard.writeText(text).then(() => {
      document.getElementById('copyToast').classList.add('show');
      setTimeout(() => document.getElementById('copyToast').classList.remove('show'), 2000);
    });
  }
}

function downloadSvg() {
  const text = document.getElementById('outputSvg').textContent;
  if (text && !text.startsWith('Click') && !text.startsWith('❌')) {
    const blob = new Blob([text], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'optimized.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
}

function clearAll() {
  document.getElementById('inputSvg').value = '';
  document.getElementById('outputSvg').textContent = 'Click "Compress" to see result';
  document.getElementById('previewBox').innerHTML = '<span style="color:#64748b;font-size:.85rem">SVG preview will appear here</span>';
  document.getElementById('originalSize').textContent = '0';
  document.getElementById('compressedSize').textContent = '0';
  document.getElementById('savingsPercent').textContent = '0%';
  document.getElementById('origSizeLabel').textContent = '';
  document.getElementById('compSizeLabel').textContent = '';
}

function loadExample1() {
  document.getElementById('inputSvg').value = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48">
  <!-- Star icon -->
  <metadata>Created with SVG Editor v2.0</metadata>
  <title>Star</title>
  <desc>A five-pointed star icon</desc>
  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" id="star-path" data-editor="v1.0"/>
</svg>`;
  document.getElementById('outputSvg').textContent = 'Click "Compress" to see result';
  updateStats();
}

function loadExample2() {
  document.getElementById('inputSvg').value = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48">
  <!-- Arrow right circle -->
  <metadata>Generated by Icon Tool</metadata>
  <g id="arrow-group">
    <circle cx="12" cy="12" r="10" fill="#06b6d4" opacity="0.2" data-type="background"/>
    <path d="M12 16l4-4-4-4" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 12h8" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>`;
  document.getElementById('outputSvg').textContent = 'Click "Compress" to see result';
  updateStats();
}

document.getElementById('inputSvg').addEventListener('input', () => {
  if (!document.getElementById('inputSvg').value.trim()) {
    document.getElementById('originalSize').textContent = '0';
  }
});
</script>
</body>
