(function(){

var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>💬 Tooltip Style</h2><div class="row"><div class="field"><label>Direction</label><select id="tipDirection"><option value="top">Top</option><option value="bottom">Bottom</option><option value="left">Left</option><option value="right">Right</option></select></div><div class="field"><label>Animation</label><select id="tipAnimation"><option value="fade">Fade</option><option value="slide">Slide</option><option value="scale">Scale</option></select></div></div><div class="row"><div class="field"><label>Background</label><input type="color" id="tipBg" value="#1e293b"></div><div class="field"><label>Text Color</label><input type="color" id="tipTextColor" value="#f1f5f9"></div></div><div class="row"><div class="field"><label>Radius (px)</label><input type="number" id="tipRadius" value="6" min="0" max="20"></div><div class="field"><label>Font Size (px)</label><input type="number" id="tipFontSize" value="14" min="10" max="24"></div></div><div class="row"><div class="field"><label>Arrow Size (px)</label><input type="number" id="tipArrowSize" value="6" min="2" max="16"></div><div class="field"><label>Shadow</label><select id="tipShadow"><option value="none">None</option><option value="sm" selected>Light</option><option value="md">Medium</option><option value="lg">Strong</option></select></div></div><div class="options"><label><input type="checkbox" id="tipShowCode" checked> Show Code</label></div></div><div class="result-section show" id="previewSection"><h2>👁️ Preview</h2><div id="previewBox" style="display:flex;justify-content:center;align-items:center;padding:48px 40px;background:#0f172a;border-radius:12px;min-height:160px;position:relative"></div></div><div class="result-section show" id="codeSection"><h2>📋 CSS Code</h2><div class="btn-row"><button class="btn btn-success" id="copyBtn">📋 Copy Code</button></div><div id="codeOutput" class="result-box" style="font-family:monospace;font-size:.8rem"></div></div>';
document.getElementById('usageContent').innerHTML='<p>Choose tooltip direction (top/bottom/left/right) and animation (fade/slide/scale). Customize background, text color, border-radius, font size, and shadow.</p><p>Hover to preview the tooltip. One-click CSS copy. 100% client-side. Perfect for navigation hints, form help text, and UI interaction design.</p>';

function render(){var dir=document.getElementById('tipDirection').value;var anim=document.getElementById('tipAnimation').value;var bg=document.getElementById('tipBg').value;var textColor=document.getElementById('tipTextColor').value;var radius=parseInt(document.getElementById('tipRadius').value);var fontSize=parseInt(document.getElementById('tipFontSize').value);var arrow=parseInt(document.getElementById('tipArrowSize').value);var shadow=document.getElementById('tipShadow').value;
var shadowVal='none';if(shadow==='sm')shadowVal='0 2px 8px rgba(0,0,0,0.3)';else if(shadow==='md')shadowVal='0 4px 16px rgba(0,0,0,0.4)';else if(shadow==='lg')shadowVal='0 8px 32px rgba(0,0,0,0.5)';
var animCSS='';if(anim==='fade')animCSS='@keyframes tipFade { from { opacity: 0; } to { opacity: 1; } }';else if(anim==='slide'){if(dir==='top'||dir==='bottom')animCSS='@keyframes tipSlide { from { opacity: 0; transform: translateY('+(dir==='top'?'-8px':'8px')+'); } to { opacity: 1; transform: translateY(0); } }';else animCSS='@keyframes tipSlide { from { opacity: 0; transform: translateX('+(dir==='left'?'-8px':'8px')+'); } to { opacity: 1; transform: translateX(0); } }';}
else if(anim==='scale')animCSS='@keyframes tipScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }';
var animName=anim==='fade'?'tipFade':anim==='slide'?'tipSlide':'tipScale';
var css='/* Tooltip CSS */\n[data-tooltip] {\n  position: relative;\n  cursor: pointer;\n  display: inline-block;\n}\n[data-tooltip]::after {\n  content: attr(data-tooltip);\n  position: absolute;\n  background: '+bg+';\n  color: '+textColor+';\n  font-size: '+fontSize+'px;\n  padding: 6px 12px;\n  border-radius: '+radius+'px;\n  white-space: nowrap;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity 0.2s;';

if(shadowVal!=='none')css+='\n  box-shadow: '+shadowVal+';';
if(anim!=='fade')css+='\n  animation: '+animName+' 0.3s ease forwards;';
else css+='\n  transition: opacity 0.3s ease;';
css+='\n  z-index: 100;\n}';

// Arrow
css+='\n[data-tooltip]::before {\n  content: "";\n  position: absolute;\n  border: '+arrow+'px solid transparent;\n  pointer-events: none;\n  opacity: 0;';
if(anim!=='fade')css+='\n  animation: '+animName+' 0.3s ease forwards;';
else css+='\n  transition: opacity 0.3s ease;';
css+='\n  z-index: 100;\n}';

// Positioning
if(dir==='top'){css+='\n[data-tooltip]::after {\n  bottom: calc(100% + '+(arrow*2)+'px);\n  left: 50%;\n  transform: translateX(-50%);\n}\n[data-tooltip]::before {\n  top: -'+(arrow)+'px;\n  left: 50%;\n  transform: translateX(-50%);\n  border-top-color: '+bg+';\n}';}
else if(dir==='bottom'){css+='\n[data-tooltip]::after {\n  top: calc(100% + '+(arrow*2)+'px);\n  left: 50%;\n  transform: translateX(-50%);\n}\n[data-tooltip]::before {\n  bottom: -'+(arrow)+'px;\n  left: 50%;\n  transform: translateX(-50%);\n  border-bottom-color: '+bg+';\n}';}
else if(dir==='left'){css+='\n[data-tooltip]::after {\n  right: calc(100% + '+(arrow*2)+'px);\n  top: 50%;\n  transform: translateY(-50%);\n}\n[data-tooltip]::before {\n  left: -'+(arrow)+'px;\n  top: 50%;\n  transform: translateY(-50%);\n  border-left-color: '+bg+';\n}';}
else if(dir==='right'){css+='\n[data-tooltip]::after {\n  left: calc(100% + '+(arrow*2)+'px);\n  top: 50%;\n  transform: translateY(-50%);\n}\n[data-tooltip]::before {\n  right: -'+(arrow)+'px;\n  top: 50%;\n  transform: translateY(-50%);\n  border-right-color: '+bg+';\n}';}

css+='\n[data-tooltip]:hover::after,\n[data-tooltip]:hover::before {\n  opacity: 1;\n}';
if(anim!=='fade')css+='\n'+animCSS;

var html='<button data-tooltip="This is a tooltip!" style="padding:10px 20px;background:rgba(6,182,212,.15);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;font-size:14px;cursor:pointer">Hover me for a tooltip</button>';
document.getElementById('previewBox').innerHTML=html;
var styleTag=document.getElementById('dynamicStyle');if(!styleTag){styleTag=document.createElement('style');styleTag.id='dynamicStyle';document.head.appendChild(styleTag);}
styleTag.textContent=css;document.getElementById('codeOutput').textContent=css;}

document.getElementById('tipDirection').addEventListener('change',render);
document.getElementById('tipAnimation').addEventListener('change',render);
document.getElementById('tipBg').addEventListener('input',render);
document.getElementById('tipTextColor').addEventListener('input',render);
document.getElementById('tipRadius').addEventListener('input',render);
document.getElementById('tipFontSize').addEventListener('input',render);
document.getElementById('tipArrowSize').addEventListener('input',render);
document.getElementById('tipShadow').addEventListener('change',render);
document.getElementById('copyBtn').addEventListener('click',function(){navigator.clipboard.writeText(document.getElementById('codeOutput').textContent).then(function(){alert('Code copied!');});});
render();

})();
