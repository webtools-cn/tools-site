<script>
(function(){
const textInput = document.getElementById('c3dText');
const sizeSlider = document.getElementById('c3dSize');
const sizeVal = document.getElementById('c3dSizeVal');
const colorInput = document.getElementById('c3dColor');
const preview = document.getElementById('c3dPreview');
const codeOutput = document.getElementById('c3dCode');
const copyBtn = document.getElementById('copyC3dBtn');
const presetBtns = document.querySelectorAll('#c3dPresets .preset-btn');

let currentPreset = 'extrude';

function getPresetStyle(preset, color) {
  const s = parseInt(sizeSlider.value);
  switch(preset) {
    case 'extrude':
      return {
        css: `/* 3D Extrude Text */
.three-d-text {
  font-size: ${s}px;
  font-weight: bold;
  color: ${color};
  text-shadow:
    1px 1px 0 #666,
    2px 2px 0 #555,
    3px 3px 0 #444,
    4px 4px 0 #333,
    5px 5px 0 #222,
    6px 6px 0 #111,
    7px 7px 5px rgba(0,0,0,0.5);
}`,
        html: `font-size: ${s}px; font-weight:bold; color: ${color}; text-shadow: 1px 1px 0 #666, 2px 2px 0 #555, 3px 3px 0 #444, 4px 4px 0 #333, 5px 5px 0 #222, 6px 6px 0 #111, 7px 7px 5px rgba(0,0,0,0.5);`
      };
    case 'neon':
      return {
        css: `/* Neon Glow Text */
.neon-text {
  font-size: ${s}px;
  font-weight: bold;
  color: #fff;
  text-shadow:
    0 0 7px ${color},
    0 0 10px ${color},
    0 0 21px ${color},
    0 0 42px ${color},
    0 0 82px ${color},
    0 0 92px ${color},
    0 0 102px ${color},
    0 0 151px ${color};
}`,
        html: `font-size: ${s}px; font-weight:bold; color: #fff; text-shadow: 0 0 7px ${color}, 0 0 10px ${color}, 0 0 21px ${color}, 0 0 42px ${color}, 0 0 82px ${color}, 0 0 92px ${color}, 0 0 102px ${color}, 0 0 151px ${color};`
      };
    case 'emboss':
      return {
        css: `/* Emboss Text */
.emboss-text {
  font-size: ${s}px;
  font-weight: bold;
  color: #e2e8f0;
  text-shadow:
    -1px -1px 1px rgba(0,0,0,0.8),
    1px 1px 1px rgba(255,255,255,0.3);
}`,
        html: `font-size: ${s}px; font-weight:bold; color: #e2e8f0; text-shadow: -1px -1px 1px rgba(0,0,0,0.8), 1px 1px 1px rgba(255,255,255,0.3);`
      };
    case 'shadow':
      return {
        css: `/* Layered Shadow Text */
.layered-shadow-text {
  font-size: ${s}px;
  font-weight: bold;
  color: ${color};
  text-shadow:
    0 0 5px rgba(0,0,0,0.5),
    0 0 10px rgba(0,0,0,0.3),
    0 5px 15px rgba(0,0,0,0.4),
    0 10px 20px rgba(0,0,0,0.2),
    0 15px 30px rgba(0,0,0,0.1);
}`,
        html: `font-size: ${s}px; font-weight:bold; color: ${color}; text-shadow: 0 0 5px rgba(0,0,0,0.5), 0 0 10px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.2), 0 15px 30px rgba(0,0,0,0.1);`
      };
    case 'fire':
      return {
        css: `/* Fire Text */
.fire-text {
  font-size: ${s}px;
  font-weight: bold;
  color: #ff6b35;
  text-shadow:
    0 -1px 3px #ffd700,
    0 -2px 5px #ff8c00,
    0 -4px 8px #ff4500,
    0 -6px 12px #ff0000,
    0 1px 3px rgba(0,0,0,0.3);
}`,
        html: `font-size: ${s}px; font-weight:bold; color: #ff6b35; text-shadow: 0 -1px 3px #ffd700, 0 -2px 5px #ff8c00, 0 -4px 8px #ff4500, 0 -6px 12px #ff0000, 0 1px 3px rgba(0,0,0,0.3);`
      };
    case 'retro':
      return {
        css: `/* Retro/Vaporwave Text */
.retro-text {
  font-size: ${s}px;
  font-weight: bold;
  color: #ff71ce;
  text-shadow:
    2px 2px 0 #01cdfe,
    4px 4px 0 #05ffa1,
    6px 6px 0 #b967ff,
    8px 8px 0 #fffb96;
}`,
        html: `font-size: ${s}px; font-weight:bold; color: #ff71ce; text-shadow: 2px 2px 0 #01cdfe, 4px 4px 0 #05ffa1, 6px 6px 0 #b967ff, 8px 8px 0 #fffb96;`
      };
    default:
      return {css: '', html: ''};
  }
}

function renderPreview() {
  const text = textInput.value || '3D TEXT';
  const color = colorInput.value;
  const style = getPresetStyle(currentPreset, color);
  preview.innerHTML = '<span style="' + style.html + '">' + text + '</span>';
  codeOutput.textContent = style.css;
}

presetBtns.forEach(btn => {
  btn.addEventListener('click', function() {
    presetBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentPreset = this.dataset.preset;
    renderPreview();
  });
});

[textInput, sizeSlider, colorInput].forEach(el => {
  el.addEventListener('input', function() {
    sizeVal.textContent = sizeSlider.value;
    renderPreview();
  });
});

copyBtn.addEventListener('click', function() {
  navigator.clipboard.writeText(codeOutput.textContent).then(function() {
    copyBtn.textContent = 'Copied!';
    setTimeout(function() { copyBtn.textContent = 'Copy CSS'; }, 1500);
  });
});

renderPreview();
})();
</script>

</div>
