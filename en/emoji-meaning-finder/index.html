// Categories
const CATEGORIES = [...new Set(EMOJIS.map(e => e.c))];

// Category name mapping (Chinese → English)
const CAT_NAMES = {
  "笑脸与情感":"Smileys & Emotion",
  "动物与自然":"Animals & Nature",
  "符号与标志":"Symbols & Signs",
  "手势与动作":"Hand Gestures",
  "物体与符号":"Objects & Symbols",
  "旅行与地点":"Travel & Places",
  "音乐与艺术":"Music & Arts",
  "运动与活动":"Sports & Activities",
  "自然与天气":"Nature & Weather",
  "食品与饮料":"Food & Drink",
  "人物与人群":"People & Body",
  "节日与特殊":"Holidays & Special",
  "旗帜":"Flags",
  "手势与动作":"Hand Gestures",
};

// State
let currentCat = 'all';
let currentQuery = '';

function init() {
  renderCategoryTabs();
  renderEmojis(EMOJIS);
  setupSearch();
  setupModal();
}

function renderCategoryTabs() {
  const container = document.getElementById('categoryTabs');
  container.innerHTML = '<span class="cat-tab active" data-cat="all">All</span>' +
    CATEGORIES.map(c => `<span class="cat-tab" data-cat="${c}">${CAT_NAMES[c]||c}</span>`).join('');
  container.addEventListener('click', e => {
    const tab = e.target.closest('.cat-tab');
    if (!tab) return;
    container.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    filterEmojis();
  });
}

function renderEmojis(list) {
  const grid = document.getElementById('emojiGrid');
  const noResults = document.getElementById('noResults');
  const count = document.getElementById('resultCount');
  
  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    count.textContent = '共 0 个表情';
    return;
  }
  
  noResults.style.display = 'none';
  count.textContent = `Total: ${list.length} emojis`;
  
  grid.innerHTML = list.map(e => `
    <div class="emoji-card" data-emoji="${e.e}">
      <div class="emoji-char">${e.e}</div>
      <div class="emoji-info">
        <div class="emoji-name">${e.n}</div>
        <div class="emoji-desc">${e.m}</div>
        <span class="emoji-cat-tag">${CAT_NAMES[e.c]||e.c}</span>
      </div>
    </div>
  `).join('');
  
  // Click handlers
  grid.querySelectorAll('.emoji-card').forEach(card => {
    card.addEventListener('click', () => {
      const emoji = EMOJIS.find(e => e.e === card.dataset.emoji);
      if (emoji) showModal(emoji);
    });
  });
}

function filterEmojis() {
  let filtered = EMOJIS;
  if (currentCat !== 'all') {
    filtered = filtered.filter(e => e.c === currentCat);
  }
  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    filtered = filtered.filter(e => 
      e.n.toLowerCase().includes(q) || 
      e.m.toLowerCase().includes(q) || 
      e.c.toLowerCase().includes(q)
    );
  }
  renderEmojis(filtered);
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  input.addEventListener('input', () => {
    currentQuery = input.value;
    filterEmojis();
  });
}

function showModal(emoji) {
  document.getElementById('modalEmoji').textContent = emoji.e;
  document.getElementById('modalTitle').textContent = emoji.n;
  document.getElementById('modalCat').textContent = CAT_NAMES[emoji.c] || emoji.c;
  document.getElementById('modalMeaning').textContent = emoji.m;
  document.getElementById('modalUsage').textContent = emoji.u;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  
  // Copy button
  document.getElementById('modalCopyBtn').onclick = () => {
    navigator.clipboard.writeText(emoji.e).then(() => {
      showToast('Copied ' + emoji.e);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = emoji.e;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied ' + emoji.e);
    });
  };
}

function setupModal() {
  const overlay = document.getElementById('modalOverlay');
  const closeBtn = document.getElementById('modalClose');
  
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

document.addEventListener('DOMContentLoaded', init);
</script>

<div id="feedback-panel" style="display:none;position:absolute;bottom:56px;right:0;width:320px;background:#1e293b;border:1px solid rgba(6,182,212,.3);border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.4)">

<span style="color:#f1f5f9;font-size:.95rem;font-weight:600">📝 Feedback</span>
<button onclick="toggleFeedback()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
</div>
<select id="feedback-type" style="width:100%;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none">
<option value="feedback">💡 Feature Request</option>

</select>
<textarea id="feedback-text" placeholder="Describe your suggestion or issue..." style="width:100%;height:100px;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:10px;color:#e2e8f0;font-size:.85rem;resize:vertical;outline:none;font-family:inherit" maxlength="1000"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">Submit</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ Thank you! Your feedback has been submitted to GitHub Issues</div>
</div>
</div>
<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){alert('Please enter your feedback');return;}
const typeLabel={feedback:'💡 Feature Request',bug:'🐛 Bug Report',other:'💬 Other'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**Page**: '+window.location.href+'\n**Type**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
