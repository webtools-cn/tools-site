function hexToRgb(hex) {
  let h = hex.replace(/^#/, '');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  if (h.length !== 6) return null;
  return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
}

function parseColor(input) {
  input = input.trim();
  // Hex
  if (input.startsWith('#')) {
    const rgb = hexToRgb(input);
    return rgb ? {rgb, hex: input.toUpperCase()} : null;
  }
  if (/^[0-9A-Fa-f]{6}$/.test(input) || /^[0-9A-Fa-f]{3}$/.test(input)) {
    const rgb = hexToRgb('#' + input);
    return rgb ? {rgb, hex: '#' + input.toUpperCase()} : null;
  }
  // rgb()
  const rgbMatch = input.match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/);
  if (rgbMatch) {
    const r = Math.min(255, parseInt(rgbMatch[1])), g = Math.min(255, parseInt(rgbMatch[2])), b = Math.min(255, parseInt(rgbMatch[3]));
    const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0').toUpperCase()).join('');
    return {rgb: [r,g,b], hex};
  }
  // hsl()
  const hslMatch = input.match(/^hsl\s*\(\s*(\d+)\s*,\s*(\d+)%\s*,\s*(\d+)%\s*\)$/);
  if (hslMatch) {
    const h = parseInt(hslMatch[1]), s = parseInt(hslMatch[2])/100, l = parseInt(hslMatch[3])/100;
    const rgb = hslToRgb(h, s, l);
    const hex = '#' + rgb.map(v => v.toString(16).padStart(2,'0').toUpperCase()).join('');
    return {rgb, hex};
  }
  // Named color
  const lower = input.toLowerCase();
  if (CSS_COLORS[lower]) {
    const rgb = CSS_COLORS[lower];
    const hex = '#' + rgb.map(v => v.toString(16).padStart(2,'0').toUpperCase()).join('');
    return {rgb, hex, name: lower};
  }
  // Comma-separated
  const parts = input.split(',').map(s => parseInt(s.trim()));
  if (parts.length === 3 && parts.every(v => !isNaN(v))) {
    const r = Math.min(255, parts[0]), g = Math.min(255, parts[1]), b = Math.min(255, parts[2]);
    const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0').toUpperCase()).join('');
    return {rgb: [r,g,b], hex};
  }
  return null;
}

function hslToRgb(h, s, l) {
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs((h/60) % 2 - 1));
  const m = l - c/2;
  let r, g, b;
  if (h < 60) [r,g,b] = [c,x,0];
  else if (h < 120) [r,g,b] = [x,c,0];
  else if (h < 180) [r,g,b] = [0,c,x];
  else if (h < 240) [r,g,b] = [0,x,c];
  else if (h < 300) [r,g,b] = [x,0,c];
  else [r,g,b] = [c,0,x];
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}

  const parsed = parseColor(input);
  
  if (!parsed) {
    document.getElementById('color-preview-box').style.background = '#ccc';
    document.getElementById('result-section').classList.remove('show');
    return;
  }
  
  document.getElementById('color-preview-box').style.background = parsed.hex;
  
  // Find closest named color
  let closest = null;
  let minDist = Infinity;
  for (const [name, rgb] of Object.entries(CSS_COLORS)) {
    if (name === 'transparent') continue;
    const dist = colorDistance(parsed.rgb, rgb);
    if (dist < minDist) { minDist = dist; closest = name; }
  }
  
  const maxDist = colorDistance([0,0,0], [255,255,255]);
  const matchPct = Math.round((1 - minDist/maxDist) * 100);
  const closestRgb = CSS_COLORS[closest];
  const closestHex = '#' + closestRgb.map(v => v.toString(16).padStart(2,'0').toUpperCase()).join('');
  
  const named = parsed.name ? `<div style="margin-top:8px;padding:8px;background:rgba(6,182,212,.05);border-radius:6px;font-size:.9rem">匹配到标准颜色名称: <strong style="color:#22d3ee">${parsed.name}</strong></div>` : '';
  
  document.getElementById('result-section').classList.add('show');
  document.getElementById('result-content').innerHTML = `
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-size:.85rem;color:#94a3b8;margin-bottom:4px">你的颜色</div>
        <div style="width:100%;height:80px;border-radius:8px;background:${parsed.hex};border:1px solid rgba(148,163,184,.2)"></div>
        <div style="margin-top:8px;font-size:.85rem">
          <div><strong>Hex:</strong> ${parsed.hex}</div>
          <div><strong>RGB:</strong> rgb(${parsed.rgb.join(',')})</div>
        </div>
        ${named}
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:.85rem;color:#94a3b8;margin-bottom:4px">最接近的标准色</div>
        <div style="width:100%;height:80px;border-radius:8px;background:${closestHex};border:1px solid rgba(148,163,184,.2)"></div>
        <div style="margin-top:8px;font-size:.85rem">
          <div><strong>名称:</strong> <span style="color:#22d3ee">${closest}</span></div>
          <div><strong>Hex:</strong> ${closestHex}</div>
          <div><strong>匹配度:</strong> <span class="match-badge">${matchPct}%</span></div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('char-count').textContent = `RGB: (${parsed.rgb.join(', ')})`;
}

window.lookupColor = lookupColor;

</script>
</body>
</html>
