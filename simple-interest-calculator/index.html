<script>
(function(){
document.getElementById('app').innerHTML=`
<div class="input-section">
  <h2>📊 输入参数</h2>
  <div class="row">
    <div class="field">
      <label>本金金额 (元)</label>
      <input type="number" id="principal" value="10000" min="0" step="100">
    </div>
    <div class="field">
      <label>年利率 (%)</label>
      <input type="number" id="rate" value="5" min="0" step="0.1">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>期限</label>
      <input type="number" id="term" value="3" min="1" step="1">
    </div>
    <div class="field">
      <label>时间单位</label>
      <select id="unit">
        <option value="year">年</option>
        <option value="month">月</option>
        <option value="day">日</option>
      </select>
    </div>
  </div>
</div>
<div class="result-section" id="resultSection">
  <h2>✅ 计算结果</h2>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
    <div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center">
      <div style="color:#94a3b8;font-size:.8rem;margin-bottom:4px">利息总额</div>
      <div id="interestResult" style="font-size:1.5rem;color:#22d3ee;font-weight:700"></div>
    </div>
    <div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center">
      <div style="color:#94a3b8;font-size:.8rem;margin-bottom:4px">本息合计</div>
      <div id="totalResult" style="font-size:1.5rem;color:#4ade80;font-weight:700"></div>
    </div>
    <div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center">
      <div style="color:#94a3b8;font-size:.8rem;margin-bottom:4px">有效利率</div>
      <div id="effRateResult" style="font-size:1.5rem;color:#fbbf24;font-weight:700"></div>
    </div>
  </div>
  <div id="scheduleTable"></div>
</div>
`;
function calc(){
  var p=parseFloat(document.getElementById('principal').value)||0;
  var r=parseFloat(document.getElementById('rate').value)||0;
  var t=parseInt(document.getElementById('term').value)||0;
  var u=document.getElementById('unit').value;
  if(p<=0||r<=0||t<=0){return;}
  var yr=t,annualRate=r/100;
  if(u==='month'){yr=t/12;}
  else if(u==='day'){yr=t/365;}
  var interest=p*annualRate*yr;
  var total=p+interest;
  document.getElementById('interestResult').textContent='¥'+interest.toFixed(2);
  document.getElementById('totalResult').textContent='¥'+total.toFixed(2);
  document.getElementById('effRateResult').textContent=r.toFixed(2)+'%';
  var html='<h3 style="font-size:.95rem;color:#f1f5f9;margin-bottom:8px">详细计算表</h3><div class="table-wrap"><table class="data"><tr><th>期数</th><th>期初本金</th><th>当期利息</th><th>期末本息</th></tr>';
  var periods=u==='year'?t:(u==='month'?t:Math.min(t,30));
  var perRate=u==='year'?annualRate:(u==='month'?annualRate/12:annualRate/365);
  var balance=p;
  for(var i=1;i<=periods;i++){
    var perInt=balance*perRate;
    var endBal=balance+perInt;
    html+='<tr><td>'+i+(u==='year'?'年':(u==='month'?'月':'日'))+'</td><td>¥'+balance.toFixed(2)+'</td><td>¥'+perInt.toFixed(2)+'</td><td>¥'+endBal.toFixed(2)+'</td></tr>';
    balance=endBal;
  }
  html+='</table></div>';
  document.getElementById('scheduleTable').innerHTML=html;
}
document.getElementById('principal').addEventListener('input',calc);
document.getElementById('rate').addEventListener('input',calc);
document.getElementById('term').addEventListener('input',calc);
document.getElementById('unit').addEventListener('change',calc);
calc();
})();
</script>
