const CAT_NAMES = Object.keys(EMOJI_DATA);
let recentEmojis = JSON.parse(localStorage.getItem('recentEmojis') || '[]');
let currentCat = CAT_NAMES[0];

function renderCats(){
  const container = document.getElementById('emojiCats');
  container.innerHTML = CAT_NAMES.map(c => 
    `<span class="emoji-cat ${c === currentCat ? 'active' : ''}" onclick="switchCat('${c}')">${c}</span>`
  ).join('');
}

function switchCat(cat){
  currentCat = cat;
  document.querySelectorAll('.emoji-cat').forEach(el => el.classList.toggle('active', el.textContent === cat));
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('emojiGrid');
  const search = document.getElementById('emojiSearch').value.trim().toLowerCase();
  let allEmojis = [];
  
  if(search){
    // Search across all categories
    Object.values(EMOJI_DATA).forEach(arr => allEmojis.push(...arr));
    allEmojis = allEmojis.filter(e => e.toLowerCase().includes(search));
  } else {
    allEmojis = EMOJI_DATA[currentCat] || [];
  }
  
  if(allEmojis.length === 0){
    grid.innerHTML = '<div style="color:#64748b;text-align:center;padding:40px">未找到匹配的Emoji</div>';
    document.getElementById('emojiCount').textContent = '共 0 个';
    return;
  }
  
  grid.innerHTML = allEmojis.map(e => 
    `<div class="emoji-item" onclick="copyEmoji(this,'${e}')">${e}</div>`
  ).join('');
  document.getElementById('emojiCount').textContent = '共 ' + allEmojis.length + ' 个';
  
  // Also show recent
  const recentSection = document.getElementById('recentSection');
  const recentGrid = document.getElementById('recentGrid');
  if(recentEmojis.length > 0){
    recentSection.style.display = 'block';
    recentGrid.innerHTML = recentEmojis.map(e =>
      `<div class="emoji-item" onclick="copyEmoji(this,'${e}')">${e}</div>`
    ).join('');
  } else {
    recentSection.style.display = 'none';
  }
}

function filterEmojis(){ renderGrid(); }

function copyEmoji(el, emoji){
  navigator.clipboard.writeText(emoji).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 500);
    const toast = document.getElementById('copyToast');
    toast.textContent = '✅ 已复制: ' + emoji;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
    // Add to recent
    recentEmojis = [emoji, ...recentEmojis.filter(e => e !== emoji)].slice(0, 20);
    localStorage.setItem('recentEmojis', JSON.stringify(recentEmojis));
    renderGrid();
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = emoji;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 500);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  renderCats();
  renderGrid();
});
