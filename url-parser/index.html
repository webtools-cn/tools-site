<header>

<a href="/">🏠 首页</a>
<a href="/category/">📂 分类</a>
<a href="/en/">EN</a>
</nav>
</header>
<main>
<h1>🔗 URL解析器</h1>
<p class="subtitle">输入URL，一键拆解所有组成部分</p>
<div class="card">
<h3>📝 输入URL</h3>
<input type="text" id="urlInput" placeholder="https://user:pass@example.com:8080/path/to/page?q=hello&lang=zh#section" onkeydown="if(event.key==='Enter')parse()">
<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-primary" onclick="parse()">🔍 解析</button>
<button class="btn btn-outline" onclick="clearAll()">🗑 清空</button>
</div>
<div id="resultArea" style="display:none">
<div class="props-grid" id="propsGrid"></div>
<div class="query-params" id="queryParamsArea"></div>
</div>
</div>
</main>
<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 免费在线工具集合 · <a href="/privacy-policy/">隐私政策</a></p>
</footer>
<script>
function showToast(msg){
  var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
  m.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function clearAll(){
  document.getElementById('urlInput').value='';
  document.getElementById('resultArea').style.display='none';
}
</script>
<script>
function parse(){
  var url=document.getElementById('urlInput').value.trim();
  if(!url){showToast('请输入URL');return;}
  // Auto-add https:// if missing protocol
  if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(url)){
    url='https://'+url;
  }
  try{
    var u=new URL(url);
    var props=[
      {label:'完整URL',value:u.href},
      {label:'协议',value:u.protocol.replace(':','')},
      {label:'主机名',value:u.hostname},
      {label:'端口',value:u.port||'(默认)'},
      {label:'路径',value:u.pathname||'/'},
      {label:'哈希/锚点',value:u.hash||'(无)'},
      {label:'用户名',value:u.username||'(无)'},
      {label:'密码',value:u.password?'••••••':'(无)'},
      {label:'来源',value:u.origin}
    ];
    var grid=document.getElementById('propsGrid');
    grid.innerHTML='';
    for(var i=0;i<props.length;i++){
      grid.innerHTML+='<div class="prop-item"><span class="label">'+props[i].label+'</span><span class="value">'+escapeHtml(props[i].value)+'</span></div>';
    }
    // Query params
    var paramsArea=document.getElementById('queryParamsArea');
    if(u.searchParams.toString()){
      var paramsHtml='<div class="card" style="margin-top:16px"><h3>📊 查询参数</h3>';
      u.searchParams.forEach(function(v,k){
        paramsHtml+='<div class="query-param"><span class="key">'+escapeHtml(k)+'</span><span class="val">'+escapeHtml(v)+'</span></div>';
      });
      paramsHtml+='</div>';
      paramsArea.innerHTML=paramsHtml;
    }else{
      paramsArea.innerHTML='';
    }
    document.getElementById('resultArea').style.display='block';
  }catch(e){
    showToast('无效的URL格式: '+e.message);
  }
}
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
