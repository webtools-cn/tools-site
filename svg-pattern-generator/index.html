<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function generate(){
  var type=document.getElementById("patternType").value;
  var fg=document.getElementById("fgColor").value;
  var bg=document.getElementById("bgColor").value;
  var size=parseInt(document.getElementById("patternSize").value)||40;
  var sw=parseInt(document.getElementById("strokeWidth").value)||2;
  var w=size,h=size,s=size/2;
  var svg="";
  if(type==="dots"){
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><circle cx=\""+s+"\" cy=\""+s+"\" r=\""+Math.max(1,sw)+"\" fill=\""+fg+"\"/></svg>";
  }else if(type==="stripes"){
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><line x1=\"0\" y1=\"0\" x2=\""+w+"\" y2=\"0\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/></svg>";
  }else if(type==="grid"){
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><line x1=\"0\" y1=\"0\" x2=\""+w+"\" y2=\"0\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\""+h+"\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/></svg>";
  }else if(type==="chevron"){
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><path d=\"M0 "+s+" L"+s+" 0 L"+w+" "+s+" L"+s+" "+h+" Z\" fill=\"none\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/></svg>";
  }else if(type==="hexagon"){
    var r=s*0.6;var cx=s,cy=s;var pts="";for(var i=0;i<6;i++){var a=Math.PI/3*i-Math.PI/6;pts+=(cx+r*Math.cos(a))+","+(cy+r*Math.sin(a))+" "}
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><polygon points=\""+pts+"\" fill=\"none\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/></svg>";
  }else if(type==="crosshatch"){
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><line x1=\"0\" y1=\"0\" x2=\""+w+"\" y2=\""+h+"\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/><line x1=\""+w+"\" y1=\"0\" x2=\"0\" y2=\""+h+"\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/></svg>";
  }else if(type==="triangle"){
    svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\""+w+"\" height=\""+h+"\"><rect width=\"100%\" height=\"100%\" fill=\""+bg+"\"/><polygon points=\"0,0 "+w+",0 "+s+","+h+"\" fill=\"none\" stroke=\""+fg+"\" stroke-width=\""+sw+"\"/></svg>";
  }
  var b64=btoa(svg);
  var css="background-color: "+bg+";\nbackground-image: url(\"data:image/svg+xml;base64,"+b64+"\");\nbackground-repeat: repeat;\nbackground-size: "+w+"px "+h+"px;";
  document.getElementById("resultCss").textContent=css;
  document.getElementById("resultArea").style.display="block";
  document.getElementById("previewBox").style.backgroundImage="url(\"data:image/svg+xml;base64,"+b64+"\")";
  document.getElementById("previewBox").style.backgroundRepeat="repeat";
  document.getElementById("previewBox").style.backgroundSize=w+"px "+h+"px";
  document.getElementById("previewBox").innerHTML="";
}
function copyCss(){
  var text=document.getElementById("resultCss").textContent;
  navigator.clipboard.writeText(text).then(function(){toast("复制CSS")})
}
document.addEventListener("DOMContentLoaded",function(){generate()});
</script>
