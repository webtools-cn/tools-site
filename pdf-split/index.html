<script>
let pdfDoc=null,pdfBytes=null,totalPages=0,fileName='';
function parsePages(input,maxPage){
const pages=new Set();
const parts=input.split(',').map(s=>s.trim()).filter(Boolean);
for(const p of parts){
if(p.includes('-')){
const[r1,r2]=p.split('-').map(Number);
if(isNaN(r1)||isNaN(r2))continue;
for(let i=Math.max(1,r1);i<=Math.min(r2,maxPage);i++)pages.add(i-1);
}else{const n=parseInt(p);if(!isNaN(n)&&n>=1&&n<=maxPage)pages.add(n-1);}
}
return Array.from(pages).sort((a,b)=>a-b);
}
function downloadBlob(bytes,name){const b=new Blob([bytes],{type:'application/pdf'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

async function loadPDF(file){
try{
pdfBytes=await file.arrayBuffer();
const{PDFDocument}=PDFLib;
pdfDoc=await PDFDocument.load(pdfBytes);
totalPages=pdfDoc.getPageCount();
fileName=file.name.replace(/\.pdf$/i,'');
document.getElementById('fileInfo').style.display='block';
document.getElementById('fileInfo').innerHTML=`📄 <strong>${file.name}</strong> — ${(file.size/1048576).toFixed(1)} MB，共 <strong>${totalPages}</strong> 页`;
document.getElementById('uploadZone').classList.add('has-file');
document.getElementById('uploadZone').querySelector('p').textContent=file.name;
document.getElementById('splitBtn').disabled=false;
document.getElementById('status').textContent=`PDF已加载，共${totalPages}页。选择拆分模式后点击拆分。`;
}catch(e){
document.getElementById('status').textContent='❌ PDF加载失败: '+e.message;
}
}

document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('uploadZone').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('uploadZone').addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)loadPDF(f);});
document.getElementById('fileInput').addEventListener('change',function(){const f=this.files[0];if(f)loadPDF(f);});

document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',function(){
document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');
document.querySelectorAll('.mode-panel').forEach(x=>x.classList.remove('active'));
document.getElementById('panel-'+this.dataset.mode).classList.add('active');
}));

document.getElementById('resetBtn').addEventListener('click',()=>{pdfDoc=null;pdfBytes=null;totalPages=0;document.getElementById('fileInfo').style.display='none';document.getElementById('uploadZone').classList.remove('has-file');document.getElementById('uploadZone').querySelector('p').textContent='点击或拖拽PDF文件到此处';document.getElementById('splitBtn').disabled=true;document.getElementById('status').textContent='请先上传PDF文件';document.getElementById('fileInput').value='';});

document.getElementById('splitBtn').addEventListener('click',async()=>{
if(!pdfDoc)return;
const btn=document.getElementById('splitBtn');btn.disabled=true;btn.textContent='拆分中...';
const status=document.getElementById('status');
const mode=document.querySelector('.mode-btn.active').dataset.mode;
try{
const{PDFDocument}=PDFLib;
if(mode==='extract'){
const input=document.getElementById('extractPages').value.trim();
if(!input){status.textContent='❌ 请输入页码范围';return;}
const pages=parsePages(input,totalPages);
if(!pages.length){status.textContent='❌ 未找到有效页面';return;}
status.textContent=`正在提取 ${pages.length} 页...`;
const newDoc=await PDFDocument.create();
const copied=await newDoc.copyPages(pdfDoc,pages);
copied.forEach(p=>newDoc.addPage(p));
const bytes=await newDoc.save();
downloadBlob(bytes,`${fileName}-extracted.pdf`);
status.textContent=`✅ 已提取 ${pages.length} 页并下载`;
}else if(mode==='every'){
const n=parseInt(document.getElementById('everyN').value)||2;
const total=Math.ceil(totalPages/n);
status.textContent=`正在拆分为 ${total} 个文件...`;
for(let i=0;i<total;i++){
const start=i*n,end=Math.min(start+n,totalPages);
const pages=[];
for(let j=start;j<end;j++)pages.push(j);
const newDoc=await PDFDocument.create();
const copied=await newDoc.copyPages(pdfDoc,pages);
copied.forEach(p=>newDoc.addPage(p));
const bytes=await newDoc.save();
const suffix=total>1?`-part${i+1}`:'';
downloadBlob(bytes,`${fileName}${suffix}.pdf`);
await new Promise(r=>setTimeout(r,200));
}
status.textContent=`✅ 已拆分为 ${total} 个文件`;
}else if(mode==='all'){
status.textContent=`正在拆分为 ${totalPages} 个文件...`;
for(let i=0;i<totalPages;i++){
const newDoc=await PDFDocument.create();
const copied=await newDoc.copyPages(pdfDoc,[i]);
copied.forEach(p=>newDoc.addPage(p));
const bytes=await newDoc.save();
downloadBlob(bytes,`${fileName}-page${i+1}.pdf`);
if(i<totalPages-1)await new Promise(r=>setTimeout(r,150));
}
status.textContent=`✅ 已拆分为 ${totalPages} 个文件`;
}
}catch(e){status.textContent='❌ 拆分失败: '+e.message;}
finally{btn.disabled=false;btn.textContent='✂️ 拆分PDF';}
});
</script>
