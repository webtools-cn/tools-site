<script>
function getConfig() {
  return {
    ecmaVersion: document.getElementById('ecmaVersion').value,
    sourceType: document.getElementById('sourceType').value,
    envBrowser: document.getElementById('envBrowser').checked,
    envNode: document.getElementById('envNode').checked,
    envES6: document.getElementById('envES6').checked,
    envJest: document.getElementById('envJest').checked,
    pluginReact: document.getElementById('pluginReact').checked,
    pluginReactHooks: document.getElementById('pluginReactHooks').checked,
    pluginTS: document.getElementById('pluginTS').checked,
    pluginVue: document.getElementById('pluginVue').checked,
    pluginPrettier: document.getElementById('pluginPrettier').checked,
    pluginImport: document.getElementById('pluginImport').checked,
    severity: document.getElementById('severity').value,
  };
}

function generate() {
  const c = getConfig();
  const lines = [];
  lines.push('import js from "@eslint/js";');
  if (c.pluginTS) lines.push('import ts from "typescript-eslint";');
  if (c.pluginReact) lines.push('import react from "eslint-plugin-react";');
  if (c.pluginReactHooks) lines.push('import reactHooks from "eslint-plugin-react-hooks";');
  if (c.pluginVue) lines.push('import vue from "eslint-plugin-vue";');
  if (c.pluginPrettier) lines.push('import prettier from "eslint-config-prettier";');
  if (c.pluginImport) lines.push('import importPlugin from "eslint-plugin-import";');
  lines.push('');
  lines.push('export default [');
  lines.push('  js.configs.recommended,');

  if (c.pluginTS) {
    if (c.severity === 'strict') lines.push('  ...ts.configs.strict,');
    else lines.push('  ...ts.configs.recommended,');
  }
  if (c.pluginVue) {
    if (c.severity === 'strict') lines.push('  ...vue.configs["flat/recommended"],');
    else lines.push('  ...vue.configs["flat/essential"],');
  }
  if (c.pluginPrettier) lines.push('  prettier,');

  lines.push('');
  lines.push('  {');
  lines.push('    languageOptions: {');
  lines.push(`      ecmaVersion: "${c.ecmaVersion}",`);
  lines.push(`      sourceType: "${c.sourceType}",`);
  const envs = [];
  if (c.envBrowser) envs.push('browser: true');
  if (c.envNode) envs.push('node: true');
  if (c.envES6) envs.push('es2021: true');
  if (c.envJest) envs.push('jest: true');
  if (envs.length > 0) {
    lines.push('      globals: {');
    envs.forEach(e => lines.push(`        ${e},`));
    lines.push('      },');
  }
  lines.push('    },');

  if (c.pluginReact) {
    lines.push('    plugins: {');
    lines.push('      react,');
    if (c.pluginReactHooks) lines.push('      "react-hooks": reactHooks,');
    if (c.pluginImport) lines.push('      import: importPlugin,');
    lines.push('    },');
    lines.push('    settings: {');
    lines.push('      react: { version: "detect" },');
    lines.push('    },');
  } else if (c.pluginImport) {
    lines.push('    plugins: {');
    lines.push('      import: importPlugin,');
    lines.push('    },');
  }

  if (c.severity === 'strict') {
    lines.push('    rules: {');
    lines.push('      "no-unused-vars": "error",');
    lines.push('      "no-console": "warn",');
    lines.push('      "eqeqeq": "error",');
    lines.push('      "curly": "error",');
    if (c.pluginTS) {
      lines.push('      "@typescript-eslint/no-explicit-any": "error",');
      lines.push('      "@typescript-eslint/explicit-function-return-type": "warn",');
    }
    if (c.pluginReact) {
      lines.push('      "react/prop-types": "error",');
      lines.push('      "react/jsx-no-duplicate-props": "error",');
    }
    if (c.pluginImport) {
      lines.push('      "import/order": ["error", { alphabetize: { order: "asc" } }],');
    }
    lines.push('    },');
  } else if (c.severity === 'relaxed') {
    lines.push('    rules: {');
    lines.push('      "no-unused-vars": "warn",');
    lines.push('      "no-console": "off",');
    lines.push('      "no-debugger": "warn",');
    if (c.pluginTS) {
      lines.push('      "@typescript-eslint/no-explicit-any": "off",');
    }
    if (c.pluginReact) {
      lines.push('      "react/prop-types": "off",');
    }
    lines.push('    },');
  }

  lines.push('  },');

  // File-specific overrides
  const overrides = [];
  if (c.pluginTS) {
    overrides.push('  {');
    overrides.push('    files: ["**/*.ts", "**/*.tsx"],');
    overrides.push('    rules: {');
    overrides.push('      "no-undef": "off",');
    overrides.push('    },');
    overrides.push('  },');
  }
  if (c.pluginReact && c.pluginReactHooks) {
    overrides.push('  {');
    overrides.push('    files: ["**/*.jsx", "**/*.tsx"],');
    overrides.push('    plugins: { "react-hooks": reactHooks },');
    overrides.push('    rules: {');
    overrides.push('      "react-hooks/rules-of-hooks": "error",');
    overrides.push('      "react-hooks/exhaustive-deps": "warn",');
    overrides.push('    },');
    overrides.push('  },');
  }

  // Ignore patterns
  if (c.severity !== 'relaxed') {
    overrides.push('  {');
    overrides.push('    ignores: ["dist/**", "build/**", "node_modules/**", "*.config.*"],');
    overrides.push('  },');
  }

  lines.push(...overrides);
  lines.push('];');
  document.getElementById('output').textContent = lines.join('\n');
}

function copyIt() {
  const t=document.getElementById('output').textContent;
  navigator.clipboard.writeText(t).then(()=>{const b=document.querySelectorAll('.btn-row .btn-secondary')[0];const o=b.textContent;b.textContent='✅ 已复制';setTimeout(()=>b.textContent=o,2000)}).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});
}
function downloadIt() {
  const t=document.getElementById('output').textContent;
  const b=new Blob([t],{type:'text/javascript'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='eslint.config.js';a.click();URL.revokeObjectURL(a.href);
}
document.querySelectorAll('input, select').forEach(el=>{el.addEventListener('change', generate);el.addEventListener('input', generate)});
generate();
</script>

<script>

const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){var ft=document.getElementById('feedback-text');if(ft){ft.style.borderColor='#ef4444';setTimeout(function(){ft.style.borderColor=''},2000)};return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
