<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

// Tool-specific JavaScript
const TOOL_SLUG = 'bracket-matcher';
function showToast(msg) {
  const t = document.getElementById('toast-msg') || (()=>{const d=document.createElement('div');d.id='toast-msg';d.className='toast';document.body.appendChild(d);return d;})();
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));
}

function downloadFile(content, filename, mime='text/plain') {
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}


function initTool() {
  const ui = document.getElementById('tool-ui');
  ui.innerHTML = `
    <textarea id="input-text" class="input-textarea" placeholder="粘贴代码进行括号匹配检查..." style="min-height:200px;font-family:monospace"></textarea>
    <div class="input-row" style="margin-top:12px">
      <div class="input-group">
        <label>检查类型</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          <label style="font-size:.85rem;color:#94a3b8;display:flex;align-items:center;gap:4px"><input type="checkbox" id="ck-paren" checked> ( )</label>
          <label style="font-size:.85rem;color:#94a3b8;display:flex;align-items:center;gap:4px"><input type="checkbox" id="ck-bracket" checked> [ ]</label>
          <label style="font-size:.85rem;color:#94a3b8;display:flex;align-items:center;gap:4px"><input type="checkbox" id="ck-brace" checked> { }</label>
          <label style="font-size:.85rem;color:#94a3b8;display:flex;align-items:center;gap:4px"><input type="checkbox" id="ck-angle"> < ></label>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-large" onclick="check()">🔍 检查</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
      <button class="btn btn-secondary" onclick="document.getElementById('input-text').value='function example() {\n  const arr = [1, 2, 3];\n  if (arr.length > 0) {\n    console.log("ok");\n  }\n}'">🔍 示例</button>
    </div>
  `;
}
initTool();

function check() {
  const input = document.getElementById('input-text').value;
  if (!input) { showToast('请输入要检查的代码'); return; }
  
  const types = [];
  if (document.getElementById('ck-paren').checked) types.push({open:'(', close:')', name:'圆括号'});
  if (document.getElementById('ck-bracket').checked) types.push({open:'[', close:']', name:'方括号'});
  if (document.getElementById('ck-brace').checked) types.push({open:'{', close:'}', name:'花括号'});
  if (document.getElementById('ck-angle').checked) types.push({open:'<', close:'>', name:'尖括号'});
  
  if (types.length === 0) { showToast('请选择至少一种括号类型'); return; }
  
  const stack = [];
  const errors = [];
  let openers = '';
  let closers = '';
  const typeMap = {};
  
  types.forEach(t => {
    openers += t.open;
    closers += t.close;
    typeMap[t.open] = t;
    typeMap[t.close] = t;
  });
  
  for (let i = 0; i < input.length; i++) {
    const ch = input[i];
    if (openers.includes(ch)) {
      stack.push({char: ch, pos: i, type: typeMap[ch]});
    } else if (closers.includes(ch)) {
      if (stack.length === 0) {
        errors.push({pos: i, char: ch, msg: `多余的关闭括号 "${ch}" 在第${i+1}位`});
      } else {
        const last = stack.pop();
        const expectedClose = last.type.close;
        if (ch !== expectedClose) {
          errors.push({pos: i, char: ch, expected: expectedClose, msg: `不匹配的括号：期望 "${expectedClose}" 但找到 "${ch}" 在第${i+1}位`});
        }
      }
    }
  }
  
  // Unclosed brackets
  while (stack.length > 0) {
    const item = stack.pop();
    errors.push({pos: item.pos, char: item.char, msg: `未闭合的括号 "${item.char}" 在第${item.pos+1}位，期望 "${item.type.close}"`});
  }
  
  displayResult(errors, input);
}

function displayResult(errors, input) {
  document.getElementById('result-section').classList.add('show');
  
  if (errors.length === 0) {
    document.getElementById('result-content').innerHTML = '<div style="text-align:center;padding:20px;background:rgba(34,197,94,.1);border-radius:8px"><div style="font-size:3rem;margin-bottom:12px">✅</div><div style="color:#22c55e;font-size:1.2rem;font-weight:600">所有括号匹配正确！</div></div>';
    document.getElementById('char-count').textContent = `总字符: ${input.length} | 无错误`;
  } else {
    let html = `<div style="margin-bottom:12px;padding:12px;background:rgba(239,68,68,.1);border-radius:8px;border:1px solid rgba(239,68,68,.3)">`;
    html += `<div style="color:#f87171;font-weight:600;margin-bottom:8px">发现 ${errors.length} 个括号问题：</div>`;
    errors.forEach((e, idx) => {
      html += `<div style="padding:6px 0;border-bottom:1px solid rgba(148,163,184,.1);font-size:.85rem;color:#e2e8f0">${idx+1}. ${e.msg}</div>`;
    });
    html += '</div>';
    
    // Show code with markers
    html += `<textarea class="output-textarea" readonly style="min-height:150px">${input}</textarea>`;
    document.getElementById('result-content').innerHTML = html + `<div class="btn-row"><button class="btn btn-primary" onclick="copyToClipboard(document.querySelector('.output-textarea').value)">📋 复制代码</button></div>`;
    document.getElementById('char-count').textContent = `总字符: ${input.length} | 错误: ${errors.length}`;
  }
}

function clearAll() {
  document.getElementById('input-text').value = '';
  document.getElementById('result-section').classList.remove('show');
}

</script>
