<script>
const toast = document.getElementById('toast');
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2500);}

function updateRibbon(){
  const color = document.getElementById('ribbonColor').value;
  const tColor = document.getElementById('textColor').value;
  const text = document.getElementById('ribbonText').value || '标签';
  const fSize = document.getElementById('fontSize').value;
  const w = document.getElementById('ribbonWidth').value;
  const h = document.getElementById('ribbonHeight').value;
  const fold = document.getElementById('foldSize').value;
  const pos = document.getElementById('ribbonPos').value;
  const style = document.getElementById('ribbonStyle').value;

  document.getElementById('colorVal').textContent = color;
  document.getElementById('textColorVal').textContent = tColor;
  document.getElementById('fontSizeVal').textContent = fSize + 'px';
  document.getElementById('widthVal').textContent = w + 'px';
  document.getElementById('heightVal').textContent = h + 'px';
  document.getElementById('foldVal').textContent = fold + 'px';

  const preview = document.getElementById('ribbonPreview');
  const isTop = pos === 'top-left' || pos === 'top-right';
  const isLeft = pos === 'top-left' || pos === 'bottom-left';

  let positionCSS = '';
  if (pos === 'top-left') positionCSS = 'top:10px;left:-6px;';
  else if (pos === 'top-right') positionCSS = 'top:10px;right:-6px;';
  else if (pos === 'center') positionCSS = 'top:50%;left:50%;transform:translate(-50%,-50%);';
  else if (pos === 'bottom-left') positionCSS = 'bottom:10px;left:-6px;';
  else if (pos === 'bottom-right') positionCSS = 'bottom:10px;right:-6px;';

  let html = '', css = '';

  if (style === 'folded') {
    const darker = darkenColor(color, 30);
    const foldDir = isLeft ? 'right' : 'left';
    html = `<div class="ribbon-folded">${text}</div>`;
    css = `.ribbon-folded {
  position: absolute;
  ${positionCSS}
  width: ${w}px;
  height: ${h}px;
  background: ${color};
  color: ${tColor};
  font-size: ${fSize}px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  box-shadow: 0 2px 4px rgba(0,0,0,.3);
}
.ribbon-folded::before {
  content: '';
  position: absolute;
  ${isLeft ? 'left' : 'right'}: 0;
  bottom: -${fold}px;
  border-${isLeft ? 'left' : 'right'}: ${fold}px solid ${darker};
  border-${isLeft ? 'right' : 'left'}: ${fold}px solid transparent;
  border-top: ${fold}px solid ${darker};
  border-bottom: ${fold}px solid transparent;
}`;
  } else if (style === 'straight') {
    html = `<div class="ribbon-straight">${text}</div>`;
    css = `.ribbon-straight {
  position: absolute;
  ${positionCSS}
  width: ${w}px;
  height: ${h}px;
  background: ${color};
  color: ${tColor};
  font-size: ${fSize}px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  border-radius: 0 4px 4px 0;
  box-shadow: 0 2px 4px rgba(0,0,0,.25);
}`;
  } else if (style === 'flag') {
    html = `<div class="ribbon-flag">${text}</div>`;
    css = `.ribbon-flag {
  position: absolute;
  ${positionCSS}
  width: ${w}px;
  height: ${h}px;
  background: ${color};
  color: ${tColor};
  font-size: ${fSize}px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.ribbon-flag::after {
  content: '';
  position: absolute;
  bottom: -${fold}px;
  ${isLeft ? 'left' : 'right'}: 0;
  border-${isLeft ? 'left' : 'right'}: ${w/2}px solid ${color};
  border-${isLeft ? 'right' : 'left'}: ${w/2}px solid ${color};
  border-bottom: ${fold}px solid transparent;
}`;
  }

  preview.innerHTML = html;
  preview.style.cssText = positionCSS;

  // Inject style for preview
  let styleEl = document.getElementById('ribbon-style-tag');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'ribbon-style-tag';
    document.head.appendChild(styleEl);
  }
  // Adjust preview styles
  let previewCSS = css;
  previewCSS = previewCSS.replace(/\.ribbon-(folded|straight|flag)/g, '#ribbonPreview');
  if (style === 'folded') {
    previewCSS = previewCSS.replace(/#ribbonPreview::before/g, '#ribbonPreview::before');
  } else if (style === 'flag') {
    previewCSS = previewCSS.replace(/#ribbonPreview::after/g, '#ribbonPreview::after');
  }
  styleEl.textContent = previewCSS;

  document.getElementById('codeOutput').textContent = css;
}

function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function copyCSS() {
  const code = document.getElementById('codeOutput').textContent;
  if (code.startsWith('/*')) { showToast('⚠️ 请先调整参数生成代码'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('✅ CSS已复制')).catch(() => showToast('❌ 复制失败'));
}

function copyHTML() {
  const css = document.getElementById('codeOutput').textContent;
  if (css.startsWith('/*')) { showToast('⚠️ 请先调整参数生成代码'); return; }
  const html = document.getElementById('ribbonPreview').outerHTML;
  const full = css + '\n\n' + html;
  navigator.clipboard.writeText(full).then(() => showToast('✅ HTML+CSS已复制')).catch(() => showToast('❌ 复制失败'));
}

updateRibbon();
</script>
