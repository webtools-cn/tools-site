<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
header .logo{font-size:1.3rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:8px;flex-wrap:wrap}
header nav a{color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:.9rem;transition:all .2s}
header nav a:hover{background:var(--hover);color:var(--primary)}
main{flex:1;max-width:860px;width:100%;margin:0 auto;padding:28px 18px 60px}
h1{font-size:1.7rem;margin-bottom:8px;color:var(--text)}
.subtitle{color:var(--text2);margin-bottom:24px;font-size:.95rem}
.card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px}
.card h3{font-size:1rem;margin-bottom:14px;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.field-row{display:flex;gap:10px;flex-wrap:wrap}
.field-row .field{flex:1;min-width:120px;margin-bottom:14px}
input[type="number"],select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;background:#fafbfc;transition:border-color .2s}
input[type="number"]:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.3)}
.btn-outline{background:var(--card);color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:var(--hover)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:8px}
.result-item{background:var(--hover);border-radius:10px;padding:14px;text-align:center}
.result-item .val{font-size:1.5rem;font-weight:700;color:var(--primary);display:block}
.result-item .lbl{font-size:.8rem;color:var(--text2);margin-top:4px;display:block}
.info{font-size:.85rem;color:var(--text2);margin-top:14px;line-height:1.6}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 22px;border-radius:10px;font-size:.9rem;opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{background:var(--card);border-top:1px solid var(--border);padding:18px 24px;text-align:center;font-size:.85rem;color:var(--text2)}
footer a{color:var(--primary);text-decoration:none}
@media(max-width:480px){
  main{padding:22px 14px 50px}
  h1{font-size:1.45rem}
  .card{padding:18px 16px}
  .field-row .field{min-width:100%}
}

<body>
<header>
<a href="/" class="logo">🧰 Free ToolBase</a>
<nav>
<a href="/">🏠 首页</a>
<a href="/category/">📂 分类</a>
<a href="/en/seed-spacing-calculator/">EN</a>
</nav>
</header>
<main>
<h1>🌱 种子间距计算器</h1>
<p class="subtitle">输入地块尺寸、行距与株距，计算可种行数、每行株数和总株数</p>

<div class="card">
<h3>📐 地块尺寸</h3>
<div class="field-row">
<div class="field">
<label for="bedLen">长度</label>
<input type="number" id="bedLen" min="0" step="0.1" value="300" placeholder="如 300">
</div>
<div class="field">
<label for="bedWid">宽度</label>
<input type="number" id="bedWid" min="0" step="0.1" value="100" placeholder="如 100">
</div>
<div class="field">
<label for="bedUnit">尺寸单位</label>
<select id="bedUnit">
<option value="cm">厘米 (cm)</option>
<option value="m">米 (m)</option>
<option value="ft">英尺 (ft)</option>
</select>
</div>
</div>
</div>

<div class="card">
<h3>🌿 间距与种子</h3>
<div class="field-row">
<div class="field">
<label for="rowSp">行距</label>
<input type="number" id="rowSp" min="0" step="0.1" value="30" placeholder="如 30">
</div>
<div class="field">
<label for="plantSp">株距</label>
<input type="number" id="plantSp" min="0" step="0.1" value="20" placeholder="如 20">
</div>
<div class="field">
<label for="spUnit">间距单位</label>
<select id="spUnit">
<option value="cm">厘米 (cm)</option>
<option value="m">米 (m)</option>
<option value="ft">英尺 (ft)</option>
</select>
</div>
</div>
<div class="field">
<label for="germ">种子发芽率 (%)</label>
<input type="number" id="germ" min="1" max="100" step="1" value="85" placeholder="如 85">
</div>
<div class="field">
<label for="safety">安全余量 (%)</label>
<input type="number" id="safety" min="0" max="100" step="1" value="10" placeholder="如 10">
</div>
<div class="info" id="spInfo">参考行距：叶菜 20–30cm，根菜 25–40cm，瓜类 80–150cm。</div>
</div>

<div class="btn-row">
<button class="btn btn-primary" onclick="calc()">🧮 计算种植数</button>
<button class="btn btn-outline" onclick="resetForm()">🔄 重置</button>
</div>

<div id="resultArea" style="display:none">
<div class="card">
<h3>📊 计算结果</h3>
<div class="result-grid" id="resultGrid"></div>
<div class="info" id="resultNote"></div>
</div>
</div>
</main>

<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 免费在线工具集合 · <a href="/privacy-policy/">隐私政策</a></p>
</footer>

<script>
function showToast(msg){
var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
m.textContent=msg;t.classList.add('show');
setTimeout(function(){t.classList.remove('show');},2500);
}
function toCm(val,unit){
if(unit==='cm')return val;
if(unit==='m')return val*100;
if(unit==='ft')return val*30.48;
return val;
}
function fmt(n,d){
d=d||0;
return Number(n.toFixed(d)).toLocaleString('zh-CN');
}
function calc(){
var bedLen=parseFloat(document.getElementById('bedLen').value);
var bedWid=parseFloat(document.getElementById('bedWid').value);
var bedUnit=document.getElementById('bedUnit').value;
var rowSp=parseFloat(document.getElementById('rowSp').value);
var plantSp=parseFloat(document.getElementById('plantSp').value);
var spUnit=document.getElementById('spUnit').value;
var germ=parseFloat(document.getElementById('germ').value);
var safety=parseFloat(document.getElementById('safety').value);
if(isNaN(bedLen)||bedLen<=0){showToast('请输入有效的长度');return;}
if(isNaN(bedWid)||bedWid<=0){showToast('请输入有效的宽度');return;}
if(isNaN(rowSp)||rowSp<=0){showToast('请输入有效的行距');return;}
if(isNaN(plantSp)||plantSp<=0){showToast('请输入有效的株距');return;}
if(isNaN(germ)||germ<1||germ>100){showToast('发芽率应在 1–100%');return;}
if(isNaN(safety)||safety<0||safety>100){showToast('安全余量应在 0–100%');return;}
var lenCm=toCm(bedLen,bedUnit);
var widCm=toCm(bedWid,bedUnit);
var rowCm=toCm(rowSp,spUnit);
var plantCm=toCm(plantSp,spUnit);
var rows=Math.floor(widCm/rowCm);
if(rows<1)rows=1;
var perRow=Math.floor(lenCm/plantCm);
if(perRow<1)perRow=1;
var totalPlants=rows*perRow;
var areaM2=(lenCm*widCm)/10000;
var densityPerM2=totalPlants/areaM2;
var effGerm=germ/100;
var seedsNeeded=Math.ceil(totalPlants/effGerm);
var withSafety=Math.ceil(seedsNeeded*(1+safety/100));
var grid=document.getElementById('resultGrid');
var items=[
{val:fmt(rows,0)+' 行',lbl:'可种植行数'},
{val:fmt(perRow,0)+' 株',lbl:'每行株数'},
{val:fmt(totalPlants,0)+' 株',lbl:'总株数'},
{val:fmt(densityPerM2,1)+' 株/m²',lbl:'种植密度'},
{val:fmt(areaM2,2)+' m²',lbl:'地块面积'},
{val:fmt(seedsNeeded,0)+' 粒',lbl:'考虑发芽率需种'},
{val:fmt(withSafety,0)+' 粒',lbl:'建议购买种子'}
];
grid.innerHTML='';
for(var i=0;i<items.length;i++){
var d=document.createElement('div');
d.className='result-item';
d.innerHTML='<span class="val">'+items[i].val+'</span><span class="lbl">'+items[i].lbl+'</span>';
grid.appendChild(d);
}
document.getElementById('resultNote').textContent=
'说明：行数=⌊宽度/行距⌋，每行株数=⌊长度/株距⌋（已自动取整）。所需种子=总株数÷发芽率，再加安全余量。实际应留边距并参考品种推荐密度。';
document.getElementById('resultArea').style.display='block';
}
function resetForm(){
document.getElementById('bedLen').value='';
document.getElementById('bedWid').value='';
document.getElementById('rowSp').value='';
document.getElementById('plantSp').value='';
document.getElementById('germ').value='85';
document.getElementById('safety').value='10';
document.getElementById('resultArea').style.display='none';
showToast('已重置');
}
</script>
</body>
</html>
