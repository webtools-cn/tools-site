(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🔷 Shape & Dimensions</h2><div class="field"><label>Shape</label><select id="shapeSelect"><option value="cube">Cube</option><option value="sphere">Sphere</option><option value="cylinder">Cylinder</option><option value="cone">Cone</option><option value="rectprism">Rectangular Prism</option></select></div><div id="dims"></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">Calculate Surface Area</button><button class="btn btn-secondary" id="clearBtn">Reset</button></div></div><div class="result-section" id="result"><h2>✅ Result</h2><div id="areaDisplay" style="font-size:1.8rem;text-align:center;padding:16px;color:#22d3ee"></div><div id="formulaDisplay" style="text-align:center;padding:8px;color:#94a3b8;font-size:.85rem;white-space:pre-wrap"></div></div>';
function renderDims(){var s=document.getElementById('shapeSelect').value;var html='';if(s==='cube'){html='<div class="field"><label>Side Length (a)</label><input type="number" id="dim1" value="5" step="any"></div>';}else if(s==='sphere'){html='<div class="field"><label>Radius (r)</label><input type="number" id="dim1" value="5" step="any"></div>';}else if(s==='cylinder'){html='<div class="row"><div class="field"><label>Radius (r)</label><input type="number" id="dim1" value="3" step="any"></div><div class="field"><label>Height (h)</label><input type="number" id="dim2" value="7" step="any"></div></div>';}else if(s==='cone'){html='<div class="row"><div class="field"><label>Radius (r)</label><input type="number" id="dim1" value="3" step="any"></div><div class="field"><label>Height (h)</label><input type="number" id="dim2" value="7" step="any"></div></div>';}else if(s==='rectprism'){html='<div class="row"><div class="field"><label>Length (l)</label><input type="number" id="dim1" value="4" step="any"></div><div class="field"><label>Width (w)</label><input type="number" id="dim2" value="5" step="any"></div><div class="field"><label>Height (h)</label><input type="number" id="dim3" value="6" step="any"></div></div>';}

function calc(){var s=document.getElementById('shapeSelect').value;var d1=parseFloat(document.getElementById('dim1').value)||0;var d2=parseFloat(document.getElementById('dim2').value)||0;var d3=parseFloat(document.getElementById('dim3').value)||0;var area=0,formula='';
if(s==='cube'){area=6*d1*d1;formula='Surface Area = 6a² = 6 × '+d1+'² = 6 × '+(d1*d1)+' = '+area.toFixed(2);}else if(s==='sphere'){area=4*Math.PI*d1*d1;formula='Surface Area = 4πr² = 4π × '+d1+'² = 4π × '+(d1*d1)+' = '+area.toFixed(2);}else if(s==='cylinder'){area=2*Math.PI*d1*d1+2*Math.PI*d1*d2;formula='Surface Area = 2πr² + 2πrh = 2π('+d1+'²) + 2π('+d1+')('+d2+') = '+(2*Math.PI*d1*d1).toFixed(2)+' + '+(2*Math.PI*d1*d2).toFixed(2)+' = '+area.toFixed(2);}else if(s==='cone'){var l=Math.sqrt(d1*d1+d2*d2);area=Math.PI*d1*d1+Math.PI*d1*l;formula='Surface Area = πr² + πrl = π('+d1+'²) + π('+d1+')('+l.toFixed(2)+') = '+(Math.PI*d1*d1).toFixed(2)+' + '+(Math.PI*d1*l).toFixed(2)+' = '+area.toFixed(2);}else if(s==='rectprism'){area=2*(d1*d2+d1*d3+d2*d3);formula='Surface Area = 2(lw + lh + wh) = 2('+(d1*d2)+' + '+(d1*d3)+' + '+(d2*d3)+') = 2('+(d1*d2+d1*d3+d2*d3)+') = '+area.toFixed(2);}
