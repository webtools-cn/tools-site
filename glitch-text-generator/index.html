<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}



let currentStyle = 'classic';

const styles = {
  classic: { name: '经典故障', color: '#22d3ee', glitch: true, shake: true },
  cyber: { name: '赛博朋克', color: '#f472b6', glitch: true, shake: true },
  matrix: { name: '黑客帝国', color: '#4ade80', glitch: true, shake: false },
  ghost: { name: '重影', color: '#a78bfa', glitch: true, shake: false },
  fire: { name: '燃烧', color: '#fb923c', glitch: true, shake: true },
  flicker: { name: '闪烁', color: '#fbbf24', glitch: false, shake: false, flicker: true },
  scanline: { name: '扫描线', color: '#94a3b8', glitch: false, shake: false, scanlines: true, flicker: true },
  minimal: { name: '极简偏移', color: '#22d3ee', glitch: true, shake: false }
};

function updateGlitch() {
  const text = document.getElementById('textInput').value || 'GLITCH';
  const el = document.getElementById('glitchText');
  const shakeVal = parseInt(document.getElementById('shakeIntensity').value) / 50;
  const offsetVal = parseInt(document.getElementById('offsetIntensity').value) / 50;
  const flickerVal = parseInt(document.getElementById('flickerSpeed').value);
  const speedVal = parseInt(document.getElementById('glitchSpeed').value);

  el.textContent = text;
  el.setAttribute('data-text', text);

  // Reset classes
  el.className = 'glitch-text';

  const style = styles[currentStyle];
  el.style.color = style.color;

  // Shake
  el.style.setProperty('--shake-speed', (0.2 - shakeVal * 0.12) + 's');
  if (style.shake && shakeVal > 0.1) {
    el.classList.add('shake');
    el.style.animation = `shake ${0.2 - shakeVal * 0.12}s infinite`;
  } else {
    el.style.animation = 'none';
  }

  // Glitch (color offset)
  const offX = Math.round(offsetVal * 6);
  el.style.setProperty('--offset-x1', Math.round(offX * 0.8 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset-x2', Math.round(offX * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset-x3', Math.round(offX * 0.6 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset-x4', Math.round(offX * 1.2 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset2-x1', Math.round(offX * 1.5 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset2-x2', Math.round(offX * 0.7 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset2-x3', Math.round(offX * 1.1 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset2-x4', Math.round(offX * 0.9 * (Math.random() > 0.5 ? 1 : -1)) + 'px');
  el.style.setProperty('--offset2-x5', Math.round(offX * 1.3 * (Math.random() > 0.5 ? 1 : -1)) + 'px');

  el.style.setProperty('--glitch-speed', (0.2 - speedVal * 0.015) + 's');
  el.style.setProperty('--glitch-speed2', (0.18 - speedVal * 0.013) + 's');

  if (style.glitch && offsetVal > 0.1) {
    el.classList.add('glitch-on');
  }

  // Flicker
  if (style.flicker || (document.querySelector('#flickerSpeed') && parseInt(document.getElementById('flickerSpeed').value) > 0)) {
    el.style.setProperty('--flicker-speed', (3 - flickerVal * 0.25) + 's');
    el.classList.add('flicker');
  }

  // Scanlines
  if (style.scanlines) {
    el.classList.add('scanlines');
  }
}

function setStyle(name) {
  currentStyle = name;
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-style="${name}"]`).classList.add('active');

  const style = styles[name];
  document.getElementById('glitchText').style.color = style.color;
  updateGlitch();
}

function copyGlitchHTML() {
  const text = document.getElementById('textInput').value || 'GLITCH';
  const html = `<div class="glitch-text" data-text="${text}">${text}</div>`;
  navigator.clipboard.writeText(html).then(() => {
    showToast('✅ HTML代码已复制！\n需同时复制CSS样式。');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = html;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ HTML代码已复制！');
  });
}

function copyGlitchCSS() {
  const css = `/* Glitch Text CSS */
.glitch-text {
  position: relative;
  font-size: 2.5rem;
  font-weight: 900;
  color: #22d3ee;
  font-family: monospace;
  letter-spacing: 2px;
}
.glitch-text::before,
.glitch-text::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.glitch-text::before {
  color: #f87171;
  z-index: -1;
  animation: glitch-offset 0.12s infinite;
  clip-path: inset(0 0 80% 0);
}
.glitch-text::after {
  color: #38bdf8;
  z-index: -2;
  animation: glitch-offset2 0.1s infinite;
  clip-path: inset(15% 0 0 0);
}
@keyframes glitch-offset {
  0%,100% { transform: translate(0); opacity: 1; }
  20% { transform: translate(-3px, 0); opacity: 0.8; }
  40% { transform: translate(2px, 1px); opacity: 0.6; }
  60% { transform: translate(-2px, -1px); opacity: 0.7; }
  80% { transform: translate(3px, 0); opacity: 0.5; }
}
@keyframes glitch-offset2 {
  0%,100% { transform: translate(0); opacity: 1; }
  15% { transform: translate(4px, -1px); opacity: 0.7; }
  30% { transform: translate(-3px, 1px); opacity: 0.5; }
  45% { transform: translate(2px, 0); opacity: 0.6; }
  60% { transform: translate(-2px, -1px); opacity: 0.8; }
  75% { transform: translate(3px, 1px); opacity: 0.5; }
}`;
  navigator.clipboard.writeText(css).then(() => {
    showToast('✅ CSS代码已复制！');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = css;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ CSS代码已复制！');
  });
}

function buildStyleGrid() {
  const grid = document.getElementById('styleGrid');
  grid.innerHTML = '';
  for (const [key, style] of Object.entries(styles)) {
    const card = document.createElement('div');
    card.className = 'style-card' + (key === currentStyle ? ' active' : '');
    card.dataset.style = key;
    card.innerHTML = `
      <div class="style-preview" style="color:${style.color}">${key === 'matrix' ? 'MATRIX' : key === 'flicker' ? 'FLICKER' : key === 'scanline' ? 'SCAN' : 'GLITCH'}</div>
      <div class="style-name">${style.name}</div>
    `;
    card.onclick = () => setStyle(key);
    grid.appendChild(card);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  buildStyleGrid();
  updateGlitch();
  document.getElementById('textInput').addEventListener('input', updateGlitch);
});
