let pdfFile=null;
function formatSize(b){if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

async function checkPDF(file){
try{
const arrBuf=await file.arrayBuffer();
// Try loading without password
try{
const doc=await PDFLib.PDFDocument.load(arrBuf);
const isEnc=doc.isEncrypted;
document.getElementById('fileInfo').style.display='block';
if(!isEnc){
document.getElementById('fileInfo').innerHTML=`📄 \x3Cstrong>${file.name}\x3C/strong> — ${formatSize(file.size)} — \x3Cspan style="color:#4caf50">⚠️ 此PDF未加密，无需解锁\x3C/span>`;
document.getElementById('passwordRow').style.display='none';
document.getElementById('unlockBtn').disabled=false;
document.getElementById('status').textContent='PDF未加密，但可以移除任何权限限制。';
}else{
document.getElementById('fileInfo').innerHTML=`📄 \x3Cstrong>${file.name}\x3C/strong> — ${formatSize(file.size)} — \x3Cspan style="color:#e53935">🔒 已加密\x3C/span>`;
document.getElementById('passwordRow').style.display='flex';
document.getElementById('unlockBtn').disabled=false;
document.getElementById('status').textContent='PDF已加密，请先尝试不用密码解锁，如果失败再输入密码。';
}
}catch(e){
// Possibly encryption issue - show password field
document.getElementById('fileInfo').style.display='block';
document.getElementById('fileInfo').innerHTML=`📄 \x3Cstrong>${file.name}\x3C/strong> — ${formatSize(file.size)} — \x3Cspan style="color:#e53935">🔒 需要密码\x3C/span>`;
document.getElementById('passwordRow').style.display='flex';
document.getElementById('unlockBtn').disabled=false;
document.getElementById('status').textContent='此PDF受密码保护，请输入密码后解锁。';
}
pdfFile=file;
document.getElementById('uploadZone').classList.add('has-file');
document.getElementById('uploadZone').querySelector('p').textContent=file.name;
}catch(e){
document.getElementById('status').textContent='❌ PDF加载失败: '+e.message;
}
}

document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('uploadZone').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('uploadZone').addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')checkPDF(f);});
document.getElementById('fileInput').addEventListener('change',function(){const f=this.files[0];if(f)checkPDF(f);});

document.getElementById('resetBtn').addEventListener('click',()=>{
pdfFile=null;document.getElementById('fileInfo').style.display='none';document.getElementById('passwordRow').style.display='none';document.getElementById('uploadZone').classList.remove('has-file');document.getElementById('uploadZone').querySelector('p').textContent='点击或拖拽加密的PDF文件到此处';document.getElementById('unlockBtn').disabled=true;document.getElementById('status').textContent='请上传需要解锁的PDF文件';document.getElementById('fileInput').value='';document.getElementById('passwordInput').value='';
});

document.getElementById('unlockBtn').addEventListener('click',async()=>{
if(!pdfFile)return;
const btn=document.getElementById('unlockBtn');btn.disabled=true;btn.textContent='解锁中...';
const status=document.getElementById('status');
const password=document.getElementById('passwordInput').value||undefined;
try{
const arrBuf=await pdfFile.arrayBuffer();
status.textContent='正在加载PDF...';
let doc;
try{
doc=await PDFLib.PDFDocument.load(arrBuf,{ignoreEncryption:true});
}catch(e){
if(!password)throw new Error('此PDF需要密码，请在上方输入密码后重试。');
doc=await PDFLib.PDFDocument.load(arrBuf,{password});
}
status.textContent='正在创建解锁副本...';
const pages=doc.getPageIndices();
const newDoc=await PDFLib.PDFDocument.create();
const copied=await newDoc.copyPages(doc,pages);
copied.forEach(p=>newDoc.addPage(p));
status.textContent='正在生成解锁文件...';
const unlockedBytes=await newDoc.save();
const blob=new Blob([unlockedBytes],{type:'application/pdf'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;
const baseName=pdfFile.name.replace(/\.pdf$/i,'');
a.download=`${baseName}-unlocked.pdf`;a.click();
URL.revokeObjectURL(url);
status.textContent='✅ PDF已解锁并下载！新文件无密码、无权限限制。';
}catch(e){
let msg=e.message;
if(msg.includes('password'))msg='❌ 密码错误或PDF需要密码。请确认密码正确后重试。';
else if(msg.includes('decrypt'))msg='❌ 解密失败，可能不支持此加密方式。';
else msg='❌ 解锁失败: '+msg;
status.textContent=msg;
}finally{btn.disabled=false;btn.textContent='🔓 解锁PDF';}
});

<script>
(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) { hash = ((hash << 5) - hash) + path.charCodeAt(i); hash = hash & hash; }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
</script></div></div>
