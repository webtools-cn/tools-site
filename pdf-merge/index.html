<script>
let files=[];
function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function renderList(){
const el=document.getElementById('fileList');
if(!files.length){el.innerHTML='';return;}
el.innerHTML=files.map((f,i)=>`
<div class="file-item">
<span class="name">📄 ${f.name}</span>
<span class="size">${formatSize(f.size)}</span>
<div class="btns">
<button ${i===0?'disabled':''} onclick="moveUp(${i})" title="上移">⬆️</button>
<button ${i===files.length-1?'disabled':''} onclick="moveDown(${i})" title="下移">⬇️</button>
<button onclick="removeFile(${i})" title="删除">❌</button>
</div>
</div>`).join('');
document.getElementById('mergeBtn').disabled=files.length<2;
document.getElementById('status').textContent=`已添加 ${files.length} 个PDF文件`;
}
window.moveUp=function(i){if(i>0){[files[i],files[i-1]]=[files[i-1],files[i]];renderList();}};
window.moveDown=function(i){if(i<files.length-1){[files[i],files[i+1]]=[files[i+1],files[i]];renderList();}};
window.removeFile=function(i){files.splice(i,1);renderList();if(!files.length)document.getElementById('status').textContent='准备就绪，请上传PDF文件';};

function addFiles(newFiles){
for(const f of newFiles){
if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'))files.push(f);
}
renderList();
}

document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('uploadZone').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('uploadZone').addEventListener('drop',e=>{e.preventDefault();addFiles(e.dataTransfer.files);});
document.getElementById('fileInput').addEventListener('change',function(){addFiles(this.files);this.value='';});

document.getElementById('clearBtn').addEventListener('click',()=>{files=[];renderList();document.getElementById('status').textContent='准备就绪，请上传PDF文件';});

document.getElementById('mergeBtn').addEventListener('click',async()=>{
if(files.length<2)return;
const btn=document.getElementById('mergeBtn');btn.disabled=true;btn.textContent='合并中...';
const progress=document.getElementById('progressBar');progress.style.display='block';
const fill=document.getElementById('progressFill');fill.style.width='10%';
const status=document.getElementById('status');
try{
const{PDFDocument}=PDFLib;
const mergedDoc=await PDFDocument.create();
for(let i=0;i<files.length;i++){
status.textContent=`正在处理: ${files[i].name} (${i+1}/${files.length})`;
const arrBuf=await files[i].arrayBuffer();
const doc=await PDFDocument.load(arrBuf);
const pages=await mergedDoc.copyPages(doc,doc.getPageIndices());
pages.forEach(p=>mergedDoc.addPage(p));
fill.style.width=(30+70*(i+1)/files.length)+'%';
}
status.textContent='正在生成合并文件...';
fill.style.width='95%';
const mergedBytes=await mergedDoc.save();
const blob=new Blob([mergedBytes],{type:'application/pdf'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='merged.pdf';a.click();
URL.revokeObjectURL(url);
fill.style.width='100%';
status.textContent=`✅ 合并完成！共 ${files.length} 个PDF文件`;
}catch(e){
status.textContent='❌ 合并失败: '+e.message;
}finally{
btn.disabled=false;btn.textContent='🔗 合并PDF';
setTimeout(()=>{progress.style.display='none';fill.style.width='0';},1500);
}
});
</script>

<script>
(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) { hash = ((hash << 5) - hash) + path.charCodeAt(i); hash = hash & hash; }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
</script>
