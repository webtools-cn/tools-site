<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

let currentGender = 'male';

function setGender(g) {
  currentGender = g;
  document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-gender="${g}"]`).classList.add('active');
}

function calculate() {
  const age = parseFloat(document.getElementById('age').value) || 0;
  const height = parseFloat(document.getElementById('height').value) || 0;
  const weight = parseFloat(document.getElementById('weight').value) || 0;
  const activityFactor = parseFloat(document.getElementById('activityLevel').value);
  const goal = document.getElementById('goal').value;

  if (!age || !height || !weight || age < 10 || age > 100 || height < 50 || height > 250 || weight < 20 || weight > 300) {
    showToast('请输入有效数据');
    return;
  }

  let bmr;
  if (currentGender === 'male') {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }
  bmr = Math.round(bmr);
  const tdee = Math.round(bmr * activityFactor);

  document.getElementById('bmrValue').textContent = bmr;
  document.getElementById('tdeeValue').textContent = tdee;

  let goalCal, goalLabel;
  if (goal === 'lose') {
    goalCal = tdee - 400;
    goalLabel = '减脂';
  } else if (goal === 'maintain') {
    goalCal = tdee;
    goalLabel = '维持';
  } else {
    goalCal = tdee + 400;
    goalLabel = '增肌';
  }

  const goalGrid = document.getElementById('goalGrid');
  goalGrid.innerHTML = `
    <div class="goal-card">
      <div class="goal-icon">📉</div>
      <div class="goal-value">${Math.round(tdee - 500)} ~ ${Math.round(tdee - 300)} 大卡</div>
      <div class="goal-label">积极减脂（每周减~0.5kg）</div>
    </div>
    <div class="goal-card">
      <div class="goal-icon">⚖️</div>
      <div class="goal-value">${tdee} 大卡</div>
      <div class="goal-label">维持体重</div>
    </div>
    <div class="goal-card">
      <div class="goal-icon">📈</div>
      <div class="goal-value">${Math.round(tdee + 300)} ~ ${Math.round(tdee + 500)} 大卡</div>
      <div class="goal-label">增肌（每周增~0.25kg）</div>
    </div>
  `;

  // Macronutrients
  const proteinMin = Math.round(weight * 1.6);
  const proteinMax = Math.round(weight * 2.2);
  const proteinCalV = Math.round(proteinMax * 4);
  const fatCalV = Math.round(goalCal * 0.25);
  const fatGram = Math.round(fatCalV / 9);
  const carbsCal = goalCal - proteinCalV - fatCalV;
  const carbsGram = Math.round(carbsCal / 4);

  document.getElementById('proteinPct').textContent = '25-30%';
  document.getElementById('proteinCal').textContent = proteinCalV;
  document.getElementById('proteinGram').textContent = `${proteinMin}~${proteinMax}g`;
  document.getElementById('carbsPct').textContent = '40-50%';
  document.getElementById('carbsCal').textContent = carbsCal;
  document.getElementById('carbsGram').textContent = carbsGram + 'g';
  document.getElementById('fatPct').textContent = '20-30%';
  document.getElementById('fatCal').textContent = fatCalV;
  document.getElementById('fatGram').textContent = fatGram + 'g';

  // Weight plan table
  const planTable = document.getElementById('planTable');
  const plans = [
    { change: '快速减脂', cal: Math.round(tdee - 500), rate: '每周减约0.5-1kg' },
    { change: '温和减脂', cal: Math.round(tdee - 300), rate: '每周减约0.25-0.5kg' },
    { change: '维持体重', cal: tdee, rate: '体重保持稳定' },
    { change: '温和增肌', cal: Math.round(tdee + 300), rate: '每月增约0.5-1kg' },
    { change: '快速增肌', cal: Math.round(tdee + 500), rate: '每月增约1-2kg' }
  ];
  plans.forEach(p => {
    const row = planTable.insertRow();
    row.insertCell().textContent = p.change;
    row.insertCell().textContent = p.cal + ' 大卡/天';
    row.insertCell().textContent = p.rate;
  });

  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('age').value = 30;
  document.getElementById('height').value = 170;
  document.getElementById('weight').value = 70;
  document.getElementById('activityLevel').value = '1.375';
  document.getElementById('goal').value = 'maintain';
  currentGender = 'male';
  document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('active'));
  document.querySelector('[data-gender="male"]').classList.add('active');
  document.getElementById('resultSection').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.input-group input').forEach(input => {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') calculate();
    });
  });
});
