(function(){

var totalBuy=bp*qty;var totalSell=sp*qty;var buyFee=totalBuy*fee/100;var sellFee=totalSell*fee/100;var totalFees=buyFee+sellFee;var profit=totalSell-totalBuy-totalFees;var roi=(profit/totalBuy*100);
var grid=document.getElementById('resultsGrid');
var cards=[
{label:'Total Investment',val:'$'+totalBuy.toFixed(2),color:'#94a3b8'},
{label:'Total Revenue',val:'$'+totalSell.toFixed(2),color:'#94a3b8'},
{label:'Total Fees',val:'$'+totalFees.toFixed(2),color:'#f87171'},
{label:'Net Profit',val:(profit>=0?'+':'')+'$'+profit.toFixed(2),color:profit>=0?'#4ade80':'#f87171'},
{label:'ROI',val:(roi>=0?'+':'')+roi.toFixed(2)+'%',color:roi>=0?'#4ade80':'#f87171'},
{label:'Buy Price',val:'$'+bp.toFixed(2),color:'#94a3b8'},
{label:'Sell Price',val:'$'+sp.toFixed(2),color:'#94a3b8'},
{label:'Quantity',val:qty,color:'#94a3b8'}
];
grid.innerHTML='';for(var i=0;i<cards.length;i++){var c=cards[i];grid.innerHTML+='<div style="background:#0f172a;border-radius:8px;padding:12px;text-align:center;border:1px solid rgba(148,163,184,.08)"><div style="font-size:.75rem;color:#64748b;margin-bottom:4px">'+c.label+'</div><div style="font-size:1.3rem;font-weight:700;color:'+c.color+'">'+c.val+'</div></div>';}
document.getElementById('result').classList.add('show');}
document.getElementById('calcBtn').addEventListener('click',calc);
