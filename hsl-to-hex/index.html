<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

(function(){var s=document.createElement('script');s.src='/tools-site/feedback-widget.html';s.onload=function(){if(window.initFeedback)initFeedback('hsl-to-hex')};document.body.appendChild(s)})();

function toggleFaq(el){var item=el.parentElement;item.classList.toggle('open')}

function hslToHex(h,s,l){
  s/=100;l/=100;
  const k=function(n){return (n+h/30)%12};
  const a=s*Math.min(l,1-l);
  const f=function(n){return l-a*Math.max(Math.min(k(n)-3,9-k(n),1),-1)};
  const toHex=function(v){return Math.round(255*v).toString(16).padStart(2,'0')};
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}

function hexToRgb(hex){
  hex=hex.replace('#','');
  const r=parseInt(hex.substring(0,2),16);
  const g=parseInt(hex.substring(2,4),16);
  const b=parseInt(hex.substring(4,6),16);
  return {r,g,b};
}

function hslToRgb(h,s,l){
  s/=100;l/=100;
  const k=function(n){return (n+h/30)%12};
  const a=s*Math.min(l,1-l);
  return{
    r:Math.round(255*(l-a*Math.max(Math.min(k(0)-3,9-k(0),1),-1))),
    g:Math.round(255*(l-a*Math.max(Math.min(k(8)-3,9-k(8),1),-1))),
    b:Math.round(255*(l-a*Math.max(Math.min(k(4)-3,9-k(4),1),-1)))
  };
}

function updateDisplay(h,s,l){
  const hex=hslToHex(h,s,l);
  const rgb=hslToRgb(h,s,l);
  const preview=document.getElementById('colorPreview');
  preview.style.background='hsl('+h+','+s+'%,'+l+'%)';
  document.getElementById('hexCode').textContent=hex;
  document.getElementById('hslCode').textContent='hsl('+h+','+s+'%,'+l+'%)';
  document.getElementById('rgbCode').textContent='rgb('+rgb.r+','+rgb.g+','+rgb.b+')';
  document.getElementById('hVal').textContent=h+'°';
  document.getElementById('sVal').textContent=s+'%';
  document.getElementById('lVal').textContent=l+'%';
  document.getElementById('hue').value=h;
  document.getElementById('sat').value=s;
  document.getElementById('light').value=l;

  // Update input fields (avoid loop)
  document.getElementById('hInput').value=h;
  document.getElementById('sInput').value=s;
  document.getElementById('lInput').value=l;

  // Update preset active state
  document.querySelectorAll('.preset-color').forEach(function(el){
    el.classList.toggle('active',el.dataset.h==h&&el.dataset.s==s&&el.dataset.l==l);
  });
}

function updateFromSliders(){
  const h=parseInt(document.getElementById('hue').value);
  const s=parseInt(document.getElementById('sat').value);
  const l=parseInt(document.getElementById('light').value);
  updateDisplay(h,s,l);
}

function updateFromInputs(){
  const h=parseInt(document.getElementById('hInput').value)||0;
  const s=parseInt(document.getElementById('sInput').value)||0;
  const l=parseInt(document.getElementById('lInput').value)||0;
  updateDisplay(Math.max(0,Math.min(360,h)),Math.max(0,Math.min(100,s)),Math.max(0,Math.min(100,l)));
}

function copyColor(type){
  let val='';
  if(type==='hex')val=document.getElementById('hexCode').textContent;
  else if(type==='hsl')val=document.getElementById('hslCode').textContent;
  else val=document.getElementById('rgbCode').textContent;
  navigator.clipboard.writeText(val).then(function(){showToast('已复制: '+val)}).catch(function(){showToast('复制失败')});
}

function loadPreset(h,s,l){
  updateDisplay(h,s,l);
}

function initPresets(){
  const presets=[
    {h:0,s:80,l:50,name:'红'},{h:15,s:90,l:55,name:'橙'},{h:45,s:95,l:55,name:'黄'},
    {h:120,s:60,l:45,name:'绿'},{h:190,s:80,l:50,name:'青'},{h:210,s:80,l:50,name:'蓝'},
    {h:260,s:70,l:55,name:'紫'},{h:330,s:80,l:55,name:'粉'},{h:0,s:0,l:30,name:'深灰'},
    {h:0,s:0,l:70,name:'浅灰'},{h:0,s:0,l:95,name:'白'},{h:0,s:0,l:5,name:'黑'}
  ];
  const container=document.getElementById('presetColors');
  presets.forEach(function(p){
    const el=document.createElement('div');
    el.className='preset-color';
    el.style.background='hsl('+p.h+','+p.s+'%,'+p.l+'%)';
    el.title=p.name+' '+'('+p.h+'°,'+p.s+'%,'+p.l+'%)';
    el.dataset.h=p.h;el.dataset.s=p.s;el.dataset.l=p.l;
    el.addEventListener('click',function(){loadPreset(parseInt(this.dataset.h),parseInt(this.dataset.s),parseInt(this.dataset.l))});
    container.appendChild(el);
  });
}



window.onload=initPresets;

</script>
