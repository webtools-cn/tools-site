  <h2>太阳高度角基础知识</h2>
  <h3>什么是太阳高度角？</h3>
  <p>太阳高度角（Solar Elevation Angle）是指太阳光线与地平面的夹角，范围从0°（太阳在地平线上）到90°（太阳在正头顶）。太阳高度角是太阳能利用、建筑设计、摄影规划和农业等领域的重要参数。</p>
  <h3>什么是太阳方位角？</h3>
  <p>太阳方位角（Solar Azimuth Angle）是指太阳在水平面上的投影方向与正南方向的夹角。以北为0°，顺时针方向递增，正东为90°，正南为180°，正西为270°。</p>
  <h3>核心计算公式</h3>
  <p><code>sin(δ) = 0.39779 × cos(0.98565 × (N + 10) + 1.914 × sin(0.98565 × (N - 2)))</code></p>
  <p><code>sin(h) = sin(φ)sin(δ) + cos(φ)cos(δ)cos(ω)</code></p>
  <p><code>cos(A) = (sin(δ) - sin(h)sin(φ)) / (cos(h)cos(φ))</code></p>
  <p>其中：N=年积日，φ=纬度，δ=太阳赤纬，ω=时角，h=高度角，A=方位角</p>
</div>

<div class="info-section">
  <h2>常见问题 FAQ</h2>
  <div class="faq-item">
    <h3>太阳高度角为负数代表什么？</h3>
    <p>太阳高度角为负数表示太阳位于地平线以下，即当前时间太阳已落山或尚未升起。负值的绝对值越大，太阳在地平线以下越深。</p>
  </div>
  <div class="faq-item">
    <h3>日出日落时间的计算精度如何？</h3>
    <p>本工具使用标准天文公式计算，精度约为±5分钟。实际日出日落时间还会受到海拔、地形遮挡、大气折射等因素影响。大气折射通常使日出提前约2-3分钟，日落延后约2-3分钟。</p>
  </div>
  <div class="faq-item">
    <h3>如何确定太阳能板的最佳倾角？</h3>
    <p>太阳能板的最佳倾角通常等于当地纬度。如果需要冬季优化发电，倾角可增加10-15°；夏季优化则减少10-15°。使用本工具了解不同季节的太阳高度角变化，有助于精确调整。</p>
  </div>
  <div class="faq-item">
    <h3>为什么正午太阳不一定在正南方向？</h3>
    <p>太阳正午（高度角最大时刻）不一定恰好是当地时间12:00，这取决于经度与时区中心经线的偏差以及「均时差」效应。均时差是由于地球椭圆轨道和自转轴倾斜导致的太阳时与钟表时差异，全年最大偏差约±16分钟。</p>
  </div>

<script>
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2500)}
var el=function(id){return document.getElementById(id)};

function useNow(){
  var now=new Date();
  var d=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  var t=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");

  showToast("已设置为当前时间");
}

  el("dateInput").value="";
  el("timeInput").value="";
  el("latInput").value="";
  el("lonInput").value="";
  el("resultSection").classList.remove("show");
}

function rad2deg(r){return r*180/Math.PI}
function deg2rad(d){return d*Math.PI/180}

function calcSolar(){
  var dateStr=el("dateInput").value;
  var timeStr=el("timeInput").value;
  var lat=parseFloat(el("latInput").value);
  var lon=parseFloat(el("lonInput").value);
  var tz=parseFloat(el("tzSelect").value);

  if(!dateStr||!timeStr){showToast("请输入日期和时间");return}
  if(isNaN(lat)||isNaN(lon)){showToast("请输入有效的经纬度");return}
  if(lat<-90||lat>90){showToast("纬度范围 -90 ~ 90");return}
  if(lon<-180||lon>180){showToast("经度范围 -180 ~ 180");return}

  var parts=dateStr.split("-");
  var year=parseInt(parts[0]);
  var month=parseInt(parts[1]);
  var day=parseInt(parts[2]);
  var tp=timeStr.split(":");
  var hour=parseInt(tp[0]);
  var minute=parseInt(tp[1]);

  // 计算年积日 N (day of year)
  var date1=new Date(year,0,1);
  var date2=new Date(year,month-1,day);
  var N=Math.floor((date2-date1)/(1000*60*60*24))+1;

  // 计算太阳赤纬 δ (declination) - 使用Cooper公式
  var delta=23.45*Math.sin(deg2rad(360*(284+N)/365));

  // 计算时角 ω
  // 本地太阳时 = 钟表时 + (经度 - 时区中心经度) * 4分钟/度 + 均时差
  var tzCenterLon=tz*15; // 时区中心经度
  // 均时差（简化版）
  var B=deg2rad(360*(N-1)/365);
  var eot=229.18*(0.000075+0.001868*Math.cos(B)-0.032077*Math.sin(B)-0.014615*Math.cos(2*B)-0.04089*Math.sin(2*B)); // 分钟
  var localSolarTimeMinutes=(hour*60+minute)+(lon-tzCenterLon)*4+eot;
  var localSolarTimeHours=localSolarTimeMinutes/60;
  var omega=(localSolarTimeHours-12)*15; // 时角（度）

  // 计算太阳高度角 h
  var sinH=Math.sin(deg2rad(lat))*Math.sin(deg2rad(delta))+Math.cos(deg2rad(lat))*Math.cos(deg2rad(delta))*Math.cos(deg2rad(omega));
  sinH=Math.max(-1,Math.min(1,sinH));
  var elevation=rad2deg(Math.asin(sinH));

  // 计算太阳方位角 A
  var cosA=0;
  var azimuth=0;
  if(Math.cos(deg2rad(elevation))>0.001){
    cosA=(Math.sin(deg2rad(delta))-Math.sin(deg2rad(lat))*Math.sin(deg2rad(elevation)))/(Math.cos(deg2rad(lat))*Math.cos(deg2rad(elevation)));
    cosA=Math.max(-1,Math.min(1,cosA));
    azimuth=rad2deg(Math.acos(cosA));
    // 如果时角为正(下午)，方位角大于180
    if(omega>0){azimuth=360-azimuth}
  }else{
    azimuth=omega>0?270:90;
  }

  // 计算日出日落时间
  // 日出日落时高度角约0° (忽略大气折射)
  var cosOmega0=-Math.tan(deg2rad(lat))*Math.tan(deg2rad(delta));
  var sunriseTime="--",sunsetTime="--";
  if(cosOmega0>=-1&&cosOmega0<=1){
    var omega0=rad2deg(Math.acos(cosOmega0));
    // 日出: 太阳时 = 12 - omega0/15
    // 日落: 太阳时 = 12 + omega0/15
    var sunriseSolarMin=(12-omega0/15)*60;
    var sunsetSolarMin=(12+omega0/15)*60;
    // 转回钟表时
    var sunriseClockMin=sunriseSolarMin-(lon-tzCenterLon)*4-eot;
    var sunsetClockMin=sunsetSolarMin-(lon-tzCenterLon)*4-eot;
    sunriseTime=formatTime(sunriseClockMin);
    sunsetTime=formatTime(sunsetClockMin);
  }else if(cosOmega0>1){
    sunriseTime="无日出(极夜)";
    sunsetTime="无日落(极夜)";
  }else{
    sunriseTime="无日落(极昼)";
    sunsetTime="无日出(极昼)";
  }

  // 更新结果
  el("resElevation").textContent=elevation.toFixed(2);
  el("resAzimuth").textContent=azimuth.toFixed(2);
  el("resSunrise").textContent=sunriseTime;
  el("resSunset").textContent=sunsetTime;
  el("resDeclination").textContent=delta.toFixed(2);
  el("resHourAngle").textContent=omega.toFixed(2);

  // 更新可视化
  var sunDot=el("sunDot");
  var vis=el("sunVis");
  var visW=vis.offsetWidth||600;
  var visH=vis.offsetHeight||180;
  // 高度角映射到y位置 (0°=底部, 90°=顶部)
  var yPos=Math.max(0,Math.min(90,elevation));
  var yPx=(yPos/90)*(visH-60);
  // 方位角映射到x位置 (0°=左, 180°=中, 360°=右)
  var normalizedAz=azimuth;
  if(normalizedAz>180)normalizedAz=normalizedAz-360;
  var xRatio=(normalizedAz+180)/360;
  var xPx=xRatio*(visW-50);
  sunDot.style.bottom=(10+yPx)+"px";
  sunDot.style.left=xPx+"px";
  sunDot.style.transform="none";

  // 太阳颜色根据高度角变化
  if(elevation<=0){
    sunDot.style.background="radial-gradient(circle,#475569,#334155)";
    sunDot.style.boxShadow="0 0 20px rgba(71,85,105,.4)";
  }else if(elevation<10){
    sunDot.style.background="radial-gradient(circle,#f97316,#ea580c)";
    sunDot.style.boxShadow="0 0 30px rgba(249,115,22,.5)";
  }else if(elevation<30){
    sunDot.style.background="radial-gradient(circle,#fb923c,#f59e0b)";
    sunDot.style.boxShadow="0 0 35px rgba(251,146,60,.5)";
  }else{
    sunDot.style.background="radial-gradient(circle,#fbbf24,#f59e0b)";
    sunDot.style.boxShadow="0 0 40px rgba(251,191,36,.6)";
  }

  el("resultSection").classList.add("show");
  showToast("计算完成");
}

function formatTime(minutes){
  if(typeof minutes!=="number"||!isFinite(minutes))return"--";
  var h=Math.floor(minutes/60);
  var m=Math.round(minutes%60);
  // 处理跨日
  while(h<0)h+=24;
  while(h>=24)h-=24;
  if(m>=60){h++;m-=60}
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

// 页面加载时设置默认日期为今天
window.addEventListener("DOMContentLoaded",function(){
  var now=new Date();
  var d=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  var t=String(now.getHours()).padStart(2,"0")+":"+String(Math.floor(now.getMinutes()/15)*15).padStart(2,"0");
  el("dateInput").value=d;
  el("timeInput").value=t;
});
</script>
