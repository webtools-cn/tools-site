<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

// Tool-specific JavaScript
const TOOL_SLUG = 'base64-encode';
function showToast(msg) {
  const t = document.getElementById('toast-msg') || (()=>{const d=document.createElement('div');d.id='toast-msg';d.className='toast';document.body.appendChild(d);return d;})();
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));
}

function downloadFile(content, filename, mime='text/plain') {
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}


function initTool() {
  const ui = document.getElementById('tool-ui');
  ui.innerHTML = `
    <div class="tab-bar" id="input-mode-tabs">
      <button class="tab-btn active" onclick="switchInputMode('text')">📝 文本</button>
      <button class="tab-btn" onclick="switchInputMode('file')">📁 文件</button>
    </div>
    <div id="text-input-area">
      <textarea id="input-text" class="input-textarea" placeholder="输入要编码的文本..."></textarea>
    </div>
    <div id="file-input-area" style="display:none">
      <div class="file-drop" id="file-drop" ondragover="event.preventDefault();this.style.borderColor='rgba(6,182,212,.5)'" ondrop="event.preventDefault();handleFile(event.dataTransfer.files[0])" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📤</div>
        <div class="drop-text">拖拽文件到此处</div>
        <div class="drop-hint">或点击选择文件</div>
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this.files[0])">
      </div>
      <div id="file-info" style="display:none;margin-top:8px;padding:8px;background:rgba(6,182,212,.05);border-radius:6px;font-size:.85rem;color:#94a3b8"></div>
    </div>
    <div class="input-row" style="margin-top:12px">
      <div class="input-group">
        <label>输出格式</label>
        <select id="output-format">
          <option value="standard">标准Base64</option>
          <option value="urlsafe">Base64URL（URL安全）</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-large" onclick="encode()">编码</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>
  `;
}
initTool();

let currentFile = null;

function switchInputMode(mode) {
  document.querySelectorAll('#input-mode-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('text-input-area').style.display = mode === 'text' ? 'block' : 'none';
  document.getElementById('file-input-area').style.display = mode === 'file' ? 'block' : 'none';
}

function handleFile(file) {
  currentFile = file;
  const fi = document.getElementById('file-info');
  fi.style.display = 'block';
  fi.textContent = '已选择: ' + file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
}

function encode() {
  const format = document.getElementById('output-format').value;
  const textMode = document.getElementById('text-input-area').style.display !== 'none';
  
  let data;
  if (textMode) {
    data = document.getElementById('input-text').value;
    if (!data) { showToast('请输入要编码的内容'); return; }
  } else {
    if (!currentFile) { showToast('请选择文件'); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      const bytes = new Uint8Array(e.target.result);
      const base64 = btoa(String.fromCharCode(...bytes));
      displayResult(format === 'urlsafe' ? base64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'') : base64);
    };
    reader.readAsArrayBuffer(currentFile);
    return;
  }
  
  // Encode text
  const bytes = new TextEncoder().encode(data);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  let base64 = btoa(binary);
  if (format === 'urlsafe') base64 = base64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  displayResult(base64);
}

function displayResult(text) {
  document.getElementById('result-section').classList.add('show');
  document.getElementById('result-content').innerHTML = `
    <textarea class="output-textarea" readonly>${text}</textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyToClipboard('${text.replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">📋 复制</button>
      <button class="btn btn-secondary" onclick="downloadFile('${text.replace(/'/g,"\\'").replace(/\n/g,'\\n')}','encoded.txt')">💾 下载</button>
    </div>
  `;
  document.getElementById('char-count').textContent = `长度: ${text.length} 字符`;
}

function clearAll() {
  document.getElementById('input-text').value = '';
  document.getElementById('result-section').classList.remove('show');
  currentFile = null;
  document.getElementById('file-info').style.display = 'none';
}

</script>
