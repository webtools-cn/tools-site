<script>
(function(){
var units=['B','KB','MB','GB','TB','PB','EB'];
var unitFactors={B:0,KB:1,MB:2,GB:3,TB:4,PB:5,EB:6};
document.getElementById('app').innerHTML=`
<div class="input-section">
  <h2>🎯 单位转换</h2>
  <div class="row">
    <div class="field">
      <label>数值</label>
      <input type="number" id="inputVal" value="1024" min="0" step="any">
    </div>
    <div class="field">
      <label>当前单位</label>
      <select id="inputUnit">
        <option value="B">Byte (B)</option>
        <option value="KB">Kilobyte (KB)</option>
        <option value="MB" selected>Megabyte (MB)</option>
        <option value="GB">Gigabyte (GB)</option>
        <option value="TB">Terabyte (TB)</option>
        <option value="PB">Petabyte (PB)</option>
        <option value="EB">Exabyte (EB)</option>
      </select>
    </div>
    <div class="field">
      <label>换算标准</label>
      <select id="standard">
        <option value="1024">二进制标准 (1024) - 系统/内存</option>
        <option value="1000">十进制标准 (1000) - 硬盘厂商</option>
      </select>
    </div>
  </div>
</div>
<div class="result-section" id="singleResult">
  <h2>✅ 转换结果</h2>
  <div class="table-wrap"><table class="data" id="resultTable"></table></div>
</div>
<div class="input-section">
  <h2>📋 批量转换</h2>
  <label>每行一个数值（使用上方选择的单位和换算标准）</label>
  <textarea id="batchInput" rows="5">512
1024
2048
10240
1048576</textarea>
  <div class="btn-row" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
    <button class="btn btn-primary" id="batchBtn">批量转换</button>
  </div>
  <div id="batchResult"></div>
</div>
`;
function convertOne(val,fromUnit,base){
  var fromExp=unitFactors[fromUnit];
  var bytes=val*Math.pow(base,fromExp);
  var rows='<tr><th>单位</th><th>值</th></tr>';
  for(var i=0;i<units.length;i++){
    var v=bytes/Math.pow(base,i);
    rows+='<tr><td>'+units[i]+'</td><td>'+v.toFixed(4).replace(/\.?0+$/,'')+'</td></tr>';
  }
  return rows;
}
function update(){
  var val=parseFloat(document.getElementById('inputVal').value)||0;
  var unit=document.getElementById('inputUnit').value;
  var base=parseInt(document.getElementById('standard').value);
  document.getElementById('resultTable').innerHTML=convertOne(val,unit,base);
}
document.getElementById('inputVal').addEventListener('input',update);
document.getElementById('inputUnit').addEventListener('change',update);
document.getElementById('standard').addEventListener('change',update);
document.getElementById('batchBtn').addEventListener('click',function(){
  var base=parseInt(document.getElementById('standard').value);
  var unit=document.getElementById('inputUnit').value;
  var lines=document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim();});
  var html='<div class="table-wrap"><table class="data"><tr><th>输入值</th>';
  for(var i=0;i<units.length;i++) html+='<th>'+units[i]+'</th>';
  html+='</tr>';
  for(var j=0;j<lines.length;j++){
    var v=parseFloat(lines[j])||0;
    var bytes=v*Math.pow(base,unitFactors[unit]);
    html+='<tr><td>'+v+' '+unit+'</td>';
    for(var k=0;k<units.length;k++){
      html+='<td>'+(bytes/Math.pow(base,k)).toFixed(4).replace(/\.?0+$/,'')+'</td>';
    }
    html+='</tr>';
  }
  html+='</table></div>';
  document.getElementById('batchResult').innerHTML=html;
});
update();
// batch auto-run
document.getElementById('batchBtn').click();
})();
</script>
