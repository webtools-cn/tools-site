function getWords(text) {
  var cleaned = text.replace(/[\u4e00-\u9fff]/g, ' ').trim();
  if (!cleaned) return text.length;
  return cleaned.split(/\s+/).filter(Boolean).length;
}

var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>📖 选择测试文章</h2><div class="options"><label>难度：<select id="difficulty"><option value="easy">简单 (约80词)</option><option value="medium" selected>中等 (约120词)</option><option value="hard">困难 (约160词)</option></select></label><label>语言：<select id="lang"><option value="zh">中文</option><option value="en" selected>English</option></select></label></div></div><div class="input-section"><h2>📝 阅读文章</h2><div id="passageBox" style="background:#0f172a;border-radius:8px;padding:16px;border:1px solid rgba(148,163,184,.08);font-size:1rem;line-height:1.8;margin-bottom:12px;color:#e2e8f0;max-height:300px;overflow-y:auto"></div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><button class="btn btn-primary" id="startBtn">▶️ 开始阅读</button><span id="timerDisplay" style="color:#22d3ee;font-size:1.2rem;font-weight:700;font-family:monospace;min-width:80px">00:00</span><span style="color:#64748b;font-size:.85rem">点击"开始阅读"后计时</span></div></div><div class="result-section" id="resultSection"><h2>📊 测试结果</h2><div id="resultContent"></div></div>';

document.getElementById('usageContent').innerHTML='<p>选择测试文章难度和语言，点击"开始阅读"后开始计时。阅读完毕后再次点击按钮停止计时，系统将自动计算您的阅读速度（WPM）。</p><p>成人平均阅读速度约为200-300 WPM，经过训练的快速阅读者可达400-700 WPM。</p>';

var timerInterval = null;
var startTime = null;
var elapsed = 0;
var isRunning = false;
var currentPassage = '';

function loadPassage() {
  var diff = document.getElementById('difficulty').value;
  var lang = document.getElementById('lang').value;
  var p = passages[diff];
  currentPassage = lang === 'zh' ? p.zh : p.en;
  document.getElementById('passageBox').innerHTML = currentPassage;
  document.getElementById('resultSection').classList.remove('show');
  resetTimer();
}

function resetTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  isRunning = false;
  elapsed = 0;
  startTime = null;
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('startBtn').textContent = '▶️ 开始阅读';
}

function toggleTimer() {
  if (isRunning) {
    // Stop
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    isRunning = false;
    var endTime = Date.now();
    elapsed = (endTime - startTime) / 1000;
    document.getElementById('startBtn').textContent = '▶️ 重新测试';
    showResults();
  } else {
    // Start
    resetTimer();
    startTime = Date.now();
    isRunning = true;
    document.getElementById('startBtn').textContent = '⏹️ 停止 (完成阅读)';
    timerInterval = setInterval(function(){
      var now = Date.now();
      var e = (now - startTime) / 1000;
      var mins = Math.floor(e / 60);
      var secs = Math.floor(e % 60);
      document.getElementById('timerDisplay').textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    }, 200);
  }
}

function showResults() {
  var lang = document.getElementById('lang').value;
  var diff = document.getElementById('difficulty').value;
  var p = passages[diff];
  var wordCount = lang === 'zh' ? p.words : getWords(p.en);
  var wpm = elapsed > 0 ? Math.round(wordCount / (elapsed / 60)) : 0;
  var mins = Math.floor(elapsed / 60);
  var secs = Math.floor(elapsed % 60);

  var level = '';
  var levelColor = '#94a3b8';
  if (wpm < 100) { level = '较慢'; levelColor = '#f87171'; }
  else if (wpm < 200) { level = '一般'; levelColor = '#fb923c'; }
  else if (wpm < 300) { level = '正常 (成人平均)'; levelColor = '#22d3ee'; }
  else if (wpm < 400) { level = '良好'; levelColor = '#4ade80'; }
  else if (wpm < 500) { level = '优秀'; levelColor = '#34d399'; }
  else { level = '卓越 (速读水平)'; levelColor = '#06b6d4'; }

  var html = '<div style="margin-bottom:16px;padding:16px;background:rgba(6,182,212,.1);border-radius:8px;border:1px solid rgba(6,182,212,.2);text-align:center">';
  html += '<div style="font-size:3rem;font-weight:700;color:' + levelColor + '">' + wpm + '</div>';
  html += '<div style="color:#94a3b8;font-size:.9rem">WPM (每分钟阅读词数)</div>';
  html += '<div style="margin-top:8px;padding:4px 12px;display:inline-block;border-radius:12px;font-size:.85rem;background:' + levelColor + '20;color:' + levelColor + ';border:1px solid ' + levelColor + '40">' + level + '</div></div>';

  html += '<div class="table-wrap"><table class="data"><tr><th>指标</th><th>数值</th></tr>';
  html += '<tr><td>阅读用时</td><td>' + mins + '分 ' + secs + '秒</td></tr>';
  html += '<tr><td>文章总词数</td><td>' + wordCount + ' 词</td></tr>';
  html += '<tr><td>阅读速度</td><td style="font-weight:600;color:' + levelColor + '">' + wpm + ' WPM</td></tr></table></div>';

  html += '<h3 style="margin:12px 0 8px;color:#f1f5f9">📈 速度参考</h3><div class="table-wrap"><table class="data"><tr><th>水平</th><th>WPM</th></tr>';
  var levels = [['较慢','< 100','#f87171'],['一般','100-199','#fb923c'],['正常 (成人平均)','200-300','#22d3ee'],['良好','300-399','#4ade80'],['优秀','400-499','#34d399'],['卓越 (速读)','500+','#06b6d4']];
  levels.forEach(function(l){
    html += '<tr' + (wpm >= parseInt(l[1]) ? ' style="background:rgba(6,182,212,.08)"' : '') + '><td style="color:' + l[2] + '">' + l[0] + '</td><td>' + l[1] + '</td></tr>';
  });
  html += '</table></div>';

  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('resultSection').classList.add('show');
}

document.getElementById('difficulty').addEventListener('change', loadPassage);
document.getElementById('lang').addEventListener('change', loadPassage);
document.getElementById('startBtn').addEventListener('click', toggleTimer);
loadPassage();
})();
