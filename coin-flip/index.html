<script>
let cfData={heads:0,tails:0,history:[]};
function cfFlip(){
  const coin=document.getElementById('cfCoin');
  const result=document.getElementById('cfResult');
  coin.classList.add('flipping');
  const isHeads=Math.random()<0.5;
  setTimeout(()=>{
    coin.classList.remove('flipping');
    if(isHeads){
      cfData.heads++;
      cfData.history.push('H');
      result.textContent=document.querySelector('html').lang==='en'?'🏆 Heads!':'🏆 正面!';
    }else{
      cfData.tails++;
      cfData.history.push('T');
      result.textContent=document.querySelector('html').lang==='en'?'💸 Tails!':'💸 反面!';
    }
    if(cfData.history.length>100)cfData.history=cfData.history.slice(-100);
    cfUpdateStats();
    const inner=coin.querySelector('.cf-coin-inner');
    inner.style.transform=isHeads?'rotateY(0)':'rotateY(180deg)';
  },600);
}
function cfReset(){
  cfData={heads:0,tails:0,history:[]};
  document.getElementById('cfResult').textContent=document.querySelector('html').lang==='en'?'Click the coin to flip':'点击硬币抛掷';
  cfUpdateStats();
}
function cfUpdateStats(){
  document.getElementById('cfHeads').textContent=cfData.heads;
  document.getElementById('cfTails').textContent=cfData.tails;
  document.getElementById('cfTotal').textContent=cfData.heads+cfData.tails;
  const hist=document.getElementById('cfHistory');
  hist.innerHTML=cfData.history.map(r=>'<span class="cf-history-item '+(r==='H'?'h':'t')+'">'+r+'</span>').join('');
}
</script>
