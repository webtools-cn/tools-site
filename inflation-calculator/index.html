<script>
(function(){
document.getElementById('app').innerHTML=`
<div class="input-section">
  <h2>📊 基本计算</h2>
  <div class="row">
    <div class="field">
      <label>当前金额 (元)</label>
      <input type="number" id="amount" value="100000" min="0" step="1000">
    </div>
    <div class="field">
      <label>年通胀率 (%)</label>
      <input type="number" id="rate" value="3" min="0" max="100" step="0.1">
    </div>
    <div class="field">
      <label>年数</label>
      <input type="number" id="years" value="10" min="1" max="100" step="1">
    </div>
  </div>
</div>
<div class="result-section" id="resultSection">
  <h2>✅ 计算结果</h2>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
    <div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center">
      <div style="color:#94a3b8;font-size:.8rem;margin-bottom:4px">未来实际购买力</div>
      <div id="futureVal" style="font-size:1.5rem;color:#22d3ee;font-weight:700"></div>
    </div>
    <div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center">
      <div style="color:#94a3b8;font-size:.8rem;margin-bottom:4px">购买力损失</div>
      <div id="lossVal" style="font-size:1.5rem;color:#ef4444;font-weight:700"></div>
    </div>
    <div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center">
      <div style="color:#94a3b8;font-size:.8rem;margin-bottom:4px">购买力占比</div>
      <div id="pctVal" style="font-size:1.5rem;color:#4ade80;font-weight:700"></div>
    </div>
  </div>
  <div id="yearTable"></div>
</div>
<div class="input-section">
  <h2>🔄 多场景对比</h2>
  <div class="row">
    <div class="field">
      <label>低通胀率 (%)</label>
      <input type="number" id="rateLow" value="1" min="0" step="0.1">
    </div>
    <div class="field">
      <label>中通胀率 (%)</label>
      <input type="number" id="rateMid" value="3" min="0" step="0.1">
    </div>
    <div class="field">
      <label>高通胀率 (%)</label>
      <input type="number" id="rateHigh" value="6" min="0" step="0.1">
    </div>
  </div>
  <div id="compareTable"></div>
</div>
`;
function calc(){
  var a=parseFloat(document.getElementById('amount').value)||0;
  var r=parseFloat(document.getElementById('rate').value)||0;
  var y=parseInt(document.getElementById('years').value)||0;
  if(a<=0||r<=0||y<=0) return;
  var rate=r/100;
  var future=a*Math.pow(1-rate,y);
  var loss=a-future;
  document.getElementById('futureVal').textContent='¥'+future.toFixed(2);
  document.getElementById('lossVal').textContent='¥'+loss.toFixed(2);
  document.getElementById('pctVal').textContent=(future/a*100).toFixed(1)+'%';
  var html='<h3 style="font-size:.95rem;color:#f1f5f9;margin-bottom:8px">逐年购买力变化</h3><div class="table-wrap"><table class="data"><tr><th>年份</th><th>购买力</th><th>累计损失</th><th>占比</th></tr>';
  for(var i=1;i<=y;i++){
    var fv=a*Math.pow(1-rate,i);
    html+='<tr><td>第'+i+'年</td><td>¥'+fv.toFixed(2)+'</td><td style="color:#ef4444">¥'+(a-fv).toFixed(2)+'</td><td>'+(fv/a*100).toFixed(1)+'%</td></tr>';
  }
  html+='</table></div>';
  document.getElementById('yearTable').innerHTML=html;
  // Compare
  var rl=parseFloat(document.getElementById('rateLow').value||1)/100;
  var rm=parseFloat(document.getElementById('rateMid').value||3)/100;
  var rh=parseFloat(document.getElementById('rateHigh').value||6)/100;
  var ch='<h3 style="font-size:.95rem;color:#f1f5f9;margin-bottom:8px">不同通胀率对比（'+y+'年后）</h3><div class="table-wrap"><table class="data"><tr><th>通胀率</th><th>未来价值</th><th>购买力占比</th></tr>';
  ch+='<tr><td>'+(rl*100).toFixed(1)+'%</td><td>¥'+(a*Math.pow(1-rl,y)).toFixed(2)+'</td><td>'+(Math.pow(1-rl,y)*100).toFixed(1)+'%</td></tr>';
  ch+='<tr><td>'+(rm*100).toFixed(1)+'%</td><td>¥'+(a*Math.pow(1-rm,y)).toFixed(2)+'</td><td>'+(Math.pow(1-rm,y)*100).toFixed(1)+'%</td></tr>';
  ch+='<tr><td>'+(rh*100).toFixed(1)+'%</td><td>¥'+(a*Math.pow(1-rh,y)).toFixed(2)+'</td><td>'+(Math.pow(1-rh,y)*100).toFixed(1)+'%</td></tr>';
  ch+='</table></div>';
  document.getElementById('compareTable').innerHTML=ch;
}
['amount','rate','years','rateLow','rateMid','rateHigh'].forEach(function(id){
  var el=document.getElementById(id);
  if(el) el.addEventListener('input',calc);
});
calc();
})();
</script>
