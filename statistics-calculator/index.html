<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function parseData(str) {
  const nums = str.split(/[,\s\n\r]+/).map(s => s.trim()).filter(s => s !== '').map(Number);
  return nums.filter(n => !isNaN(n));
}

function calculate() {
  const raw = document.getElementById('dataInput').value;
  const data = parseData(raw);

  if (data.length < 2) {
    showToast('请至少输入2个有效数字');
    return;
  }

  const n = data.length;
  const sorted = [...data].sort((a, b) => a - b);
  const sum = data.reduce((a, b) => a + b, 0);
  const mean = sum / n;

  // Median
  let median;
  if (n % 2 === 0) {
    median = (sorted[n/2 - 1] + sorted[n/2]) / 2;
  } else {
    median = sorted[Math.floor(n/2)];
  }

  // Mode
  const freq = {};
  data.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
  const maxFreq = Math.max(...Object.values(freq));
  const modes = Object.keys(freq).filter(k => freq[k] === maxFreq).map(Number);
  const modeStr = maxFreq === 1 ? '无众数' : modes.join(', ');

  // Variance and Std Dev
  const variance = data.reduce((acc, v) => acc + (v - mean) ** 2, 0);
  const popVariance = variance / n;
  const sampleVariance = variance / (n - 1);
  const popStd = Math.sqrt(popVariance);
  const sampleStd = Math.sqrt(sampleVariance);

  // Min, Max, Range
  const min = sorted[0];
  const max = sorted[n - 1];
  const range = max - min;

  // Quartiles
  function getQuartile(arr, q) {
    const pos = q * (arr.length - 1);
    const lower = Math.floor(pos);
    const upper = Math.ceil(pos);
    if (lower === upper) return arr[lower];
    return arr[lower] * (upper - pos) + arr[upper] * (pos - lower);
  }
  const q1 = getQuartile(sorted, 0.25);
  const q2 = median;
  const q3 = getQuartile(sorted, 0.75);
  const iqr = q3 - q1;

  // Skewness (sample)
  const skewness = n > 2 ? (data.reduce((acc, v) => acc + ((v - mean) / sampleStd) ** 3, 0) * n) / ((n-1) * (n-2)) : 0;

  // Kurtosis (excess)
  const kurtosis = n > 3 ? (data.reduce((acc, v) => acc + ((v - mean) / sampleStd) ** 4, 0) * n * (n+1)) / ((n-1) * (n-2) * (n-3)) - (3 * (n-1) ** 2) / ((n-2) * (n-3)) : 0;

  // Display
  document.getElementById('dataPreview').textContent = `共 ${n} 个数据: ${sorted.slice(0, 20).join(', ')}${n > 20 ? '...' : ''}`;

  const statsGrid = document.getElementById('statsGrid');
  statsGrid.innerHTML = `
    <div class="result-card"><div class="value">${n}</div><div class="label">数据个数 (n)</div></div>
    <div class="result-card"><div class="value">${mean.toFixed(4)}</div><div class="label">均值 (Mean)</div></div>
    <div class="result-card"><div class="value">${median.toFixed(4)}</div><div class="label">中位数 (Median)</div></div>
    <div class="result-card"><div class="value">${modeStr}</div><div class="label">众数 (Mode)</div></div>
    <div class="result-card"><div class="value">${sum.toFixed(4)}</div><div class="label">总和 (Sum)</div></div>
    <div class="result-card"><div class="value">${min.toFixed(4)}</div><div class="label">最小值 (Min)</div></div>
    <div class="result-card"><div class="value">${max.toFixed(4)}</div><div class="label">最大值 (Max)</div></div>
    <div class="result-card"><div class="value">${range.toFixed(4)}</div><div class="label">极差 (Range)</div></div>
  `;

  const distGrid = document.getElementById('distGrid');
  distGrid.innerHTML = `
    <div class="result-card"><div class="value">${popStd.toFixed(4)}</div><div class="label">总体标准差</div><div class="sub">Population Std Dev</div></div>
    <div class="result-card"><div class="value">${sampleStd.toFixed(4)}</div><div class="label">样本标准差</div><div class="sub">Sample Std Dev</div></div>
    <div class="result-card"><div class="value">${popVariance.toFixed(4)}</div><div class="label">总体方差</div><div class="sub">Population Variance</div></div>
    <div class="result-card"><div class="value">${sampleVariance.toFixed(4)}</div><div class="label">样本方差</div><div class="sub">Sample Variance</div></div>
    <div class="result-card"><div class="value">${q1.toFixed(4)}</div><div class="label">Q1 (第25百分位)</div></div>
    <div class="result-card"><div class="value">${q3.toFixed(4)}</div><div class="label">Q3 (第75百分位)</div></div>
    <div class="result-card"><div class="value">${iqr.toFixed(4)}</div><div class="label">四分位距 (IQR)</div></div>
    <div class="result-card"><div class="value">${skewness.toFixed(4)}</div><div class="label">偏度 (Skewness)</div><div class="sub">${skewness > 0.5 ? '右偏' : skewness < -0.5 ? '左偏' : '近似对称'}</div></div>
    <div class="result-card"><div class="value">${kurtosis.toFixed(4)}</div><div class="label">峰度 (Kurtosis)</div><div class="sub">${kurtosis > 1 ? '高峰度' : kurtosis < -1 ? '低峰度' : '适中'}</div></div>
  `;

  document.getElementById('sortedData').textContent = sorted.join('  ');

  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

function loadSample() {

  calculate();
}

function clearData() {

}
