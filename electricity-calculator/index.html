<div class="container">
  <div class="header"><h1>⚡ 电费计算器</h1><div class="lang-switch"><a href="index.html" class="active">EN</a><a href="../en/electricity-calculator/">EN</a></div></div>
  <div class="nav-back"><a href="../index.html">&larr; 返回首页</a></div>
  <div class="section">
    <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">输入电器功率（瓦）、每日使用时间（小时）和电费单价，自动计算每日、每月、每年的耗电量和电费。</p>
    <div class="form-row">
      <div class="form-group"><label>电费单价 (元/度)</label><input type="number" id="rate" step="0.01" min="0" placeholder="e.g. 0.6"></div>
    </div>
    <div id="appliances">
      <div class="form-row appliance-item" data-idx="0">
        <div class="form-group"><label>电器名称</label><input type="text" id="name_0" value="电器 1"></div>
        <div class="form-group"><label>功率 (W)</label><input type="number" id="power_0" step="1" min="0" placeholder="e.g. 1000"></div>
        <div class="form-group"><label>每日使用 (小时)</label><input type="number" id="hours_0" step="0.5" min="0" placeholder="e.g. 4"></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="addAppliance()">+ 添加电器</button>
      <button class="btn btn-primary" onclick="calculate()">计算电费</button>
    </div>
    <div class="result-grid" style="margin-top:16px" id="resultSection">
      <div class="result-item"><div class="label">每日电费</div><div class="value" id="resDaily">&mdash;</div></div>
      <div class="result-item"><div class="label">每月电费</div><div class="value" id="resMonthly">&mdash;</div></div>
      <div class="result-item"><div class="label">每年电费</div><div class="value highlight" id="resYearly">&mdash;</div></div>
    </div>
  </div>
  <div class="section"><h2>常见问题</h2>

  </div>
  <div class="footer"><p>电费计算器 - 纯前端本地计算 | 根据功率和用时估算电费</p></div>
</div>
<div class="toast" id="toast"></div>
<script>
var appIdx=1;
var LABEL_NAME="电器名称";
var LABEL_POWER="功率 (W)";
var LABEL_HOURS="每日使用 (小时)";
var LABEL_APPLIANCE="电器";
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function addAppliance(){
  var div=document.createElement("div");div.className="form-row appliance-item";div.style.marginTop="8px";
  var h="<div class=\"form-group\"><label>"+LABEL_NAME+"</label><input type=\"text\" id=\"name_"+appIdx+"\" value=\" "+LABEL_APPLIANCE+" "+(appIdx+1)+"\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_POWER+"</label><input type=\"number\" id=\"power_"+appIdx+"\" step=\"1\" min=\"0\" placeholder=\"e.g. 1000\"></div>";
  h+="<div class=\"form-group\"><label>"+LABEL_HOURS+"</label><input type=\"number\" id=\"hours_"+appIdx+"\" step=\"0.5\" min=\"0\" placeholder=\"e.g. 4\"></div>";
  h+="<div style=\"display:flex;align-items:flex-end;margin-bottom:14px\"><button class=\"btn btn-secondary\" onclick=\"this.parentElement.parentElement.remove()\" style=\"padding:8px 12px\">\u2715</button></div>";
  div.innerHTML=h;document.getElementById("appliances").appendChild(div);appIdx++;
}
function calculate(){
  var rate=parseFloat(document.getElementById("rate").value);
  if(isNaN(rate)||rate<=0){toast("请输入电费单价");return}
  var totalDaily=0;var items=document.querySelectorAll(".appliance-item");
  for(var i=0;i<items.length;i++){
    var idx=items[i].querySelector("input[type=\"text\"]").id.split("_")[1];
    var power=parseFloat(document.getElementById("power_"+idx).value);
    var hours=parseFloat(document.getElementById("hours_"+idx).value);
    if(isNaN(power)||power<=0||isNaN(hours)||hours<0)continue;
    totalDaily+=power*hours/1000*rate;
  }
  document.getElementById("resDaily").textContent=totalDaily.toFixed(2);
  document.getElementById("resMonthly").textContent=(totalDaily*30).toFixed(2);
  document.getElementById("resYearly").textContent=(totalDaily*365).toFixed(2);
}
</script>

<div id="feedback-panel" style="display:none;position:absolute;bottom:56px;right:0;width:320px;background:#1e293b;border:1px solid rgba(6,182,212,.3);border-radius:12px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.4)">

<span style="color:#f1f5f9;font-size:.95rem;font-weight:600">📝 反馈建议</span>
<button onclick="toggleFeedback()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
</div>
<select id="feedback-type" style="width:100%;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none">
<option value="feedback">💡 功能建议</option>
<option value="bug">🐛 问题反馈</option>

</select>
<textarea id="feedback-text" placeholder="请描述您的建议或遇到的问题..." style="width:100%;height:100px;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:10px;color:#e2e8f0;font-size:.85rem;resize:vertical;outline:none;font-family:inherit" maxlength="1000"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">提交</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ 感谢反馈！已提交到GitHub Issues</div>
</div>
</div>
<script>
function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){alert('请输入反馈内容');return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**页面**: '+window.location.href+'\n**类型**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
