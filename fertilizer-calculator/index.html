<style>
:root{--primary:#16a34a;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--hover:#f0fdf4;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
header .logo{font-size:1.3rem;font-weight:700;color:var(--primary);text-decoration:none}
header nav{display:flex;gap:8px;flex-wrap:wrap}
header nav a{color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:.9rem;transition:all .2s}
header nav a:hover{background:var(--hover);color:var(--primary)}
main{flex:1;max-width:860px;width:100%;margin:0 auto;padding:28px 18px 60px}
h1{font-size:1.7rem;margin-bottom:8px;color:var(--text)}
.subtitle{color:var(--text2);margin-bottom:24px;font-size:.95rem}
.card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:18px}
.card h3{font-size:1rem;margin-bottom:14px;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.field-row{display:flex;gap:10px;flex-wrap:wrap}
.field-row .field{flex:1;min-width:120px;margin-bottom:14px}
input[type="number"],select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;background:#fafbfc;transition:border-color .2s}
input[type="number"]:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.3)}
.btn-outline{background:var(--card);color:var(--primary);border:1.5px solid var(--primary)}
.btn-outline:hover{background:var(--hover)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:8px}
.result-item{background:var(--hover);border-radius:10px;padding:14px;text-align:center}
.result-item .val{font-size:1.5rem;font-weight:700;color:var(--primary);display:block}
.result-item .lbl{font-size:.8rem;color:var(--text2);margin-top:4px;display:block}
.info{font-size:.85rem;color:var(--text2);margin-top:14px;line-height:1.6}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 22px;border-radius:10px;font-size:.9rem;opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{background:var(--card);border-top:1px solid var(--border);padding:18px 24px;text-align:center;font-size:.85rem;color:var(--text2)}
footer a{color:var(--primary);text-decoration:none}
@media(max-width:480px){
  main{padding:22px 14px 50px}
  h1{font-size:1.45rem}
  .card{padding:18px 16px}
  .field-row .field{min-width:100%}
}
@media(max-width:640px){h1{font-size:1.2rem;word-break:break-word}.header{flex-direction:column;gap:8px}}</style>

<body>
<header>
<a href="/" class="logo">🧰 Free ToolBase</a>
<nav>
<a href="/">🏠 首页</a>
<a href="/category/">📂 分类</a>
<a href="/en/fertilizer-calculator/">EN</a>
</nav>
</header>
<main>
<h1>🌱 肥料计算器</h1>
<p class="subtitle">输入面积与NPK配比，按目标施氮量计算所需肥料重量与N-P-K实际投入量</p>

<div class="card">
<h3>📐 施肥面积</h3>
<div class="field-row">
<div class="field">
<label for="area">面积数值</label>
<input type="number" id="area" min="0" step="0.1" value="100" placeholder="如 100">
</div>
<div class="field">
<label for="unit">面积单位</label>
<select id="unit">
<option value="m2">平方米 (m²)</option>
<option value="mu">亩</option>
<option value="ft2">平方英尺 (ft²)</option>
<option value="acre">英亩 (acre)</option>
</select>
</div>
</div>
</div>

<div class="card">
<h3>🧪 肥料配比与目标</h3>
<div class="field">
<label for="preset">常用肥料预设</label>
<select id="preset">
<option value="15-15-15">15-15-15 复合肥</option>
<option value="10-10-10">10-10-10 均衡复合肥</option>
<option value="20-10-10">20-10-10 高氮型</option>
<option value="12-61-61">12-61-61 高磷钾促花果</option>
<option value="46-0-0">46-0-0 尿素</option>
<option value="custom">自定义配比</option>
</select>
</div>
<div class="field-row">
<div class="field">
<label for="npkN">含氮 N (%)</label>
<input type="number" id="npkN" min="0" max="100" step="0.1" value="15" placeholder="如 15">
</div>
<div class="field">
<label for="npkP">含磷 P₂O₅ (%)</label>
<input type="number" id="npkP" min="0" max="100" step="0.1" value="15" placeholder="如 15">
</div>
<div class="field">
<label for="npkK">含钾 K₂O (%)</label>
<input type="number" id="npkK" min="0" max="100" step="0.1" value="15" placeholder="如 15">
</div>
</div>
<div class="field">
<label for="targetN">目标施氮量（kg N / 100 m²）</label>
<input type="number" id="targetN" min="0" step="0.01" value="0.15" placeholder="如 0.15">
</div>
<div class="info" id="targetInfo">常见用量参考：蔬菜 0.1–0.25 kg N/100m²，草坪 0.2–0.5 kg N/100m²。请依作物与土壤调整。</div>
</div>

<div class="btn-row">
<button class="btn btn-primary" onclick="calc()">🧮 计算用量</button>
<button class="btn btn-outline" onclick="resetForm()">🔄 重置</button>
</div>

<div id="resultArea" style="display:none">
<div class="card">
<h3>📊 计算结果</h3>
<div class="result-grid" id="resultGrid"></div>
<div class="info" id="resultNote"></div>
</div>
</div>
</main>

<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 免费在线工具集合 · <a href="/privacy-policy/">隐私政策</a></p>
</footer>

<script>
function showToast(msg){
var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
m.textContent=msg;t.classList.add('show');
setTimeout(function(){t.classList.remove('show');},2500);
}
var PRESETS={
'15-15-15':[15,15,15],
'10-10-10':[10,10,10],
'20-10-10':[20,10,10],
'12-61-61':[12,61,61],
'46-0-0':[46,0,0]
};
document.getElementById('preset').addEventListener('change',function(){
var v=this.value;
if(v==='custom')return;
var p=PRESETS[v];
document.getElementById('npkN').value=p[0];
document.getElementById('npkP').value=p[1];
document.getElementById('npkK').value=p[2];
});
function toM2(val,unit){
if(unit==='m2')return val;
if(unit==='mu')return val*666.6667;
if(unit==='ft2')return val*0.092903;
if(unit==='acre')return val*4046.8564;
return val;
}
function fmt(n,d){
d=d||2;
return Number(n.toFixed(d)).toLocaleString('zh-CN');
}
function calc(){
var area=parseFloat(document.getElementById('area').value);
var unit=document.getElementById('unit').value;
var nN=parseFloat(document.getElementById('npkN').value);
var nP=parseFloat(document.getElementById('npkP').value);
var nK=parseFloat(document.getElementById('npkK').value);
var targetN=parseFloat(document.getElementById('targetN').value);
if(isNaN(area)||area<=0){showToast('请输入有效的面积');return;}
if(isNaN(nN)||nN<0||nN>100){showToast('含氮比例应在 0–100%');return;}
if(isNaN(nP)||nP<0||nP>100){showToast('含磷比例应在 0–100%');return;}
if(isNaN(nK)||nK<0||nK>100){showToast('含钾比例应在 0–100%');return;}
if(isNaN(targetN)||targetN<=0){showToast('请输入有效的目标施氮量');return;}
if(nN===0){showToast('含氮量为 0，无法按氮量推算用量');return;}
var areaM2=toM2(area,unit);
var totalNkg=targetN*(areaM2/100);
var fertKg=totalNkg/(nN/100);
var pKg=fertKg*(nP/100);
var kKg=fertKg*(nK/100);
var per100m2=fertKg/(areaM2/100);
var perMu=per100m2*6.6667;
var perAcre=per100m2*40.4686;
var grid=document.getElementById('resultGrid');
var items=[
{val:fmt(fertKg,2)+' kg',lbl:'总需肥料量'},
{val:fmt(totalNkg,3)+' kg',lbl:'实际投入 N'},
{val:fmt(pKg,3)+' kg',lbl:'实际投入 P₂O₅'},
{val:fmt(kKg,3)+' kg',lbl:'实际投入 K₂O'},
{val:fmt(per100m2,2)+' kg',lbl:'每 100 m² 用量'},
{val:fmt(perMu,2)+' kg',lbl:'每亩用量'},
{val:fmt(perAcre,1)+' kg',lbl:'每英亩用量'}
];
grid.innerHTML='';
for(var i=0;i<items.length;i++){
var d=document.createElement('div');
d.className='result-item';
d.innerHTML='<span class="val">'+items[i].val+'</span><span class="lbl">'+items[i].lbl+'</span>';
grid.appendChild(d);
}
document.getElementById('resultNote').textContent=
'说明：按目标施氮量倒推，假设肥料全部可溶且无损失。磷(P)以P₂O₅计、钾(K)以K₂O计。实际应结合土壤检测调整；建议分次施用以减少淋失。';
document.getElementById('resultArea').style.display='block';
}
function resetForm(){
document.getElementById('area').value='';
document.getElementById('targetN').value='';
document.getElementById('resultArea').style.display='none';
document.getElementById('preset').value='15-15-15';
document.getElementById('npkN').value='15';
document.getElementById('npkP').value='15';
document.getElementById('npkK').value='15';
showToast('已重置');
}
</script>
</body>
</html>
