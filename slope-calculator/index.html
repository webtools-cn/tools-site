<script>

(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>📍 Enter Two Points</h2><div class="row"><div class="field"><label>Point A</label><div class="row"><div class="field"><label>x₁</label><input type="number" id="x1" value="1" step="any"></div><div class="field"><label>y₁</label><input type="number" id="y1" value="1" step="any"></div></div></div><div class="field"><label>Point B</label><div class="row"><div class="field"><label>x₂</label><input type="number" id="x2" value="3" step="any"></div><div class="field"><label>y₂</label><input type="number" id="y2" value="5" step="any"></div></div></div></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">Calculate Slope</button><button class="btn btn-secondary" id="clearBtn">Clear</button></div></div><div class="result-section" id="result"><h2>✅ Results</h2><div id="slopeDisplay" style="font-size:1.8rem;text-align:center;padding:12px;color:#22d3ee"></div><div id="typeDisplay" style="text-align:center;padding:4px;color:#fbbf24"></div><div id="lineEqDisplay" style="text-align:center;padding:8px;color:#94a3b8"></div><div id="stepsSlope" style="padding:8px;color:#94a3b8;font-size:.85rem;white-space:pre-wrap"></div></div>';
function calc(){var x1=parseFloat(document.getElementById('x1').value)||0;var y1=parseFloat(document.getElementById('y1').value)||0;var x2=parseFloat(document.getElementById('x2').value)||0;var y2=parseFloat(document.getElementById('y2').value)||0;var dx=x2-x1,dy=y2-y1;var slope,type,lineEq,steps;
document.getElementById('result').classList.add('show');
if(dx===0){slope='Undefined';type='Vertical Line (slope is undefined)';lineEq='x = '+x1;steps='dx = '+x2+' - '+x1+' = 0\ndy = '+y2+' - '+y1+' = '+dy+'\nSlope = dy/dx = '+dy+'/0 = undefined\nThe line is vertical.';}else{slope=(dy/dx).toFixed(4);var m=dy/dx;if(m>0.001){type='Positive Slope ↗';}else if(m<-0.001){type='Negative Slope ↘';}else{type='Zero Slope →';}
var c=y1-m*x1;if(c>=0){lineEq='y = '+m.toFixed(4)+'x + '+c.toFixed(4);}else{lineEq='y = '+m.toFixed(4)+'x - '+Math.abs(c).toFixed(4);}
steps='dx = '+x2+' - '+x1+' = '+dx+'\ndy = '+y2+' - '+y1+' = '+dy+'\nSlope = dy/dx = '+dy+'/'+dx+' = '+slope;if(c!==0){steps+='\nIntercept: y = '+m.toFixed(4)+'x + '+c.toFixed(4);}}
document.getElementById('slopeDisplay').textContent='Slope = '+(typeof slope==='string'?slope:slope);
document.getElementById('typeDisplay').textContent=type;
document.getElementById('lineEqDisplay').textContent=lineEq||'';
document.getElementById('stepsSlope').textContent=steps;}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('clearBtn').addEventListener('click',function(){document.getElementById('x1').value='1';document.getElementById('y1').value='1';document.getElementById('x2').value='3';document.getElementById('y2').value='5';document.getElementById('result').classList.remove('show');});
calc();})();
