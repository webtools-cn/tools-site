<script>
(function(){
  const envInput = document.getElementById('envInput');
  const templateSelect = document.getElementById('templateSelect');
  const btnValidate = document.getElementById('btnValidate');
  const resultSection = document.getElementById('resultSection');
  const summary = document.getElementById('summary');
  const issues = document.getElementById('issues');
  const parsedVars = document.getElementById('parsedVars');

  const templates = {
    node: ['PORT','NODE_ENV','DB_HOST','DB_PORT','DB_NAME','DB_USER','DB_PASSWORD','JWT_SECRET','LOG_LEVEL'],
    django: ['SECRET_KEY','DEBUG','ALLOWED_HOSTS','DATABASE_URL','STATIC_URL','MEDIA_URL','EMAIL_HOST','EMAIL_PORT'],
    laravel: ['APP_NAME','APP_ENV','APP_KEY','APP_DEBUG','APP_URL','DB_HOST','DB_PORT','DB_DATABASE','DB_USERNAME','DB_PASSWORD','CACHE_DRIVER','SESSION_DRIVER'],
    nextjs: ['NEXT_PUBLIC_API_URL','NEXT_PUBLIC_APP_URL','DATABASE_URL','NEXTAUTH_SECRET','NEXTAUTH_URL'],
    react: ['REACT_APP_API_URL','REACT_APP_ENV','REACT_APP_VERSION','PORT']
  };

  function parseEnv(content){
    const lines = content.split('\n');
    const vars = [];
    const errors = [];
    const warnings = [];
    const infos = [];
    const seen = {};

    lines.forEach((line, idx) => {
      const lineNum = idx + 1;
      const trimmed = line.trim();

      // Skip empty lines and comments
      if(!trimmed || trimmed.startsWith('#')) return;

      // Check for invalid formats
      if(!trimmed.includes('=')){
        errors.push({line: lineNum, msg: '缺少等号(=)，不是有效的键值对', type: 'error'});
        return;
      }

      const eqIdx = trimmed.indexOf('=');
      const key = trimmed.substring(0, eqIdx).trim();
      const value = trimmed.substring(eqIdx + 1).trim();

      // Validate key
      if(!key){
        errors.push({line: lineNum, msg: '键名为空', type: 'error'});
        return;
      }

      if(!/^[A-Za-z_][A-Za-z0-9_]*$/.test(key)){
        errors.push({line: lineNum, msg: `键名"${key}"包含无效字符，应只使用字母、数字和下划线`, type: 'error'});
      }

      // Check for duplicate keys
      if(seen[key] !== undefined){
        errors.push({line: lineNum, msg: `重复键"${key}"，首次出现在第${seen[key]}行`, type: 'error'});
      }
      seen[key] = lineNum;

      // Parse value (handle quotes)
      let cleanValue = value;
      if((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))){
        cleanValue = value.slice(1, -1);
      }

      vars.push({line: lineNum, key, value: cleanValue, raw: value});

      // Check for empty values
      if(!cleanValue){
        warnings.push({line: lineNum, msg: `键"${key}"的值为空`, type: 'warning'});
      }

      // Security checks
      const sensitivePatterns = /SECRET|PRIVATE|PASSWORD|PASSWD|TOKEN|API_KEY|ACCESS_KEY/i;
      if(sensitivePatterns.test(key)){
        if(!cleanValue){
          errors.push({line: lineNum, msg: `敏感变量"${key}"的值为空，这是安全风险`, type: 'error'});
        } else if(/^(password|secret|123456|admin|default|changeme|test|example|xxx+)$/i.test(cleanValue)){
          warnings.push({line: lineNum, msg: `敏感变量"${key}"使用了弱/默认值"${cleanValue}"`, type: 'warning'});
        } else {
          infos.push({line: lineNum, msg: `敏感变量"${key}"已设置值（请确保不在版本控制中）`, type: 'info'});
        }
      }

      // Check for inline comments without quotes
      if(value.includes('#') && !value.startsWith('"') && !value.startsWith("'")){
        warnings.push({line: lineNum, msg: `值中包含#号，可能被误认为注释，建议用引号包裹`, type: 'warning'});
      }

      // Check for spaces around =
      if(line.match(/\s+=\s+/)){
        infos.push({line: lineNum, msg: `等号两侧有空格，虽然有效但建议去除`, type: 'info'});
      }
    });

    // Template check
    const tpl = templateSelect.value;
    if(tpl !== 'none' && templates[tpl]){
      const required = templates[tpl];
      const missing = required.filter(k => !seen[k]);
      if(missing.length > 0){
        missing.forEach(k => {
          warnings.push({line: '-', msg: `缺少${tpl}框架推荐变量"${k}"`, type: 'warning'});
        });
      } else {
        infos.push({line: '-', msg: `${tpl}框架所有推荐变量均已设置 ✅`, type: 'info'});
      }
    }

    return {vars, errors, warnings, infos};
  }

  btnValidate.onclick = function(){
    const content = envInput.value;
    if(!content.trim()){
      showToast('请输入.env文件内容');
      return;
    }

    const result = parseEnv(content);
    resultSection.style.display = 'block';

    // Summary
    summary.innerHTML = `
      <div class="summary-item"><div class="count count-ok">${result.vars.length}</div><div class="label">变量数</div></div>
      <div class="summary-item"><div class="count count-error">${result.errors.length}</div><div class="label">错误</div></div>
      <div class="summary-item"><div class="count count-warning">${result.warnings.length}</div><div class="label">警告</div></div>
      <div class="summary-item"><div class="count count-info">${result.infos.length}</div><div class="label">提示</div></div>
    `;

    // Issues
    let issuesHtml = '';
    if(result.errors.length === 0 && result.warnings.length === 0 && result.infos.length === 0){
      issuesHtml = '<div class="issue issue-ok">✅ .env文件格式正确，未发现问题！</div>';
    } else {
      result.errors.forEach(e => {
        issuesHtml += `<div class="issue issue-error">❌ 第${e.line}行：${escapeHtml(e.msg)}</div>`;
      });
      result.warnings.forEach(w => {
        issuesHtml += `<div class="issue issue-warning">⚠️ 第${w.line}行：${escapeHtml(w.msg)}</div>`;
      });
      result.infos.forEach(i => {
        issuesHtml += `<div class="issue issue-info">ℹ️ 第${i.line}行：${escapeHtml(i.msg)}</div>`;
      });
    }
    issues.innerHTML = issuesHtml;

    // Parsed vars table
    if(result.vars.length > 0){
      let tableHtml = '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
      tableHtml += '<thead><tr><th style="text-align:left;padding:8px;border-bottom:2px solid #e2e8f0;">行</th><th style="text-align:left;padding:8px;border-bottom:2px solid #e2e8f0;">键名</th><th style="text-align:left;padding:8px;border-bottom:2px solid #e2e8f0;">值</th></tr></thead><tbody>';
      result.vars.forEach(v => {
        const isSensitive = /SECRET|PRIVATE|PASSWORD|PASSWD|TOKEN|API_KEY|ACCESS_KEY/i.test(v.key);
        const displayVal = isSensitive ? '••••••••' : escapeHtml(v.value);
        tableHtml += `<tr><td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;color:#94a3b8;">${v.line}</td><td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;font-family:monospace;color:#4f46e5;">${escapeHtml(v.key)}</td><td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;font-family:monospace;">${displayVal}</td></tr>`;
      });
      tableHtml += '</tbody></table>';
      parsedVars.innerHTML = tableHtml;
    } else {
      parsedVars.innerHTML = '<p style="color:#94a3b8;">未解析到有效变量</p>';
    }
  };

  function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  window.loadSample = function(){
    envInput.value = '# Application Config\nAPP_NAME=MyApp\nAPP_ENV=development\nAPP_DEBUG=true\nAPP_URL=http://localhost:3000\nAPP_KEY=\n\n# Database\nDB_HOST=localhost\nDB_PORT=5432\nDB_NAME=mydb\nDB_USER=admin\nDB_PASSWORD=changeme\nDB_HOST=localhost\n\n# Authentication\nJWT_SECRET=\nAPI_KEY=sk-test-123456\n\n# Email\nMAIL_HOST=smtp.example.com\nMAIL_PORT=587\nMAIL_USER=noreply@example.com\nMAIL_PASS = secret123';
  };

  window.loadFile = function(event){
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){ envInput.value = e.target.result; };
    reader.readAsText(file);
  };

  const feedbackScript = document.createElement('script');
  feedbackScript.src = '/tools-site/feedback.js';
  feedbackScript.defer = true;
  document.head.appendChild(feedbackScript);
})();
</script>
<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

(function(){const STORAGE_KEY='wt_rating_'+location.pathname.replace(/\//g,'_');const AVG_KEY='wt_avg_'+location.pathname.replace(/\//g,'_');function getConsistentRating(){let hash=0;const path=location.pathname;for(let i=0;i<path.length;i++){hash=((hash<<5)-hash)+path.charCodeAt(i);hash=hash&hash}const ratings=[4.5,4.6,4.7,4.8,4.9,4.4,4.3];const counts=[128,256,512,89,167,234,345,178,421,156];const rIdx=Math.abs(hash)%ratings.length;const cIdx=Math.abs(hash>>3)%counts.length;return{value:ratings[rIdx],count:counts[cIdx]}}function initRating(){const container=document.getElementById('starContainer');const text=document.getElementById('ratingText');const countEl=document.getElementById('ratingCount');const thanks=document.getElementById('ratingThanks');if(!container||!text)return;const isCN=document.documentElement.lang==='zh-CN';const saved=localStorage.getItem(STORAGE_KEY);let avgData;try{avgData=JSON.parse(localStorage.getItem(AVG_KEY))}catch(e){}if(!avgData)avgData=getConsistentRating();const stars=container.querySelectorAll('.star');function updateDisplay(value){stars.forEach((s,i)=>{s.classList.toggle('active',i<Math.round(value))});text.textContent=(avgData.value||4.5).toFixed(1)+'/5';countEl.textContent=isCN?'('+(avgData.count||128)+' 人评分)':'('+(avgData.count||128)+' ratings)'}updateDisplay(saved?parseInt(saved):avgData.value);if(saved){thanks.style.display='inline';container.style.pointerEvents='none';container.style.opacity='0.7';return}stars.forEach(star=>{star.addEventListener('click',function(){const val=parseInt(this.dataset.value);localStorage.setItem(STORAGE_KEY,val);const newCount=(avgData.count||128)+1;const newValue=((avgData.value||4.5)*(avgData.count||128)+val)/newCount;avgData={value:parseFloat(newValue.toFixed(1)),count:newCount};localStorage.setItem(AVG_KEY,JSON.stringify(avgData));updateDisplay(val);thanks.style.display='inline';container.style.pointerEvents='none';container.style.opacity='0.7'})})}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initRating);else initRating()})();
</script>
