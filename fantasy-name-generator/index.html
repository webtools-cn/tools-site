document.getElementById('genBtn').addEventListener('click',function(){
  var race=document.getElementById('race').value;
  var gender=document.getElementById('gender').value;
  var count=parseInt(document.getElementById('count').value);
  var namePool=NAMES[race]||NAMES.elf;
  var names=[];
  for(var i=0;i<count;i++){
    var pool=(gender==='any'?(Math.random()<0.5?namePool.male:namePool.female):namePool[gender]);
    var n=pool[Math.floor(Math.random()*pool.length)];
    if(race==='dragon'||race==='demon'||race==='angel'){
      var suffixes=[' the Ancient',' the Mighty',' the Wise',' the Fierce',' the Noble',' Shadowflame',' Stormbringer',' Deathwing',' the Eternal',' the Venerable'];
      n+=suffixes[Math.floor(Math.random()*suffixes.length)];
    }
    if(race==='orc'){
      var titles=[' the Slayer',' the Crusher',' the Defiler',' the Savage',' the Unbroken'];
      if(Math.random()>0.5) n+=titles[Math.floor(Math.random()*titles.length)];
    }
    if(race==='tiefling'){
      var epithets=[' of the Dark',' the Cursed',' the Forsaken',' the Infernal',' the Oathbound'];
      if(Math.random()>0.4) n+=epithets[Math.floor(Math.random()*epithets.length)];
    }
    names.push(n);
  }
  var grid=document.getElementById('nameGrid');
  grid.innerHTML='';
  var seen={};
  names.forEach(function(n){
    if(seen[n]) return;
    seen[n]=true;
    var card=document.createElement('div');
    card.className='name-card';
    card.innerHTML='<div class="name-text">'+n+'</div><div class="name-desc">点击复制</div>';
    card.addEventListener('click',function(){
      navigator.clipboard.writeText(this.querySelector('.name-text').textContent).then(function(){
        card.querySelector('.name-desc').textContent='✅ 已复制!';
        setTimeout(function(){card.querySelector('.name-desc').textContent='点击复制';},1500);
      });
    });
    grid.appendChild(card);
  });
  document.getElementById('resultSection').classList.add('show');
});

document.getElementById('copyAllBtn').addEventListener('click',function(){
  var texts=[].map.call(document.querySelectorAll('.name-card .name-text'),function(el){return el.textContent;});
  navigator.clipboard.writeText(texts.join('\\n')).then(function(){
    document.getElementById('copyAllBtn').textContent='✅ 已复制全部!';
    setTimeout(function(){document.getElementById('copyAllBtn').textContent='📋 复制全部';},2000);
  });
});
})();
