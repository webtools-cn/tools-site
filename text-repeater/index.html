<script>
function showFlash(msg, type) {
  const el = document.getElementById('flashMsg');
  el.textContent = msg;
  el.className = 'flash-message flash-' + type + ' show';
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

document.getElementById('separator').addEventListener('change', function() {
  document.getElementById('customSepRow').style.display = this.value === 'custom' ? 'block' : 'none';
});

document.querySelectorAll('.preset-chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    document.getElementById('inputText').value = this.textContent;
  });
});

function getSeparator() {
  const sel = document.getElementById('separator').value;
  if (sel === 'custom') return document.getElementById('customSep').value;
  if (sel === '\\n') return '\n';
  return sel;
}

function generate() {
  const text = document.getElementById('inputText').value;
  const count = parseInt(document.getElementById('repeatCount').value);
  const prefix = document.getElementById('prefix').value;
  const suffix = document.getElementById('suffix').value;
  const addNumbers = document.getElementById('addNumbers').checked;
  const trimOutput = document.getElementById('trimOutput').checked;
  const sep = getSeparator();

  if (!text) {
    showFlash('⚠️ 请输入要重复的文本', 'success');
    return;
  }

  if (isNaN(count) || count < 1) {
    showFlash('⚠️ 重复次数必须 >= 1', 'success');
    return;
  }

  if (count > 10000) {
    showFlash('⚠️ 最大支持10000次重复', 'success');
    return;
  }

  var maxChars = count * (text.length + prefix.length + suffix.length + (addNumbers ? String(count).length + 2 : 0));
  if (maxChars > 5000000) {
    showFlash('⚠️ 输出内容过大，请减少重复次数', 'success');
    return;
  }

  var parts = [];
  for (var i = 0; i < count; i++) {
    var line = '';
    if (addNumbers) line += (i + 1) + '. ';
    line += prefix + text + suffix;
    parts.push(line);
  }

  var output = parts.join(sep);

  if (trimOutput) {
    output = output.replace(/^\s+|\s+$/g, '').replace(/\n{3,}/g, '\n\n');
  }

  document.getElementById('outputText').textContent = output;
  document.getElementById('totalLines').textContent = count.toLocaleString();
  document.getElementById('totalChars').textContent = output.length.toLocaleString();
  document.getElementById('outputCard').style.display = 'block';

  showFlash('✅ 生成完成！共 ' + count.toLocaleString() + ' 条', 'success');
}

window.copyOutput = function() {
  const text = document.getElementById('outputText').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(function() {
    showFlash('📋 已复制到剪贴板', 'success');
  }).catch(function() {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showFlash('📋 已复制到剪贴板', 'success'); } catch(e) { showFlash('复制失败，请手动选择复制', 'success'); }
    document.body.removeChild(ta);
  });
};

window.downloadOutput = function() {
  const text = document.getElementById('outputText').textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'repeated-text.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showFlash('⬇️ 文件已下载', 'success');
};

window.clearOutput = function() {
  document.getElementById('outputText').textContent = '';
  document.getElementById('outputCard').style.display = 'none';
};

// Auto-trigger on Enter
document.getElementById('inputText').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});
</script>

<script>

const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();

const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
