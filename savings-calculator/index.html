<div class="container">
  <div class="header"><h1>🐷 储蓄计算器</h1><div class="lang-switch"><a href="index.html" class="active">EN</a><a href="../en/savings-calculator/">EN</a></div></div>

    <div class="form-group"><label>Mode</label><select id="mode">

<script>function T(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)};function calc(){var mode=document.getElementById('mode').value;var r=parseFloat(document.getElementById('rate').value)/100||0;var n=parseFloat(document.getElementById('yrs').value)||10;var init=parseFloat(document.getElementById('init').value)||0;if(mode==='target'){var tv=parseFloat(document.getElementById('tv').value);if(isNaN(tv)||tv<=0){T('请输入有效数值');return}if(r>0){var fv=init*Math.pow(1+r,n);if(fv>=tv){document.getElementById('rM').textContent='0 (goal met)';document.getElementById('rTD').textContent='0';document.getElementById('rI').textContent='0';document.getElementById('rF').textContent=fv.toFixed(2);return}var rem=tv-fv;var af=12*((Math.pow(1+r,n)-1)/r);var mDep=rem/af;}else{var mDep=(tv-init)/(n*12);}if(mDep<0)mDep=0;document.getElementById('rM').textContent=mDep.toFixed(2);document.getElementById('rTD').textContent=(mDep*n*12+init).toFixed(2);document.getElementById('rI').textContent=(tv-mDep*n*12-init>0?tv-mDep*n*12-init:0).toFixed(2);document.getElementById('rF').textContent=tv.toFixed(2);}else{var mDep=parseFloat(document.getElementById('tv').value);if(isNaN(mDep)||mDep<=0){T('请输入有效数值');return}var fv;if(r>0){fv=init*Math.pow(1+r,n)+mDep*12*((Math.pow(1+r,n)-1)/r);}else{fv=init+mDep*n*12;}document.getElementById('rM').textContent=mDep.toFixed(2);document.getElementById('rTD').textContent=(mDep*n*12+init).toFixed(2);document.getElementById('rI').textContent=(fv-mDep*n*12-init>0?fv-mDep*n*12-init:0).toFixed(2);document.getElementById('rF').textContent=fv.toFixed(2);}}</script>
