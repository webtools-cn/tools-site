(function(){

app.innerHTML='\x3Cdiv class="input-section">\x3Ch2>🔋 电池状态\x3C/h2>\x3Cdiv id="batteryInfo" style="text-align:center;padding:20px 0">正在检测电池信息...\x3C/div>\x3C/div>';

function showBattery(battery){
  var level=Math.round(battery.level*100);
  var charging=battery.charging;
  var timeRem=battery.dischargingTime;
  var timeCharging=battery.chargingTime;
  var icon=charging?'⚡':'🔋';
  var statusText='';

  if(charging){statusText='充电中';}
  else if(level<=15){statusText='电量不足';}
  else if(level<=30){statusText='电量较低';}
  else if(level>=90){statusText='电量充足';}
  else{statusText='正常';}

  var color=level<=15?'#ef4444':level<=30?'#f59e0b':'#22c55e';
  var html='';
  html+='\x3Cdiv style="position:relative;width:160px;height:260px;margin:0 auto 16px">';
  html+='\x3Cdiv style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:25px;border:3px solid #475569;border-radius:5px 5px 0 0;background:#1e293b">\x3C/div>';
  html+='\x3Cdiv style="position:absolute;top:20px;left:50%;transform:translateX(-50%);width:120px;height:200px;border:3px solid #475569;border-radius:8px;background:#1e293b;overflow:hidden">';
  html+='\x3Cdiv style="position:absolute;bottom:0;width:100%;height:'+level+'%;background:'+color+';transition:height 0.5s;border-radius:0 0 5px 5px;opacity:0.8">\x3C/div>';
  html+='\x3Cdiv style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:700;color:#f1f5f9;text-shadow:0 2px 8px rgba(0,0,0,0.5)">'+level+'%\x3C/div>';
  html+='\x3C/div>\x3C/div>';
  html+='\x3Cdiv style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto">';
  
  var t1 = "充电状态";
  var v1 = charging ? ("⚡ 充电中") : ("🔋 未充电");
  
  var t2 = "电量";
  var v2 = level+'% ('+statusText+')';
  
  html+=_infoCard(t1,v1);
  html+=_infoCard(t2,v2);
  
  if(timeRem!==Infinity && timeRem!==null){
    var hrs=Math.floor(timeRem/3600);
    var mins=Math.floor((timeRem%3600)/60);
    html+=_infoCard("剩余时间", hrs+'h '+mins+'m');
  }
  if(timeCharging!==Infinity && timeCharging!==null && charging){
    var hrs=Math.floor(timeCharging/3600);
    var mins=Math.floor((timeCharging%3600)/60);
    html+=_infoCard("充满时间", hrs+'h '+mins+'m');
  }
  html+='\x3C/div>';
  document.getElementById('batteryInfo').innerHTML=html;
}
function _infoCard(t,v){
  return '\x3Cdiv style="background:#0f172a;border-radius:8px;padding:12px;border:1px solid rgba(148,163,184,.08)">\x3Cdiv style="color:#64748b;font-size:.75rem;margin-bottom:4px">'+t+'\x3C/div>\x3Cdiv style="color:#e2e8f0;font-size:.9rem;font-weight:500">'+v+'\x3C/div>\x3C/div>';
}
if(navigator.getBattery){
  navigator.getBattery().then(function(battery){
    showBattery(battery);
    battery.addEventListener('levelchange',function(){showBattery(battery);});
    battery.addEventListener('chargingchange',function(){showBattery(battery);});

    battery.addEventListener('chargingtimechange',function(){showBattery(battery);});
  }).catch(function(){

  });
} else {
