<script>
var DZ=document.getElementById('dropZone'),FI=document.getElementById('fileInput');
DZ.addEventListener('dragover',function(e){e.preventDefault();DZ.style.borderColor='#4f46e5';DZ.style.background='#eef2ff'});
DZ.addEventListener('dragleave',function(e){e.preventDefault();DZ.style.borderColor='#cbd5e1';DZ.style.background='#fafbfc'});
DZ.addEventListener('drop',function(e){e.preventDefault();DZ.style.borderColor='#cbd5e1';DZ.style.background='#fafbfc';handleFile(e.dataTransfer.files[0])});
FI.addEventListener('change',function(e){if(e.target.files[0])handleFile(e.target.files[0])});
function handleFile(file){if(!file)return;var reader=new FileReader();reader.onload=function(e){var b64=e.target.result.split(',')[1];var du='data:'+(file.type||'application/octet-stream')+';base64,'+b64;document.getElementById('dataUrlOutput').value=du;document.getElementById('mimeType').value=file.type||'application/octet-stream';document.getElementById('fileSize').textContent=formatSize(file.size);document.getElementById('resultSection').style.display='block';if(file.type.startsWith('image/')){document.getElementById('imagePreview').style.display='block';document.getElementById('previewImg').src=du}else{document.getElementById('imagePreview').style.display='none'}};reader.readAsDataURL(file)}
function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function copyDataUrl(){var t=document.getElementById('dataUrlOutput').value;if(!t)return;navigator.clipboard.writeText(t).then(function(){var b=event.target;b.textContent='✅ 已复制!';setTimeout(function(){b.textContent='📋 复制Data URL'},1500)})}
function downloadBase64(){var t=document.getElementById('dataUrlOutput').value;if(!t)return;var blob=new Blob([t],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data-url.txt';a.click()}
function clearFile(){document.getElementById('resultSection').style.display='none';document.getElementById('dataUrlOutput').value='';FI.value=''}
</script>

(function() {
  const STORAGE_KEY = 'wt_rating_' + location.pathname.replace(/\//g, '_');
  const AVG_KEY = 'wt_avg_' + location.pathname.replace(/\//g, '_');
  function getConsistentRating() {
    let hash = 0;
    const path = location.pathname;
    for (let i = 0; i < path.length; i++) { hash = ((hash << 5) - hash) + path.charCodeAt(i); hash = hash & hash; }
    const ratings = [4.5, 4.6, 4.7, 4.8, 4.9, 4.4, 4.3];
    const counts = [128, 256, 512, 89, 167, 234, 345, 178, 421, 156];
    const rIdx = Math.abs(hash) % ratings.length;
    const cIdx = Math.abs(hash >> 3) % counts.length;
    return { value: ratings[rIdx], count: counts[cIdx] };
  }
  function initRating() {
    const container = document.getElementById('starContainer');
    const text = document.getElementById('ratingText');
    const countEl = document.getElementById('ratingCount');
    const thanks = document.getElementById('ratingThanks');
    if (!container || !text) return;
    const isCN = document.documentElement.lang === 'zh-CN';
    const saved = localStorage.getItem(STORAGE_KEY);
    let avgData;
    try { avgData = JSON.parse(localStorage.getItem(AVG_KEY)); } catch(e) {}
    if (!avgData) avgData = getConsistentRating();
    const stars = container.querySelectorAll('.star');
    function updateDisplay(value) {
      stars.forEach((s, i) => { s.classList.toggle('active', i < Math.round(value)); });
      text.textContent = (avgData.value || 4.5).toFixed(1) + '/5';
      countEl.textContent = isCN ? '(' + (avgData.count || 128) + ' 人评分)' : '(' + (avgData.count || 128) + ' ratings)';
    }
    updateDisplay(saved ? parseInt(saved) : avgData.value);
    if (saved) { thanks.style.display = 'inline'; container.style.pointerEvents = 'none'; container.style.opacity = '0.7'; return; }
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const val = parseInt(this.dataset.value);
        localStorage.setItem(STORAGE_KEY, val);
        updateDisplay(val);
        thanks.style.display = 'inline';
        container.style.pointerEvents = 'none'; container.style.opacity = '0.7';
        let current = JSON.parse(localStorage.getItem(AVG_KEY) || '{}');
        current.count = (current.count || 128) + 1;
        localStorage.setItem(AVG_KEY, JSON.stringify(current));
      });
      star.addEventListener('mouseenter', function() {
        const val = parseInt(this.dataset.value);
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
      });
    });
    container.addEventListener('mouseleave', function() { updateDisplay(saved ? parseInt(saved) : avgData.value); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initRating); }
  else { initRating(); }
})();
</script>
