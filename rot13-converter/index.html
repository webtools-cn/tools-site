<script>
let currentMode='rot13';
function setMode(mode,el){
  currentMode=mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('caesar-options').style.display=mode==='caesar'?'block':'none';
  processInput();
}
function rot13(text){
  return text.replace(/[a-zA-Z]/g,c=>{
    const base=c<='Z'?65:97;
    return String.fromCharCode((c.charCodeAt(0)-base+13)%26+base);
  });
}
function rot47(text){
  return text.replace(/[\x21-\x7E]/g,c=>{
    const code=c.charCodeAt(0);
    return String.fromCharCode(((code-33+47)%94)+33);
  });
}
function caesar(text,shift){
  return text.replace(/[a-zA-Z]/g,c=>{
    const base=c<='Z'?65:97;
    return String.fromCharCode((c.charCodeAt(0)-base+shift)%26+base);
  });
}
function processInput(){
  const input=document.getElementById('input-text').value;
  if(!input){document.getElementById('result-output').value='';return;}
  let result;
  if(currentMode==='rot13')result=rot13(input);
  else if(currentMode==='rot47')result=rot47(input);
  else result=caesar(input,parseInt(document.getElementById('offset-slider').value));
  document.getElementById('result-output').value=result;
  const letters=(input.match(/[a-zA-Z]/g)||[]).length;
  document.getElementById('stats-row').innerHTML='<div class="stat-item"><div class="num" style="color:#06b6d4">'+input.length+'</div><div class="lbl">字符数</div></div><div class="stat-item"><div class="num" style="color:#10b981">'+letters+'</div><div class="lbl">字母数</div></div><div class="stat-item"><div class="num" style="color:#f59e0b">'+(input.split('\n').length)+'</div><div class="lbl">行数</div></div>';
  document.getElementById('result-panel').style.display='block';
}
function copyResult(){const v=document.getElementById('result-output').value;if(v)navigator.clipboard.writeText(v);}
function downloadResult(){const v=document.getElementById('result-output').value;if(!v)return;const blob=new Blob([v],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rot13-output.txt';a.click();}
function loadExample(){

  processInput();
}

const dz=document.getElementById('drop-zone');const fi=document.getElementById('file-input');

fi.addEventListener('change',e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('input-text').value=ev.target.result;processInput();};r.readAsText(f);}});
document.getElementById('input-text').addEventListener('input',function(){clearTimeout(this._timer);this._timer=setTimeout(processInput,300);});

window.addEventListener('load',loadExample);
