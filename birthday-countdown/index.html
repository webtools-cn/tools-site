function updateCountdown(month,day,birthYear){
  var now=new Date();
  var year=now.getFullYear();
  var next=new Date(year,month-1,day);
  if(next<=now) next=new Date(year+1,month-1,day);

  var days=Math.floor(diff/(86400000));
  var hours=Math.floor((diff%(86400000))/(3600000));
  var minutes=Math.floor((diff%(3600000))/(60000));
  var seconds=Math.floor((diff%(60000))/1000);
  document.getElementById('days').textContent=days;
  document.getElementById('hours').textContent=('0'+hours).slice(-2);
  document.getElementById('minutes').textContent=('0'+minutes).slice(-2);
  document.getElementById('seconds').textContent=('0'+seconds).slice(-2);
  var age=year-birthYear;
  if(next.getTime()>now.getTime()&&next.getFullYear()>year) age++;
  document.getElementById('ageInfo').textContent='🎂 '+age+'岁';
  var zodiac=getZodiac(month,day);
  document.getElementById('zodiacInfo').textContent=zodiac;
}

function updateCountdown(month,day,birthYear){
  var now=new Date();
  var year=now.getFullYear();
  var next=new Date(year,month-1,day);
  if(next<=now) next=new Date(year+1,month-1,day);
  var diff=next-now;
  var days=Math.floor(diff/(86400000));
  var hours=Math.floor((diff%(86400000))/(3600000));
  var minutes=Math.floor((diff%(3600000))/(60000));
  var seconds=Math.floor((diff%(60000))/1000);
  document.getElementById('days').textContent=days;
  document.getElementById('hours').textContent=('0'+hours).slice(-2);
  document.getElementById('minutes').textContent=('0'+minutes).slice(-2);
  document.getElementById('seconds').textContent=('0'+seconds).slice(-2);
  var age=year-birthYear;
  if(next.getTime()>now.getTime()&&next.getFullYear()>year) age++;
  document.getElementById('ageInfo').textContent='🎂 '+age+'岁';
  var zodiac=getZodiac(month,day);
  document.getElementById('zodiacInfo').textContent=zodiac;
}

function getZodiac(m,d){
  var signs=[{name:'♑ 摩羯座',start:'12-22',end:'01-19'},{name:'♒ 水瓶座',start:'01-20',end:'02-18'},{name:'♓ 双鱼座',start:'02-19',end:'03-20'},{name:'♈ 白羊座',start:'03-21',end:'04-19'},{name:'♉ 金牛座',start:'04-20',end:'05-20'},{name:'♊ 双子座',start:'05-21',end:'06-20'},{name:'♋ 巨蟹座',start:'06-21',end:'07-22'},{name:'♌ 狮子座',start:'07-23',end:'08-22'},{name:'♍ 处女座',start:'08-23',end:'09-22'},{name:'♎ 天秤座',start:'09-23',end:'10-22'},{name:'♏ 天蝎座',start:'10-23',end:'11-21'},{name:'♐ 射手座',start:'11-22',end:'12-21'}];
  var md=(m<10?'0':'')+m+'-'+(d<10?'0':'')+d;
  for(var i=0;i<signs.length;i++){
    var s=signs[i];
    if(s.start<=s.end){
      if(md>=s.start&&md<=s.end) return s.name;
    }else{
      if(md>=s.start||md<=s.end) return s.name;
    }
  }
  return '';
}
