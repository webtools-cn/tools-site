(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>📐 Input Coefficients</h2><div class="row"><div class="field"><label>a (coefficient of x²)</label><input type="number" id="coeffA" value="1" step="any"></div><div class="field"><label>b (coefficient of x)</label><input type="number" id="coeffB" value="0" step="any"></div><div class="field"><label>c (constant term)</label><input type="number" id="coeffC" value="-4" step="any"></div></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">Calculate</button><button class="btn btn-secondary" id="clearBtn">Clear</button></div></div><div class="result-section" id="result"><h2>✅ Solution</h2><div id="equation" style="font-size:1.3rem;text-align:center;padding:8px;color:#22d3ee"></div><div id="discriminant" style="text-align:center;padding:4px;color:#94a3b8"></div><div id="roots" style="font-size:1.2rem;text-align:center;padding:12px;color:#fbbf24"></div><div id="steps" style="padding:8px;color:#94a3b8;font-size:.85rem;white-space:pre-wrap"></div></div>';
function calc(){var a=parseFloat(document.getElementById('coeffA').value);var b=parseFloat(document.getElementById('coeffB').value);var c=parseFloat(document.getElementById('coeffC').value);if(isNaN(a)||isNaN(b)||isNaN(c)){document.getElementById('result').classList.remove('show');return;}
document.getElementById('result').classList.add('show');
var eq='';if(a!==0){eq+=a+'x²';}else{eq+='0x²';}
if(b>0){eq+=' + '+b+'x';}else if(b<0){eq+=' - '+Math.abs(b)+'x';}
if(c>0){eq+=' + '+c;}else if(c<0){eq+=' - '+Math.abs(c);}
eq+=' = 0';
document.getElementById('equation').textContent=eq;
var d=b*b-4*a*c;
document.getElementById('discriminant').textContent='Δ = b² - 4ac = '+b+'² - 4·'+a+'·'+c+' = '+d;
var roots='',steps='';
if(a===0){roots='Not a quadratic equation (a = 0)';}else if(d>0){var r1=(-b+Math.sqrt(d))/(2*a);var r2=(-b-Math.sqrt(d))/(2*a);roots='x₁ = '+r1.toFixed(4)+'\nx₂ = '+r2.toFixed(4);steps='x = [-b ± √(b²-4ac)] / 2a\n  = [-'+b+' ± √('+d+')] / '+(2*a)+'\n  = ['+(-b)+' ± '+Math.sqrt(d).toFixed(4)+'] / '+(2*a);}else if(d===0){var r=-b/(2*a);roots='x = '+r.toFixed(4)+' (double root)';steps='x = -b/2a = -('+b+')/('+2*a+') = '+r.toFixed(4);}else{var re=(-b/(2*a)).toFixed(4);var im=(Math.sqrt(-d)/(2*a)).toFixed(4);roots='x₁ = '+re+' + '+im+'i\nx₂ = '+re+' - '+im+'i';steps='x = [-b ± i√(4ac-b²)] / 2a\n  = [-'+b+' ± i√('+(-d)+')] / '+(2*a);}
document.getElementById('roots').textContent=roots;
document.getElementById('steps').textContent=steps;}
