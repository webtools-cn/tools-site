<input type="range" id="radiusTL" min="0" max="80" value="12">
</div>
<div class="control-group">
<label>右上 <span class="value-display" id="trVal">12px</span></label>
<input type="range" id="radiusTR" min="0" max="80" value="12">
</div>

<script>
const preview = document.getElementById('preview');
const codeText = document.getElementById('codeText');
const els = {
  style: document.getElementById('borderStyle'),
  width: document.getElementById('borderWidth'),
  color: document.getElementById('borderColor'),
  bg: document.getElementById('bgColor'),
  tl: document.getElementById('radiusTL'),
  tr: document.getElementById('radiusTR'),
  bl: document.getElementById('radiusBL'),
  br: document.getElementById('radiusBR'),
  link: document.getElementById('linkRadius')
};
const valEls = {
  width: document.getElementById('widthVal'),
  tl: document.getElementById('tlVal'),
  tr: document.getElementById('trVal'),
  bl: document.getElementById('blVal'),
  br: document.getElementById('brVal')
};

function update() {
  const w = els.width.value;
  const s = els.style.value;
  const c = els.color.value;
  const bg = els.bg.value;
  const tl = els.tl.value;
  const tr = els.tr.value;
  const bl = els.bl.value;
  const br = els.br.value;

  valEls.width.textContent = w + 'px';
  valEls.tl.textContent = tl + 'px';
  valEls.tr.textContent = tr + 'px';
  valEls.bl.textContent = bl + 'px';
  valEls.br.textContent = br + 'px';

  preview.style.border = w + 'px ' + s + ' ' + c;
  preview.style.borderRadius = tl + 'px ' + tr + 'px ' + br + 'px ' + bl + 'px';
  preview.style.background = bg;

  const radiusStr = (tl === tr && tr === br && br === bl) ? tl + 'px' : tl + 'px ' + tr + 'px ' + br + 'px ' + bl + 'px';
  const css = 'border: ' + w + 'px ' + s + ' ' + c + ';\nborder-radius: ' + radiusStr + ';';
  codeText.textContent = css;
}

function linkRadius(source) {
  if (!els.link.checked) return;
  const val = source.value;
  els.tl.value = els.tr.value = els.bl.value = els.br.value = val;
}

Object.values(els).forEach(el => {
  el.addEventListener('input', function() {
    if (['tl','tr','bl','br'].includes(Object.keys(els).find(k => els[k] === this))) {
      linkRadius(this);
    }
    update();
  });
});

function copyCode() {
  navigator.clipboard.writeText(codeText.textContent).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

update();
</script>
