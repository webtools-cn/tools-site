function initTable() {

    tbody.innerHTML = '';

        tr.innerHTML = '<td>' + (i+1) + '</td>' +

            '<td><button class="btn btn-secondary" style="padding:4px 8px;font-size:.75rem" onclick="removeRow(' + i + ')">✕</button></td>';
        tbody.appendChild(tr);

}

}

    chartData.splice(i, 1);

function getTableData() {

    const labels = [], values = [], colors = [];
    rows.forEach(tr => {
        const label = tr.querySelector('.label-input').value || '';
        const val = parseFloat(tr.querySelector('.value-input').value) || 0;

<script>
function drawPieChart() {
    const data = getTableData();
    if (data.labels.length === 0) return;
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    const cx = w * 0.4, cy = h / 2, radius = Math.min(w * 0.3, h * 0.35);
    const showLabels = document.getElementById('showLabels').checked;
    const showLegend = document.getElementById('showLegend').checked;

    const total = data.values.reduce((a, b) => a + b, 0);
    if (total === 0) { ctx.fillStyle = '#94a3b8'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('No data', cx, cy); return; }

    let startAngle = -Math.PI / 2;
    const slices = [];
    for (let i = 0; i < data.labels.length; i++) {
        const angle = (data.values[i] / total) * 2 * Math.PI;
        slices.push({ start: startAngle, end: startAngle + angle, color: data.colors[i] || '#06b6d4', label: data.labels[i], value: data.values[i], pct: (data.values[i] / total * 100).toFixed(1) });
        startAngle += angle;
    }

    // Draw slices
    for (const s of slices) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, s.start, s.end);
        ctx.closePath();
        ctx.fillStyle = s.color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Labels
    if (showLabels) {
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        for (const s of slices) {
            const mid = (s.start + s.end) / 2;
            const lx = cx + Math.cos(mid) * (radius + 20);
            const ly = cy + Math.sin(mid) * (radius + 20);
            ctx.fillStyle = '#334155';
            ctx.fillText(s.label + ' ' + s.pct + '%', lx, ly);
        }
    }

    // Legend
    if (showLegend) {
        const lx = w * 0.72, ly = h * 0.2;
        ctx.font = '12px sans-serif';
        for (let i = 0; i < slices.length; i++) {
            const y = ly + i * 22;
            ctx.fillStyle = slices[i].color;
            ctx.fillRect(lx, y, 12, 12);
            ctx.fillStyle = '#334155';
            ctx.textAlign = 'left';
            ctx.fillText(slices[i].label + ' (' + slices[i].pct + '%)', lx + 18, y + 11);
        }
    }
}

initTable();
drawPieChart();

</script>
