<script>
const defaultColors = ['rgba(6,182,212,0.3)','rgba(139,92,246,0.3)','rgba(245,158,11,0.3)','rgba(16,185,129,0.3)','rgba(239,68,68,0.3)'];
const defaultBorders = ['#06b6d4','#8b5cf6','#f59e0b','#10b981','#ef4444'];

const defaultDims = ['速度','稳定性','易用性','功能','安全性','价格'];
const defaultSeries = [
  {name:'产品A',values:[85,70,90,75,80,65],color:defaultBorders[0]},
  {name:'产品B',values:[70,85,75,90,65,80],color:defaultBorders[1]}
];

let dims = [...defaultDims];
let series = JSON.parse(JSON.stringify(defaultSeries));

function initDims(){
  const body=document.getElementById('dimBody');
  body.innerHTML='';
  dims.forEach((d,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input type="text" value="${d}" oninput="dims[${i}]=this.value;drawRadar()"></td>
      <td><input type="number" value="100" min="1" style="max-width:80px" onchange="drawRadar()"></td>
      <td><button class="btn btn-danger" style="padding:4px 10px;font-size:.75rem" onclick="dims.splice(${i},1);series.forEach(s=>s.values.splice(${i},1));initDims();initSeries();drawRadar()">删除</button></td>`;
    body.appendChild(tr);
  });
}

function addDim(){
  dims.push('维度'+(dims.length+1));
  series.forEach(s=>s.values.push(50));
  initDims();initSeries();drawRadar();
}

function initSeries(){
  const container=document.getElementById('seriesContainer');
  container.innerHTML='';
  series.forEach((s,si)=>{
    const div=document.createElement('div');
    div.style.cssText='background:#0f172a;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid rgba(148,163,184,.1)';
    let html=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input type="color" value="${s.color}" class="color-picker-inline" oninput="series[${si}].color=this.value;drawRadar()">
      <input type="text" value="${s.name}" style="flex:1;padding:4px 8px;background:#1e293b;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:4px;font-size:.85rem" oninput="series[${si}].name=this.value;drawRadar()">
      <button class="btn btn-danger" style="padding:4px 10px;font-size:.75rem" onclick="series.splice(${si},1);initSeries();drawRadar()">删除</button>
    </div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
    dims.forEach((dim,di)=>{
      html+=`<div style="min-width:70px"><label style="font-size:.7rem;color:#64748b">${dim}</label><input type="number" value="${s.values[di]||0}" min="0" max="100" style="width:100%;padding:3px 5px;background:#1e293b;color:#e2e8f0;border:1px solid rgba(148,163,184,.15);border-radius:4px;font-size:.8rem;text-align:center" oninput="series[${si}].values[${di}]=parseFloat(this.value)||0;drawRadar()"></div>`;
    });
    html+='</div>';
    div.innerHTML=html;
    container.appendChild(div);
  });
}

function addSeries(){
  series.push({name:'系列'+(series.length+1),values:dims.map(()=>50),color:defaultBorders[series.length%defaultBorders.length]});
  initSeries();drawRadar();
}

function resetAll(){
  dims=[...defaultDims];
  series=JSON.parse(JSON.stringify(defaultSeries));
  initDims();initSeries();drawRadar();
}

function drawRadar(){
  const canvas=document.getElementById('radarCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=2;
  canvas.width=600*dpr;canvas.height=550*dpr;
  canvas.style.width='600px';canvas.style.height='550px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,600,550);

  const n=dims.length;
  if(n<3){ctx.fillStyle='#94a3b8';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('至少需要3个维度',300,275);return;}

  const title=document.getElementById('chartTitle').value;
  const showDots=document.getElementById('showDots').checked;
  const showVals=document.getElementById('showValues').checked;

  ctx.fillStyle='#1e293b';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText(title,300,28);

  const cx=300,cy=290,maxR=200;
  const angleStep=(Math.PI*2)/n;
  const levels=5;

  // Grid
  for(let l=1;l<=levels;l++){
    const r=(l/levels)*maxR;
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const angle=-Math.PI/2+i*angleStep;
      const x=cx+Math.cos(angle)*r;
      const y=cy+Math.sin(angle)*r;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;ctx.stroke();
    // Level label
    ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText((l/levels*100).toFixed(0),cx-8,cy-r+3);
  }

  // Axis lines + labels
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+i*angleStep;
    const x=cx+Math.cos(angle)*maxR;
    const y=cy+Math.sin(angle)*maxR;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);
    ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.stroke();
    // Label
    const lx=cx+Math.cos(angle)*(maxR+20);
    const ly=cy+Math.sin(angle)*(maxR+20);
    ctx.fillStyle='#334155';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(dims[i],lx,ly);
  }

  // Data polygons
  series.forEach((s,si)=>{
    ctx.beginPath();
    s.values.forEach((v,vi)=>{
      const angle=-Math.PI/2+vi*angleStep;
      const r=(v/100)*maxR;
      const x=cx+Math.cos(angle)*r;
      const y=cy+Math.sin(angle)*r;
      if(vi===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle=defaultColors[si%defaultColors.length];ctx.fill();
    ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.stroke();

    if(showDots){
      s.values.forEach((v,vi)=>{
        const angle=-Math.PI/2+vi*angleStep;
        const r=(v/100)*maxR;
        const x=cx+Math.cos(angle)*r;
        const y=cy+Math.sin(angle)*r;
        ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();
      });
    }

    if(showVals){
      s.values.forEach((v,vi)=>{
        const angle=-Math.PI/2+vi*angleStep;
        const r=(v/100)*maxR+12;
        const x=cx+Math.cos(angle)*r;
        const y=cy+Math.sin(angle)*r;
        ctx.fillStyle=s.color;ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(v,x,y);
      });
    }
  });

  // Legend
  const ly=530;
  ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
  let lx=300-(series.length*70)/2;
  series.forEach((s,i)=>{
    ctx.fillStyle=s.color;ctx.fillRect(lx,ly-5,12,12);
    ctx.fillStyle='#475569';ctx.fillText(s.name,lx+16,ly+1);
    lx+=80;
  });
}

function exportPNG(){
  const canvas=document.getElementById('radarCanvas');
  const link=document.createElement('a');
  link.download='radar-chart.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

initDims();initSeries();drawRadar();
</script>
