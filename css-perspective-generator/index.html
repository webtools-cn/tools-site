<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}
function setPreset(p,rx,ry,rz,tz,tx){
  document.getElementById('perspective').value=p;
  document.getElementById('rotateX').value=rx;
  document.getElementById('rotateY').value=ry;
  document.getElementById('rotateZ').value=rz;
  document.getElementById('translateZ').value=tz;
  document.getElementById('translateX').value=tx||0;
  update();
}
function resetAll(){
  document.getElementById('perspective').value=800;
  document.getElementById('rotateX').value=0;
  document.getElementById('rotateY').value=0;
  document.getElementById('rotateZ').value=0;
  document.getElementById('translateZ').value=0;
  document.getElementById('translateX').value=0;
  update();
}

function update(){
  var p=document.getElementById('perspective').value;
  var rx=document.getElementById('rotateX').value;
  var ry=document.getElementById('rotateY').value;
  var rz=document.getElementById('rotateZ').value;
  var tz=document.getElementById('translateZ').value;
  var tx=document.getElementById('translateX').value;

  document.getElementById('perspectiveVal').textContent=p+'px';
  document.getElementById('rotateXVal').textContent=rx+'deg';
  document.getElementById('rotateYVal').textContent=ry+'deg';
  document.getElementById('rotateZVal').textContent=rz+'deg';
  document.getElementById('translateZVal').textContent=tz+'px';
  document.getElementById('translateXVal').textContent=tx+'px';

  document.getElementById('previewArea').style.perspective=p+'px';
  var transform='rotateX('+rx+'deg) rotateY('+ry+'deg) rotateZ('+rz+'deg) translateZ('+tz+'px) translateX('+tx+'px)';
  document.getElementById('previewBox').style.transform=transform;

  var css='/* 父容器 */\n.parent {\n  perspective: '+p+'px;\n  perspective-origin: 50% 50%;\n}\n\n/* 3D元素 */\n.element {\n  transform: '+transform+';\n  transform-style: preserve-3d;\n  backface-visibility: visible;\n}';
  document.getElementById('codeBox').textContent=css;
}

function copyCode(){
  var code=document.getElementById('codeBox').textContent;
  navigator.clipboard.writeText(code).then(function(){showToast('CSS代码已复制 ✅')}).catch(function(){showToast('复制失败');});
}

update();
</script>
