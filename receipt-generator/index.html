<script>

function getItems() {
    const names = document.querySelectorAll(".item-name");
    const qtys = document.querySelectorAll(".item-qty");
    const prices = document.querySelectorAll(".item-price");
    const items = [];
    for (let i = 0; i < names.length; i++) {
        const name = names[i].value.trim();
        const qty = parseInt(qtys[i].value) || 1;
        const price = parseFloat(prices[i].value) || 0;
        if (name) items.push({ name, qty, price });
    }
    return items;
}

function renderReceipt() {
    const biz = document.getElementById("recBiz").value || "商店";
    const date = document.getElementById("recDate").value || new Date().toISOString().split("T")[0];
    const no = document.getElementById("recNo").value || "RCP-001";
    const currency = document.getElementById("recCurrency").value;
    const client = document.getElementById("recClient").value;
    const taxRate = parseFloat(document.getElementById("recTax").value) || 0;
    const discount = parseFloat(document.getElementById("recDiscount").value) || 0;
    const items = getItems();
    
    let subtotal = 0;
    let rows = "";
    items.forEach(item => {
        const lineTotal = item.qty * item.price;
        subtotal += lineTotal;
        rows += `<tr><td style="padding:4px 8px;border-bottom:1px dashed #ddd;font-size:.85rem">${item.name}</td><td style="padding:4px 8px;border-bottom:1px dashed #ddd;text-align:center;font-size:.85rem">${item.qty}</td><td style="padding:4px 8px;border-bottom:1px dashed #ddd;text-align:right;font-size:.85rem">${currency}${item.price.toFixed(2)}</td><td style="padding:4px 8px;border-bottom:1px dashed #ddd;text-align:right;font-size:.85rem">${currency}${lineTotal.toFixed(2)}</td></tr>`;
    });
    
    const taxAmount = subtotal * (taxRate / 100);
    const total = subtotal + taxAmount - discount;
    
    const preview = document.getElementById("receiptPreview");
    preview.innerHTML = `
        <div style="text-align:center;margin-bottom:16px">
            <h3 style="font-size:1.4rem;margin:0;color:#1e293b">${biz}</h3>
            <p style="font-size:.75rem;color:#64748b;margin:4px 0">收据 / RECEIPT</p>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:.8rem;color:#475569;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #ddd">
            <span>编号: ${no}</span>
            <span>日期: ${date}</span>
        </div>
        ${client ? `<p style="font-size:.8rem;color:#475569;margin-bottom:8px">客户: ${client}</p>` : ""}
        <table style="width:100%;border-collapse:collapse;margin-bottom:12px">
            <tr><th style="padding:4px 8px;border-bottom:2px solid #333;text-align:left;font-size:.8rem">商品</th><th style="padding:4px 8px;border-bottom:2px solid #333;text-align:center;font-size:.8rem">数量</th><th style="padding:4px 8px;border-bottom:2px solid #333;text-align:right;font-size:.8rem">单价</th><th style="padding:4px 8px;border-bottom:2px solid #333;text-align:right;font-size:.8rem">金额</th></tr>
            ${rows}
        </table>
        <div style="border-top:2px solid #333;padding-top:8px;margin-top:8px">
            <div style="display:flex;justify-content:space-between;font-size:.85rem"><span>小计:</span><span>${currency}${subtotal.toFixed(2)}</span></div>
            ${taxRate > 0 ? `<div style="display:flex;justify-content:space-between;font-size:.85rem"><span>税率 (${taxRate}%):</span><span>${currency}${taxAmount.toFixed(2)}</span></div>` : ""}
            ${discount > 0 ? `<div style="display:flex;justify-content:space-between;font-size:.85rem"><span>折扣:</span><span>-${currency}${discount.toFixed(2)}</span></div>` : ""}
            <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:bold;margin-top:4px;padding-top:4px;border-top:1px solid #ddd"><span>总计:</span><span>${currency}${total.toFixed(2)}</span></div>
        </div>
        <div style="text-align:center;margin-top:16px;font-size:.7rem;color:#94a3b8;border-top:1px solid #ddd;padding-top:12px">
            <p>感谢您的惠顾!</p>
            <p style="margin-top:4px">由 free-toolbase.com 生成</p>
        </div>
    `;
}

function addItem() {
    const container = document.getElementById("receiptItems");
    const row = document.createElement("div");

    row.style.marginBottom = "8px";
    row.innerHTML = `<div class="field" style="flex:2"><input type="text" class="item-name" placeholder="商品名称" oninput="renderReceipt()"></div><div class="field" style="flex:1"><input type="number" class="item-qty" value="1" min="1" oninput="renderReceipt()"></div><div class="field" style="flex:1"><input type="number" class="item-price" value="0" min="0" step="0.01" oninput="renderReceipt()"></div>`;
    container.appendChild(row);
}

function removeItem() {
    const container = document.getElementById("receiptItems");
    if (container.children.length > 1) {
        container.removeChild(container.lastChild);
        renderReceipt();
    }
}

    win.document.write('</scr' + 'ipt>');
    win.document.write('</head><body>');
    win.document.write(content);
    win.document.write('</body></html>');
    win.document.close();
    setTimeout(function(){ win.print(); }, 500);
    showToast('打印页面已打开');
}
