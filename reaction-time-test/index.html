(function(){

var state='waiting';var timeoutId=null;var startTime=0;var results=[];var maxTests=5;var testCount=0;
function getTestArea(){return document.getElementById('testArea');}
function getResults(){return document.getElementById('results');}
function resetTest(){if(timeoutId)clearTimeout(timeoutId);state='waiting';testCount=0;results=[];var ta=getTestArea();ta.style.background='#1e293b';ta.textContent='Click to start';ta.style.color='#64748b';document.getElementById('results').style.display='none';}
function startNext(){if(testCount>=maxTests){showFinal();return;}testCount++;state='waiting';var ta=getTestArea();ta.style.background='#1e293b';ta.textContent='Wait for green...';ta.style.color='#64748b';
var delay=1000+Math.random()*3000;timeoutId=setTimeout(function(){state='ready';startTime=Date.now();ta.style.background='rgba(34,197,94,.5)';ta.textContent='CLICK NOW!';ta.style.color='#4ade80';},delay);}
