<body>
<header>
<a href="/" class="logo">🧰 Free ToolBase</a>
<nav>
<a href="/">🏠 首页</a>
<a href="/category/">📂 分类</a>
<a href="/en/leap-year-checker/">EN</a>
</nav>
</header>
<main>
<h1>📅 闰年检测器</h1>
<p class="subtitle">输入年份，快速判断是否为闰年，或查询范围内的所有闰年</p>
<div class="mode-tabs">
<button class="mode-tab active" onclick="switchMode('single')">单年检测</button>
<button class="mode-tab" onclick="switchMode('range')">范围查询</button>
</div>
<div class="card">
<div id="singleMode">
<h3>🔍 输入年份</h3>
<input type="number" id="yearInput" placeholder="例如：2024" onkeydown="if(event.key==='Enter')checkSingle()">
<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-primary" onclick="checkSingle()">🔍 检测</button>
<button class="btn btn-outline" onclick="clearSingle()">🗑 清空</button>
</div>
<div class="result-box" id="singleResult">
<div class="result-title" id="singleTitle"></div>
<div class="result-detail" id="singleDetail"></div>
</div>
</div>
<div id="rangeMode" style="display:none">
<h3>📊 输入年份范围</h3>
<div class="input-row">
<label>起始年份</label>
<input type="number" id="startYear" placeholder="2000">
</div>
<div class="input-row" style="margin-top:12px">
<label>结束年份</label>
<input type="number" id="endYear" placeholder="2030">
</div>
<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-primary" onclick="checkRange()">🔍 查询</button>
<button class="btn btn-outline" onclick="clearRange()">🗑 清空</button>
</div>
<div class="result-box" id="rangeResult">
<div class="result-title" id="rangeTitle"></div>
<div class="leap-list" id="rangeList"></div>
</div>
</div>
</div>
<div class="card">
<h3>📖 闰年规则</h3>
<ul class="info-list">
<li>① 能被4整除但不能被100整除的年份是闰年</li>
<li>② 能被400整除的年份也是闰年</li>
<li>③ 其他年份都是平年（365天）</li>
<li>④ 闰年有366天，2月有29天</li>
</ul>
</div>
</main>
<div class="toast" id="toast"><span id="toastMsg"></span></div>
<footer>
<p>© 2026 <a href="/">Free ToolBase</a> · 免费在线工具集合 · <a href="/privacy-policy/">隐私政策</a></p>
</footer>
<script>
function showToast(msg){
  var t=document.getElementById('toast');var m=document.getElementById('toastMsg');
  m.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function isLeapYear(y){
  return (y%4===0&&y%100!==0)||(y%400===0);
}
function switchMode(mode){
  var tabs=document.querySelectorAll('.mode-tab');
  tabs[0].classList.toggle('active',mode==='single');
  tabs[1].classList.toggle('active',mode==='range');
  document.getElementById('singleMode').style.display=mode==='single'?'block':'none';
  document.getElementById('rangeMode').style.display=mode==='range'?'block':'none';
}
function checkSingle(){
  var y=parseInt(document.getElementById('yearInput').value);
  if(!y||isNaN(y)){showToast('请输入有效的年份');return;}
  var box=document.getElementById('singleResult');
  var title=document.getElementById('singleTitle');
  var detail=document.getElementById('singleDetail');
  var leap=isLeapYear(y);
  box.classList.remove('leap-no');
  if(leap){
    title.textContent='✅ '+y+'年是闰年';
    var next=y+4;
    while(!isLeapYear(next)){next++;}
    var prev=y-4;
    while(!isLeapYear(prev)){prev--;}
    detail.innerHTML=y+'年有366天，2月有29天。<br>上一个闰年：'+prev+'年<br>下一个闰年：'+next+'年';
  }else{
    box.classList.add('leap-no');
    title.textContent='❌ '+y+'年不是闰年';
    var reason='';
    if(y%4!==0){reason=y+'不能被4整除。';}
    else if(y%100===0&&y%400!==0){reason=y+'能被100整除但不能被400整除，因此不是闰年。';}
    detail.innerHTML=reason+'<br>'+y+'年有365天，2月有28天。';
  }
  box.classList.add('show');
}
function clearSingle(){
  document.getElementById('yearInput').value='';
  document.getElementById('singleResult').classList.remove('show');
}
function checkRange(){
  var s=parseInt(document.getElementById('startYear').value);
  var e=parseInt(document.getElementById('endYear').value);
  if(!s||!e||isNaN(s)||isNaN(e)){showToast('请输入有效的年份范围');return;}
  if(s>e){var tmp=s;s=e;e=tmp;}
  if(e-s>5000){showToast('范围过大，请缩小到5000年以内');return;}
  var leaps=[];
  for(var i=s;i<=e;i++){if(isLeapYear(i)){leaps.push(i);}}
  var box=document.getElementById('rangeResult');
  var title=document.getElementById('rangeTitle');
  var list=document.getElementById('rangeList');
  title.textContent='在 '+s+' 到 '+e+' 年之间共有 '+leaps.length+' 个闰年';
  list.innerHTML='';
  for(var j=0;j<leaps.length;j++){
    var item=document.createElement('span');
    item.className='leap-item';
    item.textContent=leaps[j];
    list.appendChild(item);
  }
  box.classList.add('show');
}
function clearRange(){
  document.getElementById('startYear').value='';
  document.getElementById('endYear').value='';
  document.getElementById('rangeResult').classList.remove('show');
}
</script>
</body>
</html>
