else if(effect==='grayscale'){imgCss='filter: grayscale(0); transition: filter '+duration+'s ease;';containerCss='.img-hover-container:hover img { filter: grayscale(1); }';}
else if(effect==='shine'){containerCss='.img-hover-container { position: relative; overflow: hidden; }\n.img-hover-container::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%); transform: rotate(45deg) translateX(-100%); transition: transform 0.6s ease; }\n.img-hover-container:hover::after { transform: rotate(45deg) translateX(100%); }';}
var fullCss=containerCss+'\n.img-hover-container {\n  display: inline-block;\n  overflow: hidden;\n  border-radius: '+borderRadius+';\n  line-height: 0;\n}\n.img-hover-container img {\n  display: block;\n  width: 200px;\n  height: 200px;\n  object-fit: cover;\n  '+(effect!=='overlay'&&effect!=='slide'?imgCss:'')+'\n}'+overlayCss+'\n'+textCss;
var html='<div class="img-hover-container">\n  <img src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231e293b%22/%3E%3Ccircle cx=%22100%22 cy=%2280%22 r=%2230%22 fill=%22%233b82f6%22/%3E%22%3E%3Ccircle cx=%22100%22 cy=%2280%22 r=%2230%22 fill=%22%233b82f6%22/%3E%3C/svg%3E" alt="Sample Image">\n'+(effect==='overlay'?'  <div class="overlay">'+(showText?'<span class="overlay-text">查看详情</span>':'')+'</div>':'')+'\n'+(effect==='border'?'  <div class="border-box"></div>':'')+'\n'+(effect==='slide'?'  <div class="slide-overlay">'+(showText?'<span class="overlay-text">查看详情</span>':'')+'</div>':'')+'\n</div>';
document.getElementById('previewBox').innerHTML=html;
var styleTag=document.getElementById('dynamicStyle');if(!styleTag){styleTag=document.createElement('style');styleTag.id='dynamicStyle';document.head.appendChild(styleTag);}
styleTag.textContent=fullCss;document.getElementById('codeOutput').textContent=fullCss+'\n\n<!-- HTML -->\n'+html;}

document.getElementById('hoverEffect').addEventListener('change',render);
document.getElementById('hoverDuration').addEventListener('input',render);
document.getElementById('hoverOverlayColor').addEventListener('input',render);
document.getElementById('hoverOpacity').addEventListener('change',render);
document.getElementById('hoverBorderColor').addEventListener('input',render);
document.getElementById('hoverBorderWidth').addEventListener('input',render);
document.getElementById('hoverText').addEventListener('change',render);
document.getElementById('hoverRounded').addEventListener('change',render);
document.getElementById('copyBtn').addEventListener('click',function(){navigator.clipboard.writeText(document.getElementById('codeOutput').textContent).then(function(){alert('代码已复制！');});});
render();

})();
</script>
