<script>
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
function generate(){
  var c1=document.getElementById("c1").value;
  var c2=document.getElementById("c2").value;
  var c3=document.getElementById("c3").value;
  var c4=document.getElementById("c4").value;
  var bw=parseInt(document.getElementById("bdrWidth").value)||4;
  var br=parseInt(document.getElementById("bdrRadius").value)||12;
  var sp=parseFloat(document.getElementById("animSpeed").value)||3;
  var dir=document.getElementById("gradDir").value;
  var colors=[c1,c2];
  if(c3&&c3!=="#000000") colors.push(c3);
  if(c4&&c4!=="#000000") colors.push(c4);
  var grad="linear-gradient("+dir+", "+colors.join(", ")+")";
  var gradSize=colors.length*30+100;
  var css="/* Animated Gradient Border */\n";
  css+=".gradient-border {\n  position: relative;\n  border-radius: "+br+"px;\n  overflow: hidden;\n}\n";
  css+=".gradient-border::before {\n  content: \"\";\n  position: absolute;\n  top: -"+bw+"px; left: -"+bw+"px;\n  right: -"+bw+"px; bottom: -"+bw+"px;\n";
  css+="  background: "+grad+";\n  background-size: "+gradSize+"% "+gradSize+"%;\n";
  css+="  border-radius: "+(br+bw)+"px;\n  z-index: -1;\n  animation: gradientRotate "+sp+"s ease infinite;\n}\n";
  css+=".gradient-border > * {\n  position: relative;\n  z-index: 1;\n  background: #0f172a;\n  border-radius: "+br+"px;\n  margin: "+bw+"px;\n}\n";
  css+="@keyframes gradientRotate {\n  0% { background-position: 0% 50%; }\n  50% { background-position: 100% 50%; }\n  100% { background-position: 0% 50%; }\n}";
  document.getElementById("resultCss").textContent=css;
  document.getElementById("resultArea").style.display="block";
  // Update preview
  var box=document.getElementById("previewBox");
  var old=box.querySelector(".pseudo-border");
  if(old) old.remove();
  var pseudo=document.createElement("div");
  pseudo.className="pseudo-border";
  pseudo.style.cssText="position:absolute;top:-"+bw+"px;left:-"+bw+"px;right:-"+bw+"px;bottom:-"+bw+"px;background:"+grad+";background-size:"+gradSize+"% "+gradSize+"%;border-radius:"+(br+bw)+"px;z-index:0;animation:previewRotate "+sp+"s ease infinite";
  box.insertBefore(pseudo,box.firstChild);
  var el=document.getElementById("previewEl");
  el.style.cssText="padding:20px 40px;color:#f1f5f9;font-size:1rem;font-weight:500;position:relative;z-index:2;border-radius:"+br+"px;background:#0f172a;margin:"+bw+"px";
  if(!document.getElementById("previewKeyframes")){
    var s=document.createElement("style");
    s.id="previewKeyframes";
    s.textContent="@keyframes previewRotate{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}";
    document.head.appendChild(s);
  }
}
function copyResult(){
  var text=document.getElementById("resultCss").textContent;
  navigator.clipboard.writeText(text).then(function(){toast("复制CSS")})
}
document.addEventListener("DOMContentLoaded",function(){generate()});
</script>
