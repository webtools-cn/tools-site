(function(){var s=document.createElement('script');s.src='/tools-site/feedback-widget.html';s.onload=function(){if(window.initFeedback)initFeedback('json-to-rust')};document.body.appendChild(s)})();

function toSnakeCase(s){return s.replace(/([A-Z])/g,'_$1').toLowerCase().replace(/^_/,'')}
function toPascalCase(s){return s.replace(/[^a-zA-Z0-9]/g,' ').replace(/\s+(.)/g,function(_,c){return c.toUpperCase()}).replace(/\s/g,'').replace(/^./,function(c){return c.toUpperCase()})}
function toRustType(value,jsonKey,optionAll){
  if(value===null||value===undefined){return 'Option<serde_json::Value>'}
  if(typeof value==='string'){return optionAll?'Option<String>':'String'}
  if(typeof value==='boolean'){return optionAll?'Option<bool>':'bool'}
  if(typeof value==='number'){if(Number.isInteger(value))return optionAll?'Option<i64>':'i64';return optionAll?'Option<f64>':'f64'}
  if(Array.isArray(value)){
    if(value.length===0)return 'Option<Vec<serde_json::Value>>';
    const itemType=toRustType(value[0],jsonKey,optionAll);
    const inner=itemType.replace('Option<','').replace('>','');
    return optionAll?'Option<Vec<'+inner+'>>':'Vec<'+inner+'>';
  }
  if(typeof value==='object'&&value!==null){
    const name=toPascalCase(jsonKey);
    return optionAll?'Option<'+name+'>':name;
  }
  return 'serde_json::Value';
}

let generatedCode='';

function generateRust(){
  const input=document.getElementById('jsonInput').value.trim();
  const errorBox=document.getElementById('errorBox');
  if(!input){errorBox.style.display='block';errorBox.textContent='请输入JSON数据';return}
  let data;
  try{data=JSON.parse(input)}catch(e){errorBox.style.display='block';errorBox.textContent='JSON格式错误: '+e.message;return}
  errorBox.style.display='none';
  
  const useSnake=document.getElementById('useSnakeCase').checked;
  const useCamel=document.getElementById('useCamelCase').checked;
  const useOptionAll=document.getElementById('useOptionAll').checked;
  const useDefaults=document.getElementById('useDefaults').checked;
  
  const structs={};
  
  function analyze(obj,name,structs,useOptionAll){
    if(obj===null||obj===undefined||typeof obj!=='object'||Array.isArray(obj)){
      if(Array.isArray(obj)&&obj.length>0&&typeof obj[0]==='object'&&obj[0]!==null)analyze(obj[0],name+'Item',structs,useOptionAll);
      return;
    }
    if(structs[name])return;
    structs[name]={fields:[]};
    const keys=Object.keys(obj);
    keys.forEach(function(key){
      const val=obj[key];
      let rustType=toRustType(val,key,useOptionAll);
      
      if(typeof val==='object'&&val!==null&&!Array.isArray(val)){const className=toPascalCase(key);analyze(val,className,structs,useOptionAll)}
      if(Array.isArray(val)&&val.length>0&&typeof val[0]==='object'&&val[0]!==null){const itemType=toPascalCase(key)+'Item';analyze(val[0],itemType,structs,useOptionAll)}
      
      const fieldName=useSnake?toSnakeCase(key):key;
      const isOptional=val===null||val===undefined||useOptionAll;
      structs[name].fields.push({jsonKey:key,fieldName:fieldName,rustType:rustType,isOptional:isOptional});
    });
  }
  
  const rootName='Root';
  analyze(data,rootName,structs,useOptionAll);
  
  let code='use serde::{Deserialize, Serialize};\nuse serde_json;\n\n';
  
  const names=Object.keys(structs);
  names.forEach(function(name){
    const s=structs[name];
    code+='#[derive(Debug, Clone, Serialize, Deserialize)]\n';
    if(useCamel){code+='#[serde(rename_all = "camelCase")]\n'}
    code+='pub struct '+name+' {\n';
    s.fields.forEach(function(f){
      let attrs='';
      if(useDefaults&&f.isOptional)attrs+='#[serde(default)] ';
      if(f.jsonKey!==f.fieldName&&!useCamel)attrs+='#[serde(rename = "'+f.jsonKey+'")] ';
      code+='  '+attrs+'pub '+f.fieldName+': '+f.rustType+',\n';
    });
    code+='}\n\n';
  });
  
  document.getElementById('codeOutput').textContent=code;
  generatedCode=code;
}

function copyCode(){if(!generatedCode){showToast('请先生成代码');return}navigator.clipboard.writeText(generatedCode).then(function(){showToast('已复制到剪贴板')}).catch(function(){showToast('复制失败')})}
