<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

let audioCtx = null;
let sustainOn = false;
let showKeyLabels = false;
let activeOscillators = {};
let recording = [];
let isRecording = false;
let recordStart = 0;

const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Build 3 octaves: C3 to B5 (36 notes)
const startMidi = 48; // C3
const endMidi = 83;   // B5
const whiteNotes = [];
const blackNotes = [];

for (let midi = startMidi; midi <= endMidi; midi++) {
  const noteIndex = midi % 12;
  const octave = Math.floor(midi / 12) - 1;
  const name = noteNames[noteIndex] + octave;
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const isBlack = [1,3,6,8,10].includes(noteIndex);
  if (isBlack ? blackNotes.push({midi, name, freq, noteIndex}) : whiteNotes.push({midi, name, freq, noteIndex});
}

// Keyboard mapping
const keyMap = {
  'z':48,'s':49,'x':50,'d':51,'c':52,'v':53,'g':54,'b':55,'h':56,'n':57,'j':58,'m':59,
  'q':60,'2':61,'w':62,'3':63,'e':64,'r':65,'5':66,'t':67,'6':68,'y':69,'7':70,'u':71,
  'i':72,'9':73,'o':74,'0':75,'p':76,'[':77,'=':78,']':79
};

const keyLabels = {};
Object.entries(keyMap).forEach(([k,m]) => {
  const ni = m % 12;
  const oct = Math.floor(m / 12) - 1;
  keyLabels[m] = k.toUpperCase();
});

function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';
  let whiteIndex = 0;
  
  for (let midi = startMidi; midi <= endMidi; midi++) {
    const noteIndex = midi % 12;
    const isBlack = [1,3,6,8,10].includes(noteIndex);
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    
    if (!isBlack) {
      const key = document.createElement('div');
      key.className = 'key white-key';
      key.dataset.midi = midi;
      key.dataset.freq = freq;
      const label = document.createElement('span');
      label.className = 'key-label';
      label.textContent = keyLabels[midi] || '';
      label.style.display = showKeyLabels ? 'block' : 'none';
      key.appendChild(label);
      key.addEventListener('mousedown', () => playNote(midi, freq));
      key.addEventListener('mouseup', () => stopNote(midi));
      key.addEventListener('mouseleave', () => stopNote(midi));
      key.addEventListener('touchstart', (e) => { e.preventDefault(); playNote(midi, freq); });
      key.addEventListener('touchend', (e) => { e.preventDefault(); stopNote(midi); });
      piano.appendChild(key);
      whiteIndex++;
    } else {
      const key = document.createElement('div');
      key.className = 'key black-key';
      key.dataset.midi = midi;
      key.dataset.freq = freq;
      key.style.left = (whiteIndex * 36 - 11) + 'px';
      const label = document.createElement('span');
      label.className = 'key-label';
      label.textContent = keyLabels[midi] || '';
      label.style.display = showKeyLabels ? 'block' : 'none';
      key.appendChild(label);
      key.addEventListener('mousedown', () => playNote(midi, freq));
      key.addEventListener('mouseup', () => stopNote(midi));
      key.addEventListener('mouseleave', () => stopNote(midi));
      key.addEventListener('touchstart', (e) => { e.preventDefault(); playNote(midi, freq); });
      key.addEventListener('touchend', (e) => { e.preventDefault(); stopNote(midi); });
      piano.appendChild(key);
    }
  }
}

function getToneConfig() {
  const tone = document.getElementById('toneSelect').value;
  switch(tone) {
    case 'piano': return {type:'triangle', attack:0.005, decay:0.3, sustain:0.2, release:0.8};
    case 'epiano': return {type:'sine', attack:0.01, decay:0.2, sustain:0.3, release:0.5};
    case 'organ': return {type:'square', attack:0.05, decay:0.1, sustain:0.8, release:0.1};
    case 'synth': return {type:'sawtooth', attack:0.01, decay:0.1, sustain:0.5, release:0.3};
    default: return {type:'triangle', attack:0.005, decay:0.3, sustain:0.2, release:0.8};
  }
}

function playNote(midi, freq) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (activeOscillators[midi]) return;
  
  const config = getToneConfig();
  const vol = document.getElementById('volumeSlider').value / 100;
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  
  osc.type = config.type;
  osc.frequency.value = freq;
  filter.type = 'lowpass';
  filter.frequency.value = 4000;
  
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(vol * 0.4, audioCtx.currentTime + config.attack);
  gain.gain.linearRampToValueAtTime(vol * 0.4 * config.sustain, audioCtx.currentTime + config.attack + config.decay);
  
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  
  activeOscillators[midi] = {osc, gain, filter, config};
  
  // Visual feedback
  const keyEl = document.querySelector(`[data-midi="${midi}"]`);
  if (keyEl) keyEl.classList.add('pressed');
  
  // Recording
  if (isRecording) {
    recording.push({type:'on', midi, freq, time: Date.now() - recordStart});
  }
}

function stopNote(midi) {
  if (!activeOscillators[midi]) return;
  const {osc, gain, config} = activeOscillators[midi];
  
  if (sustainOn) return; // Don't stop if sustain is on
  
  const releaseTime = config.release;
  gain.gain.cancelScheduledValues(audioCtx.currentTime);
  gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + releaseTime);
  osc.stop(audioCtx.currentTime + releaseTime);
  
  delete activeOscillators[midi];
  
  const keyEl = document.querySelector(`[data-midi="${midi}"]`);
  if (keyEl) keyEl.classList.remove('pressed');
  
  if (isRecording) {
    recording.push({type:'off', midi, time: Date.now() - recordStart});
  }
}

function toggleSustain() {
  sustainOn = !sustainOn;
  const btn = document.getElementById('sustainBtn');
  const ind = document.getElementById('sustainIndicator');
  btn.textContent = '延音踏板: ' + (sustainOn ? '开' : '关');
  btn.classList.toggle('active', sustainOn);
  ind.textContent = '延音踏板: ' + (sustainOn ? '开启' : '关闭（按空格键切换）');
  ind.classList.toggle('active', sustainOn);
  
  if (!sustainOn) {
    // Release all sustained notes
    Object.keys(activeOscillators).forEach(midi => stopNote(parseInt(midi)));
  }
}

function toggleLabels() {
  showKeyLabels = !showKeyLabels;
  document.getElementById('showLabels').classList.toggle('active', showKeyLabels);
  document.querySelectorAll('.key-label').forEach(l => l.style.display = showKeyLabels ? 'block' : 'none');
}

function toggleRecord() {
  isRecording = !isRecording;
  const btn = document.getElementById('recBtn');
  if (isRecording) {
    recording = [];
    recordStart = Date.now();
    btn.textContent = '⏹ 停止录制';
    btn.classList.add('recording');
  } else {
    btn.textContent = '⏺ 录制';
    btn.classList.remove('recording');
  }
}

function playRecording() {
  if (recording.length === 0) { showToast('没有录制内容'); return; }
  recording.forEach(event => {
    setTimeout(() => {
      if (event.type === 'on') playNote(event.midi, event.freq);
      else stopNote(event.midi);
    }, event.time);
  });
}

function clearRecording() {
  recording = [];
  isRecording = false;
  document.getElementById('recBtn').textContent = '⏺ 录制';
  document.getElementById('recBtn').classList.remove('recording');
}

// Keyboard input
const pressedKeys = new Set();
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();
  if (key === ' ') { e.preventDefault(); toggleSustain(); return; }
  if (keyMap[key] !== undefined && !pressedKeys.has(key)) {
    pressedKeys.add(key);
    const midi = keyMap[key];
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    playNote(midi, freq);
  }
});

document.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  if (keyMap[key] !== undefined) {
    pressedKeys.delete(key);
    stopNote(keyMap[key]);
  }
});

document.getElementById('volumeSlider').addEventListener('input', function() {
  document.getElementById('volumeLabel').textContent = this.value + '%';
});

buildPiano();

</script>
</body>
</html>
