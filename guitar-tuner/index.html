let audioCtx, analyser, mediaStream, isRunning = false;
let currentTuning = 'standard';
let activeString = -1;

function buildStringsGrid() {
  const grid = document.getElementById('stringsGrid');
  grid.innerHTML = '';
  const strings = tunings[currentTuning];
  strings.forEach((s, i) => {
    const btn = document.createElement('div');
    btn.className = 'string-btn';
    btn.innerHTML = `<div class="string-name">${s.name}</div><div class="string-note">${s.note}</div>`;
    btn.onclick = () => {
      document.querySelectorAll('.string-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeString = i;
      playReference(s.freq);
    };
    grid.appendChild(btn);
  });
}

document.getElementById('tuningMode').addEventListener('change', function() {
  currentTuning = this.value;
  activeString = -1;
  buildStringsGrid();
});

function playReference(freq) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 2);
}

function toggleTuner() {
  if (isRunning) {
    stopTuner();
  } else {
    startTuner();
  }
}

async function startTuner() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({audio: true});
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    const source = audioCtx.createMediaStreamSource(mediaStream);
    source.connect(analyser);
    isRunning = true;
    document.getElementById('startBtn').textContent = '⏹ 停止调音';
    document.getElementById('startBtn').classList.add('active');
    detectPitch();
  } catch(e) {
    showToast('无法访问麦克风，请确保已授予权限。错误：' + e.message);

}

function stopTuner() {
  isRunning = false;
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());

}

function autoCorrelate(buf, sampleRate) {
  let SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  let r1 = 0, r2 = SIZE - 1, thres = 0.2;
  for (let i = 0; i < SIZE / 2; i++) {
    if (Math.abs(buf[i]) < thres) { r1 = i; break; }
  }
  for (let i = 1; i < SIZE / 2; i++) {
    if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
  }
  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  let c = new Array(SIZE).fill(0);
  for (let i = 0; i < SIZE; i++) {
    for (let j = 0; j < SIZE - i; j++) {
      c[i] += buf[j] * buf[j + i];
    }
  }
  let d = 0;
  while (c[d] > c[d + 1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < SIZE; i++) {
    if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
  }
  let T0 = maxpos;
  let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
  let a = (x1 + x3 - 2 * x2) / 2;
  let b = (x3 - x1) / 2;
  if (a) T0 = T0 - b / (2 * a);
  return sampleRate / T0;
}

const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToNote(freq) {
  const noteNum = 12 * (Math.log2(freq / 440)) + 69;
  const roundNote = Math.round(noteNum);
  const cents = Math.round((noteNum - roundNote) * 100);
  const octave = Math.floor(roundNote / 12) - 1;
  const name = noteNames[roundNote % 12];
  return {name, octave, cents, noteNum: roundNote};
}

function detectPitch() {
  if (!isRunning) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, audioCtx.sampleRate);
  
  if (freq !== -1 && freq > 50 && freq < 2000) {
    const info = freqToNote(freq);
    document.getElementById('noteDisplay').textContent = info.name + info.octave;
    document.getElementById('freqDisplay').textContent = freq.toFixed(1) + ' Hz';
    
    const indicator = document.getElementById('centsIndicator');
    const pct = 50 + (info.cents / 50) * 50;
    indicator.style.left = Math.max(0, Math.min(100, pct)) + '%';
    indicator.className = 'indicator';
    if (Math.abs(info.cents) <= 3) {
      indicator.classList.add('in-tune');
    } else if (info.cents > 0) {
      indicator.classList.add('sharp');
    } else {
      indicator.classList.add('flat');
    }
    
    // Auto-detect closest string
    const strings = tunings[currentTuning];
    let closest = 0, minDiff = Infinity;
    strings.forEach((s, i) => {
      const diff = Math.abs(freq - s.freq);
      if (diff < minDiff) { minDiff = diff; closest = i; }
    });
    document.querySelectorAll('.string-btn').forEach((b, i) => {
      b.classList.toggle('active', i === closest);
    });
  }
  
  requestAnimationFrame(detectPitch);
}
