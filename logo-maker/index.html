<script>
function renderLogo() {
    const text = document.getElementById("logoText").value || "LOGO";
    const sub = document.getElementById("logoSub").value || "";
    const font = document.getElementById("logoFont").value;
    const shape = document.getElementById("logoShape").value;
    const textColor = document.getElementById("logoTextColor").value;
    const bgColor = document.getElementById("logoBgColor").value;
    const bold = document.getElementById("logoBold").checked;
    const italic = document.getElementById("logoItalic").checked;
    
    const canvas = document.getElementById("logoCanvas");
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    
    const cx = w / 2, cy = h / 2;
    const pad = 20;
    const maxR = Math.min(w, h) / 2 - pad;
    
    // Draw background shape
    if (shape !== "none") {
        ctx.beginPath();
        if (shape === "circle") {
            ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
        } else if (shape === "square") {
            ctx.rect(cx - maxR, cy - maxR, maxR * 2, maxR * 2);
        } else { // rounded
            const r = maxR * 0.2;
            const x = cx - maxR, y = cy - maxR, s = maxR * 2;
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + s - r, y);
            ctx.quadraticCurveTo(x + s, y, x + s, y + r);
            ctx.lineTo(x + s, y + s - r);
            ctx.quadraticCurveTo(x + s, y + s, x + s - r, y + s);
            ctx.lineTo(x + r, y + s);
            ctx.quadraticCurveTo(x, y + s, x, y + s - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
        }
        ctx.closePath();
        ctx.fillStyle = bgColor;
        ctx.fill();
    }
    
    // Draw text
    const fontSize = sub ? Math.min(60, maxR * 0.4) : Math.min(80, maxR * 0.6);
    const fontStyle = italic ? "italic " : "";
    const fontWeight = bold ? "bold " : "";
    ctx.font = fontStyle + fontWeight + fontSize + "px " + font;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = textColor;
    
    if (sub) {
        ctx.fillText(text, cx, cy - fontSize * 0.3);
        ctx.font = "300 " + (fontSize * 0.45) + "px " + font;
        ctx.fillStyle = textColor + "99";
        ctx.fillText(sub, cx, cy + fontSize * 0.5);
    } else {
        ctx.fillText(text, cx, cy);
    }
}

function downloadLogo() {
    const canvas = document.getElementById("logoCanvas");
    const link = document.createElement("a");
    link.download = "logo.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

renderLogo();
