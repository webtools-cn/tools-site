<script>
function getVideoId(url) {
  var match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match ? match[1] : null;
}

var qualityOptions = [
  {id:'maxresdefault', name:'最高分辨率', desc:'最佳画质（高清/4K）'},
  {id:'sddefault', name:'标清SD', desc:'标准清晰度 (640x480)'},
  {id:'hqdefault', name:'高质量HQ', desc:'高质量 (480x360)'},
  {id:'mqdefault', name:'中等MQ', desc:'中等质量 (320x180)'},
  {id:'default', name:'默认', desc:'低质量 (120x90)'}
];

function fetchThumbnails() {
  var url = document.getElementById('ytUrl').value.trim();
  var statusMsg = document.getElementById('statusMsg');
  var grid = document.getElementById('thumbGrid');

  if (!url) {
    statusMsg.innerHTML = '⚠️ 请输入YouTube视频链接';
    return;
  }

  var videoId = getVideoId(url);
  if (!videoId) {
    statusMsg.innerHTML = '⚠️ 无效的YouTube链接，请检查后重试';
    return;
  }

  statusMsg.innerHTML = '⏳ 正在获取视频 ' + videoId + ' 的缩略图...';
  grid.classList.remove('show');
  grid.innerHTML = '';

  var loaded = 0;
  var total = qualityOptions.length;
  var html = '';

  qualityOptions.forEach(function(q) {
    var imgUrl = 'https://img.youtube.com/vi/' + videoId + '/' + q.id + '.jpg';
    var img = new Image();
    img.onload = function() {
      loaded++;
      var w = img.naturalWidth;
      var h = img.naturalHeight;
      if (w <= 120 && h <= 90 && q.id !== 'default') {
        // skip
      } else {
        html += '<div class="thumb-card">' +
          '<div class="preview"><img src="' + imgUrl + '" alt="' + q.name + '" loading="lazy"></div>' +
          '<div class="card-body">' +
          '<div class="quality">' + q.name + '</div>' +
          '<div class="dimensions">' + w + '×' + h + 'px — ' + q.desc + '</div>' +
          '<div class="download-btn" onclick="downloadThumb(\'' + imgUrl + '\', \'' + videoId + '-' + q.id + '.jpg\')">⬇️ 下载</div>' +
          '</div></div>';
      }
      if (loaded >= total) {
        if (html) {
          grid.innerHTML = html;
          grid.classList.add('show');
          statusMsg.innerHTML = '✅ 找到 ' + grid.querySelectorAll('.thumb-card').length + ' 个缩略图';
        } else {
          statusMsg.innerHTML = '⚠️ 未找到缩略图，视频可能不存在或为私密视频';
        }
      }
    };
    img.onerror = function() {
      loaded++;
      if (loaded >= total) {
        if (html) {
          grid.innerHTML = html;
          grid.classList.add('show');
          statusMsg.innerHTML = '✅ 找到 ' + grid.querySelectorAll('.thumb-card').length + ' 个缩略图';
        } else {
          statusMsg.innerHTML = '⚠️ 无法加载缩略图，请检查链接后重试';
        }
      }
    };
    img.src = imgUrl;
  });
}

function downloadThumb(url, filename) {
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

setTimeout(fetchThumbnails, 500);
</script>

<script>

const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
