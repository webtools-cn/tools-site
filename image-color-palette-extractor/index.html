(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>🖼️ 上传图片</h2><input type="file" id="imageInput" accept="image/*"><div class="row"><div class="field"><label>提取颜色数量</label><select id="colorCount"><option value="5">5色</option><option value="8">8色</option><option value="10" selected>10色</option><option value="15">15色</option><option value="20">20色</option></select></div></div><div class="btn-row"><button class="btn btn-primary" id="extractBtn">🎨 提取配色</button></div></div><div class="result-section" id="previewSection"><h2>🖼️ 原图预览</h2><div id="imagePreview" style="text-align:center"></div></div><div class="result-section" id="resultSection"><h2>🎨 提取的配色方案</h2><div class="palette-grid" id="paletteGrid"></div><div class="btn-row"><button class="btn btn-success" id="copyPaletteBtn">📋 复制颜色代码</button></div></div>';

var currentColors=[];
function T(m){var t=document.getElementById("toast");if(!t)return;t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)}
document.getElementById('extractBtn').addEventListener('click',function(){

    var previewDiv=document.getElementById('imagePreview');

    document.getElementById('previewSection').classList.add('show');
    extractColors(img,parseInt(document.getElementById('colorCount').value));

function extractColors(img,numColors){
  var canvas=document.createElement('canvas');
  var ctx=canvas.getContext('2d');
  var w=img.width,h=img.height;
  var size=Math.min(200,Math.max(w,h));
  canvas.width=size;canvas.height=size*Math.min(h,w)/Math.max(w,h);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  var data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  var pixels=[];
  for(var i=0;i<data.length;i+=4){pixels.push([data[i],data[i+1],data[i+2]]);}
  var colors=quantize(pixels,numColors);
  currentColors=colors;
  renderPalette(colors);
  document.getElementById('extractBtn').textContent='🎨 提取配色';
  document.getElementById('extractBtn').disabled=false;
}

function quantize(pixels,numColors){
  if(pixels.length<=numColors) return pixels;
  var buckets=[pixels];
  while(buckets.length<numColors){
    var largestIdx=0;
    for(var i=1;i<buckets.length;i++){
      if(buckets[i].length>buckets[largestIdx].length) largestIdx=i;
    }
    var bucket=buckets[largestIdx];
    if(bucket.length<2) break;
    var rMin=255,rMax=0,gMin=255,gMax=0,bMin=255,bMax=0;
    bucket.forEach(function(p){
      rMin=Math.min(rMin,p[0]);rMax=Math.max(rMax,p[0]);
      gMin=Math.min(gMin,p[1]);gMax=Math.max(gMax,p[1]);
      bMin=Math.min(bMin,p[2]);bMax=Math.max(bMax,p[2]);
    });
    var rRange=rMax-rMin,gRange=gMax-gMin,bRange=bMax-bMin;
    var channel=0;
    if(gRange>=rRange&&gRange>=bRange) channel=1;
    else if(bRange>=rRange&&bRange>=gRange) channel=2;
    bucket.sort(function(a,b){return a[channel]-b[channel];});
    var mid=Math.floor(bucket.length/2);
    buckets.splice(largestIdx,1,bucket.slice(0,mid),bucket.slice(mid));
  }
  return buckets.map(function(bucket){
    var sumR=0,sumG=0,sumB=0;
    bucket.forEach(function(p){sumR+=p[0];sumG+=p[1];sumB+=p[2];});
    var n=bucket.length;
    return [Math.round(sumR/n),Math.round(sumG/n),Math.round(sumB/n)];
  });
}

function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(function(x){return ('0'+x.toString(16)).slice(-2);}).join('');
}

function renderPalette(colors){
  var grid=document.getElementById('paletteGrid');
  grid.innerHTML='';
  colors.forEach(function(c){
    var hex=rgbToHex(c[0],c[1],c[2]);
    var rgb='rgb('+c[0]+','+c[1]+','+c[2]+')';
    var item=document.createElement('div');
    item.className='palette-item';
    item.innerHTML='<div class="palette-color" style="background:'+rgb+'"></div><div class="palette-info">'+hex+'<br>rgb('+c[0]+','+c[1]+','+c[2]+')</div>';
    item.querySelector('.palette-color').addEventListener('click',function(){
      navigator.clipboard.writeText(hex).then(function(){
        var old=item.innerHTML;
        item.innerHTML='<div class="palette-color" style="background:'+rgb+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem">✅ 已复制</div><div class="palette-info">'+hex+'</div>';
        setTimeout(function(){item.innerHTML=old;},1000);
      });
    });
    grid.appendChild(item);
  });
  document.getElementById('resultSection').classList.add('show');
}

document.getElementById('copyPaletteBtn').addEventListener('click',function(){
  var txt=currentColors.map(function(c){return rgbToHex(c[0],c[1],c[2]);}).join(', ');

    document.getElementById('copyPaletteBtn').textContent='✅ 已复制';
    setTimeout(function(){document.getElementById('copyPaletteBtn').textContent='📋 复制颜色代码';},2000);

});
