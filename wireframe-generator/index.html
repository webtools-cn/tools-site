<script>
(function(){
const canvas=document.getElementById('canvas');
const propsPanel=document.getElementById('propsPanel');
let elements=[];
let selectedEl=null;
let isDragging=false,isResizing=false;
let dragOffsetX=0,dragOffsetY=0;

const defaultProps={
  heading:{w:300,h:40,text:'标题文本',class:'heading'},
  paragraph:{w:300,h:60,text:'这是一段正文内容，用于展示文字排版效果。',class:'paragraph'},
  button:{w:120,h:36,text:'按钮',class:'button'},
  input:{w:200,h:32,text:'请输入...',class:'input'},
  image:{w:200,h:150,text:'📷 图片',class:'image'},
  navbar:{w:800,h:50,text:'Logo    首页  关于  联系',class:'navbar'},
  'sidebar-comp':{w:200,h:400,text:'侧边栏',class:'sidebar-comp'},
  card:{w:300,h:200,text:'卡片标题\n卡片内容描述',class:'card'},
  divider:{w:300,h:2,text:'',class:'divider'},
  list:{w:200,h:150,text:'• 列表项 1\n• 列表项 2\n• 列表项 3',class:'list'},
  table:{w:400,h:120,text:'列1  列2  列3\n数据 数据 数据\n数据 数据 数据',class:'table'}
};

document.querySelectorAll('.component-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const type=btn.dataset.type;
    const props=Object.assign({},defaultProps[type]);
    const el={type,x:20,y:20+elements.length*10,w:props.w,h:props.h,text:props.text,cls:props.class,id:Date.now()+Math.random()};
    elements.push(el);
    renderElement(el);
    selectElement(el);
  });
});

function renderElement(el){
  const div=document.createElement('div');
  div.className='wire-element '+el.cls;
  div.dataset.id=el.id;
  div.style.left=el.x+'px';
  div.style.top=el.y+'px';
  div.style.width=el.w+'px';
  div.style.height=el.h+'px';
  div.innerHTML=`\x3Cspan class="el-text">${el.text.replace(/\n/g,'\x3Cbr>')}\x3C/span>\x3Cdiv class="resize-handle">\x3C/div>`;

  div.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('resize-handle')){
      isResizing=true;
      const startX=e.clientX,startY=e.clientY;
      const startW=el.w,startH=el.h;
      function onMove(e2){
        el.w=Math.max(20,startW+e2.clientX-startX);
        el.h=Math.max(20,startH+e2.clientY-startY);
        div.style.width=el.w+'px';
        div.style.height=el.h+'px';
        updateProps();
      }
      function onUp(){isResizing=false;document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    }else{
      selectElement(el);
      isDragging=true;
      dragOffsetX=e.clientX-el.x;
      dragOffsetY=e.clientY-el.y;
      function onMove(e2){
        el.x=Math.max(0,e2.clientX-dragOffsetX);
        el.y=Math.max(0,e2.clientY-dragOffsetY);
        div.style.left=el.x+'px';
        div.style.top=el.y+'px';
        updateProps();
      }
      function onUp(){isDragging=false;document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    }
    e.stopPropagation();
  });

  div.addEventListener('dblclick',e=>{
    const textEl=div.querySelector('.el-text');
    textEl.contentEditable=true;
    textEl.classList.add('editing');
    textEl.focus();
    textEl.addEventListener('blur',()=>{
      textEl.contentEditable=false;
      textEl.classList.remove('editing');
      el.text=textEl.innerText;
    },{once:true});
    e.stopPropagation();
  });

  canvas.appendChild(div);
}

function selectElement(el){
  document.querySelectorAll('.wire-element').forEach(d=>d.classList.remove('selected'));
  selectedEl=el;
  const div=canvas.querySelector(`[data-id="${el.id}"]`);
  if(div)div.classList.add('selected');
  updateProps();
}

function updateProps(){
  if(!selectedEl){
    propsPanel.innerHTML='\x3Ch3>属性\x3C/h3>\x3Cp style="color:#64748b;font-size:.8rem">选中组件查看属性\x3C/p>';
    return;
  }
  const el=selectedEl;
  propsPanel.innerHTML=`
    \x3Ch3>组件属性\x3C/h3>
    \x3Cdiv class="prop-row">\x3Clabel>X\x3C/label>\x3Cinput type="number" id="propX" value="${Math.round(el.x)}">\x3C/div>
    \x3Cdiv class="prop-row">\x3Clabel>Y\x3C/label>\x3Cinput type="number" id="propY" value="${Math.round(el.y)}">\x3C/div>
    \x3Cdiv class="prop-row">\x3Clabel>宽\x3C/label>\x3Cinput type="number" id="propW" value="${Math.round(el.w)}">\x3C/div>
    \x3Cdiv class="prop-row">\x3Clabel>高\x3C/label>\x3Cinput type="number" id="propH" value="${Math.round(el.h)}">\x3C/div>
    \x3Cdiv class="prop-row">\x3Clabel>文本\x3C/label>\x3Cinput type="text" id="propText" value="${el.text.replace(/"/g,'&quot;')}">\x3C/div>
    \x3Cdiv style="margin-top:10px">\x3Cbutton class="btn btn-danger" id="deleteElBtn">删除组件\x3C/button>\x3C/div>
    \x3Ch3>层级\x3C/h3>
    \x3Cdiv style="display:flex;gap:4px">
      \x3Cbutton class="btn btn-secondary" id="bringFrontBtn">置顶\x3C/button>
      \x3Cbutton class="btn btn-secondary" id="sendBackBtn">置底\x3C/button>
    \x3C/div>`;

  document.getElementById('propX').addEventListener('change',e=>{el.x=parseInt(e.target.value);refreshEl(el)});
  document.getElementById('propY').addEventListener('change',e=>{el.y=parseInt(e.target.value);refreshEl(el)});
  document.getElementById('propW').addEventListener('change',e=>{el.w=Math.max(20,parseInt(e.target.value));refreshEl(el)});
  document.getElementById('propH').addEventListener('change',e=>{el.h=Math.max(20,parseInt(e.target.value));refreshEl(el)});
  document.getElementById('propText').addEventListener('change',e=>{el.text=e.target.value;refreshEl(el)});
  document.getElementById('deleteElBtn').addEventListener('click',()=>{
    const div=canvas.querySelector(`[data-id="${el.id}"]`);
    if(div)div.remove();
    elements=elements.filter(e2=>e2.id!==el.id);
    selectedEl=null;updateProps();
  });
  document.getElementById('bringFrontBtn').addEventListener('click',()=>{
    const div=canvas.querySelector(`[data-id="${el.id}"]`);
    if(div)canvas.appendChild(div);
  });
  document.getElementById('sendBackBtn').addEventListener('click',()=>{
    const div=canvas.querySelector(`[data-id="${el.id}"]`);
    if(div)canvas.insertBefore(div,canvas.firstChild);
  });
}
