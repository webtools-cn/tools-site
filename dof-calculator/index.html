<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

(function(){var s=document.createElement('script');s.src='/tools-site/feedback-widget.html';s.onload=function(){if(window.initFeedback)initFeedback('dof-calculator')};document.body.appendChild(s)})();

function toggleFaq(el){var item=el.parentElement;item.classList.toggle('open')}

document.getElementById('sensorSize').addEventListener('change',function(){
  document.getElementById('cocValue').value=this.value;
});

document.getElementById('calcBtn').addEventListener('click',function(){
  const coc=parseFloat(document.getElementById('cocValue').value)||0.029;
  const f=parseFloat(document.getElementById('focalLength').value)||50;
  const N=parseFloat(document.getElementById('aperture').value)||2.8;
  const s=parseFloat(document.getElementById('focusDistance').value)||5;
  
  // Hyperfocal distance: H = (f^2) / (N * C) + f
  const H=((f*f)/(N*coc)+f)/1000; // in meters
  
  let nearLimit, farLimit, totalDof;
  
  if(s<=H){
    // Near limit: (s * (H - f/1000)) / (H + s - 2*f/1000)
    nearLimit=(s*(H-f/1000))/(H+s-2*f/1000);
    // Far limit: (s * (H - f/1000)) / (H - s)
    farLimit=(s*(H-f/1000))/(H-s);
    if(farLimit<0||farLimit>100000)farLimit=Infinity;
    totalDof=farLimit===Infinity?Infinity:farLimit-nearLimit;
  }else{
    // Focus distance beyond hyperfocal - everything from near limit to infinity
    nearLimit=(s*(H-f/1000))/(H+s-2*f/1000);
    farLimit=Infinity;
    totalDof=Infinity;
  }
  
  // Display results
  document.getElementById('resultCard').style.display='block';
  
  document.getElementById('totalDof').textContent=totalDof===Infinity?'∞':totalDof.toFixed(2);
  document.getElementById('nearLimit').textContent=nearLimit.toFixed(2);
  document.getElementById('farLimit').textContent=farLimit===Infinity?'∞':farLimit.toFixed(2);
  document.getElementById('hyperfocal').textContent=H.toFixed(2);
  
  // Visual bar
  const barWidth=400;
  const maxDist=Math.max(s*3,H*2,10);
  const nearPx=(nearLimit/maxDist)*barWidth;
  const farPx=farLimit===Infinity?barWidth:(farLimit/maxDist)*barWidth;
  const focusPx=(s/maxDist)*barWidth;
  
  const dofBar=document.getElementById('dofBar');
  const fp=document.getElementById('focusPoint');
  
  const startPx=Math.max(0,nearPx);
  const endPx=Math.min(barWidth,farPx);
  
  dofBar.style.left=startPx+'px';
  dofBar.style.width=Math.max(40,endPx-startPx)+'px';
  dofBar.textContent=totalDof===Infinity?'∞→':(totalDof.toFixed(1)+'m');
  
  fp.style.left=Math.min(barWidth,Math.max(0,focusPx))+'px';
  
  document.getElementById('nearLabel').textContent=nearLimit.toFixed(1)+'m';
  document.getElementById('farLabel').textContent=farLimit===Infinity?'∞':farLimit.toFixed(1)+'m';
  
  // Info
  if(totalDof!==Infinity&&totalDof>0){
    const frontDof=s-nearLimit;
    const backDof=farLimit-s;
    document.getElementById('ratioLabel').textContent=backDof>0?Math.round(frontDof/backDof*10)/10+':1':'1:'+Math.round(backDof/frontDof*10)/10;
  }else{
    document.getElementById('ratioLabel').textContent='--';
  }
  
  if(s>=H){
    document.getElementById('infoText').innerHTML='<strong>🌅 超焦距模式</strong>: 对焦距离 ('+s+'m) 已超过超焦距 ('+H.toFixed(2)+'m)。从 '+nearLimit.toFixed(2)+'m 到无穷远均在景深范围内。这是风光摄影的经典设置。';
  }else{
    document.getElementById('infoText').innerHTML='<strong>💡 信息</strong>: 对焦距离 ('+s+'m) 小于超焦距 ('+H.toFixed(2)+'m)。景深范围从 '+nearLimit.toFixed(2)+'m 到 '+(farLimit===Infinity?'∞':farLimit.toFixed(2)+'m')+'。要获得更大景深，可用更小光圈或更短焦距。';
  }
});

</script>
