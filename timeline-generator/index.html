el.querySelectorAll('.evt-desc').forEach(function(inp,i){inp.addEventListener('change',function(){events[i].desc=inp.value;});});}

renderEvents();
// Load html2canvas for export
var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';document.head.appendChild(s);
