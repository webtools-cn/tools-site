<script>

(function(){
var app=document.getElementById('app');
app.innerHTML='<div class="input-section" id="singleSection"><h2>🔢 单价计算</h2><div class="row"><div class="field"><label>总价 (元/$)</label><input type="number" id="totalPrice" value="25.00" step="0.01" min="0"></div><div class="field"><label>数量</label><input type="number" id="quantity" value="500" min="0.001" step="any"></div></div><div class="row"><div class="field"><label>单位类型</label><select id="unitType"><option value="weight">重量</option><option value="volume">体积</option><option value="count">数量</option></select></div><div class="field"><label>单位</label><select id="unit"><option value="g">克 (g)</option><option value="kg">千克 (kg)</option><option value="oz">盎司 (oz)</option><option value="lb">磅 (lb)</option></select></div></div><div class="btn-row"><button class="btn btn-primary" id="calcBtn">💰 计算单价</button></div><div class="result-section" id="singleResult"><div id="singleResultContent" style="padding:16px;background:rgba(6,182,212,.1);border-radius:8px;border:1px solid rgba(6,182,212,.2);text-align:center"></div></div></div><div class="input-section" id="compareSection"><h2>⚖️ 多商品对比</h2><p style="color:#94a3b8;font-size:.85rem;margin-bottom:8px">输入多个商品的总价和数量，比较哪个更划算。</p><div id="compareItems"><div class="compare-item" style="padding:8px;background:rgba(148,163,184,.05);border-radius:8px;margin-bottom:8px"><div class="row"><div class="field"><label>商品名</label><input type="text" class="itemName" value="商品A" style="width:100%;padding:8px 10px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:6px;font-size:.85rem"></div><div class="field"><label>总价</label><input type="number" class="itemPrice" value="25.00" step="0.01" style="width:100%;padding:8px 10px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:6px;font-size:.85rem"></div><div class="field"><label>数量</label><input type="number" class="itemQty" value="500" step="any" style="width:100%;padding:8px 10px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:6px;font-size:.85rem"></div></div></div></div><div class="btn-row"><button class="btn btn-secondary" id="addItemBtn">+ 添加商品</button><button class="btn btn-primary" id="compareBtn">⚖️ 比较价格</button></div><div class="result-section" id="compareResult"><div id="compareResultContent"></div></div>';

document.getElementById('usageContent').innerHTML='<p><strong>单价计算</strong>：输入总价和数量，计算每单位的价格，方便比价购物。</p><p>支持重量（克/千克/盎司/磅）、体积（毫升/升/加仑）和数量（个）单位。</p><p><strong>多商品对比</strong>：添加多个商品，一键比较哪个性价比最高！</p>';

function updateUnits() {
  var unitType = document.getElementById('unitType').value;
  var unitSel = document.getElementById('unit');
  unitSel.innerHTML = '';
  var opts = [];
  if (unitType === 'weight') opts = [['g','克 (g)'],['kg','千克 (kg)'],['oz','盎司 (oz)'],['lb','磅 (lb)']];
  else if (unitType === 'volume') opts = [['ml','毫升 (ml)'],['L','升 (L)'],['gal','加仑 (gal)'],['floz','液盎司 (fl oz)']];
  else opts = [['item','个 (item)'],['dozen','打 (dozen)'],['pack','包 (pack)']];
  opts.forEach(function(o){var opt=document.createElement('option');opt.value=o[0];opt.textContent=o[1];unitSel.appendChild(opt);});
  calcUnitPrice();
}

function getUnitLabel(unit) {
  var labels = {g:'克',kg:'千克',oz:'盎司',lb:'磅',ml:'毫升',L:'升',gal:'加仑',floz:'液盎司',item:'个',dozen:'打',pack:'包'};
  return labels[unit] || unit;
}

function calcUnitPrice() {
  var price = parseFloat(document.getElementById('totalPrice').value) || 0;
  var qty = parseFloat(document.getElementById('quantity').value) || 1;
  var unit = document.getElementById('unit').value;
  var unitLabel = getUnitLabel(unit);
  var unitPrice = price / qty;
  document.getElementById('singleResultContent').innerHTML = '<div style="font-size:2rem;font-weight:700;color:#22d3ee">' + unitPrice.toFixed(4) + '</div><div style="color:#94a3b8">元/每' + unitLabel + '</div><div style="margin-top:8px;color:#64748b;font-size:.85rem">共 ' + qty + ' ' + unitLabel + '，总价 ' + price.toFixed(2) + ' 元</div>';
}

function compareItems() {
  var items = document.querySelectorAll('.compare-item');
  var results = [];
  items.forEach(function(item){
    var name = item.querySelector('.itemName').value || '未命名';
    var price = parseFloat(item.querySelector('.itemPrice').value) || 0;
    var qty = parseFloat(item.querySelector('.itemQty').value) || 1;
    var unitLabel = getUnitLabel(document.getElementById('unit').value);
    results.push({name: name, price: price, qty: qty, unitPrice: price/qty, unitLabel: unitLabel});
  });
  results.sort(function(a,b){return a.unitPrice - b.unitPrice;});
  var best = results[0];
  var html = '<div style="margin-bottom:12px;padding:12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;text-align:center"><span style="font-size:1.2rem">🏆 最划算: </span><span style="font-size:1.4rem;font-weight:700;color:#4ade80">' + best.name + '</span><span style="color:#94a3b8"> (单价 ' + best.unitPrice.toFixed(4) + ' 元/' + best.unitLabel + ')</span></div>';
  html += '<div class="table-wrap"><table class="data"><tr><th>排名</th><th>商品</th><th>总价</th><th>数量</th><th>单价</th></tr>';
  results.forEach(function(r,i){
    html += '<tr' + (i===0?' style="background:rgba(34,197,94,.08)"':'') + '><td>' + (i+1) + '</td><td>' + r.name + '</td><td>' + r.price.toFixed(2) + '</td><td>' + r.qty + ' ' + r.unitLabel + '</td><td style="font-weight:600;color:' + (i===0?'#4ade80':'#f1f5f9') + '">' + r.unitPrice.toFixed(4) + '</td></tr>';
  });
  html += '</table></div>';
  document.getElementById('compareResultContent').innerHTML = html;
  document.getElementById('compareResult').classList.add('show');
}

document.getElementById('unitType').addEventListener('change', updateUnits);
document.getElementById('calcBtn').addEventListener('click', calcUnitPrice);
document.getElementById('compareBtn').addEventListener('click', compareItems);
document.getElementById('addItemBtn').addEventListener('click', function(){
  var div = document.createElement('div');
  div.className = 'compare-item';
  div.style.cssText = 'padding:8px;background:rgba(148,163,184,.05);border-radius:8px;margin-bottom:8px';
  div.innerHTML = '<div class="row"><div class="field"><label>商品名</label><input type="text" class="itemName" value="商品" style="width:100%;padding:8px 10px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:6px;font-size:.85rem"></div><div class="field"><label>总价</label><input type="number" class="itemPrice" value="0" step="0.01" style="width:100%;padding:8px 10px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:6px;font-size:.85rem"></div><div class="field"><label>数量</label><input type="number" class="itemQty" value="1" step="any" style="width:100%;padding:8px 10px;background:#0f172a;color:#e2e8f0;border:1px solid rgba(148,163,184,.2);border-radius:6px;font-size:.85rem"></div></div>';
  document.getElementById('compareItems').appendChild(div);
});
updateUnits();
calcUnitPrice();
})();

</script>
