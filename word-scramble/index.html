function findWords(){var letters=document.getElementById('lettersInput').value.trim().toLowerCase();var minLen=parseInt(document.getElementById('minLen').value);var exact=document.getElementById('exactMatch').checked;if(!letters){document.getElementById('wordResults').textContent='Please enter some letters.';return;}
function sortStr(s){return s.split('').sort().join('');}
var sortedInput=sortStr(letters);var matches=[];for(var i=0;i<WORD_LIST.length;i++){var w=WORD_LIST[i];if(w.length<minLen)continue;if(exact&&w.length!==letters.length)continue;if(w.length>letters.length)continue;if(sortStr(w)===sortedInput.substring(0,w.length)||sortStr(w)===sortedInput.substring(sortedInput.length-w.length)){if(sortStr(w)===sortStr(letters.substring(0,w.length))||sortStr(w)===sortStr(letters.substring(letters.length-w.length))){matches.push(w);continue;}}
var wSorted=sortStr(w);var inSorted=sortedInput;var found=true;var temp=sortedInput;for(var j=0;j<wSorted.length;j++){var idx=temp.indexOf(wSorted[j]);if(idx===-1){found=false;break;}temp=temp.substring(0,idx)+temp.substring(idx+1);}if(found)matches.push(w);}
var unique=[];var seen={};for(var i=0;i<matches.length;i++){if(!seen[matches[i]]){seen[matches[i]]=true;unique.push(matches[i]);}}
unique.sort(function(a,b){return b.length-a.length||a.localeCompare(b);});
var display=unique.map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(', ');
document.getElementById('wordResults').textContent=display||'No words found. Try different letters.';
document.getElementById('wordCount').textContent='Found '+unique.length+' words (min '+minLen+' letters'+(exact?', exact length only':'')+')';}

findWords();})();
