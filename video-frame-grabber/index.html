  });
  videoEl.addEventListener('timeupdate',function(){
    document.getElementById('currentTime').value=videoEl.currentTime.toFixed(2);
  });
});

document.getElementById('seekBtn').addEventListener('click',function(){
  if(!videoEl)return;
  var t=parseFloat(document.getElementById('seekTime').value)||0;
  videoEl.currentTime=t;
});

document.getElementById('captureBtn').addEventListener('click',function(){
  if(!videoEl)return;
  captureFrame(videoEl.currentTime);
});

document.getElementById('captureBatchBtn').addEventListener('click',function(){
  if(!videoEl)return;
  var ct=videoEl.currentTime;
  for(var i=0;i<5;i++){
    (function(t){
      setTimeout(function(){
        videoEl.currentTime=t;
        setTimeout(function(){captureFrame(t,false);},200);
      },i*250);
    })(ct+i);
  }
  document.getElementById('resultSection').style.display='block';
});

function captureFrame(time,single){
  if(!videoEl)return;
  var canvas=document.createElement('canvas');
  canvas.width=videoEl.videoWidth;
  canvas.height=videoEl.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(videoEl,0,0);
  var dataUrl=canvas.toDataURL('image/png');
  
  if(single!==false)single=true;
  if(single){
    document.getElementById('resultSection').style.display='block';
    document.getElementById('captures').innerHTML='';
  }
  
  var tStr=Math.floor(time/60)+':'+(Math.floor(time%60)<10?'0':'')+Math.floor(time%60);
  var div=document.createElement('div');
  div.style.cssText='display:inline-block;margin:8px;text-align:center';
  div.innerHTML='<img src="'+dataUrl+'" style="max-width:200px;max-height:150px;border-radius:6px;border:1px solid rgba(148,163,184,.2);cursor:pointer" onclick="window.open(this.src)" title="'+(window._isEN?'Click to view':'点击查看')+'"><br><a href="'+dataUrl+'" download="frame_'+time.toFixed(2)+'.png" style="font-size:.75rem;color:#06b6d4">'+(window._isEN?'Download':'下载')+' @ '+tStr+'</a>';
  
  if(single){
    document.getElementById('captures').appendChild(div);
  } else {
    document.getElementById('captures').appendChild(div);
  }
}
})();

</script>
