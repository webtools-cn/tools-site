(function(){

(function(){var app=document.getElementById('app');
app.innerHTML='<div class="input-section"><h2>\uD83D\uDCB0 Loan Parameters</h2><div class="row"><div class="field"><label>Loan Amount ($)</label><input type="number" id="loanAmount" value="300000"></div><div class="field"><label>Annual Rate (%)</label><input type="number" id="loanRate" value="4.5" step="0.1"></div><div class="field"><label>Term (years)</label><input type="number" id="loanTerm" value="30"></div></div><div class="options"><label><input type="radio" name="repayMethod" value="equalInstallment" checked> Equal Payment</label><label><input type="radio" name="repayMethod" value="equalPrincipal"> Equal Principal</label></div><div class="btn-row"><button class="btn btn-primary" id="calcLoan">Calculate</button></div></div><div class="result-section" id="loanResult"><h2>\uD83D\uDCCA Results</h2><div class="grid grid-cols-3" id="loanSummary" style="margin-bottom:16px"></div><h2>\uD83D\uDCC5 Amortization</h2><div class="table-wrap" id="loanSchedule" style="max-height:400px;overflow-y:auto"></div></div>';
function calc(){var amount=parseFloat(document.getElementById('loanAmount').value)||0,rate=parseFloat(document.getElementById('loanRate').value)||0,years=parseInt(document.getElementById('loanTerm').value)||1,method=document.querySelector('input[name="repayMethod"]:checked').value;var rs=document.getElementById('loanResult');if(amount<=0||rate<0||years<=0){showToast('Enter valid values');return;}var mr=rate/100/12,mo=years*12,monthly,totalPay,totalInt,sch=[];if(method==='equalInstallment'){if(mr===0)monthly=amount/mo;else monthly=amount*mr*Math.pow(1+mr,mo)/(Math.pow(1+mr,mo)-1);totalPay=monthly*mo;totalInt=totalPay-amount;var remain=amount;for(var i=1;i<=mo;i++){var ir=remain*mr,pr=monthly-ir;remain-=pr;sch.push({period:i,payment:monthly,principal:pr,interest:ir,remain:Math.max(0,remain)});}}else{var pm=amount/mo,total=0;for(var i=1;i<=mo;i++){var r=amount-pm*(i-1),ir=r*mr,payment=pm+ir;total+=payment;sch.push({period:i,payment:payment,principal:pm,interest:ir,remain:r-pm});}totalPay=total;totalInt=totalPay-amount;monthly=sch[0].payment;}document.getElementById('loanSummary').innerHTML='<div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center"><div style="color:#64748b;font-size:.8rem">Monthly</div><div style="color:#22d3ee;font-size:1.4rem;font-weight:700;margin-top:4px">$'+monthly.toFixed(2)+'</div></div><div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center"><div style="color:#64748b;font-size:.8rem">Total Interest</div><div style="color:#f87171;font-size:1.4rem;font-weight:700;margin-top:4px">$'+totalInt.toFixed(2)+'</div></div><div style="background:#0f172a;border-radius:8px;padding:16px;text-align:center"><div style="color:#64748b;font-size:.8rem">Total Payment</div><div style="color:#f1f5f9;font-size:1.4rem;font-weight:700;margin-top:4px">$'+totalPay.toFixed(2)+'</div></div>';
