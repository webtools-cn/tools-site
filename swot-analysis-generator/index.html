  product:{title:'产品分析',S:'核心功能领先\n用户体验优秀\n性能指标突出\n品牌口碑好\n技术壁垒高',W:'功能复杂难用\n定价偏高\n兼容性不足\n文档不完善\n客户支持响应慢',O:'新市场需求\n技术平台升级\n战略合作机会\n国际市场拓展\n垂直领域深耕',T:'竞品功能迭代\n价格战压力\n技术标准变化\n开源替代品\n用户习惯迁移'},
  startup:{title:'创业项目',S:'创新技术或模式\n团队能力互补\n低成本运营\n快速决策\n市场先发优势',W:'品牌认知度零\n资金有限\n人才招募难\n产品未验证\n供应链未成型',O:'资本关注热点\n市场教育成熟\n政策扶持\n渠道合作机会\n用户需求增长',T:'巨头入局风险\n融资环境恶化\n技术壁垒崩塌\n获客成本上升\n知识产权风险'},

document.querySelectorAll('#templateBar .template-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('#templateBar .template-btn').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    var tpl=this.dataset.tpl;
    var data=templates[tpl];
    if(!data)return;
    document.getElementById('strengths').value=data.S;
    document.getElementById('weaknesses').value=data.W;
    document.getElementById('opportunities').value=data.O;
    document.getElementById('threats').value=data.T;
    if(tpl!=='custom')showToast('已加载「'+data.title+'」模板');
  });
});

// Load business template by default
window.addEventListener('DOMContentLoaded',function(){
  var def=templates.business;
  document.getElementById('strengths').value=def.S;
  document.getElementById('weaknesses').value=def.W;
  document.getElementById('opportunities').value=def.O;
  document.getElementById('threats').value=def.T;
});

document.getElementById('generateBtn').addEventListener('click',function(){
  var S=document.getElementById('strengths').value.trim().split('\n').filter(function(s){return s.trim()});
  var W=document.getElementById('weaknesses').value.trim().split('\n').filter(function(s){return s.trim()});
  var O=document.getElementById('opportunities').value.trim().split('\n').filter(function(s){return s.trim()});
  var T=document.getElementById('threats').value.trim().split('\n').filter(function(s){return s.trim()});
  
  if(!S.length&&!W.length&&!O.length&&!T.length){showToast('请至少输入一项内容');return}
  
  function renderList(arr,el){
    el.innerHTML='';
    arr.forEach(function(item){
      var li=document.createElement('li');
      li.textContent=item;
      el.appendChild(li);
    });
    if(arr.length===0){
      var li=document.createElement('li');
      li.textContent='（暂无）';
      li.style.color='#aaa';
      el.appendChild(li);
    }
  }
  
  renderList(S,document.getElementById('listS'));
  renderList(W,document.getElementById('listW'));
  renderList(O,document.getElementById('listO'));
  renderList(T,document.getElementById('listT'));
  
  // TOWS strategies
  function suggestStrategy(primary,secondary,type){
    if(!primary.length||!secondary.length)return '建议补充更多分析数据以生成策略建议。';
    var p=primary[0];
    var s=secondary[0];
    var suggestions={
      SO:'结合"'+p+'"和"'+s+'"，制定增长型战略。重点关注如何将内部优势与外部机会最大化结合。',
      WO:'针对"'+p+'"，利用"'+s+'"加以改善。制定改进计划，将劣势转化为未来优势。',
      ST:'运用"'+p+'"来应对"'+(secondary.length>1?secondary[1]:s)+'"等外部威胁。制定防御与多元化战略。',
      WT:'针对"'+p+'"，制定计划以规避"'+(secondary.length>1?secondary[1]:s)+'"等威胁。考虑收缩或转型策略。'
    };
    return suggestions[type];
  }
  
  document.getElementById('towsSO').textContent=S.length&&O.length?suggestStrategy(S,O,'SO'):'建议在SWOT各维度至少填写一项以生成策略建议。';
  document.getElementById('towsWO').textContent=W.length&&O.length?suggestStrategy(W,O,'WO'):'建议在SWOT各维度至少填写一项以生成策略建议。';
  document.getElementById('towsST').textContent=S.length&&T.length?suggestStrategy(S,T,'ST'):'建议在SWOT各维度至少填写一项以生成策略建议。';
  document.getElementById('towsWT').textContent=W.length&&T.length?suggestStrategy(W,T,'WT'):'建议在SWOT各维度至少填写一项以生成策略建议。';
  
  document.getElementById('resultCard').style.display='block';
  showToast('✅ SWOT矩阵已生成');
});

document.getElementById('exportTextBtn').addEventListener('click',function(){
  var S=document.getElementById('strengths').value.trim();
  var W=document.getElementById('weaknesses').value.trim();
  var O=document.getElementById('opportunities').value.trim();
  var T=document.getElementById('threats').value.trim();
  var text='=== SWOT分析矩阵 ===\n\n';
  text+='💪 优势 (Strengths):\n'+(S||'（暂无）')+'\n\n';
  text+='⚠️ 劣势 (Weaknesses):\n'+(W||'（暂无）')+'\n\n';
  text+='🌟 机会 (Opportunities):\n'+(O||'（暂无）')+'\n\n';
  text+='🔥 威胁 (Threats):\n'+(T||'（暂无）')+'\n';
  navigator.clipboard.writeText(text).then(function(){showToast('✅ 已复制SWOT文本')}).catch(function(){showToast('❌ 复制失败')});
});

document.getElementById('clearBtn').addEventListener('click',function(){
  document.getElementById('strengths').value='';
  document.getElementById('weaknesses').value='';
  document.getElementById('opportunities').value='';
  document.getElementById('threats').value='';
  document.getElementById('resultCard').style.display='none';

  document.querySelector('#templateBar .template-btn[data-tpl="custom"]').classList.add('active');
  showToast('已清空');
});
