<script>
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},3000)}
function copyText(id){var el=document.getElementById(id);if(!el)return;var t=el.textContent||el.innerText;navigator.clipboard.writeText(t).then(function(){showToast("已复制")})["catch"](function(){showToast("复制失败")})}

const defaultColors = ['#06b6d4','#8b5cf6','#f59e0b','#10b981','#ef4444','#ec4899','#3b82f6','#f97316','#14b8a6','#a855f7'];
const defaultData = [
  {label:'产品A',value:35,color:'#06b6d4'},
  {label:'产品B',value:25,color:'#8b5cf6'},
  {label:'产品C',value:20,color:'#f59e0b'},
  {label:'产品D',value:12,color:'#10b981'},
  {label:'其他',value:8,color:'#ef4444'}
];

function initTable(){
  const body=document.getElementById('dataBody');
  body.innerHTML='';
  defaultData.forEach((d,i)=>addRow(d.label,d.value,d.color));
}

function addRow(label='',value='',color=''){
  const body=document.getElementById('dataBody');
  const idx=body.children.length;
  const c=color||defaultColors[idx%defaultColors.length];
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text" value="${label}" oninput="drawDonut()" placeholder="标签"></td>
    <td><input type="number" value="${value}" oninput="drawDonut()" placeholder="0" min="0"></td>
    <td><input type="color" value="${c}" class="color-picker-inline" oninput="drawDonut()"></td>
    <td><button class="btn btn-secondary" style="padding:4px 10px;font-size:.75rem" onclick="this.closest('tr').remove();drawDonut()">删除</button></td>`;
  body.appendChild(tr);
  drawDonut();
}

function resetData(){
  document.getElementById('dataBody').innerHTML='';
  defaultData.forEach(d=>addRow(d.label,d.value,d.color));
}

function getData(){
  const rows=document.querySelectorAll('#dataBody tr');
  const labels=[],values=[],colors=[];
  rows.forEach(tr=>{
    const inputs=tr.querySelectorAll('input');
    const l=inputs[0].value||'未命名';
    const v=parseFloat(inputs[1].value)||0;
    const c=inputs[2].value||'#06b6d4';
    if(v>0){labels.push(l);values.push(v);colors.push(c);}
  });
  return{labels,values,colors};
}

function drawDonut(){
  const canvas=document.getElementById('donutCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=2;
  canvas.width=600*dpr;canvas.height=500*dpr;
  canvas.style.width='600px';canvas.style.height='500px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,600,500);

  const data=getData();
  const total=data.values.reduce((a,b)=>a+b,0);
  if(total===0){ctx.fillStyle='#94a3b8';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('请输入数据',300,250);return;}

  const title=document.getElementById('chartTitle').value;
  const innerPct=parseInt(document.getElementById('innerRadius').value)/100;
  const showPct=document.getElementById('showPercent').checked;
  const showLeg=document.getElementById('showLegend').checked;
  const showVal=document.getElementById('showValues').checked;

  const cx=showLeg?220:300, cy=260;
  const outerR=Math.min(cx-40,cy-60,180);
  const innerR=outerR*innerPct;

  // Title
  ctx.fillStyle='#1e293b';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText(title,300,30);

  // Draw segments
  let startAngle=-Math.PI/2;
  data.values.forEach((val,i)=>{
    const sliceAngle=(val/total)*Math.PI*2;
    const endAngle=startAngle+sliceAngle;

    ctx.beginPath();
    ctx.arc(cx,cy,outerR,startAngle,endAngle);
    ctx.arc(cx,cy,innerR,endAngle,startAngle,true);
    ctx.closePath();
    ctx.fillStyle=data.colors[i];
    ctx.fill();

    // Segment border
    ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();

    // Label on segment
    if(showPct||showVal){
      const midAngle=startAngle+sliceAngle/2;
      const labelR=(outerR+innerR)/2;
      const lx=cx+Math.cos(midAngle)*labelR;
      const ly=cy+Math.sin(midAngle)*labelR;
      const pct=((val/total)*100).toFixed(1);
      ctx.fillStyle='white';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      let txt='';
      if(showPct&&showVal) txt=`${pct}%\n${val}`;
      else if(showPct) txt=pct+'%';
      else txt=String(val);
      const lines=txt.split('\n');
      lines.forEach((line,li)=>{ctx.fillText(line,lx,ly+(li-lines.length/2+0.5)*14);});
    }

    startAngle=endAngle;
  });

  // Center text
  ctx.fillStyle='#334155';ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(total,cx,cy-6);
  ctx.fillStyle='#64748b';ctx.font='12px sans-serif';
  ctx.fillText('总计',cx,cy+14);

  // Legend
  if(showLeg){
    const lx=440,ly=80;
    ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    data.labels.forEach((label,i)=>{
      const y=ly+i*22;
      ctx.fillStyle=data.colors[i];
      ctx.fillRect(lx,y-6,12,12);
      ctx.fillStyle='#475569';
      const pct=((data.values[i]/total)*100).toFixed(1);
      ctx.fillText(`${label} (${pct}%)`,lx+18,y);
    });
  }
}

function exportPNG(){
  const canvas=document.getElementById('donutCanvas');
  const link=document.createElement('a');
  link.download='donut-chart.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

initTable();

</script>
