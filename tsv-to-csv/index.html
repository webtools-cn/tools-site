<div class="panel">
  <h2>📝 输入TSV</h2>
  <div class="drop-zone" id="drop-zone">📁 拖拽TSV文件到此处<input type="file" id="file-input" accept=".tsv,.txt,.tab" style="display:none"></div>

<script>
function csvEscape(field,sep){
  if(field===null||field===undefined)return '';
  const s=String(field);
  if(s.includes(sep)||s.includes('"')||s.includes('\n')||s.includes('\r'))return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function convertTSV(){
  const input=document.getElementById('tsv-input').value;
  const errEl=document.getElementById('error-msg');errEl.classList.remove('show');
  if(!input.trim()){errEl.textContent='请输入TSV内容';errEl.classList.add('show');return;}
  try{
    const sep=document.getElementById('output-sep').value;
    const skipEmpty=document.getElementById('toggle-skip-empty').classList.contains('on');
    const addBom=document.getElementById('toggle-bom').classList.contains('on');
    const lines=input.split('\n');
    const resultLines=[];
    let rowCount=0,colCount=0;
    lines.forEach(line=>{
      if(skipEmpty&&!line.trim())return;
      const fields=line.split('\t');
      colCount=Math.max(colCount,fields.length);
      resultLines.push(fields.map(f=>csvEscape(f,sep)).join(sep));
      rowCount++;
    });
    let output=resultLines.join('\n');
    if(addBom)output='\ufeff'+output;
    document.getElementById('result-output').value=output;
    document.getElementById('stats-row').innerHTML='<div class="stat-item"><div class="num" style="color:#06b6d4">'+rowCount+'</div><div class="lbl">行数</div></div><div class="stat-item"><div class="num" style="color:#10b981">'+colCount+'</div><div class="lbl">列数</div></div>';
    document.getElementById('result-panel').style.display='block';
  }catch(e){errEl.textContent='转换错误: '+e.message;errEl.classList.add('show');}
}
function copyResult(){const v=document.getElementById('result-output').value;if(v)navigator.clipboard.writeText(v);}
function downloadResult(){const v=document.getElementById('result-output').value;if(!v)return;const blob=new Blob([v],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.csv';a.click();}
function loadExample(){
  document.getElementById('tsv-input').value='姓名\t年龄\t城市\t邮箱\n张三\t25\t北京\tzhang@example.com\n李四\t30\t上海\tli@example.com\n王五\t28\t广州\twang@example.com\n赵六\t35\t深圳\t"赵,六"@example.com';
  convertTSV();
}
function clearAll(){document.getElementById('tsv-input').value='';document.getElementById('result-output').value='';document.getElementById('result-panel').style.display='none';document.getElementById('error-msg').classList.remove('show');}
const dz=document.getElementById('drop-zone');const fi=document.getElementById('file-input');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('tsv-input').value=ev.target.result;convertTSV();};r.readAsText(f);}});
fi.addEventListener('change',e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById('tsv-input').value=ev.target.result;convertTSV();};r.readAsText(f);}});
document.getElementById('tsv-input').addEventListener('input',function(){clearTimeout(this._timer);this._timer=setTimeout(convertTSV,600);});
document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){convertTSV();e.preventDefault();}if(e.ctrlKey&&e.shiftKey&&e.key==='C'){copyResult();e.preventDefault();}if(e.ctrlKey&&e.shiftKey&&e.key==='X'){clearAll();e.preventDefault();}});
window.addEventListener('load',loadExample);
</script>
