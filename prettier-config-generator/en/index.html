<div class="container">

  <div class="card">
    <h2>⚙️ Basic Settings</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Print Width</label>
        <input type="number" id="printWidth" value="80" min="40" max="200">
      </div>
      <div class="form-group">
        <label>Tab Width</label>
        <select id="tabWidth"><option value="2" selected>2</option><option value="4">4</option><option value="8">8</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Indent</label>
        <select id="useTabs"><option value="false">Spaces</option><option value="true">Tabs</option></select>
      </div>
      <div class="form-group">
        <label>Quotes</label>
        <select id="singleQuote"><option value="true" selected>Single</option><option value="false">Double</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Semicolons</label>
        <select id="semi"><option value="true" selected>Always</option><option value="false">Omit</option></select>
      </div>
      <div class="form-group">
        <label>Trailing Commas</label>
        <select id="trailingComma"><option value="all">All</option><option value="es5" selected>ES5</option><option value="none">None</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🔧 Advanced Settings</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Bracket Spacing</label>
        <select id="bracketSpacing"><option value="true" selected>{ foo }</option><option value="false">{foo}</option></select>
      </div>
      <div class="form-group">
        <label>Arrow Parens</label>
        <select id="arrowParens"><option value="always" selected>Always</option><option value="avoid">Avoid</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quote Props</label>
        <select id="quoteProps"><option value="as-needed" selected>As-needed</option><option value="consistent">Consistent</option><option value="preserve">Preserve</option></select>
      </div>
      <div class="form-group">
        <label>JSX Quotes</label>
        <select id="jsxSingleQuote"><option value="false">Double</option><option value="true" selected>Single</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>End of Line</label>
        <select id="endOfLine"><option value="lf" selected>LF (Unix)</option><option value="crlf">CRLF (Windows)</option><option value="auto">Auto</option></select>
      </div>
      <div class="form-group">
        <label>HTML Whitespace</label>
        <select id="htmlWhitespace"><option value="css" selected>CSS</option><option value="strict">Strict</option><option value="ignore">Ignore</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>Max attributes per line (0 = unlimited)</label>
      <input type="number" id="singleAttributePerLine" value="0" min="0" max="10">

<script>
let fmt = 'json';
function getConfig() {
  return {
    printWidth: parseInt(document.getElementById('printWidth').value) || 80,
    tabWidth: parseInt(document.getElementById('tabWidth').value) || 2,
    useTabs: document.getElementById('useTabs').value === 'true',
    semi: document.getElementById('semi').value === 'true',
    singleQuote: document.getElementById('singleQuote').value === 'true',
    trailingComma: document.getElementById('trailingComma').value,
    bracketSpacing: document.getElementById('bracketSpacing').value === 'true',
    arrowParens: document.getElementById('arrowParens').value,
    quoteProps: document.getElementById('quoteProps').value,
    jsxSingleQuote: document.getElementById('jsxSingleQuote').value === 'true',
    endOfLine: document.getElementById('endOfLine').value,
    htmlWhitespaceSensitivity: document.getElementById('htmlWhitespace').value,
    singleAttributePerLine: parseInt(document.getElementById('singleAttributePerLine').value) || 0,
  };
}
function generate() {
  const c = getConfig();
  const out = fmt === 'json' ? toJSON(c) : toYAML(c);
  document.getElementById('output').textContent = out;
}
function toJSON(c) {
  const obj = {};
  if (c.printWidth !== 80) obj.printWidth = c.printWidth;
  if (c.tabWidth !== 2) obj.tabWidth = c.tabWidth;
  if (c.useTabs) obj.useTabs = true;
  if (!c.semi) obj.semi = false;
  if (c.singleQuote) obj.singleQuote = true;
  if (c.trailingComma !== 'es5') obj.trailingComma = c.trailingComma;
  if (!c.bracketSpacing) obj.bracketSpacing = false;
  if (c.arrowParens !== 'always') obj.arrowParens = 'avoid';
  if (c.quoteProps !== 'as-needed') obj.quoteProps = c.quoteProps;
  if (c.jsxSingleQuote) obj.jsxSingleQuote = true;
  if (c.endOfLine !== 'lf') obj.endOfLine = c.endOfLine;
  if (c.htmlWhitespaceSensitivity !== 'css') obj.htmlWhitespaceSensitivity = c.htmlWhitespaceSensitivity;
  if (c.singleAttributePerLine > 0) obj.singleAttributePerLine = true;
  return JSON.stringify(obj, null, 2);
}
function toYAML(c) {
  const lines = [];
  if (c.printWidth !== 80) lines.push(`printWidth: ${c.printWidth}`);
  if (c.tabWidth !== 2) lines.push(`tabWidth: ${c.tabWidth}`);
  if (c.useTabs) lines.push('useTabs: true');
  if (!c.semi) lines.push('semi: false');
  if (c.singleQuote) lines.push('singleQuote: true');
  if (c.trailingComma !== 'es5') lines.push(`trailingComma: ${c.trailingComma}`);
  if (!c.bracketSpacing) lines.push('bracketSpacing: false');
  if (c.arrowParens !== 'always') lines.push('arrowParens: avoid');
  if (c.quoteProps !== 'as-needed') lines.push(`quoteProps: ${c.quoteProps}`);
  if (c.jsxSingleQuote) lines.push('jsxSingleQuote: true');
  if (c.endOfLine !== 'lf') lines.push(`endOfLine: ${c.endOfLine}`);
  if (c.htmlWhitespaceSensitivity !== 'css') lines.push(`htmlWhitespaceSensitivity: ${c.htmlWhitespaceSensitivity}`);
  if (c.singleAttributePerLine > 0) lines.push('singleAttributePerLine: true');
  if (lines.length === 0) return '# Using Prettier defaults\n{}';
  return lines.join('\n');
}
function switchFormat(f){fmt=f;generate();}
function copyIt(){const t=document.getElementById('output').textContent;navigator.clipboard.writeText(t).then(()=>{const b=document.querySelectorAll('.btn-row .btn-secondary')[0];const o=b.textContent;b.textContent='✅ Copied';setTimeout(()=>b.textContent=o,2000)}).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});}
function downloadIt(){const t=document.getElementById('output').textContent;const ext=fmt==='json'?'.prettierrc':'.prettierrc.yaml';const b=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=ext;a.click();URL.revokeObjectURL(a.href);}
document.querySelectorAll('input, select').forEach(el=>{el.addEventListener('change',generate);el.addEventListener('input',generate)});
generate();
</script>

<span style="color:#f1f5f9;font-size:.95rem;font-weight:600">📝 反馈建议</span>
<button onclick="toggleFeedback()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
</div>
<select id="feedback-type" style="width:100%;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none">
<option value="feedback">💡 功能建议</option>
<option value="bug">🐛 问题反馈</option>
<option value="other">💬 其他</option>
</select>
<textarea id="feedback-text" placeholder="请描述您的建议或遇到的问题..." style="width:100%;height:100px;background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:6px;padding:10px;color:#e2e8f0;font-size:.85rem;resize:vertical;outline:none;font-family:inherit" maxlength="1000"></textarea>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<span id="feedback-count" style="color:#475569;font-size:.75rem">0/1000</span>
<button onclick="submitFeedback()" style="background:rgba(6,182,212,.2);color:#22d3ee;border:1px solid rgba(6,182,212,.3);border-radius:6px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(6,182,212,.4)'" onmouseout="this.style.background='rgba(6,182,212,.2)'">Submit</button>
</div>
<div id="feedback-success" style="display:none;margin-top:8px;padding:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:6px;color:#22c55e;font-size:.8rem;text-align:center">✅ Thank you! Your feedback has been submitted to GitHub Issues</div>
</div>
</div>
<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function toggleFeedback(){const p=document.getElementById('feedback-panel');p.style.display=p.style.display==='none'?'block':'none';}
document.getElementById('feedback-text').addEventListener('input',function(){document.getElementById('feedback-count').textContent=this.value.length+'/1000';});
function submitFeedback(){
const type=document.getElementById('feedback-type').value;
const text=document.getElementById('feedback-text').value.trim();
if(!text){showToast('请输入反馈内容');return;}
const typeLabel={feedback:'💡 功能建议',bug:'🐛 问题反馈',other:'💬 其他'}[type];
const title=encodeURIComponent(typeLabel+' - '+window.location.pathname);
const body=encodeURIComponent('**Page**: '+window.location.href+'\n**Type**: '+typeLabel+'\n\n'+text);
window.open('https://github.com/webtools-cn/tools-site/issues/new?title='+title+'&body='+body,'_blank');
document.getElementById('feedback-success').style.display='block';
setTimeout(()=>{document.getElementById('feedback-success').style.display='none';toggleFeedback();document.getElementById('feedback-text').value='';document.getElementById('feedback-count').textContent='0/1000';},3000);
}
</script>
